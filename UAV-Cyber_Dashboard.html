<title>無人機資安 · 標準 × 測試 × 建置模式 儀表板</title>
<style>
  :root{

    --bg:#0f1319; --surface:#171c24; --surface2:#1e242e; --ink:#e6e9ee; --muted:#9aa4b2;
    --line:#2a313c; --accent:#6ea8ff; --accent-ink:#a9c9ff; --code-bg:#1c222b;
    --ok:#4fc48b; --warn:#e0b451; --bad:#ef8a7f; --pend:#b79cf0;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Hanken Grotesk","Noto Sans TC","Microsoft JhengHei","Segoe UI",system-ui,sans-serif;
    font-size:16px;line-height:1.7}
  a{color:var(--accent);text-decoration:none}
  a:hover{color:var(--accent-ink);text-decoration:underline}
  code,.mono{font-family:"Spline Sans Mono",Consolas,"Cascadia Code",monospace;font-size:.88em;
    background:var(--code-bg);padding:.08em .38em;border-radius:5px}
  header.top{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--line);
    padding:10px 18px;display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;justify-content:space-between}
  .brand{font-weight:800;font-size:1.05rem;letter-spacing:.2px}
  .brand small{display:block;font-weight:400;color:var(--muted);font-size:.72rem;margin-top:1px}
  .tools{display:flex;gap:8px;align-items:center}
  .btn{background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:6px 11px;font:inherit;font-size:.85rem;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  nav.tabs{position:sticky;top:53px;z-index:19;background:var(--bg);border-bottom:1px solid var(--line);
    display:flex;flex-wrap:wrap;gap:2px;padding:6px 12px}
  nav.tabs button{background:none;border:none;color:var(--muted);font:inherit;font-size:.9rem;
    padding:7px 12px;border-radius:8px 8px 0 0;cursor:pointer;border-bottom:2px solid transparent}
  nav.tabs button:hover{color:var(--ink);background:var(--surface2)}
  nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
  main{max-width:1080px;margin:0 auto;padding:22px 18px 90px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  h1{font-size:1.7rem;margin:.2em 0 .5em}
  h2{font-size:1.28rem;margin:1.5em 0 .5em;padding-bottom:.2em;border-bottom:2px solid var(--line)}
  h3{font-size:1.05rem;margin:1.2em 0 .35em}
  p{margin:.6em 0}
  .lead{color:var(--muted);font-size:1.02rem}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .card h3{margin-top:0}
  .card.tint{border-left:4px solid var(--accent)}
  .kpi{font-size:1.6rem;font-weight:800;line-height:1.1}
  .kpi small{display:block;font-size:.72rem;font-weight:500;color:var(--muted);margin-top:3px}
  .chip{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;
    background:var(--surface2);color:var(--muted);border:1px solid var(--line);white-space:nowrap}
  .chip.ok{color:var(--ok);border-color:var(--ok)} .chip.warn{color:var(--warn);border-color:var(--warn)}
  .chip.bad{color:var(--bad);border-color:var(--bad)} .chip.pend{color:var(--pend);border-color:var(--pend)}
  .b{font-weight:700}
  table{border-collapse:collapse;width:100%;margin:.8em 0;font-size:.9rem}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  th{background:var(--surface2);font-weight:700}
  tr:nth-child(even) td{background:color-mix(in srgb,var(--surface2) 45%,transparent)}
  .tag{display:inline-block;font-size:.7rem;font-weight:700;color:#fff;padding:1px 7px;border-radius:5px;margin-right:4px}
  .note{background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:.9rem;color:var(--muted)}
  .src{color:var(--muted);font-size:.8rem}
  ul.tight{margin:.4em 0;padding-left:1.25em} ul.tight li{margin:.25em 0}
  .foot{color:var(--muted);font-size:.82rem;border-top:1px solid var(--line);margin-top:30px;padding-top:14px}
  svg.ic{width:16px;height:16px;vertical-align:-3px;fill:none;stroke:currentColor;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  @media(max-width:640px){body{font-size:15px} main{padding:16px 12px 80px}}
</style>
</head>

/* ===== 渲染 ===== */
const $=(s,r=document)=>r.querySelector(s), el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
function chipFor(s){if(!s)return"";const t=esc(s);let c="";if(/B輪✓/.test(s))c="ok";else if(/待證|缺|非公開|次級/.test(s))c="pend";else if(/正本/.test(s))c="";return`<span class="chip ${c}">${t}</span>`;}

const views={
  overview(){const d=DATA;let h=`<h1>無人機資安全景</h1><p class="lead">把無人機（UAV/drone）資安之<b>驗證、測試、標準</b>與<b>實驗室建置/管理模式</b>整理為兩張可查閱、可回溯的地圖。台灣為錨。</p>`;
    h+=`<div class="grid g3" style="margin:14px 0">`+d.kpis.map(k=>`<div class="card"><div class="kpi">${esc(k[1])}<small>${esc(k[0])}</small></div></div>`).join("")+`</div>`;
    h+=`<h2>威脅面（測試對象）</h2><div class="grid g2">`+d.threats.map(t=>`<div class="card tint"><h3>${esc(t[0])}</h3><p class="src">${esc(t[1])}</p></div>`).join("")+`</div>`;
    h+=`<h2>五大標準支柱</h2><div class="grid g2">`+d.pillars.map(p=>`<div class="card" style="border-left:4px solid var(--${p[2]})"><h3>${esc(p[0])}</h3><p class="mono src">${esc(p[1])}</p><p class="src">${esc(p[3])}</p></div>`).join("")+`</div>`;
    h+=`<h2>合規時程</h2><table><tr><th>日期</th><th>里程碑</th></tr>`+d.timeline.map(t=>`<tr><td class="mono"><span class="chip ${t[2]}">${esc(t[0])}</span></td><td>${esc(t[1])}</td></tr>`).join("")+`</table>`;
    h+=`<div class="note" style="margin-top:14px">${esc(d.meta.note)}</div>`;return h;},
  standards(){let h=`<h1>標準地圖（依分群）</h1><p class="lead">哪些標準適用 → 各要求什麼 → 測試意涵 → 正本狀態。<span class="chip ok">B輪✓</span>＝Tier-1 正本坐實。</p>`;
    DATA.standards.forEach(g=>{h+=`<h2><span class="tag" style="background:var(--${g.g})">　</span>${esc(g.name)}</h2><table><tr><th>識別碼</th><th>發行</th><th>強制/自願</th><th>核心要求</th><th>正本/狀態</th></tr>`;
      g.items.forEach(it=>{h+=`<tr><td class="b">${esc(it[0])}</td><td>${esc(it[1])}</td><td>${esc(it[2])}</td><td>${esc(it[3])}</td><td>${chipFor(it[4])} ${it[5]?chipFor(it[5]):""}</td></tr>`;});
      h+=`</table>`;});return h;},
  testing(){const d=DATA;let h=`<h1>測試方法 × 工具</h1>`;

      d.testmethods.map(t=>`<tr><td class="b">${esc(t[0])}</td><td>${esc(t[1])}</td><td class="src">${esc(t[2])}</td><td>${esc(t[3])}</td><td>${esc(t[4])}</td></tr>`).join("")+`</table>`;
    h+=`<h2>消費 IoT 基線測試（EN 303 645 × TS 103 701）<span class="chip ok">B輪✓</span></h2><p class="src">無人機作為消費 IoT 裝置最可直接落地之測試套（EU RED/UK PSTI/CRA 基線）。</p>`;
    h+=`<div class="grid g2"><div class="card"><h3>EN 303 645 provisions（13 高階 + clause 6）</h3><ul class="tight">`+d.en303645.provisions.map(p=>`<li><span class="mono">${esc(p[0])}</span> ${esc(p[1])}</li>`).join("")+`</ul></div>`;
    h+=`<div class="card"><h3>TS 103 701 測試方法</h3><ul class="tight">`+d.en303645.method.map(m=>`<li>${esc(m)}</li>`).join("")+`</ul></div></div>`;

  labs(){let h=`<h1>世界實驗室 / 驗證機構 survey</h1><p class="lead">三層生態：認可(17025/17065)→ scheme(CC/EUCC/NIAP/Blue)→ 運營(ITSEF/CB)。承重原則＝評測員與驗證員分離。</p>`;

  build(){const b=DATA.build;let h=`<h1>建置藍圖</h1><p class="lead">認證路線 · 設備 BOM · 人員 · 級距成本 · 營運。<span class="chip">[S]=有來源</span> <span class="chip">[E]=估計帶</span></p>`;

    h+=`<h2>人員（lean→full）</h2><table><tr><th>角色</th><th>人數</th><th>薪(US)</th></tr>`+b.staffing.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td class="src">${esc(r[2])}</td></tr>`).join("")+`</table>`;
    h+=`<h2>低/中/高 級距</h2><table><tr><th>級</th><th>範圍</th><th>總資本</th><th>年 OpEx</th></tr>`+b.tiers.map(r=>`<tr><td class="b">${esc(r[0])}</td><td class="src">${esc(r[1])}</td><td>${esc(r[2])}</td><td>${esc(r[3])}</td></tr>`).join("")+`</table>`;
    h+=`<h2>每案營收（CC 業界帶）</h2><table><tr><th>保證級</th><th>期程</th><th>報價</th></tr>`+b.revenue.map(r=>`<tr><td class="b">${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join("")+`</table>`;return h;},
  taiwan(){const t=DATA.taiwan;let h=`<h1>台灣落地（錨）</h1><p class="lead">台灣已運行國家級無人機資安檢測制度——世界領先；缺口＝非 CNS、無國際互認、安規/資安分離。</p>`;
    h+=`<h2>國家無人機資安檢測制度</h2><div class="card"><ul class="tight">`+t.scheme.map(s=>`<li>${esc(s)}</li>`).join("")+`</ul></div>`;
    h+=`<h3>6 家指定檢測機構（moda 2025-01-08）</h3><div class="grid g3">`+t.labs6.map(l=>`<div class="card"><b>${esc(l)}</b></div>`).join("")+`</div>`;
    h+=`<h2>缺口（機會）</h2><table><tr><th>缺口</th><th>說明</th></tr>`+t.gaps.map(g=>`<tr><td class="b">${esc(g[0])}</td><td class="src">${esc(g[1])}</td></tr>`).join("")+`</table>`;

  matrix(){let h=`<h1>對照矩陣（標準 ↔ 測試）</h1><p class="lead">要驗證什麼 → 用哪些測試 → 綁哪個標準。</p>`;
    const rows=[["C2 鏈路完整性/機密性","協定 fuzzing、RF/telemetry、MAVLink signing 檢","ISO 21384-3、DO-356A"],
      ["GNSS 抗欺騙","GNSS spoof/jam + failsafe","SORA robustness、ISO 21384-3"],
      ["Remote ID 真實性","RID 欺騙/符合性","ASTM F3411/F3586、DRIP RFC 9575"],
      ["韌體/secure boot","韌體分析、FI、secure-boot 測試、SBOM","DO-356A、NIST 800-193、PSA/SESIP、CRA"],
      ["GCS/App/雲","MASVS/ASVS pentest","EN 303 645、EN 18031、CRA"],
      ["密碼模組","FIPS 140-3 模組/演算法","FIPS 140-3/ISO 19790"],
      ["產品基線合規","EN 303 645(TS 103 701)測試套","EN 303 645、EN 18031、UK PSTI"],
      ["適航型認 cyber","AWSP/SRA/SAL+refutation+pentest","DO-326A/356A(AMC)"],
      ["供應鏈信任","Blue/Green 評估(SBOM/HBOM+cyber)","NDAA §848、Blue/Green UAS"]];

  glossary(){const g=[["ITSEF","受認可之 CC 評測實驗室（Information Technology Security Evaluation Facility）"],
      ["ISO/IEC 17025 / 17065","測試實驗室 / 產品驗證機構之認可標準"],["CC / CEM","Common Criteria(ISO 15408)/評測方法(ISO 18045)"],
      ["EUCC","EU CC scheme（取代 SOG-IS；substantial/high）"],["CRA","EU Cyber Resilience Act 2024/2847"],
      ["RED","Radio Equipment Directive 2014/53/EU（cyber 經 DA 2022/30 + EN 18031）"],
      ["IXIT","Implementation eXtra Information for Testing（TS 103 701 之廠商佐證包）"],
      ["ICS","Implementation Conformance Statement（M/R/C 狀態）"],["SAL","Security Assurance Level（DO-356A，0–3）"],
      ["Remote ID","遠端識別（ASTM F3411；DRIP 加密認證）"],["MAVLink","開源無人機 C2 協定（signing=認證非機密）"],
      ["Blue/Green UAS","US DoD/AUVSI 無人機信任+cyber vetting"],["NDAA §848","US 去中供應鏈禁令"],
      ["待證","無一手來源之主張，不得當結論，須正本坐實"]];
    let h=`<h1>中英詞彙</h1><table><tr><th>詞</th><th>定義</th></tr>`+g.map(x=>`<tr><td class="b mono">${esc(x[0])}</td><td>${esc(x[1])}</td></tr>`).join("")+`</table>`;return h;},
  audit(){const a=DATA.audit;let h=`<h1>稽核 / 待證帳本</h1><p class="lead">一手來源或標「待證」；對抗式查證（先假設為錯→交叉≥2 來源→裁決）。逐輪見同層 對抗查證記錄表.md。</p>`;

    h+=`<h2>待證帳本（需正本/官方坐實）</h2><table><tr><th>項目</th><th>如何關閉</th><th></th></tr>`+a.pending.map(p=>`<tr><td class="b">${esc(p[0])}</td><td class="src">${esc(p[1])}</td><td><span class="chip pend">待證</span></td></tr>`).join("")+`</table>`;return h;}
};

function render(id){$("#main").innerHTML="";const v=el("section","view active");v.id="view-"+id;v.innerHTML=views[id]();
  $("#main").appendChild(v);document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("active",b.dataset.v===id));
  window.scrollTo({top:0});location.hash=id;}
function boot(){const nav=$("#tabs");DATA.tabs.forEach(([id,label])=>{const b=el("button",null,esc(label));b.dataset.v=id;b.onclick=()=>render(id);nav.appendChild(b);});
  const foot=el("div","foot","本頁為自包含單檔研究儀表板（v"+DATA.meta.version+"，"+DATA.meta.date+"）。深度與完整來源見同層兩張地圖 .md 報告與 對抗查證記錄表.md。標「待證」者需一手正本確認；成本為公開估計帶非報價。無 emoji。");
  const start=(location.hash||"#overview").slice(1);render(DATA.tabs.some(t=>t[0]===start)?start:"overview");
  $("#main").appendChild(foot);}
$("#themebtn").onclick=()=>{const r=document.documentElement;r.dataset.theme=r.dataset.theme==="dark"?"":"dark";};
if(matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches)document.documentElement.dataset.theme="dark";
boot();
</script>
