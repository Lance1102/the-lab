standard_equipment":["Belts with 75mm width, several weights, scale, timer"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。實驗室列 belts/straps 正是本條規定之75mm非夾持加載方式,配置正確。","location":"安規測試區","utils":[],"equipment":[{"en":"Straps / belts (handle test)","zh":"提把試驗吊帶","role":"fixture","instId":"belts"}],"diagram":"","qa":"","pel":[{"equip":"Belts with 75mm width, several weights, scale, timer","code":"RB","test":"Handle strength test method","zh":"75mm寬吊帶+砝碼+磅秤","instId":"belts"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用超過實際的重量考驗提把，確認提起時不斷裂、不脫落害設備掉落砸腳。"},{"id":"8.11","clauses":["8.1"],"group":"8","title_en":"Carts, stands, and similar carriers (NOTE: this is clause 8.10 in IEC 62368-1:2018 Ed.3; clause 8.11 in Ed.3 is 'Mounting means for rack-mounted equipment')","title_zh":"推車、支架及類似承運裝置(注意:於 IEC 62368-1:2018 第3版此為 8.10 條;第3版 8.11 條為「機架安裝設備之安裝機構」)","purpose_zh":"確認用來承載並推動設備的推車、落地支架(像電視推車、投影機推架)夠堅固、夠穩,人推它、靠它、撞到它時,車架不會被壓垮,上面承載的設備也不會翻落砸到人。這類承運裝置通常較高又會移動,翻倒很容易壓到小孩或腳,所以要施力測試其結構與穩定。","analogy_zh":"像買電視推車時,用力壓一下層板、推一下整台車,確認層板不會塌、整車不會一推就倒、電視不會滑落。","procedure_zh":"以直徑30mm的圓形施力面,對推車/支架的承載面/結構施加最高440N的力,評估其機械強度與穩定性(含衝擊、水平力施加情境),並檢查輪子/腳輪的安裝是否牢固。維持規定時間,確認結構不破壞、不傾倒、承載設備不掉落。","params":"施力上限440N,經直徑30mm圓形施力面施加;另含衝擊與水平力穩定性評估、輪/腳輪固定要求;判定:結構不破壞、不傾倒、載重物不掉落。","standard_equipment":["Force up to 440 N with a circular plan surface Ø 30mm, stop watch,"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。重要:實驗室標示之「8.11」與其所列設備(440N經Ø30mm圓面)不一致——440N/Ø30mm 對應的是第3版 8.10『推車、支架及類似承運裝置』;第3版 8.11 實為『機架安裝設備之安裝機構』(以配重+計時器試驗)。實驗室自己亦註記原寫成『8.1』。建議將條號更正為 8.10,以免報告引用錯誤。","location":"安規測試區","utils":[],"equipment":[{"en":"Force applicator 440 N (Ø30 mm)","zh":"440 N 施力裝置（Ø30 mm 圓面）","role":"fixture","instId":"force-440"}],"diagram":"","qa":"PEL 確認：推車／支架／承運裝置為 8.10 條（PEL：「Force up to 440 N, Ø30 mm 圓面 ＋ stop watch」RB）；第3版 8.11 為「機架安裝設備之安裝機構」。清單標號 8.1／8.11 宜更正為 8.10。","pel":[{"equip":"Force up to 440 N with a circular plan surface Ø 30mm, stop watch,","code":"RB","test":"Carts, stands and similar carriers","zh":"440N施力(Ø30mm圓面)+碼錶","instId":"force-440"}],"match":{"level":"warn","note":"可能缺漏 / 建議補充"},"gist_zh":"對推車/落地支架施力，確認人推、靠、撞時不會壓垮或翻倒、設備不滑落。"},{"id":"9.6.3","clauses":["9.6.3"],"group":"9","title_en":"Wireless power transmitters - Test method (heating of foreign metallic objects near a near-field wireless power transmitter)","title_zh":"無線電力傳輸器-試驗方法(近場無線電力傳輸器對鄰近金屬異物之加熱評估)","purpose_zh":"無線充電板在充電時,如果上面剛好放了一塊金屬小物(鑰匙、手機指環、口香糖錫箔紙、迴紋針等),這塊金屬會被感應加熱,可能燙到拿它的人或引燃旁邊物品。這項試驗就是把幾種代表性的金屬異物放在充電器上,確認它們被加熱後的溫度不會高到燙傷人。對含無線充電功能的產品是必測的熱安全項目。","analogy_zh":"像把一根鐵湯匙放在電磁爐上:電磁爐會把鐵湯匙加熱到燙手。無線充電板也一樣,這試驗就是確認放上去的小金屬不會被燙到危險的程度。","procedure_zh":"把標準規定的三種金屬異物(鋼圓片、鋁環、鋁箔)分別放在傳輸器表面,於規定室溫環境下啟動充電,在傳輸器上移動異物找出溫度最高的位置,並量測異物溫度。共做四種情境:無接收器直接接觸、有接收器直接接觸、有接收器間隔2mm、有接收器間隔5mm(以墊片控制間距)。每個異物貼K型熱電偶量溫。判定:異物溫度不得超過70°C。","params":"溫度上限70°C;四種情境:無接收器直接接觸、有接收器直接接觸、有接收器間距2mm、有接收器間距5mm;異物於表面移動以尋找最高溫位置;以K型熱電偶量測。(異物精確尺寸/材質規格依標準 Figure 47-49 或2023版 Figure 49-51。)","standard_equipment":["Figure 49 – Steel disc; Figure 50 – Aluminium ring; Figure 51 – Aluminium foil; Spacers with 2.0 0.5 mm thick and 5.0 0.5 mm thick"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版,含無線電力傳輸器條款)。實驗室列 steel disc/aluminium ring/aluminium foil/spacers 與標準三種異物及間距墊片完全對應,配置正確。注意:9.6 自第3版納入;不同版次圖號(Fig.47-49 vs 2023版 Fig.49-51)略異,但試驗方法與70°C限值一致。","location":"安規測試區","utils":[],"equipment":[{"en":"Wireless-power foreign-object set","zh":"無線充電異物試驗組","role":"fixture","instId":"wireless-fod"}],"diagram":"wirelessfod","qa":"","pel":[{"equip":"Figure 49 – Steel disc; Figure 50 – Aluminium ring; Figure 51 – Aluminium foil; Spacers with 2.0 0.5 mm thick and 5.0 0.5 mm thick","code":"RWPT","test":"Wireless power transmitters","zh":"鋼片/鋁環/鋁箔異物組(圖49-51)","instId":"wireless-fod"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"放鋼片/鋁環/鋁箔等異物量溫，確認感應加熱不致燙傷人；含無線充電必測。"},{"id":"B.2.5","clauses":["B.2.5"],"group":"annex","title_en":"Input test (Normal operating conditions)","title_zh":"輸入試驗（正常操作條件）","purpose_zh":"這是把產品『接上電、正常操作』後，量它實際吃進去多少電（電流/功率）的試驗。目的是確認產品銘牌上標示的額定電流/功率是真的、沒有低報；如果實際耗電遠超過標示，後續的溫升、保險絲選用、線材載流量等安全評估就會全部失準，可能埋下過熱起火的風險。它本身不是『破壞性』試驗，而是為後面所有發熱與過載試驗『定錨』出正確的操作功率點。","analogy_zh":"就像買車前先實測油耗：廠商說『百公里 6 公升』，你要實際開一趟量出真實油耗，確認標示沒灌水，後面算續航、油箱大小才不會出錯。","procedure_zh":"將設備接到額定電壓（若為電壓範圍，則取範圍兩端各測一次），在正常操作條件下運轉到穩定，量測實際輸入電流與輸入功率。對含影音放大功能的設備，需依 IEC 60107-1 的量測方法用訊號產生器把機器設定到規定的正常操作狀態（這正是實驗室列出 signal generator 的原因）。判定：實測值不得超過銘牌額定值的 110%（即 +10%）。結果記錄於報告附表 B.2.5。","params":"判定限值：實測輸入電流/功率不得超過額定值的 110%（+10%）。測試電壓：額定電壓；若為電壓範圍則取兩端各測一次。設備需先在正常操作條件下運轉至穩定。","standard_equipment":["Ampere meter suitable for the current and waveform, power meter, voltmeter (See Clause 4.1.9)","Variable loads","Signal generator in acc. IEC 60107-1:1997"],"iec_bsmi":"已諧調，無已知差異。CNS 15598-1:2020 等同採用 IEC 62368-1:2018 (Ed.3.0)，B.2.5 內容一致。IEC 60107-1（電視接收機量測方法）為被引用之子標準，CNS 亦有對應採用版。","location":"安規測試區","utils":[],"equipment":[{"en":"TV/AV signal generator (IEC 60107-1)","zh":"影音訊號產生器（IEC 60107-1）","role":"equip","instId":"siggen-60107"}],"diagram":"","qa":"","pel":[{"equip":"Ampere meter suitable for the current and waveform, power meter, voltmeter (See Clause 4.1.9)","code":"RB","test":"Input test","zh":"電流表+功率計+可變負載","instId":"power-analyzer"},{"equip":"Variable loads","code":"RB","test":"Input test","zh":"可變負載","instId":"var-resistor-load"},{"equip":"Signal generator in acc. IEC 60107-1:1997","code":"RV","test":"Input test","zh":"影音訊號產生器(IEC 60107-1)","instId":"siggen-60107"}],"match":{"level":"warn","note":"部分符合"},"gist_zh":"實測產品吃進的電流/功率，確認額定標示沒低報，作為後續發熱與過載評估的基準。"},{"id":"B.3.2","clauses":["B.3.2"],"group":"annex","title_en":"Covering of ventilation openings (Simulated abnormal operating conditions)","title_zh":"通風開孔之覆蓋（模擬異常操作條件）","purpose_zh":"很多電子產品靠機殼上的散熱孔『呼吸』散熱。這個試驗故意把散熱孔堵住，模擬使用者把機器塞進櫃子、貼牆、或被灰塵/紙張蓋住散熱孔的真實情況，看機器會不會因此悶燒、過熱、甚至起火。目的是確認就算散熱被部分擋住，產品也不會變成火災隱患。","analogy_zh":"就像把正在運轉的筆電放在棉被上、把出風口悶住，看它會不會燙到危險甚至冒煙——這試驗就是刻意製造『悶住散熱孔』的最壞情況。","procedure_zh":"先讓設備在正常操作條件下運轉，再用一張卡紙（piece of card / cardboard）依規定方式覆蓋住散熱/通風開孔（一次只蓋會造成最不利結果的開孔，可移動式設備通常置於規定的測試角落或軟木板上），持續運轉直到溫度穩定或保護裝置動作。觀察是否發生過熱、絕緣熔化、起火等危險。試驗後所有安全防護(safeguard)須仍有效。僅適用於確實具有通風開孔的設備。","params":"覆蓋方式：以卡紙蓋住造成最不利結果之通風開孔，一次蓋一處。試驗時間：運轉至溫度穩定或保護裝置動作為止。判定：不得起火、不得有危險性絕緣熔化；試驗後安全防護須仍有效。","standard_equipment":["piece of card with minimum 200 g/m² density"],"iec_bsmi":"已諧調，無已知差異。CNS 15598-1:2020 等同 IEC 62368-1:2018，B.3.2 條文一致。","location":"安規測試區","utils":[],"equipment":[{"en":"Card (vent-cover simulation)","zh":"卡紙（覆蓋通風孔）","role":"consumable","instId":"card-cover"}],"diagram":"","qa":"","pel":[{"equip":"piece of card with minimum 200 g/m² density","code":"RB","test":"Covering of ventilation openings","zh":"卡紙(≥200g/m²)","instId":"card-cover"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"故意堵住散熱孔模擬塞櫃/貼牆/積塵，確認散熱受阻時不會過熱悶燒起火。"},{"id":"C","clauses":["C"],"group":"annex","title_en":"UV radiation — UV light conditioning test (C.1 Requirements / test method; C.2 UV light conditioning test: C.2.3 Carbon-arc light-exposure apparatus, C.2.4 Xenon-arc light-exposure apparatus)","title_zh":"紫外線(UV)輻射 — 紫外線光照調節試驗（C.1 要求與試驗法；C.2 紫外線光照調節：C.2.3 碳弧燈曝照裝置、C.2.4 氙弧燈曝照裝置）","purpose_zh":"塑膠長期曬太陽會脆化、變色、龜裂。如果一台機器（例如無人機/空拍機的塑膠機身或戶外設備外殼）的塑膠殼是用來『隔離高壓、防止觸電或防止零件飛出』的安全屏障，那它曬幾年後若一掰就碎，安全防護就失效了。這個試驗用人工光源加速模擬數年日曬，再量塑膠還剩多少強度，確認它不會因為紫外線而提早失去保護能力。","analogy_zh":"就像曬了好幾年的塑膠洗衣夾或庭院塑膠椅，輕輕一折就斷裂——這試驗就是用『人工太陽燈』快轉這個老化過程，提前驗出哪種塑膠殼撐不住。","procedure_zh":"取塑膠試片置於碳弧燈或氙弧燈加速候化試驗箱中，依規定光譜、輻照度、黑板溫度與噴水/乾濕循環曝照（典型 1000 小時）。曝照前後分別以拉伸(tensile)、彎曲(flexural)、Charpy 衝擊、Izod 衝擊及拉伸衝擊(tensile-impact)試驗量測機械性質。判定：曝照後須保留曝照前機械性質（拉伸/彎曲強度、衝擊強度）至少 70%，並維持原阻燃等級。","params":"典型曝照時間 1000 h（常分 200/400/600/800/1000 h 取樣）。判定限值：曝照後機械性質（拉伸、彎曲、衝擊）保留率 ≥ 70%，且阻燃等級維持不變（沿用 UL 746C / ASTM G155 之 f1/f2 戶外適用性準則）。光源依 C.2.3/C.2.4 規定之碳弧或氙弧光譜、輻照度與黑板溫度、含噴水濕潤循環。","standard_equipment":["Carbon-arc light-exposure test - apparatus described in ISO 4892-4, or equivalent, in accordance with the; procedures given in ISO 4892-1 and ISO 4892-4 using a type 1 filter, with water spray.; Xenon-arc light-exposure test - apparatus described in ISO 4892-2:2013, or equivalent, in accordance with the procedures given in ISO 4892-1 and ISO 4892-2 using cycle 1 of method A of Table 3, without water spray.; Tensile strength, ISO 527; Flexural strength, ISO 178; Charpy impact, ISO 179-1; Izod impact, ISO 180; Tensile impact, ISO 8256","Ultraviolet light test apparatus – see annex C."],"iec_bsmi":"已諧調，無已知國家差異。Annex C 之 UV 光照調節法（C.2 碳弧／氙弧燈，180–400 nm）源自 IEC 60950-1 Annex Y。已對照 CNS 15598-1:2020 <b>表 C.1<\/b>：紫外線照射後結構部件之最小特性殘留為 <b>70%<\/b>（抗拉 ISO 527／抗彎 ISO 178／衝擊 ISO 179-1／180／8256），照射後置室內 16–96 h 再試。版次注意：IEC 62368-1:2023(Ed.4) 將戶外外殼 UV 要求整併入 Annex Y，但 CNS 15598-1:2020（＝Ed.3）之 UV 耐受仍在 <b>Annex C<\/b>，故為現行正確條號。","location":"環境測試區","utils":[],"equipment":[{"en":"Carbon-arc weathering tester","zh":"碳弧燈耐候試驗機","role":"equip","instId":"uv-carbon"},{"en":"Xenon-arc weathering tester","zh":"氙弧燈耐候試驗機","role":"equip","instId":"uv-xenon"},{"en":"Tensile strength tester","zh":"拉伸強度試驗機","role":"equip","instId":"tensile"},{"en":"Flexural strength tester","zh":"彎曲強度試驗機","role":"equip","instId":"flexural"},{"en":"Charpy impact tester","zh":"夏比衝擊試驗機","role":"equip","instId":"charpy"},{"en":"Izod impact tester","zh":"艾氏（Izod）衝擊試驗機","role":"equip","instId":"izod"},{"en":"Tensile-impact tester","zh":"拉伸衝擊試驗機","role":"equip","instId":"tensile-impact"}],"diagram":"","qa":"","pel":[{"equip":"Carbon-arc light-exposure test - apparatus described in ISO 4892-4, or equivalent, in accordance with the; procedures given in ISO 4892-1 and ISO 4892-4 using a type 1 filter, with water spray.; Xenon-arc light-exposure test - apparatus described in ISO 4892-2:2013, or equivalent, in accordance with the procedures given in ISO 4892-1 and ISO 4892-2 using cycle 1 of method A of Table 3, without water spray.; Tensile strength, ISO 527; Flexural strength, ISO 178; Charpy impact, ISO 179-1; Izod impact, ISO 180; Tensile impact, ISO 8256","code":"S","test":"UV radiation","zh":"碳弧燈曝照試驗機","instId":"uv-carbon"},{"equip":"Ultraviolet light test apparatus – see annex C.","code":"","test":"Ultraviolet light conditioning test","zh":"紫外線曝照試驗裝置","instId":"uv-carbon"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用人工光源加速數年日曬，確認當作安全屏障的塑膠殼不會因紫外線脆化失效。"},{"id":"E","clauses":["E"],"group":"annex","title_en":"Test conditions for equipment containing audio amplifiers","title_zh":"含音訊放大器設備之試驗條件","purpose_zh":"音響/喇叭擴大機在『大聲播放音樂』時最會發熱，但若用最大音量的純測試音去測，反而不真實（音樂不會一直滿格）。這條規定了一個公認、可重現的『加載音量』方式（取不失真最大功率的 1/8），讓擴大機處在接近真實長時間使用、又足夠嚴苛的發熱狀態，再去做溫升與起火安全評估。目的是確保擴大機在實際聆聽情境下不會過熱起火。","analogy_zh":"就像測冷氣耗電不會一直開到最強、也不會關著測，而是設定在『真實長時間使用會出現的負載』；這裡是把擴大機音量設在真實聽音樂時的等效熱負載點（1/8 功率），再來看會不會燒起來。","procedure_zh":"先以 1 kHz 正弦波訊號（放大器若非設計於 1 kHz 操作則改用峰值響應頻率）餵入放大器，在額定負載阻抗下調到剛好不失真(non-clipped)的最大輸出功率。再把音量降到該不失真功率的 1/8（電壓約降到 35.32%）作為操作點。亦可改用經帶通濾波器(band-pass filter, 依 Figure E.1 特性)限頻之粉紅噪音(pink noise)訊號取代正弦波。所有聲道同時操作、接最不利之額定負載或實際喇叭，於此狀態下進行溫升/異常試驗。","params":"訊號頻率：1 000 Hz 正弦波（或峰值響應頻率）。操作功率：不失真最大輸出功率之 1/8（電壓約為不失真值之 35.32%；功率比 0.3532² ≈ 0.125）。替代訊號：經 Figure E.1 帶通濾波之粉紅噪音（近似峰值因數約 4）。條件：所有聲道同時操作、接最不利額定負載或實際喇叭。","standard_equipment":["Signal generator (sinus) 1kHz or alternative; Band-pass filter for wide-band noise measurement, pink noise signal generator; Variable wood test box"],"iec_bsmi":"已諧調，無已知差異。Annex E 條件源自舊 IEC 60065（音響安全）4.2/4.3 之 1/8 功率與粉紅噪音法，CNS 15598-1:2020 等同 IEC 62368-1:2018 一致採用。木製障板源自 IEC 60268 系列喇叭量測之標準障板概念。","location":"安規測試區","utils":[],"equipment":[{"en":"Variable wooden test enclosure (audio)","zh":"可變木質試驗箱（音頻）","role":"fixture","instId":"wood-box"},{"en":"1 kHz sine signal generator","zh":"1 kHz 正弦訊號產生器","role":"equip","instId":"siggen-1khz"},{"en":"Pink-noise generator + band-pass filter","zh":"粉紅噪音產生器＋帶通濾波器","role":"equip","instId":"pink-noise"}],"diagram":"","qa":"","pel":[{"equip":"Signal generator (sinus) 1kHz or alternative; Band-pass filter for wide-band noise measurement, pink noise signal generator; Variable wood test box","code":"RA","test":"Test conditions for equipment intended to; amplify audio signals","zh":"1kHz正弦訊號產生器+帶通濾波","instId":"siggen-1khz"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"規定擴大機加載到真實聽音樂的等效音量（1/8 功率），再做發熱與起火安全評估。"},{"id":"F.3.7","clauses":["F.3.7"],"group":"annex","title_en":"Equipment IP (ingress protection) rating marking — IP classification per IEC 60529","title_zh":"設備 IP（侵入防護）等級標示 — 依 IEC 60529 之 IP 分類","purpose_zh":"IP 等級（例如 IP54、IP67）是告訴使用者『這台機器能擋多少灰塵、多少水』。對無人機/空拍機尤其重要——它會在戶外飛、可能淋雨、降落在塵土中。如果標示了防護等級，就必須實測證明它真的擋得住規定的灰塵與水，否則灰塵或雨水滲入碰到帶電/高溫零件，會造成觸電、短路或起火。這條確保『標多少就真的做得到多少』。","analogy_zh":"就像潛水手錶標示『防水 50 公尺』，廠商必須真的拿去加壓水缸測過才能標；不能嘴上說防水，結果一淋雨就進水短路。","procedure_zh":"依 IEC 60529 進行兩部分試驗：第一位數字（防固體異物/防塵）以規定試具或在粉塵試驗箱(dust chamber)中以滑石粉測試；第二位數字（防水）依等級以滴水、噴淋、強力噴射(jet)或浸水(immersion)等對應裝置施加規定水量與時間。試驗後檢查灰塵/水是否侵入到危及安全或妨礙正常運作之程度，並確認標示之 IP 等級成立。","params":"依 IEC 60529 各等級：防塵第一位數字 0–6（5=防塵、6=塵密，含 2 kPa 負壓 8 h 等）；防水第二位數字 0–8（IPX1 滴水、IPX4 各方向潑水、IPX5/6 12.5/6.3 mm 噴嘴噴射、IPX7 浸水 1 m/30 min、IPX8 廠商規定更深）。水量、噴射距離、時間、壓力依各等級表訂。","standard_equipment":["IP test equipment according to IEC 60529"],"iec_bsmi":"已諧調，無已知差異。IP 等級分類與試驗依 IEC 60529（CNS 對應為 CNS 14545）；Annex F.3.7 僅規範該等級之『標示』。對無人機而言此項常為產品安全與市場宣稱之重點。","location":"防水防塵測試區","utils":["需排水","需用水"],"equipment":[{"en":"IP ingress-protection test equipment (IEC 60529)","zh":"防塵防水（IP）試驗設備","role":"equip","instId":"ip-test"}],"diagram":"ipwater","qa":"","pel":[{"equip":"IP test equipment according to IEC 60529","code":"SP","test":"Equipment IP rating marking","zh":"IP防塵防水試驗設備(IEC 60529)","instId":"ip-test"}],"pel_note":"F.3.7＝IP 等級之標示，IP 試驗設備依 IEC 60529（SP 特殊設施）。戶外更嚴格之防水（IPX4–X8）／防塵（IP5X/6X）另見附錄 Y.5。","match":{"level":"ok","note":"與標準相符"},"gist_zh":"確認標示的防水防塵等級（如 IP54/IP67）實測屬實；戶外無人機名不副實會進水短路起火。"},{"id":"F.3.10","clauses":["F.3.10"],"group":"annex","title_en":"Test for permanence of markings","title_zh":"標示耐久性（永久性）試驗","purpose_zh":"產品上的安全標示（額定電壓電流、警告語、接地與極性符號等）必須一輩子都看得清楚。如果這些字用手一擦、沾到清潔劑就糊掉或脫落，使用者就可能誤用、接錯電壓或忽略警告而受傷。這個試驗就是用手沾水和油性溶劑去『搓』標示，驗證它夠耐久、不會輕易消失。","analogy_zh":"就像測試瓶身上的成分標示牢不牢——用濕布和去油的酒精/去漬油用力擦幾下，看字會不會被擦掉或捲邊；擦掉的就是不合格的劣質標籤。","procedure_zh":"用手持沾水的布塊在標示上來回搓擦 15 秒，再換沾石油溶劑(petroleum spirit，即正己烷/n-hexane)的布塊搓擦 15 秒。判定：搓擦後標示須仍清晰可辨、不易被移除、標籤邊緣不得捲翹。實務上部分案場依產品另增酒精(IPA)或手搓(hand-rub)程序。","params":"以手搓擦：沾水 15 秒，接著沾石油溶劑(n-hexane) 15 秒。判定：標示仍清晰可辨、不可輕易移除、邊緣不捲翹。","standard_equipment":["water/piece of cloth/ timer","Petroleum spirit (85% n-hexane), (CAS# 110-54-3)"],"iec_bsmi":"已諧調，無已知差異。F.3.10 為 IEC 62368-1 內部條款（非引用 IEC 60529）；石油溶劑沿用 IEC 60950-1 之定義（脂肪族正己烷/試劑級己烷）。CNS 15598-1:2020 一致。","location":"安規測試區","utils":[],"equipment":[{"en":"Water + cloth (marking rub)","zh":"水＋擦布（標示耐久）","role":"consumable","instId":"water-cloth"},{"en":"Petroleum spirit","zh":"石油醚（去漬油）","role":"consumable","instId":"petroleum"}],"diagram":"","qa":"","pel":[{"equip":"water/piece of cloth/ timer","code":"RB","test":"Durability","zh":"水+擦布+計時","instId":"water-cloth"},{"equip":"Petroleum spirit (85% n-hexane), (CAS# 110-54-3)","code":"RB","test":"Durability","zh":"石油醚(85% n-hexane)","instId":"petroleum"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用水與油性溶劑搓擦標示，確認額定、警告等安全字樣不會輕易糊掉脫落。"},{"id":"G.5.4.5.3","clauses":["G.5.4.5.3","G.5.4.6.3","G.9.3","S.3.1","S.3.2"],"group":"annex","title_en":"DC-motor running-overload test — bench / alternative test method (G.5.4.5.3) and DC-motor locked-rotor overload test — bench / alternative test method (G.5.4.6.3); fire-ignition indicators per Annex S (wrapping tissue / cheesecloth, S.1 mounting, S.3 bottom-of-fire-enclosure indicators)","title_zh":"直流電動機運轉過載試驗—台架/替代試驗法 (G.5.4.5.3) 及直流電動機堵轉(locked-rotor)過載試驗—台架/替代試驗法 (G.5.4.6.3)；起火判定指示材料依 Annex S（包裝棉紙/薄棉布，S.1 安裝、S.3 底部起火指示）","purpose_zh":"馬達是無人機最關鍵也最容易出問題的零件。若螺旋槳被卡住(堵轉)或長期超載運轉，馬達線圈會急速升溫，可能燒毀絕緣甚至引燃周圍材料。這組試驗刻意製造『卡死』與『過載』兩種最壞情況，並在馬達周圍鋪上極易燃的薄棉布與棉紙當『火災偵測紙』，看會不會引燃，藉此確認馬達異常時不會釀成火災；試驗後還要做耐電壓測試確認絕緣沒被熱壞。『台架/替代法』是允許把馬達單獨拆到工作台上測（而非裝在整機內測），方便又可重現。","analogy_zh":"就像把電風扇用手按住不讓它轉、或一直超載硬轉，看馬達會不會燒起來；周圍鋪上薄如蟬翼的衛生紙當警報——只要被引燃就代表這台會釀火災，不合格。","procedure_zh":"直流電動機之運轉過載(G.5.4.5)與堵轉(G.5.4.6)各有兩種作法：裝在整機內測(in the unit, .2)或拆到工作台上以替代法測(on the bench, .3)。替代法將馬達固定於台架，施加過載或機械堵轉並通電，依規定時間/直到溫度穩定或保護動作，全程在依 Annex S（S.1 安裝方式）鋪設之包裝棉紙(下)與薄棉布(上/覆蓋)之間運轉，觀察是否引燃。試驗後對馬達絕緣施加耐電壓(electric strength)試驗。判定：薄棉布與棉紙均不得起燃、無危險性熔融，耐壓不得崩潰。","params":"薄棉布：漂白棉布約 40 g/m²（約 32×28 threads/inch，35.7–38.5 g/m²）；包裝棉紙：12–30 g/m²。試驗時間：運轉過載至溫度穩定或保護動作；堵轉常為延長時間（依條文，DC 馬達台架法記錄試驗小時數）。判定：棉布/棉紙不得起燃、無危險熔融；試後耐電壓不得崩潰。","standard_equipment":["Cheesecloth (bleached cotton cloth 40g/m2), Wrapping Tissue (12g/ m2 – 30g/m2)"],"iec_bsmi":"已諧調，無已知差異。條號釐清：實驗室標註之『G.9.3』在 IEC 62368-1 中 G.9 實為 IC 限流器，與『直流電動機過載／堵轉替代試驗』題名不符；正確條號為 G.5.4.5.3（DC 馬達運轉過載—台架法，源自 IEC 60950-1 B.6.3）與 G.5.4.6.3（DC 馬達堵轉—台架法）。S.3.1／S.3.2 對應 Annex S 起火指示材料（薄棉布／棉紙）之安裝與底部開孔判定。建議實驗室確認 Excel 之『G.9.3』是否為 G.5.4.x 之誤植。","location":"安規測試區","utils":[],"equipment":[{"en":"Cheesecloth (bleached cotton)","zh":"棉紗布（漂白棉布）","role":"consumable","instId":"cheesecloth"},{"en":"Wrapping tissue","zh":"薄棉紙（包裝紙）","role":"consumable","instId":"tissue"}],"diagram":"","qa":"","pel":[{"equip":"Cheesecloth (bleached cotton cloth 40g/m2), Wrapping Tissue (12g/ m2 – 30g/m2)","code":"RB","test":"Alternative test method","zh":"棉紗布(漂白棉布40g/m²)","instId":"cheesecloth"}],"match":{"level":"warn","note":"部分符合"},"gist_zh":"製造馬達堵轉與過載最壞情況、周圍鋪易燃棉紙偵測，確認不引燃、絕緣不被熱壞。"},{"id":"G.7","clauses":["G.7"],"group":"annex","title_en":"Mains supply cords — Cord anchorage and strain relief (G.7.3.2: strain-relief pull/torque test, Table G.8) and Non-detachable cord bend protection (G.7.5: radius of curvature)","title_zh":"電源供應線 — 線固定與應力消除（G.7.3.2：應力消除拉力/扭力試驗，表 G.8）及不可拆卸電源線之彎曲保護（G.7.5：曲率半徑）","purpose_zh":"電源線常被使用者拉扯、絆到、纏繞收納。這個試驗檢查線材『固定座』夠不夠牢——用規定的力道去拉、去扭電源線，確認內部導線不會被扯鬆、火線不會脫離端子碰到外殼（否則整台機殼帶電會電人）。彎曲保護(曲率半徑)則檢查電源線在出線口處不會因反覆彎折而折斷、銅線外露。對會頻繁收納、攜帶的設備（如無人機充電器）特別重要。","analogy_zh":"就像吹風機的電源線——你常用力一拔插頭，若線根固定不牢，內部銅線就會被扯鬆甚至露出；出線口若沒有保護套，反覆折同一點久了就會斷裂冒火花。這試驗就是模擬這些拉扯與彎折。","procedure_zh":"應力消除(G.7.3.2)：將規定重量/拉力依 Table G.8 施加於電源線（依額定電流/線徑決定力值），通常拉 25 次、每次 1 秒，並施加規定扭力；判定導線在連接點之位移不得超過 2 mm、不得受到拉應力、間距不得縮減到不足。彎曲保護(G.7.5)：對出線口之線材施加規定負載觀察其彎曲，量測試驗後之曲率半徑(radius of curvature)，以半徑規(radius gauge)確認不小於規定值（避免過度彎折）。","params":"拉力/扭力依 Table G.8（依額定電流與導線截面積決定，常見 30/60/100 N 與 0.1/0.25/0.35 N·m）。拉力試驗：通常施加 25 次、每次約 1 秒。判定：導線在端子之縱向位移 ≤ 2 mm、導線不受拉應力、爬電/空氣間距不得降至不足。彎曲保護：量測試後曲率半徑須 ≥ 規定值（與線材外徑 D 相關）。","standard_equipment":["Test equipment according IEC 60227","Appropriate weights","Torque meter or equivalent"],"iec_bsmi":"已諧調，無已知差異。拉力/扭力值依 IEC 62368-1 Table G.8（GB/T 4943.1-2022 亦對應 G.7.3.2.1 與 Table G.8）；CNS 15598-1:2020 一致。註：IEC 62368-1:2023 (Ed.4) 將 G.7.3 應力消除擴及 ES2/ES3/PS3 之互連線，惟對現行 CNS 15598-1:2020(Ed.3) 適用範圍以電源線為主。","location":"安規測試區","utils":[],"equipment":[{"en":"Calibrated weights / masses","zh":"砝碼／配重","role":"fixture","instId":"weights"},{"en":"Radius gauge","zh":"半徑規（R 規）","role":"equip","instId":"radius-gauge"}],"diagram":"","qa":"","pel":[{"equip":"Test equipment according IEC 60227","code":"S","test":"Mains supply cords","zh":"電源線試驗設備(IEC 60227)","instId":""},{"equip":"Appropriate weights","code":"RB","test":"Mains supply cords","zh":"適當砝碼","instId":"weights"},{"equip":"Torque meter or equivalent","code":"RB","test":"Mains supply cords","zh":"扭力計或同等品","instId":"torque-gauge"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"拉扯與扭轉電源線，確認固定座夠牢、火線不脫落碰殼，出線口不折斷露銅。"},{"id":"P.2","clauses":["P.2"],"group":"annex","title_en":"Safeguards against entry or consequences of entry of a foreign object — P.2.2 Safeguards against entry of a foreign object","title_zh":"防止外物進入或其後果之安全防護 — P.2.2 防止外物進入之安全防護","purpose_zh":"桌上型或開孔設備常被掉進迴紋針、項鍊、髮夾等細長金屬物。如果這些金屬從外殼縫隙掉進去、剛好搭在兩個帶電點之間，就會造成短路、起火或讓外殼帶電電人。這個試驗用一根模擬『細長金屬物』的試具，從設備頂部開孔伸入，檢查開孔設計有沒有讓危險的金屬異物碰到不該碰的帶電/危險部位。對有散熱開孔、又會在環境中作業的設備很關鍵。","analogy_zh":"就像檢查烤麵包機或主機殼頂部的散熱縫——故意拿一根細鐵絲/迴紋針從縫隙戳進去，看會不會碰到裡面的帶電零件造成觸電或短路。","procedure_zh":"使用模擬『直的剛性金屬物』之試具（直徑 1 mm、長度可達 13 mm 之金屬棒/針），由設備頂部及側面之開孔依規定方向與位置垂直落入或伸入，檢查是否會接觸到危險帶電部位或造成跨接。亦評估開孔尺寸：頂部開孔/側面開孔須符合規定（如開孔任一方向尺寸不超過 5 mm，或側面開孔不超過外殼厚度之規定倍數）。判定：外物不得觸及造成危險之部位。","params":"試具：直徑 1 mm、長度最長 13 mm 之直的剛性金屬物。開孔判定：開孔任一方向尺寸 ≤ 5 mm 視為可接受之一種情形；IEC 62368-1:2023(Ed.4) 另增『側面開孔不超過外殼厚度 11 倍』(Figure P.3) 之判據。判定：模擬金屬物不得接觸到危險帶電/能量部位。","standard_equipment":["Suitable tool (or tools) to simulate a straight metal object, 1mm in diameter, length up to 13 mm"],"iec_bsmi":"已諧調，無已知差異（就現行 CNS 15598-1:2020 = IEC 62368-1:2018 而言）。版本差異提醒：IEC 62368-1:2023(Ed.4) 更新 P.2.1 側面開孔判據為『不超過外殼厚度 11 倍』(Figure P.3)；此為未來 CNS 改版時需留意之變更，現行 CNS 15598-1:2020 尚未納入。","location":"安規測試區","utils":[],"equipment":[{"en":"Straight metal-object probe","zh":"直形金屬棒探棒","role":"fixture","instId":"straight-probe"}],"diagram":"","qa":"","pel":[{"equip":"Suitable tool (or tools) to simulate a straight metal object, 1mm in diameter, length up to 13 mm","code":"RB","test":"Safeguards against entry of solid foreign objects","zh":"模擬直形金屬物之試具","instId":"straight-probe"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用細長試具從開孔伸入，確認掉進的迴紋針等金屬不會搭到帶電件造成短路或外殼帶電。"},{"id":"S","clauses":["S"],"group":"annex","title_en":"Annex S — Tests for resistance to heat and fire (Flammability tests for fire enclosures, fire barriers and materials)","title_zh":"附錄 S — 耐熱及耐燃試驗(防火外殼、防火障壁及材料之可燃性試驗)","purpose_zh":"這組試驗在問一個問題:萬一機器內部某個零件因故障起火,這把火會不會燒穿外殼、蔓延到外面、或引燃旁邊的東西?針焰試驗用一支像打火機的小火苗,模擬內部小零件著火的情況;500W大火焰則模擬比較猛的火源。外殼或障壁必須能擋住或讓火自己熄掉,不能把火放出來。對無人機而言,機身內有鋰電池與馬達驅動板,一旦短路冒火,外殼若不耐燃就可能在空中或落地後引發更大火災。","analogy_zh":"就像考驗一個垃圾桶:你丟一根點燃的火柴進去,看桶子會不會自己燒穿、會不會把放在桶子下面的衛生紙也點著。會的話這個桶子(外殼)就不及格。","procedure_zh":"針焰法(IEC 60695-11-5):用直徑約0.9mm的噴嘴產生約12mm高的藍色火焰,以45度角接觸試樣指定時間(常見30秒),移開火焰後觀察試樣與周圍是否在30秒內自行熄滅,且其下方200mm處鋪設的薄紙(wrapping tissue)與襯墊不可被引燃。500W火焰法(IEC 60695-11-20):用較大的125mm火焰對試樣施加,評估垂直燃燒等級(對應UL94 5VA/5VB)。防火外殼整體試驗(S.2/S.3)會在外殼上方覆蓋棉紗布(cheesecloth)作為火焰是否竄出的指示物,棉紗布不可被點燃且外殼不得產生新破孔。","params":"針焰:火焰高度12mm,45度角,施加時間依零件而定(常見30s);移除後試樣及周圍須在≤30s熄滅;wrapping tissue 不得引燃;火焰能量校正 100°C±5→700°C±3 為 23.5s±1.0s。500W火焰:火焰高度約125mm。預處理:15-35°C、RH 45-75%、≥24h。棉紗布定量約26-28 m²/kg;薄紙 12-30 g/m²。","standard_equipment":["Needle flame test apparatus acc. to IEC 60695-11-5:2016, gauge for flame hight","Distillate fuel oil as described in annex S.3.2","500W flame test apparatus in acc. to IEC 60695-11-20:2015","Cheesecloth (bleached cotton cloth 40g/m2), wrapping tissue (12g/ m2 – 30g/m2)","fuel tablet in according to S.6"],"iec_bsmi":"CNS 15598-1 對應採用 IEC 62368-1,Annex S 之耐燃方法引用 IEC 60695 系列(CNS 亦有對應之 CNS 14545/CNS 14535 系列火災危險試驗標準)。基本諧和,無已知技術差異;UL 62368-1 對 500W/UL94 分類有並行對照,屬等同。需注意 CNS 版次(對應 IEC 62368-1 第2版/2018)與最新 IEC 第3版(2023)在 Annex S 編排上可能有細部章節號差異。","location":"材料測試區","utils":["需排煙"],"equipment":[{"en":"Needle-flame test apparatus","zh":"針焰試驗裝置","role":"equip","instId":"needle-flame"},{"en":"500 W flame test apparatus","zh":"500 W 火焰試驗裝置","role":"equip","instId":"flame-500w"},{"en":"Cheesecloth (bleached cotton)","zh":"棉紗布（漂白棉布）","role":"consumable","instId":"cheesecloth"},{"en":"Wrapping tissue","zh":"薄棉紙（包裝紙）","role":"consumable","instId":"tissue"}],"diagram":"needleflame","qa":"PEL 已確認：附錄 S 同時列有「針焰試驗裝置（IEC 60695-11-5）」與「500 W 火焰試驗裝置（IEC 60695-11-20）」兩者（皆 SP 特殊設施），另需餾分燃油（S.3.2）。故清單之 500 W 火焰裝置為官方要求項目，正確（先前「非規範」之提醒予以更正）。","pel":[{"equip":"Needle flame test apparatus acc. to IEC 60695-11-5:2016, gauge for flame hight","code":"SP","test":"Tests for resistance to heat and fire","zh":"針焰試驗裝置(IEC 60695-11-5)","instId":"needle-flame"},{"equip":"Distillate fuel oil as described in annex S.3.2","code":"S","test":"Tests for resistance to heat and fire","zh":"餾分燃油(S.3.2)","instId":""},{"equip":"500W flame test apparatus in acc. to IEC 60695-11-20:2015","code":"SP","test":"Tests for resistance to heat and fire","zh":"500W火焰試驗裝置(IEC 60695-11-20)","instId":"flame-500w"},{"equip":"Cheesecloth (bleached cotton cloth 40g/m2), wrapping tissue (12g/ m2 – 30g/m2)","code":"RB","test":"Tests for resistance to heat and fire","zh":"棉紗布(漂白棉布40g/m²)","instId":"cheesecloth"},{"equip":"fuel tablet in according to S.6","code":"SP","test":"Tests for resistance to heat and fire","zh":"燃料錠(S.6)","instId":""}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用針焰/大火焰燒外殼與屏障，確認能擋火或自熄，避免機內鋰電/驅動板起火延燒。"},{"id":"T.2","clauses":["T.2–T.4"],"group":"annex","title_en":"Annex T.2 Steady force test, 10 N / T.3 Steady force test, 30 N / T.4 Steady force test, 100 N","title_zh":"附錄 T.2 穩定力試驗 10 N / T.3 穩定力試驗 30 N / T.4 穩定力試驗 100 N","purpose_zh":"這是用「手指或手掌可能施加的力量」去推、壓機器各部位,確認在正常使用中被人手碰、靠、按時,內部的帶電零件或危險運動件不會因外殼變形而暴露出來。10N約等於用一根手指輕按的力;30N是用力按的力;100N則接近用一隻手掌用力推。施力後仍須維持安全距離與隔離,不能讓人摸到電或被夾傷。","analogy_zh":"就像你買智慧型手機時用拇指用力按一按螢幕邊框、推一推背蓋,看看會不會按到內部、或把後蓋推開露出電池——機器也要能承受手指與手掌這種日常力道。","procedure_zh":"T.2(10N±1N)與 T.3(30N±3N)使用未關節化試指(unjointed test finger,圖 V.1/V.2)對內部零件或可被試指觸及的部位施加穩定力;T.4(100N±10N)改用直徑30mm圓形平面端的施力工具,對內部可觸及防護件施力。施力維持一段時間(典型5秒)後,檢查是否仍符合電氣間隙、防護或防觸電要求。較高力(250N,T.5)另用於外部外殼。","params":"T.2:10 N ± 1 N;T.3:30 N ± 3 N;T.4:100 N ± 10 N;施力工具圓形平面直徑30mm(100N及以上);施力時間典型 5 s。(對照:T.5 外殼為 250 N ± 10 N,5s;質量>18kg者底部不施加。)","standard_equipment":["10N ± 1N; Test finger (figure V1 or V2 unjointed, 30N± 3N); Test tool 100N± 10N with a circular plan surface Ø 30mm; Stop watch"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和,力值與工具無已知差異(源自舊 IEC 60950-1 4.2.x / IEC 60065 9.1.x)。","location":"安規測試區","utils":[],"equipment":[{"en":"Steady-force test finger (10/30 N)","zh":"穩定施力試指（10／30 N）","role":"fixture","instId":"steady-force-finger"}],"diagram":"","qa":"","pel":[{"equip":"10N ± 1N; Test finger (figure V1 or V2 unjointed, 30N± 3N); Test tool 100N± 10N with a circular plan surface Ø 30mm; Stop watch","code":"RB","test":"Steady force test","zh":"10N/30N穩定施力試指","instId":"steady-force-finger"}],"match":{"level":"warn","note":"部分符合"},"gist_zh":"用相當於手指到手掌的力推壓各部位，確認外殼不變形到露出帶電件或夾傷手。"},{"id":"T.6","clauses":["T.6"],"group":"annex","title_en":"Annex T.6 Impact test (Steel-ball impact test)","title_zh":"附錄 T.6 撞擊試驗(鋼球撞擊試驗)","purpose_zh":"這是測試外殼「被東西砸到或撞到」時夠不夠堅固。用一顆約半公斤的鋼球去撞擊外殼,模擬日常可能發生的碰撞(掉落的工具、被物品砸到等)。撞完後外殼不能破裂到讓人摸得到內部帶電或會夾傷的部位,也不能讓防護功能失效。對無人機,機身殼若被撞裂露出電池或螺旋槳驅動部位,就有觸電或割傷風險。","analogy_zh":"就像測試安全帽:拿一顆鐵球從固定高度砸下去,看帽殼會不會裂開。會裂開保護不了頭(內部),就不合格。","procedure_zh":"使用直徑約50mm、質量500g±25g的硬鋼球,以兩種方式擇一施加:垂直落球——讓鋼球從規定高度自由落下撞擊水平朝上的外殼;或水平擺錘——將鋼球以擺錘方式擺下撞擊垂直的外殼面。撞擊能量約5J(由 E=mgh 推算,落高約1m左右)。撞擊後檢查外殼是否破裂、是否使危險部位變為可觸及。","params":"鋼球:直徑50mm±1mm、質量500g±25g;撞擊能量典型約5J(落高約1.0m,E=mgh);可達0.5J/1J/2J/3.5J等多級;撞擊後外殼不得使危險源可觸及。","standard_equipment":["50mm/500g ± 25g steel ball, ruler"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和。同等構造亦見於 IEC 60598-1(燈具)Clause 4.13.4,UL 62368-1 等同採用,無已知差異。","location":"安規測試區","utils":[],"equipment":[{"en":"500 g impact steel ball","zh":"鋼球撞擊試驗球（500 g）","role":"fixture","instId":"steel-ball"}],"diagram":"impactball","qa":"","pel":[{"equip":"50mm/500g ± 25g steel ball, ruler","code":"RB","test":"Enclosure impact test","zh":"Ø50mm/500g鋼球+量尺","instId":"steel-ball"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用約半公斤鋼球撞擊外殼，確認不破裂到摸得到帶電或會夾傷的部位。"},{"id":"T.7","clauses":["T.7"],"group":"annex","title_en":"Annex T.7 Drop test","title_zh":"附錄 T.7 落下試驗","purpose_zh":"這是測試「整台機器不小心摔到地上」會怎樣。手持或可攜帶的設備(像遙控器、無人機本體、隨身電源)難免會從手中或桌上掉下來;此試驗讓設備從規定高度自由落下到硬地面,摔完後檢查外殼是否破裂、電池是否露出、有沒有變得會觸電或起火。重點不是設備還能不能用,而是摔了之後安不安全。","analogy_zh":"就像手機防摔測試:把手機從一定高度往硬地板摔幾次,看會不會摔到電池外露、螢幕碎到割手。摔壞外觀沒關係,但不能變得危險。","procedure_zh":"把設備從規定高度自由落下到標準硬質地面,通常落3次,選擇最可能造成最大衝擊(尤其對電池室)的姿態。落下高度依設備類別而定:可攜帶設備(質量≤7kg)約1m;可移動設備約750mm;僅作為防火外殼之部位則為350mm(桌上/可移動)或500mm(手持/直插/可運輸)。落地後檢查外殼破損、帶電件可觸及性、電池安全等。","params":"落下次數通常3次;落下高度:可攜帶(≤7kg)1000mm;可移動 750mm;僅防火外殼部位 桌上/可移動 350mm±10、手持/直插/可運輸 500mm±10;地面=13mm硬木+2x19~20mm膠合板+混凝土。","standard_equipment":["Hard wood 13mm on 18mm ± 2mm plywood, two layers. ruler up to 1000 mm ± 10mm"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和。落下高度依設備分類,各認證機構對「可移動設備750mm」偶有豁免討論,但標準值一致,無國家差異。","location":"安規測試區","utils":[],"equipment":[{"en":"Hardwood / plywood drop surface","zh":"硬木／合板落下試驗台","role":"fixture","instId":"plywood"},{"en":"Steel ruler / tape (<=5000 mm)","zh":"鋼直尺／量尺","role":"equip","instId":"ruler"}],"diagram":"droptest","qa":"","pel":[{"equip":"Hard wood 13mm on 18mm ± 2mm plywood, two layers. ruler up to 1000 mm ± 10mm","code":"RB","test":"Drop test","zh":"硬木13mm/合板+量尺","instId":"plywood"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"手持/可攜設備從規定高度摔到硬地，確認摔後外殼不裂、電池不外露、不致觸電起火。"},{"id":"T.10","clauses":["T.10"],"group":"annex","title_en":"Annex T.10 Glass fragmentation test (for thermally toughened glass)","title_zh":"附錄 T.10 玻璃破碎(碎片化)試驗(適用於熱強化/鋼化玻璃)","purpose_zh":"這是測試「機器上那塊玻璃萬一破掉,碎成什麼樣」。如果設備有可被人摸到的玻璃面板(顯示器蓋板、觀景玻璃等),萬一破裂,碎片必須是細小、邊緣鈍化的鋼化玻璃顆粒(像汽車車窗那樣),而不是長而尖、會劃傷人的大片刀狀玻璃。此試驗用衝子把玻璃打破,再數碎片夠不夠細,藉此確認用的是安全的鋼化玻璃。","analogy_zh":"就像汽車側窗玻璃破掉時,會碎成一堆小方塊不傷人;但一般窗戶玻璃破掉是大片尖刀會割傷人。這試驗就是在確認設備用的是前者那種安全玻璃。","procedure_zh":"把玻璃試樣整面平放支撐妥當,並做防碎片飛濺防護。用一支頭部質量75g±5g、尖端為60度±2度碳化鎢圓錐的中心衝子,定位在玻璃最長邊內側約13mm、該邊中點處,以鎚子敲擊衝子使玻璃破裂。破裂後最多等5分鐘,在最粗碎裂區中央取一個50mm見方範圍(避開距邊緣/孔洞15mm內),目視計數碎片數,須≥45片才合格。","params":"衝子頭75g±5g;尖端60°±2°碳化鎢;打擊點:距最長邊內側約13mm之中點;觀察等待≤5min;計數區=50mm見方,位於最粗碎裂區中央、避開邊緣/孔洞15mm內;合格判據:碎片數 ≥45 片。","standard_equipment":["Centre punch (having a head with a mass of 75 g ± 5 g and a conical tungsten carbide tip with an angle of 60° ± 2°; IEC 60335-2-24:2010/AMD2:2017 Subclause 22)* and a square of 50 mm side"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和。同方法廣見於 IEC 60598-2-3、IEC 60335-2-x 之鋼化玻璃驗證,UL 62368-1 等同,無已知國家差異。","location":"安規測試區","utils":[],"equipment":[{"en":"Spring-loaded centre punch","zh":"中心衝子（彈簧式）","role":"fixture","instId":"centre-punch"}],"diagram":"","qa":"","pel":[{"equip":"Centre punch (having a head with a mass of 75 g ± 5 g and a conical tungsten carbide tip with an angle of 60° ± 2°; IEC 60335-2-24:2010/AMD2:2017 Subclause 22)* and a square of 50 mm side","code":"RB","test":"Fragmentation test","zh":"中心衝子(頭75g)","instId":"centre-punch"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"打破面板玻璃並數碎片，確認用的是破成細小鈍粒的安全鋼化玻璃，而非大片尖刀。"},{"id":"X","clauses":["X"],"group":"annex","title_en":"Annex X — Determination of clearance and creepage distance dimensions (measuring method)","title_zh":"附錄 O／X — 空間距離與沿面距離之決定（一般量測法見附錄 O；不超過峰值 420 V 交流主電源電路之空間距離替代決定法見附錄 X）","purpose_zh":"這不是一個「會破壞樣品」的試驗,而是一套「如何正確量距離」的規則。電器內部帶電金屬之間、帶電件與人可觸及部位之間,必須隔開足夠的距離才不會跳電或漏電——『空間距離』是兩點間穿過空氣的最短直線距離;『沿面距離』是沿著絕緣材料表面爬行的最短距離。Annex X 規定遇到溝槽、肋條、轉角、接縫時要怎麼量(例如小於某寬度的溝槽要不要跨過去算),確保不同實驗室量出來的數字一致、可比對。","analogy_zh":"就像量兩棟房子之間的距離:『空間距離』是拉一條直線飛過去最短的距離;『沿面距離』是沿著地面繞過中間的牆和溝走過去的距離。Annex X 就是那本規定「遇到溝、遇到牆要怎麼繞、怎麼算」的量測規則手冊。","procedure_zh":"依 Annex X 之圖例規則,先依汙染等級決定一個最小溝槽寬度 X(典型隨汙染度為0.25/1.0/1.5mm等)。量沿面距離時,寬度小於 X 的溝槽以跨越直線計算,寬度≥X 的溝槽則須沿溝槽輪廓量。空間距離則取穿過空氣的最短路徑。配合塞規/量規或顯微量測,將實測值與 5.4 表列之需求值比較判定。 本附錄為量測「方法」，所用器具與 5.4.2／5.4.3／5.4.4 共用（游標卡尺、測微器、2.5D 投影量測儀、沿面距離量測棒等）。","params":"決定參數為最小溝槽寬度 X(依汙染度 PD1/PD2/PD3 約 0.25/1.0/1.5mm 等);量測結果須對照 5.4 依工作電壓、汙染度、絕緣等級(基本/補充/強化)所定之 clearance 與 creepage 最小值。本附錄本身無施力/溫度等破壞參數。","standard_equipment":["Oscilloscope","Dial gauge or calliper","Micrometer","Pins etc. with different diameters","Microscope","Impulse test generator circuit 1 of Table D.1.; Impulse test generator circuit 2 of Table D.1.; impulse test generator circuit 3 of Table D.1","Test equipment for tracking index per IEC 60112","Mandrel (figure 25 to 28), metal foil, equipment suitable for electrical strength test loads; Stop watch, weight"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和；量測規則源自 IEC 60664-1。條號釐清：一般之沿面距離與空間距離量測為 <b>附錄 O<\/b>「沿面距離及空間距離之量測」；<b>附錄 X<\/b> 則為「連接至不超過峰值 420 V(300 V RMS) 之交流主電源電路之空間距離替代決定法」。溝槽、轉角等量測規則與最小溝槽寬度 X 依 CNS 15598-1:2020 §5.4 與附錄 O／X 表列。","location":"","utils":[],"equipment":[],"diagram":"creepage","qa":"","pel":[{"equip":"Oscilloscope","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"示波器","instId":"oscilloscope"},{"equip":"Dial gauge or calliper","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"量錶或游標卡尺","instId":"calliper"},{"equip":"Micrometer","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"測微器","instId":"micrometer"},{"equip":"Pins etc. with different diameters","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"不同直徑量測銷","instId":""},{"equip":"Microscope","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"顯微鏡","instId":""},{"equip":"Impulse test generator circuit 1 of Table D.1.; Impulse test generator circuit 2 of Table D.1.; impulse test generator circuit 3 of Table D.1","code":"RT/S/RC","test":"Clearances, creepage distance, solid insulation","zh":"脈衝(突波)電壓產生器","instId":"impulse-gen"},{"equip":"Test equipment for tracking index per IEC 60112","code":"S","test":"Clearances, creepage distance, solid insulation","zh":"相對漏電起痕(CTI)試驗機","instId":"cti-tester"},{"equip":"Mandrel (figure 25 to 28), metal foil, equipment suitable for electrical strength test loads; Stop watch, weight","code":"S","test":"Clearances, creepage distance, solid insulation","zh":"心軸彎曲試驗+金屬箔","instId":"mandrel"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"不是破壞試驗，而是遇溝槽、轉角時如何量間隙/沿面距離的統一規則，確保各實驗室結果可比對。"},{"id":"Y.3","clauses":["Y.3","Y.3.3"],"group":"annex","title_en":"Annex Y.3 Resistance to corrosion (Y.3 salt mist test; SO2 / sulphur-dioxide corrosion test)","title_zh":"附錄 Y.3 抗腐蝕性(Y.3 鹽霧試驗;二氧化硫腐蝕試驗)","purpose_zh":"戶外設備長年風吹日曬雨淋,沿海還有鹽分、都市與工業區有含硫廢氣,金屬零件會生鏽腐蝕。一旦負責安全的金屬件(接地端子、螺絲、外殼、屏蔽)鏽蝕,可能導致接地失效、外殼鬆脫漏電。此試驗用人工加速的方式(噴鹽霧、通二氧化硫)在短時間內模擬多年腐蝕,確認設備用的金屬與鍍層夠耐腐蝕,長期使用仍安全。對戶外作業的無人機基地台/充電座尤其重要。","analogy_zh":"就像把腳踏車放進一個整天噴鹽水又冒酸氣的房間,加速看它幾天內會不會鏽到煞車失靈——藉此預測它在海邊騎好幾年會不會壞。","procedure_zh":"鹽霧試驗(依 IEC 60068-2-11 Test Ka,或更嚴苛之 2-52 循環鹽霧):將試樣置於約35°C密閉箱內,連續噴灑中性(pH 6.5-7.2)約5% NaCl鹽水霧,沉降率 1-2 ml/80cm²/h,持續規定時數。二氧化硫試驗(依 IEC 60068-2-42 Test Kc,對接點/連接件):將試樣暴露於含 SO2 的潮濕氣氛中規定週期。試後檢查腐蝕程度與安全防護功能是否仍維持。","params":"鹽霧:箱溫 35°C±1(飽和桶47°C±1);鹽水濃度約5% NaCl、pH 6.5-7.2;沉降 1-2 ml/80cm²/h;暴露時數依嚴苛度而定。SO2:依 IEC 60068-2-42,暴露於含二氧化硫潮濕氣氛之規定濃度與週期。試後安全防護(接地/外殼/密封)須維持有效。","standard_equipment":["Salt spray test apparatus according to IEC 60068-2-11; Test chamber according to ISO 22479","Water - sulphur dioxide test chamber"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和：鹽霧設備依 IEC 60068-2-11、水飽和 SO2 惰性箱依 ISO 3231。已對照 CNS 附錄 Y.3 試驗程序：<b>2 組、每組連續 12 天<\/b>——(a) 鹽霧 <b>168 h<\/b>（食鹽水 5%±1%、35°C±2°C），接 (b) <b>5 循環<\/b>（每循環 8 h 暴露水飽和 SO2、40°C±3°C，再開門 16 h）；SO2 於 300 L±30 L 箱注入體積濃度 0.067% 之 0.2 L（按容積比例）。判定：目視無危害安全之保護塗層銹蝕／氧化／龜裂（容許表面侵蝕）。亦可用 ISO 21207 方法B／ISO 14993 等同程序。","location":"","utils":[],"equipment":[{"en":"Salt-spray (fog) chamber","zh":"鹽霧試驗機","role":"equip","instId":"salt-spray"},{"en":"SO2 corrosion test chamber","zh":"二氧化硫腐蝕試驗箱","role":"equip","instId":"so2-chamber"}],"diagram":"saltspray","qa":"","pel":[{"equip":"Salt spray test apparatus according to IEC 60068-2-11; Test chamber according to ISO 22479","code":"S","test":"Resistance to corrosion, water borne contaminants","zh":"鹽霧試驗機(IEC 60068-2-11)","instId":"salt-spray"},{"equip":"Water - sulphur dioxide test chamber","code":"S","test":"Water- sulphur dioxide test","zh":"二氧化硫腐蝕試驗箱","instId":"so2-chamber"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用鹽霧/二氧化硫加速數年腐蝕，確認接地端子、螺絲、外殼等金屬件耐蝕、不致接地失效漏電。"},{"id":"Y.4.3","clauses":["Y.4.3"],"group":"annex","title_en":"Annex Y.4.3 Tensile strength and elongation tests (for non-metallic outdoor enclosures / gaskets after UV conditioning)","title_zh":"附錄 Y.4.3 ＆ C — 拉伸強度及伸長率（戶外件老化後之保留）","purpose_zh":"塑膠在太陽紫外線長期照射下會變脆、變弱(就像塑膠水管曬久了一折就斷)。戶外設備若用塑膠外殼,曬了幾年後可能一碰就裂,露出內部帶電件而危險。此試驗先用人工紫外線燈把塑膠樣品加速「曬老」,再拉它測量還能承受多大拉力(拉伸強度)、能拉多長才斷(伸長率),並和沒曬過的比較。必須保留足夠比例(通常要≥70%)才算這塑膠夠耐曬、能安全用在戶外。","analogy_zh":"就像比較一條新橡皮筋和一條曬了一整年的舊橡皮筋:新的能拉很長很有力,舊的稍微一拉就脆斷。設備的塑膠殼曬過後若像那條脆掉的舊橡皮筋,就不能用在戶外。","procedure_zh":"先依 Annex C 用氙弧/碳弧耐候試驗機(ISO 4892 系列)對塑膠試樣做紫外線老化(典型氙弧約1000小時或碳弧約720小時,黑板溫度約63°C)。老化後與未老化試樣分別依 ISO 527 用拉力試驗機量測拉伸強度與斷裂伸長率,計算保留率=(老化後值/初始值)×100%。一般要求關鍵機械性質保留 ≥70%(對應 UL 746C F1 戶外等級)方為合格。","params":"UV老化:氙弧約1000h 或 碳弧約720h(ISO 4892),黑板溫度約63°C;拉伸量測:依 ISO 527;合格判據:拉伸強度與伸長率等機械性質保留率 ≥70%(F1 戶外,F2 為≥50%)。試片為標準啞鈴狀。","standard_equipment":["Tensile strength test apparatus"],"iec_bsmi":"已對照 CNS 標準正本。<b>附錄 Y.4.3<\/b>（可拉伸密封墊片，如 O 型環）：經 <b>69–70°C 循環空氣 168 h<\/b> 熱老化後，抗拉強度須 ≥未老化之 <b>75%<\/b>、伸長率 ≥<b>60%<\/b>，且無明顯劣化／龜裂（可用 ISO 37／ISO 1798／ASTM D412／D3574 替代）。<b>附錄 C 表 C.1<\/b>（非金屬結構件 UV 老化後）：抗拉／抗彎／衝擊保留 ≥<b>70%<\/b>。兩者皆用拉伸試驗機，惟老化方式（熱 vs UV）與限值不同。","location":"安規測試區","utils":[],"equipment":[{"en":"Tensile strength tester","zh":"拉伸強度試驗機","role":"equip","instId":"tensile"}],"diagram":"","qa":"","pel":[{"equip":"Tensile strength test apparatus","code":"S","test":"Tensile strength and elongation tests","zh":"拉伸強度試驗機","instId":"tensile"}],"match":{"level":"warn","note":"可能缺漏 / 建議補充"},"gist_zh":"紫外線加速老化後拉伸塑膠樣品，確認強度/伸長率仍保留足夠比例（常 ≥70%），才適合戶外。"},{"id":"Y.4.4","clauses":["Y.4.4"],"group":"annex","title_en":"Annex Y.4.4 Compression and impact test (for non-metallic outdoor enclosures, including low-temperature impact)","title_zh":"附錄 Y.4.4 壓縮及衝擊試驗(非金屬戶外外殼,含低溫衝擊)","purpose_zh":"戶外塑膠外殼一方面可能被壓(例如積雪、有人踩、堆疊重物),另一方面在寒冷冬天會變脆,這時若被撞一下就容易裂。此試驗先對外殼施加相當於約69 kPa的壓力(看會不會壓垮變形),再把外殼放到很冷(約-33°C或廠商標示最低溫)冰凍24小時後拿出來,馬上用1.35公斤的鎚從固定高度敲它,看冷脆狀態下會不會裂開。連續做幾天,確認塑膠外殼在又冷又受撞的最壞情況下仍能保護內部、不致漏電。","analogy_zh":"就像把塑膠水桶放進冷凍庫凍一晚,拿出來馬上用鐵鎚敲——冬天變脆的塑膠最容易這樣裂開。能撐住不裂的才適合放戶外過冬。","procedure_zh":"壓縮:以圓柱形荷重對外殼施加相當於約69 kPa之壓力,檢查變形。低溫衝擊:將同一試樣冷凍24小時至廠商標示最低溫(未標示則為-33°C),取出後立即以質量1.35kg、鎚頭直徑28.6mm(打擊面25.4mm)之鎚從150mm高處落下衝擊,試樣置於至少50×100mm之無瑕雲杉(clear spruce)木塊上。每24小時再衝擊一次,連做兩天;最後於25°C±3靜置約24小時再驗證是否仍符合要求(無裂痕、無危險暴露)。","params":"壓縮荷重:約69 kPa;冷凍:24h 至 -33°C(或廠商標示最低溫);衝擊鎚:1.35 kg,落高150mm,鎚頭Ø28.6mm/打擊面Ø25.4mm;墊塊:clear spruce ≥50×100mm;衝擊頻率:每24h一次共3天;後置:25°C±3、約24h 後複驗。","standard_equipment":["Cylindrical weight for 69 kPa; Air oven; Environmental test chamber capable of testing to –33 °C; 1,35 kg impact hammer apparatus; Clear spruce wood pieces"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 諧和;此程序承襲北美戶外外殼要求(UL 60950-22 / UL 746C 系)。基本無國家差異;-33°C 與 69 kPa、1.35kg/150mm 為標準引用值。","location":"安規測試區","utils":[],"equipment":[{"en":"Cylindrical weight (69 kPa)","zh":"69 kPa 壓縮配重","role":"fixture","instId":"cyl-weight-69"},{"en":"1.35 kg impact hammer","zh":"1.35 kg 衝擊鎚","role":"fixture","instId":"impact-hammer"},{"en":"Clear spruce wood blocks","zh":"雲杉木塊（衝擊墊木）","role":"consumable","instId":"spruce"}],"diagram":"","qa":"","pel":[{"equip":"Cylindrical weight for 69 kPa; Air oven; Environmental test chamber capable of testing to –33 °C; 1,35 kg impact hammer apparatus; Clear spruce wood pieces","code":"S","test":"Compression test","zh":"69kPa壓縮配重+烘箱+環境箱","instId":"cyl-weight-69"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"對外殼加壓，再冷凍到約 -33°C 後敲擊，確認冬天又冷又受撞時仍不破裂、保護內部。"},{"id":"Y.4.5","clauses":["Y.4.5"],"group":"annex","title_en":"Annex Y.4.5 Oil resistance (resistance of gaskets/elastomers to oil)","title_zh":"附錄 Y.4.5 抗油性(墊片/彈性體之耐油性)","purpose_zh":"戶外設備靠橡膠墊片(gasket)來防水防塵,維持外殼密封。但設備若安裝在會接觸到油的環境(機械設備旁、含油霧的工業區、或本身有潤滑油),橡膠碰到油會膨脹、變軟或變硬龜裂,密封就失效、水氣灰塵就跑進去造成漏電或短路。此試驗把橡膠墊片樣品泡進標準試驗油裡一段時間,量它膨脹/硬度/強度變化多少,確認墊片夠耐油、長期仍能維持密封與安全。","analogy_zh":"就像把一條橡皮筋泡進沙拉油裡一晚,看它會不會泡到膨脹發脹、變黏變軟而失去彈性。墊片若泡油後變這樣,就守不住外殼的防水門戶了。","procedure_zh":"依 ISO 1817(或等效 ASTM D471)將墊片/彈性體標準試片浸入規定的標準試驗油(如 IRM 902 / ASTM Oil No.3 對應油)中,於規定溫度(常見如100°C)浸泡規定時間(常見約70小時)。取出後量測體積膨脹率、硬度變化、拉伸強度與伸長率變化,並與浸泡前比較,判定其變化是否在可接受範圍內(避免過度膨脹擠出溝槽或硬化龜裂)。","params":"浸泡:依 ISO 1817 / ASTM D471,標準試驗油(IRM 902 等),典型溫度約100°C、時間約70h(實際以條文規定為準);量測項:體積膨脹率(典型可接受約5-25%)、硬度變化、拉伸強度/伸長率保留。","standard_equipment":["Oil immersion test equipment per ISO 1817:2022 or ASTM D471- 98"],"iec_bsmi":"已對照 CNS 附錄 Y.4.5 抗油性：密封墊片於 <b>25°C±3°C 浸油 70 h<\/b> 後，膨脹須 <b>≤25%<\/b>、萎縮 <b>≤1%<\/b>；油規格依 <b>ISO 1817:2005／ASTM D471-98<\/b>。（ISO 1817 為 IEC 慣用、ASTM D471 為北美慣用之等效並行方法。）","location":"環境測試區","utils":[],"equipment":[{"en":"Oil-immersion test equipment","zh":"耐油浸泡試驗設備","role":"consumable","instId":"oil-immersion"}],"diagram":"","qa":"","pel":[{"equip":"Oil immersion test equipment per ISO 1817:2022 or ASTM D471- 98","code":"S","test":"Oil resistance","zh":"耐油浸泡試驗設備","instId":"oil-immersion"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"把橡膠墊片泡標準油測膨脹/硬度變化，確認耐油、長期仍維持外殼防水防塵密封。"}],"instruments":[{"id":"walkin-chamber","en":"Walk-in environmental chamber","zh":"步入式環境試驗室","cat":"環境模擬","role":"equip","desc":"像一間可走進去的大型冷暖/潮濕房，把整台設備放進去模擬各種氣候下運作。","clauses":["4.1.4"],"brands":["ESPEC / 客制"]},{"id":"ac-dc-source","en":"Regenerative AC/DC power source","zh":"可程式交直流電源供應器","cat":"電源供應","role":"equip","desc":"可調出世界各地電壓/頻率、還能回收電的電源，用來模擬各種供電與異常電壓。","clauses":["4.1.4","5.4.1.4","9.3","E"],"brands":["Cinergia/GE 30AC/DC Sic-RS"]},{"id":"dc-supply","en":"DC power supply","zh":"直流電源供應器","cat":"電源供應","role":"equip","desc":"提供穩定可調的直流電，供電池系統與電路在各種供電條件下測試。","clauses":["5.4.1.4","9.3","E"],"brands":["EA/PSI 10500-30 3U"]},{"id":"dc-load","en":"DC electronic load","zh":"直流電子負載","cat":"電源供應","role":"equip","desc":"可調的「假負載」，模擬馬達/電池耗電，用於溫升與功率試驗。","clauses":["5.4.1.4","9.3","E"],"brands":["EA / ELR 10080-340 3U"]},{"id":"chiller","en":"Circulation chiller","zh":"循環式冷卻機","cat":"環境模擬","role":"equip","desc":"幫環境室或大功率負載降溫的冷卻機，維持試驗要的溫度。","clauses":["4.1.4"],"brands":["LAUDA/ UC-2400"]},{"id":"salt-spray","en":"Salt-spray (fog) chamber","zh":"鹽霧試驗機","cat":"耐候/材料力學","role":"equip","desc":"密閉箱內連續噴鹽水霧，加速模擬海邊鹽分腐蝕，看金屬件會不會生鏽。","clauses":["Y.3","Y.3.3"],"brands":["ITABACH"]},{"id":"so2-chamber","en":"SO2 corrosion test chamber","zh":"二氧化硫腐蝕試驗箱","cat":"耐候/材料力學","role":"equip","desc":"充滿二氧化硫的潮濕箱，模擬工業/都市污染氣體對金屬與鍍層的腐蝕。","clauses":["Y.3","Y.3.3"],"brands":["ITABACH"]},{"id":"uv-carbon","en":"Carbon-arc weathering tester","zh":"碳弧燈耐候試驗機","cat":"耐候/材料力學","role":"equip","desc":"用碳弧燈當「人工太陽」曬塑膠，加速看戶外曬久了會不會脆化變色。","clauses":["C"],"brands":[]},{"id":"uv-xenon","en":"Xenon-arc weathering tester","zh":"氙弧燈耐候試驗機","cat":"耐候/材料力學","role":"equip","desc":"用氙弧燈模擬全光譜陽光（含紫外線），加速戶外曝曬老化。","clauses":["C"],"brands":[]},{"id":"oil-immersion","en":"Oil-immersion test equipment","zh":"耐油浸泡試驗設備","cat":"耐候/材料力學","role":"consumable","desc":"把材料泡進指定油裡，看接觸油污後會不會膨脹、變軟或變質。","clauses":["Y.4.5"],"brands":[]},{"id":"oven","en":"Heating oven","zh":"熱風循環烘箱","cat":"環境模擬","role":"equip","desc":"穩定加熱的烤箱，把材料加熱到指定高溫做耐熱前處理或試驗（如球壓）。","clauses":["5.4.1.10.3"],"brands":["ESPEC/PH-102"]},{"id":"humidity-chamber","en":"Temperature & humidity chamber","zh":"恆溫恆濕試驗箱","cat":"環境模擬","role":"equip","desc":"能精準控溫控濕的箱子，先讓產品受潮，再做絕緣/耐壓等電氣測試。","clauses":["5.4.8"],"brands":["Espec"]},{"id":"oscilloscope","en":"Oscilloscope","zh":"示波器","cat":"電氣量測","role":"equip","desc":"把電壓隨時間的變化畫成波形，看峰值、暫態與電容放電等情形。","clauses":["5.2"],"brands":["R. & S./RTM3004"]},{"id":"multimeter","en":"Digital multimeter","zh":"數位萬用電錶","cat":"電氣量測","role":"equip","desc":"量電壓、電流、電阻的基本工具，幾乎每項電氣檢查都會用到。","clauses":["5.2"],"brands":["Fluke/287"]},{"id":"leakage-620L","en":"Leakage / touch-current tester (IEC 60990 networks)","zh":"洩漏/接觸電流量測儀","cat":"電氣量測","role":"equip","desc":"內建「人體模擬電路」，量會流過人體的接觸電流與保護導體電流大不大。","clauses":["5.2","5.7"],"brands":["Ikonix / 620L"]},{"id":"power-analyzer","en":"Power analyzer / power meter","zh":"功率分析儀","cat":"電氣量測","role":"equip","desc":"精準量電壓、電流、功率與效率，用於功率分級與輸入/溫升試驗。","clauses":["5.4.1.4","9.3","E"],"brands":["Zes Zimmer /LMG641-A"]},{"id":"hipot","en":"Hipot (dielectric strength) tester","zh":"耐壓測試機（介電強度）","cat":"電氣量測","role":"equip","desc":"給絕緣灌比正常高很多的電壓撐一段時間，看會不會被電打穿。","clauses":["5.4.9"],"brands":["Ikonix-AR / 7800"]},{"id":"thin-sheet-es","en":"Electric-strength tester for thin/solid insulation","zh":"薄片/固體絕緣電氣強度試驗裝置","cat":"電氣量測","role":"equip","desc":"專門對膠帶、墊片這類薄片或固體絕緣做耐壓（電氣強度）試驗。","clauses":["5.4.9"],"brands":["Asia-Qtech / KQ-1"]},{"id":"ir-meter","en":"Insulation resistance meter","zh":"絕緣電阻計","cat":"電氣量測","role":"equip","desc":"加直流電壓量絕緣電阻有多大，評估絕緣好不好、有沒有受潮劣化。","clauses":["5.4.2","5.4.3","5.4.4","X"],"brands":["Ikonix-SCI / 297"]},{"id":"ground-bond","en":"Earth/ground bond resistance tester","zh":"接地阻抗測試機","cat":"電氣量測","role":"equip","desc":"灌大電流量金屬外殼到接地端的阻抗，確認故障電流走得掉、阻抗夠低。","clauses":["5.6.4.1"],"brands":["Ikonix-SCI / 266"]},{"id":"impulse-gen","en":"Impulse voltage test generator","zh":"脈衝（突波）電壓產生器","cat":"電氣量測","role":"equip","desc":"製造標準雷擊突波波形，測絕緣扛不扛得住瞬間過電壓。","clauses":["5.4.2","5.4.3","5.4.4","X"],"brands":["EMTEST / TSS 500N10"]},{"id":"antenna-surge","en":"Antenna terminal surge tester (10 kV)","zh":"天線端子突波試驗機","cat":"電氣量測","role":"equip","desc":"對天線端子打高壓突波，模擬雷擊，驗證天線到內部電路的絕緣隔離。","clauses":["5.4.5.2"],"brands":["Testing/T3-05"]},{"id":"cap-discharge-probe","en":"High-impedance voltage probe (>=100 M, <=25 pF)","zh":"高輸入阻抗電壓探棒","cat":"電氣量測","role":"equip","desc":"幾乎不耗電的量測探棒，量拔插頭後殘留電壓掉得夠不夠快。","clauses":["5.5.2.2"],"brands":["probe"]},{"id":"noninductive-r","en":"Non-inductive resistor","zh":"無感電阻","cat":"電氣量測","role":"fixture","desc":"電感極低的精密電阻，當試驗負載或量測網路的元件。","clauses":["5.4.11"],"br 4.8.3.3","G.5.4.5.3","G.5.4.6.3","G.9.3","S.3.1","S.3.2","S"],"brands":[]},{"id":"tissue","en":"Wrapping tissue","zh":"薄棉紙（包裝紙）","cat":"耗材","role":"consumable","desc":"可燃的指示紙，用來判斷過熱/燃燒試驗有沒有引燃周圍。","clauses":["G.5.4.5.3","G.5.4.6.3","G.9.3","S.3.1","S.3.2","S"],"brands":[]},{"id":"petroleum","en":"Petroleum spirit","zh":"石油醚（去漬油）","cat":"耗材","role":"consumable","desc":"標示耐久試驗用的擦拭溶劑（去漬油），擦完看標示字會不會糊掉。","clauses":["F.3.10"],"brands":[]},{"id":"water-cloth","en":"Water + cloth (marking rub)","zh":"水＋擦布（標示耐久）","cat":"耗材","role":"consumable","desc":"沾水的布料，摩擦標示看會不會脫落模糊。","clauses":["F.3.10"],"brands":[]},{"id":"spruce","en":"Clear spruce wood blocks","zh":"雲杉木塊（衝擊墊木）","cat":"耗材","role":"consumable","desc":"指定的雲杉木塊，當衝擊/壓縮試驗的標準墊材。","clauses":["Y.4.4"],"brands":[]}],"glossary":[{"en":"Walk-in environmental chamber","zh":"步入式環境試驗室","cat":"環境模擬","desc":"可讓人或大型樣品進入的恆溫恆濕室，模擬設備在高低溫、潮濕等使用環境下運作。","clauses":["4.1.4"]},{"en":"Regenerative AC/DC power source","zh":"可程式交直流電源供應器","cat":"電源供應","desc":"能輸出可調的交流或直流電壓/頻率並回收電能，模擬世界各地電網與異常電壓條件供測試使用。","clauses":["4.1.4","5.4.1.4","9.3","E"]},{"en":"DC power supply","zh":"直流電源供應器","cat":"電源供應","desc":"提供穩定可調的高壓直流電源，供無人機電池系統與電子電路在各種供電條件下測試。","clauses":["5.4.1.4","9.3","E"]},{"en":"DC electronic load","zh":"直流電子負載","cat":"電源供應","desc":"可程式吸收電流的假負載，模擬馬達/電池在不同負載下的耗電，用於溫升與功率試驗。","clauses":["5.4.1.4","9.3","E"]},{"en":"Circulation chiller","zh":"循環式冷卻機","cat":"環境模擬","desc":"以循環冷媒為環境室或大功率負載散熱，維持試驗所需的溫度條件。","clauses":["4.1.4"]},{"en":"Salt-spray (fog) chamber","zh":"鹽霧試驗機","cat":"耐候/材料力學","desc":"在密閉箱內連續噴出鹽水霧氣，加速模擬沿海鹽分腐蝕，驗證戶外金屬件的抗鏽能力。","clauses":["Y.3","Y.3.3"]},{"en":"SO2 corrosion test chamber","zh":"二氧化硫腐蝕試驗箱","cat":"耐候/材料力學","desc":"在含二氧化硫的潮濕環境中試驗，模擬工業/都市污染氣體對金屬與鍍層的腐蝕。","clauses":["Y.3","Y.3.3"]},{"en":"Carbon-arc weathering tester","zh":"碳弧燈耐候試驗機","cat":"耐候/材料力學","desc":"以碳弧燈模擬強烈日照紫外線，加速老化塑膠件，檢驗戶外曝曬後是否脆化變色。","clauses":["C"]},{"en":"Xenon-arc weathering tester","zh":"氙弧燈耐候試驗機","cat":"耐候/材料力學","desc":"以氙弧燈模擬全光譜日光（含紫外線），加速戶外曝曬老化試驗。","clauses":["C"]},{"en":"Oil-immersion test equipment","zh":"耐油浸泡試驗設備","cat":"耐候/材料力學","desc":"依 ISO 1817/ASTM D471 將材料浸入指定油品，檢驗接觸油污後是否膨潤、軟化或劣化。","clauses":["Y.4.5"]},{"en":"Heating oven","zh":"熱風循環烘箱","cat":"環境模擬","desc":"提供穩定高溫環境（如球壓試驗 70–125°C 之加熱），用於材料耐熱前處理與試驗。","clauses":["5.4.1.10.3"]},{"en":"Temperature & humidity chamber","zh":"恆溫恆濕試驗箱","cat":"環境模擬","desc":"精確控制溫度與濕度，做耐濕（受潮）前處理，再進行絕緣/耐壓等電氣安全試驗。","clauses":["5.4.8"]},{"en":"Oscilloscope","zh":"示波器","cat":"電氣量測","desc":"顯示電壓隨時間變化的波形，用於量測峰值電壓、暫態與電容放電等電氣能量源特性。","clauses":["5.2"]},{"en":"Digital multimeter","zh":"數位萬用電錶","cat":"電氣量測","desc":"量測電壓、電流、電阻等基本電氣量，是能量源分級與各項電氣檢查的基本工具。","clauses":["5.2"]},{"en":"Leakage / touch-current tester (IEC 60990 networks)","zh":"洩漏/接觸電流量測儀","cat":"電氣量測","desc":"內建 IEC 60990「人體模擬網路」，量測會流經人體的接觸電流與保護導體電流。","clauses":["5.2","5.7"]},{"en":"Power analyzer / power meter","zh":"功率分析儀","cat":"電氣量測","desc":"精確量測電壓、電流、功率與效率，用於電力能量源（PS）分級及輸入功率/溫升試驗。","clauses":["5.4.1.4","9.3","E"]},{"en":"Hipot (dielectric strength) tester","zh":"耐壓測試機（介電強度）","cat":"電氣量測","desc":"在絕緣兩端施加遠高於工作電壓的試驗電壓並維持規定時間，確認絕緣不被擊穿。","clauses":["5.4.9"]},{"en":"Electric-strength tester for thin/solid insulation","zh":"薄片/固體絕緣電氣強度試驗裝置","cat":"電氣量測","desc":"專門用於薄片或固體絕緣材料的電氣強度（耐壓）試驗，搭配適當電極施加高壓。","clauses":["5.4.9"]},{"en":"Insulation resistance meter","zh":"絕緣電阻計","cat":"電氣量測","desc":"施加直流電壓量測絕緣電阻（兆歐姆級），評估絕緣品質與受潮後是否劣化。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"Earth/ground bond resistance tester","zh":"接地阻抗測試機","cat":"電氣量測","desc":"注入大電流量測可觸及金屬件到接地端的阻抗，確保故障電流能安全導引、阻抗夠低。","clauses":["5.6.4.1"]},{"en":"Impulse voltage test generator","zh":"脈衝（突波）電壓產生器","cat":"電氣量測","desc":"產生標準雷擊突波波形（如 1.2/50 µs），驗證絕緣對暫態過電壓的耐受能力。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"Antenna terminal surge tester (10 kV)","zh":"天線端子突波試驗機","cat":"電氣量測","desc":"對天線端子施加高壓突波，模擬雷擊耦合，驗證天線到內部電路的絕緣隔離。","clauses":["5.4.5.2"]},{"en":"High-impedance voltage probe (>=100 M, <=25 pF)","zh":"高輸入阻抗電壓探棒","cat":"電氣量測","desc":"極高輸入阻抗的量測探棒，量測拔插頭後電容殘留電壓的衰減，避免量測本身洩掉電荷。","clauses":["5.5.2.2"]},{"en":"Non-inductive resistor","zh":"無感電阻","cat":"電氣量測","desc":"電感極低的精密電阻，作為試驗負載或量測網路元件（如電信網路對地隔離試驗）。","clauses":["5.4.11"]},{"en":"Variable resistive load","zh":"可變電阻負載","cat":"電氣量測","desc":"可調電阻負載，用於電力能量源（PS）分級時調整輸出至最大功率點量測。","clauses":["6.2.2"]},{"en":"Tracking index (CTI/PTI) tester","zh":"相對漏電起痕指數試驗機","cat":"絕緣/距離量測","desc":"在絕緣表面滴電解液並加電壓，測定材料耐表面導電（起痕）能力，決定沿面距離需求。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"Vernier calliper","zh":"游標卡尺","cat":"絕緣/距離量測","desc":"量測長度、孔徑與間隙的精密尺，用於空間/沿面距離與各種尺寸量測。","clauses":["5.3.2","5.4.2","5.4.3","5.4.4","X"]},{"en":"Micrometer","zh":"測微器（分厘卡）","cat":"絕緣/距離量測","desc":"量測薄件厚度與微小尺寸（µm 級），用於固體絕緣厚度等精密量測。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"2.5D profile projector / video measuring","zh":"2.5 次元投影量測儀","cat":"絕緣/距離量測","desc":"以光學放大投影量測微小輪廓與距離，精確判讀空間距離與沿面距離。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"Creepage distance test rod/probe","zh":"沿面距離量測棒","cat":"絕緣/距離量測","desc":"依標準形狀模擬沿絕緣表面爬行的最短路徑，輔助判定沿面距離是否足夠。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"Mandrel (bending) tester","zh":"心軸彎曲試驗機","cat":"絕緣/距離量測","desc":"將絕緣薄片繞固定直徑心軸彎折，檢驗薄絕緣在彎曲後是否仍維持電氣強度。","clauses":["5.4.2","5.4.3","5.4.4","X"]},{"en":"Mains-plug pin torque tester","zh":"插頭刃片轉矩試驗機","cat":"機械/結構試驗","desc":"對「直接插牆」設備的插頭刃片施加規定扭矩，確認刃片不會鬆動或轉位。","clauses":["4.7"]},{"en":"Torque gauge / driver","zh":"扭力計／扭力起子","cat":"機械/結構試驗","desc":"量測或施加旋轉扭矩，例如鈕扣電池蓋的開啟扭矩、螺絲鎖固扭矩等。","clauses":["4.8.4.3"]},{"en":"Cylindrical weight (69 kPa)","zh":"69 kPa 壓縮配重","cat":"機械/結構試驗","desc":"施加 69 kPa 表面壓力的圓柱配重，用於戶外外殼的壓縮（承壓）試驗。","clauses":["Y.4.4"]},{"en":"Force applicator 440 N (Ø30 mm)","zh":"440 N 施力裝置（Ø30 mm 圓面）","cat":"機械/結構試驗","desc":"以直徑 30 mm 圓面施加最大 440 N 的力，用於推車/支架等承運裝置的機械穩定性試驗。","clauses":["8.1"]},{"en":"Calibrated weights / masses","zh":"砝碼／配重","cat":"機械/結構試驗","desc":"各種標準質量的砝碼或配重，用於承重、水平力、穩定性與抗拉力等施力試驗。","clauses":["4.8.4.6","8.6.2","8.6.5","8.7","G.7"]},{"en":"Platform scale (<=50 kg)","zh":"磅秤（≤50 kg）","cat":"機械/結構試驗","desc":"量測設備或零件重量，用於機械能量源（MS）分級與各項質量確認。","clauses":["8.2"]},{"en":"Accessibility test probes / fingers","zh":"可觸及性試驗探棒／試指","cat":"可觸及性探棒","desc":"模擬手指、金屬棒等的標準探棒（含關節試指），檢查危險帶電或運動件是否會被碰觸。","clauses":["4.8.4.6","5.3.2","8.5.4.3"]},{"en":"Steady-force test finger (10/30 N)","zh":"穩定施力試指（10／30 N）","cat":"可觸及性探棒","desc":"以 10 N、30 N 等規定力推壓開孔或外殼，檢查在持續施力下危險件是否仍不可觸及。","clauses":["T.2–T.4"]},{"en":"Test hook","zh":"試驗鉤","cat":"可觸及性探棒","desc":"模擬手指勾拉動作的鉤狀工具，檢查可動件/電池蓋等是否能被輕易拉開造成危險。","clauses":["4.8.4.6"]},{"en":"Wedge probe (45 N / 90 N)","zh":"楔形探棒（45／90 N）","cat":"可觸及性探棒","desc":"楔形探棒以 45 N/90 N 力插入開孔，檢查含旋轉或破裂性零件的設備可觸及性。","clauses":["8.5.4.3"]},{"en":"Straight metal-object probe","zh":"直形金屬棒探棒","cat":"可觸及性探棒","desc":"模擬掉入的直細金屬物，檢查開孔是否會讓外物進入而觸及危險帶電部位。","clauses":["P.2"]},{"en":"Force gauge","zh":"推拉力計（測力計）","cat":"機械/結構試驗","desc":"量測施加的推/拉力大小，用於可觸及性、握柄強度與各種施力試驗的力量讀值。","clauses":["5.3.2"]},{"en":"Push-pull force gauge","zh":"推拉力計","cat":"機械/結構試驗","desc":"可量測推力與拉力的測力計，用於承重、握柄與穩定性試驗時施力與讀值。","clauses":["8.7"]},{"en":"Inclined plane (10/15)","zh":"傾斜試驗平台","cat":"機械/結構試驗","desc":"可調 5/10/15 度的斜面平台，將設備傾斜以驗證其抗傾倒的靜態穩定性。","clauses":["8.6.2"]},{"en":"Angle gauge / digital level","zh":"角度規／傾角儀","cat":"機械/結構試驗","desc":"量測平台或設備的傾斜角度，確保穩定性試驗的角度正確。","clauses":["8.6.2"]},{"en":"Glass slide test fixture","zh":"玻璃滑落試驗治具","cat":"機械/結構試驗","desc":"驗證以玻璃製作的承載面在受力時不致滑落或破裂傷人的專用治具。","clauses":["8.6.4"]},{"en":"Straps / belts (handle test)","zh":"提把試驗吊帶","cat":"機械/結構試驗","desc":"配合砝碼對提把/握柄施加規定拉力，驗證提把強度足以承受搬運。","clauses":["8.8"]},{"en":"Stopwatch","zh":"碼錶","cat":"機械/結構試驗","desc":"量測施力或施焰等動作的持續時間，確保依標準規定的秒數執行。","clauses":["4.8.4.6"]},{"en":"Temperature data logger (thermocouples)","zh":"溫度記錄器（熱電偶）","cat":"火焰/高溫試驗","desc":"多通道連接熱電偶，連續記錄各點溫度，用於溫升試驗判定是否超過材料限值。","clauses":["5.4.1.4","9.3","E"]},{"en":"Ball-pressure test apparatus","zh":"球壓試驗裝置","cat":"火焰/高溫試驗","desc":"以 20 N 鋼球壓入加熱後的塑膠件，量測壓痕，驗證材料在高溫下不軟化變形。","clauses":["5.4.1.10.3"]},{"en":"Glow-wire test apparatus","zh":"熾熱線試驗裝置","cat":"火焰/高溫試驗","desc":"將鎳鉻線加熱至 550–960°C 壓入試件，模擬內部過熱零件是否引燃外殼。","clauses":["6.3.1"]},{"en":"Needle-flame test apparatus","zh":"針焰試驗裝置","cat":"火焰/高溫試驗","desc":"以 12 mm 小火焰直接燒灼零件，模擬內部小火源，驗證材料離火後自熄不蔓延。","clauses":["S"]},{"en":"500 W flame test apparatus","zh":"500 W 火焰試驗裝置","cat":"火焰/高溫試驗","desc":"較大功率火焰源（對應 IEC 60695-11-20 / UL94 V/5V 類），評估材料耐燃等級。","clauses":["S"]},{"en":"TV/AV signal generator (IEC 60107-1)","zh":"影音訊號產生器（IEC 60107-1）","cat":"訊號/功能","desc":"產生標準影音測試訊號，使設備在正常工作（輸入試驗）條件下運作以量測功率/溫升。","clauses":["B.2.5"]},{"en":"1 kHz sine signal generator","zh":"1 kHz 正弦訊號產生器","cat":"訊號/功能","desc":"輸出 1 kHz 正弦波，作為含音頻放大器設備試驗的標準輸入訊號。","clauses":["E"]},{"en":"Pink-noise generator + band-pass filter","zh":"粉紅噪音產生器＋帶通濾波器","cat":"訊號/功能","desc":"產生粉紅噪音並濾波，模擬寬頻音訊輸入，量測音頻放大器在實際使用下的發熱。","clauses":["E"]},{"en":"Variable wooden test enclosure (audio)","zh":"可變木質試驗箱（音頻）","cat":"訊號/功能","desc":"音頻放大器試驗用的木質試驗箱/障板，提供標準聲學負載條件。","clauses":["E"]},{"en":"Tensile strength tester","zh":"拉伸強度試驗機","cat":"耐候/材料力學","desc":"夾持試片拉伸至斷裂，量測拉伸強度與伸長率，評估材料機械強度與老化後變化。","clauses":["C","Y.4.3"]},{"en":"Flexural strength tester","zh":"彎曲強度試驗機","cat":"耐候/材料力學","desc":"對試片施加彎曲負載，量測彎曲強度，評估塑膠件的剛性與脆化。","clauses":["C"]},{"en":"Charpy impact tester","zh":"夏比衝擊試驗機","cat":"耐候/材料力學","desc":"以擺錘衝擊有缺口的橫置試片，量測吸收能量，評估材料的抗衝擊韌性。","clauses":["C"]},{"en":"Izod impact tester","zh":"艾氏（Izod）衝擊試驗機","cat":"耐候/材料力學","desc":"以擺錘衝擊垂直夾持的試片，量測衝擊韌性，與夏比法互補評估材料脆性。","clauses":["C"]},{"en":"Tensile-impact tester","zh":"拉伸衝擊試驗機","cat":"耐候/材料力學","desc":"以衝擊方式拉伸試片量測吸收能量，評估材料在瞬間拉伸下的韌性。","clauses":["C"]},{"en":"IP ingress-protection test equipment (IEC 60529)","zh":"防塵防水（IP）試驗設備","cat":"防護等級","desc":"依 IEC 60529 以粉塵箱、噴嘴、淋水或浸水試驗外殼防護等級（IPxx）。","clauses":["F.3.7"]},{"en":"Wireless-power foreign-object set","zh":"無線充電異物試驗組","cat":"無線電力","desc":"鋼片、鋁環、鋁箔、墊片等標準異物，放在無線充電板上量測升溫，驗證異物不致起火燙傷。","clauses":["9.6.3"]},{"en":"500 g impact steel ball","zh":"鋼球撞擊試驗球（500 g）","cat":"機械/結構試驗","desc":"500 g 鋼球自約 1.3 m（約 5 J）落下撞擊外殼，模擬掉落/碰撞驗證外殼強度。","clauses":["T.6"]},{"en":"Spring-loaded centre punch","zh":"中心衝子（彈簧式）","cat":"機械/結構試驗","desc" function diagramFor(c){
  if(c.diagram && DIAGRAMS[c.diagram]) return c.diagram;
  const ids=(c.clauses&&c.clauses.length?c.clauses:[c.id]);
  for(const raw of ids){
    const id=String(raw).replace(/^Annex\s*/i,'').trim();
    if(CLAUSE_DIA[id]) return CLAUSE_DIA[id];
    for(const k in CLAUSE_DIA){ if(id===k||id.startsWith(k+'.')||id.startsWith(k)) return CLAUSE_DIA[k]; }
  }

  const rows=(DATA.glossary&&DATA.glossary.length?DATA.glossary:(DATA.instruments||[]).map(i=>({en:i.en,zh:i.zh,cat:i.cat,desc:i.desc})));
  const list=rows.filter(r=>!Q||[r.en,r.zh,r.desc,r.cat].join(' ').toLowerCase().includes(Q));
  $('#view-glossary').innerHTML=`<div class="section-head"><h2>中英對照詞彙</h2><p>儀器/治具中英名稱與一句話說明，方便查找與跨部門溝通。</p></div>
    <div class="tablewrap"><table class="gloss"><thead><tr><th style="width:25%">English</th><th style="width:22%">中文</th><th style="width:15%">分類</th><th>說明 / 用途</th></tr></thead>
    <tbody>${list.map(r=>`<tr><td class="en">${hl(r.en||'',Q)}</td><td class="zh">${hl(r.zh||'',Q)}</td><td class="cat"><span style="${catStyle(r.cat)}">${esc(r.cat||'')}</span></td><td>${hl(r.desc||'',Q)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">無資料</td></tr>'}</tbody></table></div>`;
}

/* ---------------- MATRIX ---------------- */
function renderMatrix(){
  const wrap=$('#view-matrix');
  const cls=(DATA.clauses||[]), ins=(DATA.instruments||[]);
  if(!cls.length||!ins.length){wrap.innerHTML='<div class="section-head"><h2>對照矩陣</h2></div><div class="empty">資料載入後顯示。</div>';return;}
  const head=`<tr><th>儀器 ＼ 章節</th>${cls.map(c=>{const g=c.group||groupKey(c.id);return `<th data-tip="${esc(c.title_zh||'')}" style="color:${gColor(g)}">${esc(clean(c.id))}</th>`;}).join('')}</tr>`;
  const body=ins.map(i=>{const set=new Set((i.clauses||[]).map(clean));
    return `<tr><th data-tip="${esc(i.zh||'')}">${esc(i.en||'')}</th>${cls.map(c=>{const on=(c.clauses&&c.clauses.length?c.clauses:[c.id]).some(x=>set.has(clean(x)))||set.has(clean(c.id));return `<td class="${on?'on':''}"></td>`;}).join('')}</tr>`;}).join('');
  wrap.innerHTML=`<div class="section-head"><h2>對照矩陣</h2><p>橫向為章節、縱向為儀器；藍點表示該儀器用於該章節。可橫向捲動；手機建議橫放或於平板/桌機檢視。</p></div>
    <div class="matrix-scroll"><table class="matrix"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

/* ---------------- DIAGRAMS ---------------- */
function renderDiagrams(){
  const cards=Object.keys(DIAGRAMS).map(k=>{const d=DIAGRAMS[k];let cl='';
    if(typeof CLAUSE_DIA!=='undefined'){for(const cc in CLAUSE_DIA){if(CLAUSE_DIA[cc]===k){cl=cc;break;}}}
    const g=groupKey(cl);
    return `<div class="dia-card"><h3><span class="ch-badge" style="background:${gColor(g)};min-width:auto;padding:4px 8px">${esc(cl||'—')}</span> ${esc(d.zh)} <span class="en">${esc(d.en)}</span></h3>
      <div class="svgbox">${d.svg}</div><p>${esc(d.cap||'')}</p></div>`;}).join('');
  $('#view-diagrams').innerHTML=`<div class="section-head"><h2>測試示意圖</h2><p>用動態示意圖快速理解每項測試的原理。動畫會在系統「減少動態效果」設定下自動停用。</p></div><div class="dia-gallery">${cards}</div>`;
}

/* ---------------- FOOTER ---------------- */
function renderFooter(){
  const m=DATA.meta||{};
  $('#disc').innerHTML=m.disclaimer||'本頁為內部研究／教育用途之整理，章節與參數請以最新版 CNS 15598-1 / IEC 62368-1 標準正文及 IECEE／BSMI 公告為準；本頁不含成本或報價資訊。';
  $('#foot-meta').innerHTML=`${esc(m.title||'無人機安規測試 儀器×章節對照')} · 來源資料：${esc(m.source||'')} · 產生時間 ${esc(m.generated||'')}`;
}

/* ---------------- navigation ---------------- */
function show(v){
  activeView=v;closeSheet();
  $$('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  $$('.view').forEach(s=>s.classList.toggle('active',s.id==='view-'+v));
  window.scrollTo({top:0,behavior:'auto'});
}
function gotoChapter(id){chFilter='all';Q='';$('#search').value='';renderChapters();show('chapter');
  setTimeout(()=>{const el=$('#ch-'+CSS.escape(id))||$$('.ch').find(x=>clean(x.dataset.id)===clean(id));
   if(el){el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('hl');setTimeout(()=>el.classList.remove('hl'),1800);}},70);}
function gotoInstrument(id){inFilter='all';Q='';$('#search').value='';renderInstruments();show('instrument');
  setTimeout(()=>{const el=$('#in-'+CSS.escape(id));if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('hl');setTimeout(()=>el.classList.remove('hl'),1800);}},70);}

/* ---------------- filter drawer (mobile) ---------------- */
function openSheet(kind){
  const sheet=$('#filterSheet'),bd=$('#sheetBackdrop');
  $('#sheetTitle').textContent=kind==='chapter'?'依危害分類篩選':'依儀器分類篩選';
  $('#sheetChips').innerHTML=kind==='chapter'?chapterChips():instChips();
  $$('#sheetChips [data-chf]').forEach(b=>b.onclick=()=>{chFilter=b.dataset.chf;closeSheet();renderChapters();});
  $$('#sheetChips [data-inf]').forEach(b=>b.onclick=()=>{inFilter=b.dataset.inf;closeSheet();renderInstruments();});
  bd.classList.add('show');sheet.classList.add('show');
}
function closeSheet(){const s=$('#filterSheet'),bd=$('#sheetBackdrop');if(s)s.classList.remove('show');if(bd)bd.classList.remove('show');}

/* ---------------- search ---------------- */
function onSearch(v){Q=clean(v).toLowerCase();renderChapters();renderInstruments();renderGlossary();
  if(['overview','matrix','diagrams'].includes(activeView)&&Q)show('chapter');}

/* ---------------- boot ---------------- */
function boot(){
  $('#b-ch').textContent=(DATA.clauses||[]).length;
  $('#b-in').textContent=(DATA.instruments||[]).length;
  $('#b-gl').textContent=(DATA.glossary&&DATA.glossary.length?DATA.glossary:(DATA.instruments||[])).length;
  renderOverview();renderChapters();renderInstruments();renderGlossary();renderMatrix();renderDiagrams();renderFooter();
  $$('[data-view]').forEach(b=>b.onclick=()=>show(b.dataset.view));
  $('#sheetBackdrop').onclick=closeSheet;
  let t;$('#search').addEventListener('input',e=>{clearTimeout(t);t=setTimeout(()=>onSearch(e.target.value),150);});
  window.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});
}
document.addEventListener('DOMContentLoaded',boot);

/* ---------------- custom tooltips ---------------- */
(function(){
  function setup(){
    const tip=document.createElement('div');tip.className='tipbubble';document.body.appendChild(tip);
    let cur=null;
    function hide(){tip.style.display='none';cur=null;}
    function place(el){const t=el.getAttribute('data-tip');if(!t){hide();return;}
      cur=el;tip.textContent=t;tip.style.display='block';tip.classList.remove('below');
      const r=el.getBoundingClientRect(),b=tip.getBoundingClientRect();
      let left=r.left+r.width/2-b.width/2;left=Math.max(8,Math.min(left,window.innerWidth-b.width-8));
      let top=r.top-b.height-10;if(top<6){top=r.bottom+10;tip.classList.add('below');}
      tip.style.left=left+'px';tip.style.top=top+'px';tip.style.setProperty('--ax',(r.left+r.width/2-left)+'px');}
    document.addEventListener('mouseover',e=>{const el=e.target.closest?e.target.closest('[data-tip]'):null;if(el)place(el);});
    document.addEventListener('mouseout',e=>{const el=e.target.closest?e.target.closest('[data-tip]'):null;if(el&&el===cur)hide();});
    document.addEventListener('scroll',()=>{if(cur)hide();},true);
    window.addEventListener('resize',hide);
  }
  if(document.body)setup();else document.addEventListener('DOMContentLoaded',setup);
})();
</script>
