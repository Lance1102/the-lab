<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>無人機安規測試 儀器 × 章節對照 ｜ CNS 15598-1（IEC 62368-1）</title>
<meta name="description" content="無人機（UAV）安規測試 CNS 15598-1 / IEC 62368-1：章節與測試儀器對照，每項測試用一句話講清楚「在防什麼」，附中英對照與動態示意圖。支援手機/平板。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f8; --surface:#ffffff; --surface-2:#f5f7fc; --surface-3:#eef2f9;
  --ink:#1b2435; --ink-2:#54627c; --ink-3:#8a96ad; --ink-soft:#54627c;
  --line:#e2e7f1; --line-2:#eef1f7;
  --brand:#4f46e5; --brand-d:#3a32c4; --brand-dd:#2a2496; --brand-wash:#ecebfd; --brand-wash2:#f4f3fe;
  --teal:#0e9b8c; --teal-wash:#dff5f2;
  /* HBSE semantic groups */
  --g4:#64748b; --g4w:#eef1f6;
  --g5:#2f6bdb; --g5w:#e7f0ff;
  --g6:#e9692b; --g6w:#fdeee3;
  --g8:#16a06b; --g8w:#e2f6ee;
  --g9:#cf8a1a; --g9w:#fbf2da;
  --gx:#8b5cf6; --gxw:#f1ebfe;
  --ok:#0e9b8c; --warn:#d98324; --danger:#e0506b;
  --shadow:0 1px 2px rgba(20,30,60,.05), 0 10px 26px -8px rgba(20,30,60,.13);
  --shadow-sm:0 1px 2px rgba(20,30,60,.06);
  --shadow-pop:0 14px 40px -10px rgba(28,30,90,.30);
  --r:16px; --r-sm:11px; --r-pill:999px;
  --sans:"Hanken Grotesk","Noto Sans TC",-apple-system,"Segoe UI",system-ui,sans-serif;
  --mono:"Spline Sans Mono","Hanken Grotesk",ui-monospace,Consolas,monospace;
  --maxw:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
h1,h2,h3,h4{margin:0;font-weight:700;line-height:1.25;letter-spacing:-.012em}
a{color:var(--brand-d);text-decoration:none}
a:hover{text-decoration:underline}
.mono{font-family:var(--mono)}
::selection{background:var(--brand-wash);color:var(--brand-dd)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd5e4;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#b6c0d4}

/* ---- atmospheric background ---- */
.bg-atmos{position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(1100px 620px at 82% -10%, #e4e7fd 0%, transparent 58%),
    radial-gradient(820px 460px at -6% -4%, #dff3ef 0%, transparent 52%),
    var(--bg);}
.bg-atmos::after{content:"";position:absolute;inset:0;opacity:.55;
  background-image:radial-gradient(circle at 1px 1px, rgba(40,55,95,.045) 1px, transparent 0);
  background-size:23px 23px}

/* ---- app bar ---- */
.appbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.80);
  backdrop-filter:saturate(170%) blur(16px);-webkit-backdrop-filter:saturate(170%) blur(16px);
  border-bottom:1px solid var(--line)}
.appbar-in{max-width:var(--maxw);margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .logo{width:39px;height:39px;flex:0 0 auto;border-radius:12px;display:block;
  box-shadow:0 4px 12px -2px rgba(79,70,229,.5)}
.brand .bt{font-weight:800;font-size:15.5px;letter-spacing:-.02em;white-space:nowrap}
.brand .bs{display:block;font-weight:500;font-size:10.5px;color:var(--ink-3);letter-spacing:.01em;margin-top:1px}
.search{margin-left:auto;position:relative;flex:1 1 230px;max-width:380px}
.search input{width:100%;padding:9px 14px 9px 38px;border:1px solid var(--line);border-radius:var(--r-pill);
  background:var(--surface-2);font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;transition:.16s}
.search input::placeholder{color:var(--ink-3)}
.search input:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px var(--brand-wash)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-3)}

/* ---- desktop tabs ---- */
.tabs{max-width:var(--maxw);margin:0 auto;padding:7px 16px 9px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{appearance:none;border:0;background:none;cursor:pointer;font-family:inherit;
  font-size:14px;font-weight:600;color:var(--ink-2);padding:8px 15px;border-radius:var(--r-pill);
  white-space:nowrap;display:flex;align-items:center;gap:7px;transition:.15s}
.tabs button:hover{background:var(--surface-3);color:var(--ink)}
.tabs button.active{background:var(--brand);color:#fff;box-shadow:0 4px 12px -3px rgba(79,70,229,.5)}
.cbadge{font-size:11px;font-weight:700;background:rgba(255,255,255,.22);color:inherit;border-radius:var(--r-pill);
  padding:1px 7px;min-width:18px;text-align:center}
.tabs button:not(.active) .cbadge{background:var(--surface-3);color:var(--ink-3)}

/* ---- layout / views ---- */
main{max-width:var(--maxw);margin:0 auto;padding:24px 22px 90px}
.view{display:none}
.view.active{display:block;animation:viewin .32s cubic-bezier(.22,.61,.36,1)}
@keyframes viewin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section-head{margin:4px 0 18px}
.section-head h2{font-size:19px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.section-head p{margin:.35em 0 0;color:var(--ink-2);font-size:14px;max-width:78ch}

/* ---- hero ---- */
.hero{position:relative;overflow:hidden;border-radius:22px;padding:30px 32px;color:#fff;
  background:linear-gradient(135deg,#4f46e5 0%,#3f37c9 52%,#312e81 100%);
  box-shadow:0 20px 50px -18px rgba(49,46,129,.6)}
.hero::after{content:"";position:absolute;right:-70px;top:-90px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,200,255,.28),transparent 68%)}
.hero .rotor{position:absolute;right:18px;top:18px;opacity:.5;color:#c7d2fe}
.hero h2{position:relative;font-size:clamp(24px,3.1vw,36px);color:#fff;letter-spacing:-.02em;max-width:20ch}
.hero p{position:relative;margin:.7em 0 0;color:#dfe3fb;font-size:15px;max-width:62ch;line-height:1.65}
.kpis{position:relative;display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.kpi{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;
  padding:13px 17px;min-width:108px;backdrop-filter:blur(2px)}
.kpi b{display:block;font-size:27px;line-height:1;letter-spacing:-.02em;font-weight:800}
.kpi span{font-size:12px;color:#cdd3f7;margin-top:4px;display:block}

/* ---- generic cards ---- */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.intro-card{margin-top:18px;padding:18px 22px;border-left:4px solid var(--brand);display:flex;gap:14px;align-items:flex-start}
.intro-card .qm{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--brand-wash);color:var(--brand-d);
  display:flex;align-items:center;justify-content:center}
.intro-card p{margin:0;font-size:14.5px;color:var(--ink);line-height:1.65}

/* ---- energy classes ---- */
.es-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:13px;margin-top:8px}
.es-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px 14px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:.18s}
.es-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.es-card .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.es-card .ec-h{display:flex;align-items:center;gap:9px}
.es-code{font-family:var(--mono);font-weight:600;font-size:12px;color:#fff;border-radius:7px;padding:3px 8px;letter-spacing:.02em}
.es-card .ec-zh{font-weight:700;font-size:14.5px}
.es-card .ec-desc{margin:9px 0 0;font-size:13.5px;color:var(--ink);line-height:1.55}
.es-card .ec-tech{margin:8px 0 0;font-size:11.5px;color:var(--ink-3);line-height:1.5;border-top:1px dashed var(--line);padding-top:7px}

/* ---- info cards grid ---- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-top:6px}
.icard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm)}
.icard h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.icard h3 .dot{width:8px;height:8px;border-radius:3px;background:var(--brand)}

/* structured one-per-row lists (from data html) */
.s-intro{display:block;font-size:13.5px;color:var(--ink-2);margin-bottom:6px}
.s-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.s-row,.coderow{display:flex;gap:10px;align-items:baseline;font-size:13px;line-height:1.5}
.s-k{flex:0 0 auto;font-family:var(--mono);font-size:11px;font-weight:600;border-radius:6px;padding:2px 7px;
  background:var(--brand-wash);color:var(--brand-d);min-width:56px;text-align:center;align-self:flex-start;margin-top:1px}
.s-k.kw{font-family:var(--sans);background:var(--surface-3);color:var(--ink-2);min-width:60px;font-weight:600}
.s-note,.codenote{display:block;margin-top:10px;font-size:11.5px;color:var(--ink-3);font-style:italic;
  border-top:1px dashed var(--line);padding-top:8px}
.codelist{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.pel-code{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;font-weight:600;border-radius:5px;padding:2px 6px;min-width:42px;text-align:center}
.pel-code.req{background:var(--g5w);color:#0b4fc0}
.pel-code.sub{background:var(--surface-3);color:var(--ink-2)}

/* expandable "more" disclosure */
.more{margin-top:22px}
.more-tg{width:100%;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;font-family:inherit;font-size:14.5px;
  font-weight:600;color:var(--ink);box-shadow:var(--shadow-sm);transition:.16s}
.more-tg:hover{border-color:#cdd5e6}
.more-tg .chev{margin-left:auto;transition:transform .25s;color:var(--ink-3)}
.more.open .more-tg .chev{transform:rotate(180deg)}
.more-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.more.open .more-body{grid-template-rows:1fr}
.more-body>div{overflow:hidden}
.more-inner{padding-top:14px}
.std-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;
  box-shadow:var(--shadow-sm);margin-bottom:14px}
.std-panel h3{font-size:14px;color:var(--brand-d);margin-bottom:8px}

/* ---- filter bar + mobile trigger ---- */
.filterbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 16px}
.chip{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
  border-radius:var(--r-pill);padding:7px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.13s}
.chip:hover{border-color:var(--brand);color:var(--ink)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .n{opacity:.55;margin-left:3px;font-weight:600}
.count-note{margin-left:auto;font-size:12.5px;color:var(--ink-3)}
.filter-trigger{display:none}
.ch-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.skim-toggle{flex:0 0 auto;appearance:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;margin-top:2px;
  border:1px solid var(--line);background:var(--surface);color:var(--brand-d);border-radius:var(--r-pill);padding:8px 15px;box-shadow:var(--shadow-sm);transition:.14s}
.skim-toggle:hover{border-color:var(--brand)}
.skim-toggle[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}
#chList.compact .ch{margin-bottom:8px}
#chList.compact .ch-head{padding:11px 15px;gap:11px}
#chList.compact .ch-en,#chList.compact .ch-tags{display:none}
#chList.compact .ch-title{font-size:14.5px}
#chList.compact .ch-lede{margin-top:5px;font-size:13.7px}

/* ---- chapter cards ---- */
.ch{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);
  margin-bottom:13px;overflow:hidden;transition:box-shadow .2s,border-color .2s,transform .2s;scroll-margin-top:132px}
.ch:hover{box-shadow:var(--shadow);border-color:#d3dbea}
.ch.hl{box-shadow:0 0 0 3px var(--brand),var(--shadow);border-color:var(--brand)}
.ch-head{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:15px 17px;cursor:pointer}
.ch-badge{font-family:var(--mono);font-weight:600;font-size:12px;color:#fff;border-radius:9px;padding:7px 8px;
  min-width:58px;text-align:center;letter-spacing:.01em;line-height:1.2}
.ch-main{min-width:0}
.ch-title{font-weight:700;font-size:15.5px;line-height:1.34}
.ch-en{font-size:12px;color:var(--ink-3);margin-top:1px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.ch.open .ch-en{-webkit-line-clamp:unset;overflow:visible}
.ch-lede{font-size:14px;color:var(--ink-2);line-height:1.58;margin-top:9px;max-width:74ch}
.ch-lede b,.ch-lede strong{color:var(--ink)}
.ch-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:11px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px;white-space:nowrap;line-height:1.7}
.tag.grp{color:#fff}
.tag.cnt{background:var(--brand-wash);color:var(--brand-d)}
.tag.loc{background:var(--surface-3);color:var(--ink-2)}
.tag.sub{background:var(--surface-3);color:var(--ink-3);font-family:var(--mono);font-weight:600}
.ch-chev{align-self:center;color:var(--ink-3);transition:transform .26s}
.ch.open .ch-chev{transform:rotate(180deg)}
.ch-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.ch.open .ch-body{grid-template-rows:1fr}
.ch-body>div{overflow:hidden}
.ch-inner{padding:4px 17px 18px;border-top:1px solid var(--line-2)}

.callout{display:flex;gap:11px;align-items:flex-start;background:linear-gradient(180deg,#fdf6e6,#fbf2da);
  border:1px solid #f0e2b8;border-radius:13px;padding:12px 15px;margin:15px 0;font-size:14px;color:#5c4a17;line-height:1.6}
.callout .ic{flex:0 0 auto;color:var(--g9);margin-top:1px}
.callout b{color:#7a5d12}

.cb-grid{display:grid;grid-template-columns:1.18fr .82fr;gap:24px;margin-top:6px}
.tech-h4{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--brand-d);font-weight:700;
  margin:18px 0 7px;display:flex;align-items:center;gap:8px}
.tech-h4:first-child{margin-top:6px}
.tech-h4::before{content:"";width:3px;height:13px;background:var(--brand);border-radius:2px;flex:0 0 auto}
p.tx{margin:.2em 0 0;font-size:13.8px;color:var(--ink);line-height:1.62}
.params{font-family:var(--mono);font-size:11.8px;line-height:1.62;background:#141b2e;color:#d6deef;
  border-radius:11px;padding:12px 14px;margin-top:6px;white-space:pre-wrap;overflow-x:auto}
.equip-list{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.equip-item{display:flex;gap:9px;align-items:center;padding:8px 11px;border:1px solid var(--line);border-radius:10px;
  background:var(--surface-2);cursor:pointer;transition:.13s}
.equip-item:hover{border-color:var(--brand);background:#fff;box-shadow:var(--shadow-sm)}
.equip-item .tx2{min-width:0}
.equip-item .en{font-weight:600;font-size:13px}
.equip-item .zh{font-size:12px;color:var(--ink-2)}
.role{margin-left:auto;flex:0 0 auto;font-size:10px;font-weight:700;border-radius:6px;padding:2px 7px}
.role.equip{background:var(--g5w);color:#0b4fc0}
.role.fixture{background:var(--g8w);color:#0a7a55}
.role.consumable{background:#fbe4e8;color:#b23}
.figure{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:13px;margin-top:6px}
.figure svg{width:100%;height:auto;display:block}
.figcap{font-size:11.5px;color:var(--ink-3);text-align:center;margin-top:8px;line-height:1.45}
.pel-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.pel-item{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:8px 10px;border:1px solid var(--line);
  border-radius:9px;background:#fbfcfe}
.pel-item.link{cursor:pointer;transition:.13s}
.pel-item.link:hover{border-color:var(--brand);background:#fff;box-shadow:var(--shadow-sm)}
.pel-txt{min-width:0;line-height:1.45}
.pel-txt .en{font-size:12.5px}
.pel-txt .zh{font-size:11.5px;color:var(--ink-2);display:block;margin-top:1px}
.goarrow{color:var(--brand-d);font-weight:700;font-size:11px;white-space:nowrap}
.note{font-size:12.5px;color:var(--ink-2);line-height:1.6;border-radius:10px;padding:10px 13px;margin-top:9px;background:var(--surface-2);border:1px solid var(--line)}
.note.bsmi{background:var(--teal-wash);border-color:#bce8e1;color:#0a5b54}
.note.qa{background:#f6f1fe;border-color:#e4d8fb;color:#5b3aa8}
.note b{color:inherit;font-weight:700}

/* ---- instruments ---- */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(284px,1fr));gap:14px}
.inst{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;
  box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:.18s;scroll-margin-top:132px}
.inst:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:#d3dbea}
.inst.hl{box-shadow:0 0 0 3px var(--brand),var(--shadow);border-color:var(--brand)}
.inst .ih{display:flex;gap:11px;align-items:flex-start}
.inst .ic{width:40px;height:40px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;justify-content:center}
.inst .en{font-weight:700;font-size:14.5px;line-height:1.3}
.inst .zh{font-size:12.5px;color:var(--ink-2);margin-top:1px}
.inst .cat{display:inline-block;margin-top:8px;font-size:10.5px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px}
.inst .desc{font-size:13px;color:var(--ink);margin:11px 0 0;line-height:1.55}
.inst .brands{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:9px;line-height:1.5}
.inst .cchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:12px}
.cchip{font-family:var(--mono);font-size:10.5px;font-weight:600;border-radius:6px;padding:2px 7px;cursor:pointer;color:#fff;transition:.12s}
.cchip:hover{filter:brightness(1.08)}

/* ---- glossary ---- */
.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm)}
table.gloss{width:100%;border-collapse:collapse;font-size:13.5px}
table.gloss th,table.gloss td{text-align:left;padding:11px 15px;border-bottom:1px solid var(--line-2);vertical-align:top}
table.gloss th{background:var(--surface-2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);
  position:sticky;top:64px;font-weight:700}
table.gloss tr:last-child td{border-bottom:0}
table.gloss tr:hover td{background:var(--surface-2)}
table.gloss .en{font-weight:600}
table.gloss .zh{color:var(--ink-2)}
table.gloss td.cat span{font-size:10.5px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px;white-space:nowrap}

/* ---- matrix ---- */
.matrix-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);max-height:76vh;box-shadow:var(--shadow-sm)}
table.matrix{border-collapse:collapse;font-size:11.5px}

塑膠點燃。功率大的就得用防火外殼擋住火。","tech":"對應第 6 章。依電路可輸出之最大功率分 PS1 ≤15 W、PS2 ≤100 W、PS3 >100 W，決定防火外殼需求。"},{"code":"MS","zh":"機械傷害","color":"#16a06b","desc":"會打到、夾到、割到或壓到人的危險，例如旋轉的螺旋槳、銳利邊角、會倒下來的機身。","tech":"對應第 8 章。銳邊、運動/旋轉件、傾倒、高壓件等機械傷害，分 MS1／MS2／MS3。"},{"code":"TS","zh":"高溫 · 燙傷","color":"#cf8a1a","desc":"摸到會燙傷的高溫表面。依溫度高低、材質與接觸時間判斷危不危險。","tech":"對應第 9 章。依接觸溫度、材質與接觸時間分 TS1／TS2／TS3。"},{"code":"RS","zh":"光 · 聲 · 射線","color":"#8b5cf6","desc":"光、聲音、射線造成的危險，例如雷射或強光 LED、過大的音量。","tech":"對應第 10 章。雷射/LED 光輻射、聲壓、X 射線等，分 RS1／RS2／RS3（雷射對應 IEC 60825-1）。"}],"cards":[{"t":"HBSE 三方塊模型","d":"<span class=\"s-intro\">IEC 62368-1 以「以危害為基礎的安全工程（HBSE）」為核心：<\/span><span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">三方塊<\/span><span>能量源 → 傳遞路徑 → 人體／可燃物（用<b>安全防護<\/b>切斷路徑）<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">設計流程<\/span><span>找能量源 → 分級 → 設防護 → 驗證<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">合格門檻<\/span><span>正常、異常、單一故障下，人接觸之能量都降到 <b>Class 1<\/b>（安全）<\/span><\/span><\/span>"},{"t":"為何從 60950/60065 改為 62368-1","d":"<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">舊標準<\/span><span>IEC 60950-1（IT 資訊設備）＋ IEC 60065（AV 影音設備）：依產品型態條列規定<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">新標準<\/span><span>IEC 62368-1：以能量與危害為核心（HBSE）<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">好處<\/span><span>涵蓋整合型新產品（無人機控制器/充電器/通訊模組），不必為每種新形態重寫規定<\/span><\/span><\/span>"},{"t":"如何閱讀本頁","d":"<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">依章節<\/span><span>每條文的目的、做法、參數、所需儀器與示意圖<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">依儀器<\/span><span>每件儀器的中英名稱、用途說明、用在哪些章節<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">對照矩陣<\/span><span>章節 × 儀器一覽<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">測試示意圖<\/span><span>動態理解測試原理<\/span><\/span><\/span><span class=\"s-note\">上方搜尋框可跨章節／儀器即時搜尋。<\/span>"},{"t":"IECEE CB 與 BSMI 驗證路徑","d":"<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">CB 流程<\/span><span>CBTL 依 IECEE 02 測試 → CB 報告（官方 TRF）＋ CB 證書 → 成員國相互承認<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">BSMI 路徑<\/span><span>商品檢驗：型式認可＋逐批/監視查驗，或符合性聲明（DoC）/商品驗證登錄（RPC）<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">無人機分工<\/span><span>無線電模組 → NCC 型式認可；主機/充電/資訊設備安全 → BSMI 依 CNS 15598-1（安全）＋ CNS 15936（CISPR 32，EMC）<\/span><\/span><\/span>"},{"t":"無人機（戶外設備）適用重點","d":"<span class=\"s-intro\">無人機多為戶外使用，除一般章節外特別涉及：<\/span><span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k\">附錄 Y<\/span><span>戶外外殼構造：耐 UV、鹽霧/SO₂ 腐蝕、墊片拉伸/壓縮/耐油<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">4.1.4<\/span><span>戶外環境溫度（預設 −33°C～+40°C）<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">5.4.5.2<\/span><span>天線端子突波<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">9.6.3<\/span><span>無線充電異物加熱<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">附錄 M<\/span><span>電池相關<\/span><\/span><\/span>"},{"t":"官方所需設備清單來源（已對照）","d":"<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">使用儀器<\/span><span>＝ 實驗室實際清單（無人機安規試驗儀器）<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">官方 PEL<\/span><span>＝ IECEE CTL P.E.L. 官方應備設備（含 R/S 代碼）<\/span><\/span><span class=\"s-row\"><span class=\"s-k kw\">權威依據<\/span><span>IECEE CTL EQL（OD-5003）＋標準規範性附錄（尤其附錄 D 試驗產生器）<\/span><\/span><\/span><span class=\"s-note\">兩欄並陳，一眼看出覆蓋與差異。<\/span>"},{"t":"PEL 設備代碼說明（R / S）","d":"<span class=\"codelist\"><span class=\"coderow\"><span class=\"pel-code req\">R<\/span><span><b>須由實驗室自備<\/b> Required<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RB<\/span><span>基本必備 Required Basic（所有設備皆需）<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RA<\/span><span>含音訊放大器須備（audio power &gt; 0.5 W）<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RC<\/span><span>有線分配系統須備<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">ROUT<\/span><span>戶外設備須備<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RSH<\/span><span>碎紙機須備<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RT<\/span><span>電信連接須備<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RV<\/span><span>影像 / CRT 設備須備<\/span><\/span><span class=\"coderow\"><span class=\"pel-code req\">RWPT<\/span><span>無線充電發射器須備<\/span><\/span><span class=\"coderow\"><span class=\"pel-code sub\">S<\/span><span>可外包 Subcontract（見 OD-2012）<\/span><\/span><span class=\"coderow\"><span class=\"pel-code sub\">SP<\/span><span>特殊測試設施 Specialized<\/span><\/span><span class=\"coderow\"><span class=\"pel-code sub\">W<\/span><span>可於他實驗室見證 Witness<\/span><\/span><span class=\"coderow\"><span class=\"pel-code sub\">3PPS<\/span><span>需三相電源 Three-phase supply<\/span><\/span><\/span><span class=\"codenote\">代碼僅表「是否須自建」，不代表設備已合格——仍須評估校正、不確定度與文件。<\/span>"},{"t":"與官方 PEL 對照：清單未明列（建議確認）","d":"<span class=\"s-intro\">PEL 列為必備(R*)或常見、而清單未明列者（部分屬 S 可外包）：<\/span><span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k\">5.4.1.4<\/span><span>繞組電阻計（2/4 線）、高壓電壓探棒<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">5.4.2<\/span><span>顯微鏡<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">5.4.10<\/span><span>鈍頭探棒 Figure V.3<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">5.8<\/span><span>電池備援回送 back-feed 高阻抗量測（無人機電池相關）<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">8.9<\/span><span>輪/腳輪 20 N ＋碼錶<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">8.12<\/span><span>伸縮/桿狀天線 0.6 N·m 扭力試具（無人機天線相關）<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">附錄 H<\/span><span>5000 Ω 電信振鈴電阻<\/span><\/span><span class=\"s-row\"><span class=\"s-k\">V.1.6<\/span><span>端子探棒 ＋ 1 N<\/span><\/span><\/span>"}],"intro_plain":"無人機要在台灣上市販售，得先通過 CNS 15598-1（等同國際標準 IEC 62368-1）這套電氣安全測試。本頁把實驗室的測試項目、需要哪些儀器，整理成一眼就能查的對照表。"},"clauses":[{"id":"4.1.4","clauses":["4.1.4"],"group":"4","title_en":"Specified conditions for transportable, direct plug-in, hand-held and outdoor equipment (the TRF line item is 'Specified ambient temperature for outdoor use (deg C)')","title_zh":"供戶外使用設備之規定條件／戶外使用之指定環境溫度","purpose_zh":"這一條在問一件事：這台設備是不是會被拿到戶外（風吹日曬雨淋、酷暑寒冬）使用？無人機/遙控器、戶外充電器很容易遇到。如果是戶外用，外殼與內部就必須在製造商宣告的最低到最高溫度範圍內仍維持安全（不會龜裂、不會進水、絕緣不會失效）。對無人機特別重要，因為飛行環境溫差大、又會淋到露水或細雨。換句話說，先把『會在什麼環境用』講清楚，後面所有安全試驗才知道要在多冷多熱、多潮濕的條件下做。","analogy_zh":"就像買冬天外套要先看吊牌寫『耐寒到攝氏幾度』——廠商先承諾這件衣服能撐到多冷多熱，店員（試驗室）再把它放進那個溫度去驗證真的撐得住，而不是只在室溫試穿一下就說沒問題。","procedure_zh":"本身主要以『檢查＋審查製造商資料』判定：確認製造商有無宣告戶外用途及操作溫度範圍。若宣告戶外用，除依其宣告之最低/最高溫度設定後續各項試驗的環境條件外，戶外外殼還須符合 Annex Y（抗紫外線、抗腐蝕、防塵防水等）。實務上試驗室會把樣品放進步入式恆溫恆濕室（walk-in chamber），用循環式冷卻機（chiller）把腔體拉到宣告的低溫/高溫，再供電讓設備運轉，作為各能量源試驗前的環境設定／預處理。","params":"Default outdoor operating ambient (unless manufacturer specifies otherwise): minimum -33 deg C up to maximum +40 deg C. If declared, the manufacturer's own min/max temperatures govern. Outdoor socket-outlet circuits require an RCD with rated residual operating current <= 30 mA. Note: 4.1.4 itself sets the conditions/temperatures; the actual heating/electric-strength/etc. tests are then run at these limits per their own clauses.","standard_equipment":["Test chamber: minimum range of –33°C to +40°C."],"iec_bsmi":"Largely harmonised. CNS 15598-1:2020 corresponds to IEC 62368-1:2018 (Ed.3.0); the formal outdoor-enclosure Annex Y and the -33 deg C default were strengthened in IEC 62368-1:2023 (Ed.4.0), so the exact wording/scope of 4.1.4 differs by edition - confirm which edition BSMI currently enforces. Caution: the lab's '預處理/環境調節' label overlaps conceptually with humidity conditioning at 5.4.8 (e.g. 40 deg C / 93% RH for ~120 h before the electric-strength test); 4.1.4 is specifically about declared outdoor temperature limits, not the insulation-conditioning soak. Verify the exact CNS clause title against the official CNS 15598-1 text (cnsonline.com.tw).","location":"1F","utils":["需排水","需用水"],"equipment":[{"en":"Walk-in environmental chamber","zh":"步入式環境試驗室","role":"equip","instId":"walkin-chamber"},{"en":"Regenerative AC/DC power source","zh":"可程式交直流電源供應器","role":"equip","instId":"ac-dc-source"},{"en":"Circulation chiller","zh":"循環式冷卻機","role":"equip","instId":"chiller"}],"diagram":"","qa":"","pel":[{"equip":"Test chamber: minimum range of –33°C to +40°C.","code":"ROUT","test":"Equipment Installation (Outdoor), Conditioning","zh":"環境試驗箱 −33~+40°C","instId":"walkin-chamber"}],"match":{"level":"warn","note":"部分符合"},"gist_zh":"先界定這台會在多冷多熱、多潮濕的戶外用，作為後續所有測試的條件基準。"},{"id":"4.7","clauses":["4.7"],"group":"4","title_en":"Equipment for direct insertion into mains socket-outlets (4.7.1 General; 4.7.2 Requirements / mains plug part; 4.7.3 Compliance criteria / torque test)","title_zh":"供直接插入主電源插座之設備（4.7.1 一般；4.7.2 要求／主電源插頭部分；4.7.3 符合性判定／轉矩試驗）","purpose_zh":"有些設備（像免線材的充電器、轉接頭，無人機常配的『直插式』變壓器）插頭直接長在機身上，整台靠插頭掛在牆上插座。這條要確認兩件事：一是插頭刀片（金屬腳）尺寸合乎當地插座規格、插得穩；二是這台設備的重量與外型不會對插座產生過大的『扭力』而把插座弄鬆、弄裂或讓刀片接觸不良。插座一旦被撐鬆，可能造成接觸不良發熱起火、或刀片外露觸電。簡單說：別讓一個又大又重的插頭把牆上插座給拗壞了。","analogy_zh":"像掛在牆上掛鉤的相框——掛鉤（插座）能承受的重量與翹起角度有限，如果相框又大又重、還往外翹，掛鉤就會被拗鬆甚至崩掉。這個試驗就是在量『相框會不會把掛鉤拗壞』。","procedure_zh":"4.7.2：以量規/比對檢查整體成型插頭刀片（pin/blade）的尺寸與構造是否符合當地插頭標準（如 CNS、IEC 60884-1、NEMA WD6 等）。4.7.3：把樣品插入符合規格的試驗插座（固定於專用插頭轉矩試驗機 Plug Torque Tester 的標準插座座上），以天平臂（balance arm）加掛砝碼方式對設備施加並量測其作用於插座的轉矩，讀取砝碼讀數×力臂得到轉矩值，與標準限值比較；插座配置須能承受該轉矩而插頭仍維持正常嚙合。","params":"Output is the torque (Nm) the EUT exerts on the socket-outlet, measured via weight x lever arm and compared against the standard's stated limit; the device must remain in normal engagement. Reference plug-standard torque procedure: IEC 60884-1:2022 cl.14.23.2. (Real CB-report measured results are typically very low, e.g. ~0.03-0.05 Nm.) Exact numerical pass limit in 4.7.3 is in the copyrighted standard text and was not confirmable from free sources.","standard_equipment":["Test equipment (see Fig. 11 of IEC 60065)"],"iec_bsmi":"Harmonised in method (CNS 15598-1 = IEC 62368-1). The substantive national difference is WHICH plug standard the blade/pin must meet: for Taiwan/BSMI the integral plug must comply with the Taiwan/CNS plug-pin configuration (CNS 690 family) rather than EU/UK/US - so 4.7.2 dimensional compliance is country-specific even though the 4.7.3 torque method is identical.","location":"安規測試區","utils":[],"equipment":[{"en":"Mains-plug pin torque tester","zh":"插頭刃片轉矩試驗機","role":"equip","instId":"plug-torque"}],"diagram":"plugtorque","qa":"","pel":[{"equip":"Test equipment (see Fig. 11 of IEC 60065)","code":"RB","test":"Equipment for direct insertion in to mains socket-outlets","zh":"插頭量測試具 (IEC 60065 圖11)","instId":"plug-torque"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"整台靠插頭掛在插座上的設備，重量與扭力不能把牆上插座撐鬆、發熱或讓刀片外露觸電。"},{"id":"4.8.4.3","clauses":["4.8.4.3"],"group":"4","title_en":"Battery replacement test (within 4.8.4 Battery compartment mechanical tests; parent 4.8 Equipment containing coin / button cell batteries)","title_zh":"電池更換試驗（屬 4.8.4 電池室機械試驗；上層 4.8 含鈕扣型／硬幣型電池之設備）","purpose_zh":"鈕扣電池（像無人機遙控器、小搖控裡那種銀色圓鈕電池）若被幼兒吞下，會在食道灼傷甚至致命。這條模擬『使用者反覆更換電池』後，電池室的蓋子或門是否還能牢牢關緊、不會因為開關久了就鬆脫。重點是：電池蓋被開開關關很多次以後，仍要能扣得緊，讓小孩沒辦法輕易打開把電池摳出來。","analogy_zh":"像藥罐的兒童安全蓋——你天天開關它好幾次，用了一陣子之後那個『卡榫』還是要一樣緊，不能用久了就鬆掉變成小孩一撥就開。這個試驗就是模擬『開關很多次』之後扣具還牢不牢。","procedure_zh":"對電池室門/蓋執行『打開→取出電池→放回電池→關上』的完整循環共 10 次，模擬使用者實際更換電池的操作磨耗。此為 4.8.4 機械試驗序列的一環（與應力釋放 4.8.4.2、掉落 4.8.4.4、衝擊 4.8.4.5、碾壓 4.8.4.6 接續進行）。完成後依 4.8.5 以約 30 N 試驗探棒及約 20 N 試驗鉤檢查電池是否仍無法被取出／觸及。轉矩計（torque gauge）用於量測需以工具開啟之蓋具所需的開啟轉矩，或驗證雙動作鎖固機構。","params":"Replacement cycling: open/remove/replace/close x 10 cycles. Post-test compliance (4.8.5): apply 30 N +/- 1 N for 10 s with the straight unjointed Figure V.1 probe at the most unfavourable place/direction; battery must remain inaccessible AND it must not be possible to extract the cell with the Figure 20 test hook using approx. 20 N.","standard_equipment":["30 N ± 1N applied by rigid test finger (Figure V.1); test hook (Figure 20) using a force of approximately 20 N; calliper; timer","Crush Test (330 N ± 5N); flat surface measuring 100 mm by 250 mm; timer","Torque gauges (0,5Nm), angle meter"],"iec_bsmi":"Harmonised method (CNS 15598-1 follows IEC 62368-1). Coin/button-cell safety was significantly strengthened in IEC 62368-1:2023 (Ed.4.0), aligning with UL 4200A; if CNS 15598-1 is still pinned to the 2018/Ed.3.0 base, the exact set/structure of 4.8.4 sub-tests may differ slightly from Ed.4.0 - verify the edition BSMI enforces. No Taiwan-specific deviation known beyond edition timing.","location":"安規測試區","utils":[],"equipment":[{"en":"Torque gauge / driver","zh":"扭力計／扭力起子","role":"equip","instId":"torque-gauge"}],"diagram":"","qa":"","pel":[{"equip":"30 N ± 1N applied by rigid test finger (Figure V.1); test hook (Figure 20) using a force of approximately 20 N; calliper; timer","code":"RB","test":"Coin/button cell batteries","zh":"剛性試指30N(圖V.1)+試鉤","instId":"access-probes"},{"equip":"Crush Test (330 N ± 5N); flat surface measuring 100 mm by 250 mm; timer","code":"RB","test":"Coin/button cell batteries","zh":"碾壓治具 330N (100×25mm)","instId":"weights"},{"equip":"Torque gauges (0,5Nm), angle meter","code":"RB","test":"Coin/button cell batteries","zh":"扭力計(0.5N·m)+角度計","instId":"torque-gauge"}],"match":{"level":"warn","note":"部分符合"},"gist_zh":"鈕扣電池蓋被反覆開關後仍要扣得緊，避免幼兒打開取出電池吞食灼傷。"},{"id":"4.8.4.6","clauses":["4.8.4.6"],"group":"4","title_en":"Crush test (within 4.8.4 Battery compartment mechanical tests; parent 4.8 Equipment containing coin / button cell batteries) - applied to hand-held remote control devices","title_zh":"碾壓（壓潰）試驗（屬 4.8.4 電池室機械試驗；上層 4.8 含鈕扣型／硬幣型電池之設備）——適用於手持式遙控裝置","purpose_zh":"手持遙控器（無人機遙控器、玩具遙控器）常被踩到、被壓在沙發或被體重壓住。這條模擬被人坐上去、踩到那種『壓』的力量，看看遙控器的電池蓋會不會因此爆開、把鈕扣電池彈出來。因為一旦電池在被壓壞後掉出來，幼兒就可能撿到吞下。重點是：就算被大人坐到、壓到，電池也要乖乖留在裡面。","analogy_zh":"像把手機放後口袋不小心一屁股坐下去——這個試驗就是模擬『被人坐壓』的力量，確認遙控器被壓之後電池蓋不會崩開、電池不會像彈珠一樣蹦出來被小孩撿走。","procedure_zh":"把手持遙控裝置以最易產生不利結果的姿勢置於剛性平面上（須能自我支撐）。以約 100 mm × 250 mm 的剛性平板，對其暴露的上、下表面施加 330 N ± 5 N 的壓潰力，持續 10 秒。隨後依 4.8.5 以約 30 N 試驗探棒（Figure V.1）及約 20 N 試驗鉤（Figure 20）確認電池仍無法被觸及或取出。砝碼（weight）用於施加碾壓力，剛性試指（rigid finger）/試驗鉤與碼錶（stop watch）用於後續觸及性與夾持時間之驗證。","params":"Crush force 330 N +/- 5 N applied via a flat rigid surface ~100 mm x 250 mm to the top and bottom exposed surfaces, dwell 10 s. Post-crush compliance (4.8.5): 30 N +/- 1 N for 10 s with straight Figure V.1 probe; cell must stay inaccessible and not removable with the Figure 20 hook at approx. 20 N.","standard_equipment":["30 N ± 1N applied by rigid test finger (Figure V.1); test hook (Figure 20) using a force of approximately 20 N; calliper; timer","Crush Test (330 N ± 5N); flat surface measuring 100 mm by 250 mm; timer","Torque gauges (0,5Nm), angle meter"],"iec_bsmi":"Harmonised (CNS 15598-1 follows IEC 62368-1). Same edition caveat as 4.8.4.3: coin-cell mechanical-abuse provisions tightened in Ed.4.0 (2023) per UL 4200A; verify the CNS-referenced edition. No known Taiwan-specific value deviation; the 330 N / 100x250 mm / 10 s figures are from the IEC base text.","location":"安規測試區","utils":[],"equipment":[{"en":"Calibrated weights / masses","zh":"砝碼／配重","role":"fixture","instId":"weights"},{"en":"Accessibility test probes / fingers","zh":"可觸及性試驗探棒／試指","role":"fixture","instId":"access-probes"},{"en":"Test hook","zh":"試驗鉤","role":"fixture","instId":"test-hook"},{"en":"Stopwatch","zh":"碼錶","role":"equip","instId":"stopwatch"}],"diagram":"","qa":"","pel":[{"equip":"30 N ± 1N applied by rigid test finger (Figure V.1); test hook (Figure 20) using a force of approximately 20 N; calliper; timer","code":"RB","test":"Coin/button cell batteries","zh":"剛性試指30N(圖V.1)+試鉤","instId":"access-probes"},{"equip":"Crush Test (330 N ± 5N); flat surface measuring 100 mm by 250 mm; timer","code":"RB","test":"Coin/button cell batteries","zh":"碾壓治具 330N (100×25mm)","instId":"weights"},{"equip":"Torque gauges (0,5Nm), angle meter","code":"RB","test":"Coin/button cell batteries","zh":"扭力計(0.5N·m)+角度計","instId":"torque-gauge"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"手持遙控器被人坐壓、踩到時，電池蓋不能崩開讓鈕扣電池蹦出被幼兒撿食。"},{"id":"5.2","clauses":["5.2"],"group":"5","title_en":"Electrical energy source classifications (5.2.1 Electrical energy source classifications; 5.2.2 Electrical energy source limits - incl. 5.2.2.2 Steady-state voltage and current limits)","title_zh":"電氣能量源分級（5.2.1 電氣能量源分級；5.2.2 電氣能量源限值——含 5.2.2.2 穩態電壓及電流限值）","purpose_zh":"這是整個『觸電安全』的分級總開關。它把設備裡每一條電路依『電壓有多高、能推多少電流』分成三級：ES1＝摸到也安全（連小孩都行）；ES2＝摸到會痛、會嚇一跳（只允許受過告知的人接觸）；ES3＝會造成電擊傷害甚至致命（只有受過訓練的人在有防護下才可接觸）。分完級，後面才知道哪條電路需要外殼、絕緣、警告標示等防護。對無人機而言，電池組、馬達驅動、充電輸入往往是高能量電路，正確分級是判定要不要包覆防護的第一步。","analogy_zh":"像泳池的水深標示：齊腰（ES1）人人可下；及胸有救生員看著才行（ES2）；深水區（ES3）只有受訓泳者＋圍欄才准進。先把『水多深』量清楚並標好，才能決定要不要立圍欄、放警示牌。","procedure_zh":"在正常、異常與單一故障三種狀態下，量測各電路相對於地或相對於可觸及部位的電壓與電流，比對 5.2.2 各限值表（穩態值、電容放電、單一脈衝、重複脈衝、振鈴、音訊）。任一狀態下超過 ES1 但不超過 ES2 者列為 ES2；超過 ES2 者列為 ES3；交流電源各載流導體（含中性線）逕列 ES3。用示波器擷取波形（脈衝/振鈴），用具高內阻的電壓表與量測儀（如 Ikonix/SCI 620L 之類觸電電流／洩漏量測儀）量測穩態電壓與接觸電流。","params":"ES1 steady-state limits (f <= 1 kHz): 30 V r.m.s. / 42.4 V peak / 60 V d.c. ES2 steady-state limits (f <= 1 kHz): 50 V r.m.s. / 70.7 V peak / 120 V d.c. Above ES2 = ES3. All a.c. mains current-carrying conductors incl. neutral are classified ES3 by default. Touch-current thresholds derive from IEC 60479-1 (measured through the IEC 60990 network). For ES1/ES2, meeting EITHER the voltage OR the current limit suffices; both must not be exceeded.","standard_equipment":["Ampere- and voltmeter suitable for the current and waveform, frequency meter; Measuring instruments in according to IEC 60990:2016 Figure 4 and 5, timer, 2 k resistor","Oscilloscope"],"iec_bsmi":"Harmonised, no known Taiwan-specific deviation. CNS 15598-1:2020 = IEC 62368-1:2018; the ES1/ES2 numeric limits (30/42.4/60 and 50/70.7/120) are unchanged into Ed.4.0. Note ES1 is NOT identical to legacy SELV - SELV is not used in 62368-1. Lab note: instrument 'Ikonix 620L' is a touch/leakage-current source-and-meter; ensure its measuring network conforms to IEC 60990 for the touch-current part of the classification.","location":"安規測試區","utils":[],"equipment":[{"en":"Oscilloscope","zh":"示波器","role":"equip","instId":"oscilloscope"},{"en":"Digital multimeter","zh":"數位萬用電錶","role":"equip","instId":"multimeter"},{"en":"Leakage / touch-current tester (IEC 60990 networks)","zh":"洩漏/接觸電流量測儀","role":"equip","instId":"leakage-620L"}],"diagram":"","qa":"","pel":[{"equip":"Ampere- and voltmeter suitable for the current and waveform, frequency meter; Measuring instruments in according to IEC 60990:2016 Figure 4 and 5, timer, 2 k resistor","code":"RB","test":"Steady- state voltage and current limits","zh":"電流/電壓表(適合波形)","instId":"multimeter"},{"equip":"Oscilloscope","code":"RB","test":"Single pulse limits","zh":"示波器","instId":"oscilloscope"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"把每條電路依危險度分三級（摸到安全／會痛／會傷人），這是觸電安全的總開關。"},{"id":"5.3.2","clauses":["5.3.2"],"group":"5","title_en":"Accessibility to electrical energy sources and safeguards (test probes / accessibility evaluation under 5.3 Protection against electrical energy sources)","title_zh":"電氣能量源及安全防護之可觸及性（屬 5.3 對電氣能量源之防護；以試驗探棒評估可觸及性）","purpose_zh":"分完級（5.2）之後，這條問：危險的電路（ES2/ES3）使用者的『手指』摸得到嗎？標準用模擬人手指的金屬試指去戳、去探設備的開口、縫隙、接頭。如果試指能碰到危險帶電部位，就代表防護不足、必須加蓋或加絕緣。針對可能被兒童接觸的產品，還會用更細、能伸更進去的兒童探棒。簡單說：把『標準化的假手指』伸進每個縫，確認摸不到會電人的地方。對無人機，電池接點、充電孔、散熱孔都是要戳的重點。","analogy_zh":"像家裡插座的『防觸電安全蓋』檢查——拿一根模擬小孩手指的棒子去戳插座孔，看戳不戳得到裡面的銅片。戳得到就不安全，得加擋板；這個試驗就是用標準假手指去戳設備每個開口。","procedure_zh":"依人員類別選用對應探棒：成人用 Figure V.2（即 IEC 61032 圖 2 Test Probe B 鉸接式試指）；可能被兒童接觸者另用 Figure V.1 鉸接式探棒（含一支不鉸接直探棒版本）。將試指以直伸與彎曲（關節可彎 90°）兩種姿勢，在所有可觸及開口/縫隙嘗試探入，並接低壓指示電路：試指前端一旦碰到帶電/危險部位即導通報警，判定為可觸及。需要時對直探棒施加約 30 N 之穩定推力 5 秒，並可配合擋板（baffle）限制過度插入；以推拉力計與量規/游標卡尺驗證施力與開口尺寸。","params":"Steady accessibility force: 30 N +/- 3 N applied for approx. 5 s using the straight (unjointed) version of the applicable Figure V.1/V.2 probe. Test Probe B geometry: 12 mm dia x 80 mm jointed finger, 50 mm baffle, ~300 mm overall, joints articulate 0-90 deg (+/-10 deg). Probe applied in both straight and bent attitudes at all accessible points; contact = fail (safeguard required). Higher steady-force tools (100 N / 250 N, 30 mm circular face per Annex T.2-T.5) are used where enclosure robustness is also assessed.","standard_equipment":["Test probes (Figures V.1, V.2, V.3, V.5);force gauge having at least 30 N; calliper"],"iec_bsmi":"Harmonised, no known Taiwan-specific deviation (CNS 15598-1 = IEC 62368-1; probes per IEC 61032). Key conceptual point vs legacy: 62368-1 adds the child-accessibility probe (Figure V.1) distinct from the traditional adult IEC 61032 Probe B (Figure V.2) - selection depends on whether the product is likely accessible to children. Same probes/forces across editions.","location":"安規測試區","utils":[],"equipment":[{"en":"Accessibility test probes / fingers","zh":"可觸及性試驗探棒／試指","role":"fixture","instId":"access-probes"},{"en":"Force gauge","zh":"推拉力計（測力計）","role":"equip","instId":"force-gauge"},{"en":"Vernier calliper","zh":"游標卡尺","role":"equip","instId":"calliper"}],"diagram":"","qa":"","pel":[{"equip":"Test probes (Figures V.1, V.2, V.3, V.5);force gauge having at least 30 N; calliper","code":"RB","test":"Accessibility to electrical energy sources and safeguards","zh":"試驗探棒V.1/V.2/V.3/V.5+測力計","instId":"access-probes"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用模擬手指的試棒戳遍開口縫隙，確認危險帶電部位手指（含兒童）碰不到。"},{"id":"5.4.1.4","clauses":["5.4.1.4","9.3","E"],"group":"5","title_en":"Maximum operating temperatures for materials, components and systems (incl. 9.3 Touch temperature, Annex E test conditions for equipment containing audio amplifiers)","title_zh":"材料、組件及系統之最大操作溫度（含 9.3 接觸溫度、附錄 E 含音訊放大器設備之試驗條件）","purpose_zh":"這項測試是要確認產品在正常使用、長時間開機運轉時，內部的塑膠、絕緣材料、變壓器、線材以及外殼摸得到的地方，溫度不會高到危險。溫度太高會讓絕緣材料劣化變脆、提早老化甚至起火，外殼太燙則會燙傷使用者。它量到的溫度數字，後續還會拿來決定別的測試要用幾度（例如球壓試驗、絕緣材料耐溫等級）。對無人機而言，馬達驅動板、電池管理板、充電電路與通訊模組都會發熱，這項測試確保它們在最操的狀態下也不會過熱。","analogy_zh":"就像智慧型手機長時間玩遊戲或快充時會發燙，廠商必須確認再怎麼操，機身也只是溫溫的、不會燙到拿不住，內部零件也不會被自己烤壞。","procedure_zh":"在被測物的關鍵發熱點（變壓器繞組、半導體、絕緣材料、外殼可觸及面等）貼上細線熱電偶，連到溫度記錄器。讓產品在額定電壓（或最不利電壓）下以正常操作條件運轉直到溫度達穩定；若內含音訊放大器，則依附錄 E 以 1/8 非削波輸出功率或粉紅雜訊訊號驅動。記錄各點最高穩態溫升，與標準各表之溫度限值比對，同時依 9.3 檢核可觸及表面之接觸溫度。","params":"供電：額定電壓或最不利電壓(通常 90%~110% 額定範圍取最嚴苛)；運轉至熱穩態(溫升變化通常 < 1 K/連續數分鐘)。音訊放大器(Annex E)：1000 Hz 正弦或帶限粉紅雜訊，設定為 1/8 非削波額定輸出功率。判定：各點溫度不得超過該材料/組件/能源類別之限值(例如常見繞組/絕緣依溫度等級 Class A 100°C、B 120°C、F 140°C 等之相對限值；接觸溫度限值如金屬把手約 ~60°C、塑膠/橡膠約 ~75°C、玻璃/陶瓷約 ~80°C，依握持時間與材質而定)。","standard_equipment":["Single phase voltage supply systems/variability/adequacy","Three phase voltage supply systems","Temperature recorder (multi-channel)","Thermocouples","Winding resistance (normally > 1,0 Ω 2-wire, 4-wire <1,0 Ω ).","Voltmeters (ac/dc)","High voltage meter (probe)","Currents (ac/dc)","Loads (resistive)"],"iec_bsmi":"CNS 15598-1 為 IEC 62368-1 之國家轉訂，溫度量測法(Annex B)與限值表(Clause 9 / 5.4.1.4)原則上和諧一致、無已知重大差異。注意：本案附註之『Annex E』在 IEC 62368-1 中是『含音訊放大器設備之試驗條件(粉紅雜訊 / 1/8 非削波輸出)』，並非溫升量測本身；溫升量測程序實際依 Annex B(B.1.5 量測法、B.2.6 正常操作條件)。實驗室引用 Annex E 應理解為當受測影音設備含放大器時用以建立溫度測試之正常操作訊號條件。","location":"安規測試區","utils":["需排煙"],"equipment":[{"en":"Power analyzer / power meter","zh":"功率分析儀","role":"equip","instId":"power-analyzer"},{"en":"Regenerative AC/DC power source","zh":"可程式交直流電源供應器","role":"equip","instId":"ac-dc-source"},{"en":"DC power supply","zh":"直流電源供應器","role":"equip","instId":"dc-supply"},{"en":"Temperature data logger (thermocouples)","zh":"溫度記錄器（熱電偶）","role":"equip","instId":"datalogger"},{"en":"DC electronic load","zh":"直流電子負載","role":"equip","instId":"dc-load"}],"diagram":"temprise","qa":"","pel":[{"equip":"Single phase voltage supply systems/variability/adequacy","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Voltage supply","zh":"單相交流電源供應器","instId":"ac-dc-source"},{"equip":"Three phase voltage supply systems","code":"S","test":"Maximum operating temperatures for materials, components and systems — Voltage supply","zh":"三相電源供應器","instId":"ac-dc-source"},{"equip":"Temperature recorder (multi-channel)","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Temperature (rise)","zh":"多通道溫度記錄器","instId":"datalogger"},{"equip":"Thermocouples","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Temperature (rise)","zh":"熱電偶","instId":"datalogger"},{"equip":"Winding resistance (normally > 1,0 Ω 2-wire, 4-wire <1,0 Ω ).","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Temperature (rise)","zh":"繞組電阻計(2/4線)","instId":""},{"equip":"Voltmeters (ac/dc)","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Voltage","zh":"交直流電壓表","instId":"multimeter"},{"equip":"High voltage meter (probe)","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Voltage","zh":"高壓電壓量測(探棒)","instId":""},{"equip":"Currents (ac/dc)","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Current","zh":"交直流電流量測","instId":"multimeter"},{"equip":"Loads (resistive)","code":"RB","test":"Maximum operating temperatures for materials, components and systems — Loading","zh":"電阻性負載","instId":"var-resistor-load"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"確認長時間運轉時，內部零件與摸得到的外殼不會熱到劣化、起火或燙傷。"},{"id":"5.4.1.10.3","clauses":["5.4.1.10.3"],"group":"5","title_en":"Ball pressure test (for thermoplastic parts), conducted in accordance with IEC 60695-10-2","title_zh":"球壓試驗（依 IEC 60695-10-2，適用於支撐帶電零件之熱塑性材料）","purpose_zh":"很多固定電線、夾住帶電金屬片或當作端子座的塑膠零件，受熱後會變軟。這項測試就是把塑膠加熱到它工作時可能達到的高溫，再用一顆鋼球用力壓它，看會不會被壓出一個明顯的凹陷。如果壓痕太大，代表這種塑膠在高溫下會軟掉、撐不住帶電零件，可能讓帶電件鬆脫位移，造成觸電或短路起火。對無人機的端子台、電池座、連接器外殼特別重要。","analogy_zh":"就像夏天把巧克力放在大太陽下，本來硬的會變軟，手指一壓就一個坑；這測試在確認塑膠零件遇熱不會軟到一壓就凹、撐不住裡面的金屬。","procedure_zh":"取試片(厚度至少 2.5 mm，表面平整)，水平放入已升溫的烘箱。用直徑 5 mm 鋼球以 20 N 的力垂直壓在試片表面，於規定溫度下持續 1 小時。取出後 10 秒內浸入 20°C±5°C 的水中 6 分鐘急冷，再於 3 分鐘內以顯微鏡量測壓痕直徑。","params":"鋼球：直徑 5 mm(R=2.5 mm)；施力：20 N；加熱時間：60 分鐘(1 小時)；試驗溫度：取『該零件正常/異常運轉量測溫度 + 餘裕』與固定最低值中之較高者——支撐帶電連接件之零件至少 125°C，其他零件至少 75°C；急冷：取出後 10 s 內浸入 20°C±5°C 水中 6 分鐘(±2 min)；判定：壓痕直徑 d <= 2.0 mm 為合格；量測須於取出後 3 分鐘內完成。試片厚度 >= 2.5 mm。","standard_equipment":["Vicat test B 50 of ISO 306","Ball pressure test apparatus according to IEC 60695-10-2, Oven at least 125°C ± 2°C"],"iec_bsmi":"CNS 15598-1 引用 IEC 60695-10-2 之球壓法，參數(5 mm 球、20 N、125°C/75°C、壓痕 2 mm)為國際一致，和諧無已知差異。實驗室列 oven 即恆溫箱，符合；建議補列 20°C 水浴與讀數顯微鏡。","location":"材料測試區","utils":[],"equipment":[{"en":"Ball-pressure test apparatus","zh":"球壓試驗裝置","role":"equip","instId":"ball-pressure"},{"en":"Heating oven","zh":"熱風循環烘箱","role":"equip","instId":"oven"}],"diagram":"ballpressure","qa":"PEL 對照：官方列「Ball-pressure apparatus（IEC 60695-10-2）＋ Oven」為 RB（必備），另有「Vicat B50（ISO 306）」為替代法（S 可外包）。核實參數：5 mm 鋼球、20 N、加熱 1 h、125°C（支撐帶電件）/75°C（其他）、壓痕 ≤ 2.0 mm 合格。","pel":[{"equip":"Vicat test B 50 of ISO 306","code":"S","test":"Thermoplastic parts on which conductive metallic parts are directly mounted","zh":"維卡軟化點試驗(ISO 306)","instId":""},{"equip":"Ball pressure test apparatus according to IEC 60695-10-2, Oven at least 125°C ± 2°C","code":"RB","test":"Thermoplastic parts on which conductive metallic parts are directly mounted","zh":"球壓試驗裝置(IEC 60695-10-2)+烘箱","instId":"ball-pressure"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"加熱後用鋼球壓塑膠件，確認高溫下不軟化凹陷，否則撐不住帶電件會鬆脫短路。"},{"id":"5.4.2","clauses":["5.4.2","5.4.3","5.4.4","X"],"group":"5","title_en":"5.4.2 Clearances; 5.4.3 Creepage distances; 5.4.4 Solid insulation (including distance through insulation, DTI); Annex X Insulating tapes / wound components","title_zh":"5.4.2 空間（電氣）間隙；5.4.3 沿面距離（爬電距離）；5.4.4 固體絕緣（含絕緣穿透距離 DTI）；附錄 X 絕緣帶/繞組件","purpose_zh":"電要跳過去傷人，有三條路：直接穿過空氣（空間間隙）、沿著塑膠表面爬過去（沿面距離）、或穿透固體絕緣材料本身（固體絕緣）。這三項就是分別量這三條路夠不夠長、夠不夠厚，確保高壓電不會跨過去電到人或打火。電壓越高、環境越髒（灰塵濕氣會在表面形成導電通路），要求的距離就越長；材料抗漏電起痕能力（CTI）越差，爬電距離要求也越大。無人機的電源板、充電器、高壓馬達驅動級都靠這個把危險電壓和人隔開。","analogy_zh":"就像兩棟高壓鐵塔之間要留夠遠才不會放電打火（空間間隙）；欄杆上的污垢若連成一線，螞蟻就能沿著爬過去（沿面距離）；而牆壁要夠厚實，東西才不會直接穿牆過來（固體絕緣）。","procedure_zh":"先依工作電壓、瞬時(衝擊)電壓、污染等級與材料群組查標準表，得出所需最小間隙與爬電距離。再用卡尺、量棒、測微計或 2.5D 投影儀實際量測產品上帶電件之間（及對可觸及件）的最短空氣距離、最短表面爬行距離與絕緣厚度，比對是否達標。材料群組由 IEC 60112 之 CTI 試驗(50 滴 A 液)判定；間隙亦可改用 Annex D 脈衝電壓產生器以衝擊耐壓驗證；固體絕緣厚度不足者可用替代之熱循環+濕度+耐壓組合試驗。","params":"輸入變數：工作電壓(AC rms/DC)、額定瞬時(衝擊)電壓(查表，如 OVC II、230 V 對應 2.5 kV)、污染等級(一般設備多為 PD2)、材料群組(由 CTI 判定：I>=600、II 400~599、IIIa 175~399、IIIb 100~174；未知時假設 IIIb)。範例：2.5 kV 衝擊電壓、強化絕緣需約 3.6 mm 間隙。固體絕緣替代試驗常以耐壓 x1.6 倍施加。CTI 試驗：IEC 60112，A 液(0.1% NH4Cl)，50 滴。間隙衝擊驗證波形：1.2/50 µs(Annex D Circuit 2)。","standard_equipment":["Oscilloscope","Dial gauge or calliper","Micrometer","Pins etc. with different diameters","Microscope","Impulse test generator circuit 1 of Table D.1.; Impulse test generator circuit 2 of Table D.1.; impulse test generator circuit 3 of Table D.1","Test equipment for tracking index per IEC 60112","Mandrel (figure 25 to 28), metal foil, equipment suitable for electrical strength test loads; Stop watch, weight"],"iec_bsmi":"CNS 15598-1 之間隙/爬電/固體絕緣表與 IEC 62368-1 和諧一致；引用 IEC 60112(CTI)、IEC 60664 系列原則相同，無已知重大差異。註：實驗室標示『Annex X』，IEC 62368-1 之 Annex X 為『絕緣繞組線/絕緣帶之替代要求』，與 5.4.4 固體絕緣量測相關，引用合理。","location":"安規測試區","utils":["需排煙"],"equipment":[{"en":"Vernier calliper","zh":"游標卡尺","role":"equip","instId":"calliper"},{"en":"Creepage distance test rod/probe","zh":"沿面距離量測棒","role":"fixture","instId":"creepage-rod"},{"en":"Micrometer","zh":"測微器（分厘卡）","role":"equip","instId":"micrometer"},{"en":"2.5D profile projector / video measuring","zh":"2.5 次元投影量測儀","role":"equip","instId":"projector"},{"en":"Impulse voltage test generator","zh":"脈衝（突波）電壓產生器","role":"equip","instId":"impulse-gen"},{"en":"Tracking index (CTI/PTI) tester","zh":"相對漏電起痕指數試驗機","role":"equip","instId":"cti-tester"},{"en":"Mandrel (bending) tester","zh":"心軸彎曲試驗機","role":"equip","instId":"mandrel"},{"en":"Insulation resistance meter","zh":"絕緣電阻計","role":"equip","instId":"ir-meter"}],"diagram":"creepage","qa":"","pel":[{"equip":"Oscilloscope","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"示波器","instId":"oscilloscope"},{"equip":"Dial gauge or calliper","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"量錶或游標卡尺","instId":"calliper"},{"equip":"Micrometer","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"測微器","instId":"micrometer"},{"equip":"Pins etc. with different diameters","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"不同直徑量測銷","instId":""},{"equip":"Microscope","code":"RB","test":"Clearances, creepage distance, solid insulation","zh":"顯微鏡","instId":""},{"equip":"Impulse test generator circuit 1 of Table D.1.; Impulse test generator circuit 2 of Table D.1.; impulse test generator circuit 3 of Table D.1","code":"RT/S/RC","test":"Clearances, creepage distance, solid insulation","zh":"脈衝(突波)電壓產生器","instId":"impulse-gen"},{"equip":"Test equipment for tracking index per IEC 60112","code":"S","test":"Clearances, creepage distance, solid insulation","zh":"相對漏電起痕(CTI)試驗機","instId":"cti-tester"},{"equip":"Mandrel (figure 25 to 28), metal foil, equipment suitable for electrical strength test loads; Stop watch, weight","code":"S","test":"Clearances, creepage distance, solid insulation","zh":"心軸彎曲試驗+金屬箔","instId":"mandrel"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"量帶電件之間穿空氣、沿表面、穿材料三條路徑夠不夠，確保高壓不會跨過去電人或打火。"},{"id":"5.4.5.2","clauses":["5.4.5.2"],"group":"5","title_en":"Antenna terminal insulation — impulse (surge) withstand test (verification of insulation of external antenna coaxial terminal)","title_zh":"天線端子絕緣 — 衝擊（雷擊/突波）耐受試驗（外接天線同軸端子之絕緣驗證）","purpose_zh":"如果產品接了戶外天線（無人機的圖傳、遙控、GPS、5G/LTE 天線都算），雷擊或附近放電產生的高壓突波會沿著天線線灌進機器。這項測試就是對天線端子打一連串高壓脈衝，模擬被雷打到，確認天線端子的絕緣不會被一次突波就擊穿，否則雷擊能量會傳到使用者摸得到的地方或內部低壓電路，造成觸電、燒毀甚至起火。","analogy_zh":"就像家裡的避雷針和接地，要確保打雷時電流乖乖走安全路徑、不會竄進屋內電器電到人；這測試在確認天線端子這道防線扛得住一記雷擊脈衝。","procedure_zh":"用衝擊電壓產生器（依 Annex D 電路 1 產生 10/700 µs，或依適用條件之 1.2/50 µs 波形）對天線端子與機殼/可觸及金屬或一次側電路之間施加規定次數與極性的高壓脈衝。觀察是否發生絕緣崩潰（電流失控暴增）；單次瞬間閃絡或電暈不算崩潰。試後再以 500 V 絕緣電阻計量測，絕緣電阻須仍達標。","params":"波形：10/700 µs(Table D.1 電路 1，前緣 10 µs、半值 700 µs；亦可能用 1.2/50 µs 電路 2)；脈衝次數通常正負極性各數次；峰值電壓依絕緣等級與外部電路分類查表(實驗室配置 10 kV 級產生器，涵蓋常見天線突波等級需求)；判定：無絕緣崩潰(電流不得失控暴增；單次閃絡或電暈可接受)，試後 500 V 絕緣電阻 > 2 MΩ(天線端子部分文獻要求 > 4 MΩ)。","standard_equipment":["Insulation resistance meter (500V > 4 MΩ), antenna interface test generator circuit 3 of Table D.1; timer, See electric strength test of Clause 5.4.9."],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 在天線端子／外部電路突波試驗上和諧一致。外接同軸／天線之衝擊與突波試驗主要規範於 Annex D（D.1 電路 1／2）及 G.10.4／G.10.5。實驗室之 10 kV 天線突波測試器功能上對應 Annex D 衝擊產生器。","location":"安規測試區","utils":[],"equipment":[{"en":"Antenna terminal surge tester (10 kV)","zh":"天線端子突波試驗機","role":"equip","instId":"antenna-surge"}],"diagram":"","qa":"","pel":[{"equip":"Insulation resistance meter (500V > 4 MΩ), antenna interface test generator circuit 3 of Table D.1; timer, See electric strength test of Clause 5.4.9.","code":"RC","test":"Antenna terminal insulation","zh":"絕緣電阻計","instId":"ir-meter"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"對外接天線端子打高壓脈衝模擬雷擊，確認絕緣不被擊穿、雷電不會竄進機內電到人。"},{"id":"5.4.8","clauses":["5.4.8"],"group":"5","title_en":"Humidity conditioning (preconditioning prior to electric strength / insulation tests)","title_zh":"耐濕（濕度）處理（耐電壓/絕緣試驗前之預處理）","purpose_zh":"潮濕會讓絕緣材料吸水、表面結露，電就更容易漏過去或打穿。這項『耐濕處理』是在做耐電壓測試之前，先把產品丟進又熱又濕的箱子裡放幾天，讓它充分受潮，模擬南台灣梅雨季、海邊或機體淋雨後的最糟狀況。受潮後馬上做耐壓測試，才能真正考驗絕緣在最不利潮濕條件下還撐不撐得住。對戶外飛行、可能遇雨的無人機特別關鍵。","analogy_zh":"就像買雨衣前，先把它泡在濕氣很重的浴室裡放幾天，再潑水測試，看它受潮之後還防不防水——而不是只在乾爽的新品狀態下測。","procedure_zh":"把樣品（必要時拆開外殼）放入控制在 40°C、相對濕度 93% 的恆溫恆濕箱中，連續處理規定時間（常見 120 小時/5 天，亦有 48 小時等依產品宣告而定）。期間不通電。處理結束後在箱內或同等濕度環境下立即接著進行 5.4.9 耐電壓（電氣強度）試驗與絕緣電阻量測，以評估受潮後之絕緣性能。","params":"溫度：40°C(±2°C)；相對濕度：93%(±2~3% RH)；處理時間：依產品/絕緣型式常為 120 h(5 天)，亦見 48 h 或其他依宣告操作條件；處理中不通電；結束後須『立即』接續耐電壓與絕緣電阻(>= 2 MΩ @500 V)試驗。","standard_equipment":["Chamber RH (93 ± 3)%, (20…30)°C","Chamber RH (93 ± 3)%, (40 ± 2)°C","Extra large environmental testing chamber"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 之濕度處理條件(40°C / 93% RH)和諧一致；實際時數依設備宣告之操作/環境條件而定。多份 CB 報告實測採 93% RH、40°C、120 h，與 IEC 一致，無已知 BSMI 差異。","location":"環境測試區","utils":["需排水"],"equipment":[{"en":"Temperature & humidity chamber","zh":"恆溫恆濕試驗箱","role":"equip","instId":"humidity-chamber"}],"diagram":"","qa":"","pel":[{"equip":"Chamber RH (93 ± 3)%, (20…30)°C","code":"RB","test":"Humidity conditioning","zh":"恆溫恆濕箱 (93%RH)","instId":"humidity-chamber"},{"equip":"Chamber RH (93 ± 3)%, (40 ± 2)°C","code":"RB","test":"Humidity conditioning","zh":"恆溫恆濕箱 (93%RH)","instId":"humidity-chamber"},{"equip":"Extra large environmental testing chamber","code":"S","test":"Humidity conditioning","zh":"大型環境試驗室","instId":"walkin-chamber"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"耐壓測試前先把產品放進高溫高濕箱受潮，模擬梅雨／淋雨後最不利的狀況。"},{"id":"5.4.9","clauses":["5.4.9"],"group":"5","title_en":"Electric strength (dielectric withstand) test, including the test for thin sheet / solid insulation (Figure 29 set-up)","title_zh":"電氣強度（耐電壓/介電耐壓）試驗，含薄片/固體絕緣之試驗（圖 29 配置）","purpose_zh":"這是觸電防護的『期末考』。把比正常工作電壓高很多的測試電壓，加在絕緣的兩側（例如帶電電路對外殼、一次側對二次側），維持一段時間，看絕緣會不會被電打穿。打穿就代表這層絕緣不可靠，正常使用或突波來時可能讓人觸電。對薄片絕緣（如膠帶、絕緣墊片）還會用金屬箔貼住兩面、加上探球模擬手指壓力來測最脆弱處。前面的耐濕處理就是為了讓這關在『受潮後最糟狀態』下進行。","analogy_zh":"就像水管出廠前要灌進比平常高好幾倍的水壓撐幾分鐘，確認不會爆管漏水；耐電壓就是給絕緣灌『超高電壓』撐一下，確認不會被擊穿漏電。","procedure_zh":"依絕緣等級（基本/補充/強化）與工作電壓，從標準 Table 25（瞬時電壓）、Table 26（工作電壓峰值/重複峰值）、Table 27（暫時過電壓）三表中取最高值決定試驗電壓。將試驗電壓施加於絕緣兩端，自低緩升至規定值並維持約 60 秒（型式試驗）。薄片絕緣依 Figure 29 以金屬箔/探球夾住兩面施壓加壓。觀察是否發生絕緣崩潰（漏電流失控暴增）；單次瞬間閃絡或電暈不算崩潰。","params":"試驗電壓 = Table 25/26/27 三者取最高(例：120 V AC → 2 kV 級；230 V AC → 約 2.5 kV)；常見直流值如基本絕緣 2500 Vdc；升壓後維持約 60 s(型式試驗)；薄片/固體絕緣 Figure 29：金屬箔電極 + 5 mm 直徑、100 g 質量之探球(UL 1310 另為 6.4 mm/50 g)；判定：無絕緣崩潰(漏電流不得失控暴增；單次閃絡/電暈可接受)。通常於 5.4.8 耐濕處理後立即進行。","standard_equipment":["Test instrument / equipment with the relevant voltage, frequency and tripping current; Stop watch","Test instrument / equipment according to Figure 29 for electric strength (of solid / thin sheet insulation)"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 之耐電壓試驗(Table 25/26/27、Figure 29 薄片試驗、約 60 s 維持)和諧一致；探球 5 mm/100 g 為 IEC 規格(UL 1310 為 6.4 mm/50 g，屬北美差異，非 CNS/IEC)。無已知 BSMI 重大差異。","location":"安規測試區","utils":[],"equipment":[{"en":"Hipot (dielectric strength) tester","zh":"耐壓測試機（介電強度）","role":"equip","instId":"hipot"},{"en":"Electric-strength tester for thin/solid insulation","zh":"薄片/固體絕緣電氣強度試驗裝置","role":"equip","instId":"thin-sheet-es"}],"diagram":"hipot","qa":"PEL 列 5.4.9 耐電壓：「具相關電壓／頻率之試驗儀」(RB) 與「依圖 29 之薄片／固體絕緣電氣強度試驗」(S)。已對照 CNS 15598-1:2020 <b>圖 29<\/b>：薄片絕緣試驗之金屬刀片電極質量 <b>100 g±5 g<\/b>、Ø5 mm±0.1 mm、圓角 R0.5 mm（UL 1310 之 6.4 mm／50 g 屬北美差異，非 CNS／IEC）。例行試驗（§5.4.9.2）維持 1–4 s、試驗電壓可降 10%。","pel":[{"equip":"Test instrument / equipment with the relevant voltage, frequency and tripping current; Stop watch","code":"RB","test":"Electric strength test","zh":"耐電壓試驗機(相關電壓/頻率)","instId":"hipot"},{"equip":"Test instrument / equipment according to Figure 29 for electric strength (of solid / thin sheet insulation)","code":"S","test":"Electric strength test","zh":"薄片/固體絕緣耐壓試具(圖29)","instId":"thin-sheet-es"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"給絕緣灌比正常高很多的電壓，確認不被打穿漏電——觸電防護最關鍵的一關。"},{"id":"5.4.11","clauses":["5.4.11"],"group":"5","title_en":"Separation between external circuits and earth (e.g. telecommunication network to protective earth) — discharge / leakage measurement","title_zh":"外部電路與地之間之隔離（例如電信網路對保護接地）— 放電/洩漏量測","purpose_zh":"產品若接到電信網路或其他外部線路，這條外線和產品的接地之間必須保持安全隔離，且儲存或漏過去的電不能太多。這項測試用一顆精準的 5000 歐姆無感電阻器去量：在切斷電源那一瞬間，外部電路與地之間還殘留多少電荷、漏多少電流。如果隔離不良、漏電或殘留電荷過大，維修人員或使用者碰到外線接頭就可能被電到。它確保外線這道隔離把危險電流擋在外面。","analogy_zh":"就像兩個不同水位的水池之間的閘門，必須確認閘門夠密、就算有滲水也只是幾滴、不會一下子灌過去淹到人；這測試在量外線和接地之間『漏多少、存多少電』。","procedure_zh":"在外部電路（電信端子）與保護接地（或供電各極）之間接入一顆 5000 Ω 的無感電阻器並串接電流表，量測流經該隔離的電流；並於切斷電源的瞬間，立即以該電阻器量測殘留電荷之放電量。量測電路依 IEC 60990 之 Figure 4 配置。將結果與標準允許之電流/電荷限值比對判定。","params":"量測電阻：5000 Ω 無感電阻器(Annex H；量測電路依 IEC 60990 Figure 4)；量測項目：供電中斷瞬間外部電路對地之放電電荷量與穩態洩漏電流；判定：洩漏電流/放電量須在標準允許之安全限值內(屬可接觸電流/能量限制範疇)。註：5.2.2.2 另使用 2000 Ω 無感電阻器，勿混用。","standard_equipment":["Non-inductive resistor 5000Ω, Ampere meter"],"iec_bsmi":"CNS 15598-1 與 IEC 62368-1 在此條（Annex H、引用 IEC 60990 量測電路）和諧一致。5000 Ω 無感電阻器對應 5.4.11／Annex H。實驗室所列 non-inductive resistor 須確認為 5000 Ω 規格（而非 5.2.2.2 之 2000 Ω）。","location":"安規測試區","utils":[],"equipment":[{"en":"Non-inductive resistor","zh":"無感電阻","role":"fixture","instId":"noninductive-r"}],"diagram":"","qa":"","pel":[{"equip":"Non-inductive resistor 5000Ω, Ampere meter","code":"RB","test":"Separation between external circuits and earth","zh":"無感電阻5000Ω+電流表","instId":"noninductive-r"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"量外接線路與接地之間的洩漏與殘留電荷，確保碰到外線接頭不會被電到。"},{"id":"5.5.2.2","clauses":["5.5.2.2"],"group":"5","title_en":"Safeguards against capacitor discharge after disconnection of a connector","title_zh":"斷開連接器後防止電容器放電之防護措施","purpose_zh":"很多帶有電源插頭的產品(電源供應器、充電器、機上盒等)裡面裝有所謂的『X 電容』來濾除電源雜訊。問題是當你把插頭拔下來時,這顆電容裡可能還殘留電荷,讓插頭的金屬腳在拔出後的瞬間仍帶著危險電壓。如果這時手指剛好碰到插頭金屬腳,就可能被電到。這項試驗就是確認:拔掉插頭後,殘留電壓會在很短的時間內自動洩掉(透過內部的洩放電阻或放電 IC),不會電到人。對無人機這類含內建電源/充電模組的產品同樣重要。","analogy_zh":"就像關掉水龍頭後,水管裡還會殘留一些水滴流出來。這個試驗是在確認:拔插頭後『殘留的電』要在一兩秒內漏光,而不是憋在插頭金屬腳上等著電你的手。","procedure_zh":"讓設備在額定電壓下運轉,然後在交流電壓波形的最不利相位(峰值附近)瞬間拔掉插頭/斷開連接器,並立刻用高輸入阻抗電壓表測量外露金屬腳上的殘留電壓隨時間衰減的曲線。同時在正常狀態與單一故障狀態(例如其中一顆洩放電阻開路)下各做一次。判定殘留電壓是否在規定時間內降到安全值(等同於 ES1/不具危害),或殘餘電荷對應的能量低於限值。對於 250V 設備,只有當電容值大於 18 nF (0.018 µF) 時才需做單一故障測試。","params":"量測儀器:輸入阻抗 >=100 MΩ、並聯電容 <=25 pF(此即實驗室所列規格,完全符合標準)。容值門檻:250V 設備需做單一故障測試的觸發點為電容 > 18 nF (0.018 µF)(IEC 62368-1 表 5)。斷電相位:於交流峰值最不利相位斷開。測試條件:正常 + 單一故障各一次;若用兩顆串聯且各自符合 5.5.6/補強絕緣距離的洩放電阻,則不需模擬其開路。判定:殘留電壓需於規定時間內衰減至 ES1 限值以下(常被類比為類似 IEC 61010-1 的『5 秒內不具危害』概念,但 62368-1 以能量/電壓限值判定)。","standard_equipment":["Measuring instrument with input impedance 100M Ω ± 5 MΩ in parallel with an input capacitance of 25pF or less; timer"],"iec_bsmi":"CNS 15598-1 為 IEC 62368-1 之國家轉訂，屬調和標準，無已知國家差異。CNS 官方標題為「連接器切離後之電容器放電」；已核實切離後 <b>2 s<\/b> 量得之可觸及電壓須符合限值。若使用具放電功能 IC(ICX)，其評估另依 Annex G.16，但 5.5.2.2 仍需於最終成品層級再驗證。","location":"安規測試區","utils":[],"equipment":[{"en":"High-impedance voltage probe (>=100 M, <=25 pF)","zh":"高輸入阻抗電壓探棒","role":"equip","instId":"cap-discharge-probe"}],"diagram":"capdischarge","qa":"QA 更正：電容殘電門檻與要求規定於條文 5.5.2.2 本身（非「表 5」）。PEL：量測儀 ≥100 MΩ // ≤25 pF（RB），放電電阻見 G.10、耐壓見 G.16。","pel":[{"equip":"Measuring instrument with input impedance 100M Ω ± 5 MΩ in parallel with an input capacitance of 25pF or less; timer","code":"RB","test":"Capacitor discharge","zh":"高輸入阻抗量測儀(≥100MΩ)","instId":"cap-discharge-probe"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"拔下插頭後，插腳殘留電壓要在規定時間（常 2 秒）內放掉，避免殘電電擊手。"},{"id":"5.6.4.1","clauses":["5.6.4.1"],"group":"5","title_en":"Protective bonding conductors — Requirements (5.6.4); resistance of the protective bonding system verified per 5.6.6 (Test method 5.6.6.2 / Resistance or voltage drop 5.6.6.3)","title_zh":"保護連結(接地)導體之要求;保護連結系統之電阻(阻抗)量測","purpose_zh":"金屬外殼或金屬零件如果因內部故障(例如電線脫落碰到外殼)而帶電,使用者一摸就會觸電。為了防止這種事,產品會用一條『保護接地線(綠/黃線)』把這些金屬零件連到接地端,讓故障電流經由這條低電阻的路徑快速流走、把保險絲/斷路器跳掉,而不是流經人體。這項試驗就是用大電流去『考驗』這條接地路徑:確認它接得夠牢、電阻夠低,真的有能力安全導走故障電流。對含金屬機臂/外殼且插市電充電的無人機系統很關鍵。","analogy_zh":"就像逃生通道:平常用不到,但失火(故障)時必須又寬又暢通,讓人(故障電流)一秒就跑光。這個試驗等於灌一大群人進去測,確認通道沒有被卡住(電阻過大)、門栓夠牢(接點接觸良好)。","procedure_zh":"在『主保護接地端子』與『任一需接地的金屬零件』之間通入規定的大電流(交流或直流均可),量測該路徑的電阻或壓降。電源開路電壓限制在 12 V 以下(避免把待測物當負載加熱或產生危險電壓)。依電路的保護電流額定決定試驗電流大小,維持規定時間後讀取電阻/壓降並與限值比較。","params":"電源：交流或直流皆可，開路電壓 ≤12 V。試驗電流：保護電流額定 ≤25 A 時取其 200%（常見 EU 16A／UK 13A／US 20A）；>25 A 時取『額定 200%』與『500 A』兩者較小者。施加時間：依電流大小取規定時間（數十秒至約 2 分鐘）。判定（CNS 15598-1:2020 §5.6.6.3）：保護電流額定 ≤25 A 者，由壓降計算之保護搭接系統電阻 <b>不得超過 0.1 Ω<\/b>；>25 A 者，搭接系統上之壓降 <b>不得超過 2.5 V<\/b>。","standard_equipment":["High current source with a voltage not exceeding 12 V,","Source with at least 1500A short circuit","Calliper, micrometer"],"iec_bsmi":"CNS 15598-1 轉訂 IEC 62368-1,屬調和標準,本項無已知國家差異(harmonised, no known difference)。實務提醒:條號中『需接地零件之要求』在 5.6.4(含導體截面積),而『電阻量測之試驗方法與限值』正式落在 5.6.6(5.6.6.2 方法、5.6.6.3 電阻/壓降)。實驗室標示 5.6.4.1 著重在『要求』面,量測程序對應 5.6.6。BSMI 接受 CB/IEC 結果,惟以 CNS 條文為最終依據。","location":"安規測試區","utils":[],"equipment":[{"en":"Earth/ground bond resistance tester","zh":"接地阻抗測試機","role":"equip","instId":"ground-bond"}],"diagram":"earthbond","qa":"","pel":[{"equip":"High current source with a voltage not exceeding 12 V,","code":"RB","test":"Resistance of protective conductors and their terminations","zh":"接地阻抗大電流源(≤12V)","instId":"ground-bond"},{"equip":"Source with at least 1500A short circuit","code":"S","test":"Determination of the overcurrent protective device and circuit (Annex R)","zh":"1500A短路電流源","instId":""},{"equip":"Calliper, micrometer","code":"RB","test":"Requirements for protective earthing conductors","zh":"游標卡尺、測微器","instId":"calliper"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"灌大電流考驗接地線，確認故障時電流能快速流走跳電，而不是流經人體。"},{"id":"5.7","clauses":["5.7"],"group":"5","title_en":"Prospective touch voltage, touch current and protective conductor current (5.7.2 Measuring devices and networks; 5.7.2.1 Measurement of touch current; 5.7.2.2 Measurement of prospective touch voltage)","title_zh":"預期接觸電壓、接觸電流及保護導體電流(量測裝置與網路、接觸電流量測、預期接觸電壓量測)","purpose_zh":"就算外殼沒有明顯帶高壓,某些零件(例如電源濾波電容、絕緣的微小漏電)還是會讓很小的電流流經摸到它的人。雖然不致命,但達到一定大小會讓人『有感、嚇一跳、甚至肌肉收縮放不開手』。這項量測就是模擬『人手碰到產品時,有多少電流會流過人體』,並確認這個電流小到對人沒有危害(屬 ES1)。它不是用普通電表測,而是用一個模擬『人體電阻與頻率反應』的特製電路網路(IEC 60990 的量測網路)來測,結果才會和人體實際感受相符。","analogy_zh":"就像用『假手』去摸帶微弱電的欄杆,這隻假手的導電與反應特性跟真人一模一樣(IEC 60990 網路),於是測到的數字能直接代表『真人摸下去會不會麻、會不會抽手放不開』。","procedure_zh":"把設備依規定接好電源(通常加到額定電壓的 110%),在外露可觸及零件與大地(或另一可觸及零件)之間接上 IEC 60990 規定的量測網路:圖 4 用於『感知/驚嚇反應』加權,圖 5 用於『無法放手(let-go)』加權。讀取網路輸出端電壓並換算成等效接觸電流(例如反應網路:接觸電流 mA = 輸出電壓 / 500Ω 的關係),於正常與單一故障(如中斷中性線)條件下量測。若為含保護接地之設備,另量保護導體電流並與限值/輸入電流比例比較。","params":"量測網路元件(IEC 60990 圖 4 感知/反應):輸出取 500Ω 端,典型含 Rs 1500Ω、Rs 500Ω、Cs 0.22µF、R1 10000Ω、C1 0.022µF;接觸電流 = V(輸出)/500Ω (mA)。圖 5(let-go)為較複雜網路且使用受特定條件限制。供電:常用 110% 額定電壓。判定限值(交流):ES1 穩態接觸電流上限約 0.5 mA(0.707 mA 峰值);一般接觸電流不應超過 3.5 mA;若超過 3.5 mA,需符合『保護導體電流不超過輸入電流 5%』+ 永久連接/工業型 B 類插接 + 等電位連結最小截面 等附加條件並加註指示性防護。量測同時涵蓋正常與單一故障條件。","standard_equipment":["Networks in according IEC 60990:2016 figures 4 and 5; ampere meter"],"iec_bsmi":"CNS 15598-1 調和於 IEC 62368-1,並引用 IEC 60990 量測方法,屬調和標準(harmonised, no known difference)。注意 vs. 美規:UL 62368-1 在量測電路的『e』開關處理與 UL 101 傳統做法不同,故若同時取得 UL 報告需留意量測接法差異;但對 CNS/BSMI(IEC 路線)無影響。台灣市電 110V/60Hz 之供電條件需據此設定 110% 過電壓點。","location":"安規測試區","utils":[],"equipment":[{"en":"Leakage / touch-current tester (IEC 60990 networks)","zh":"洩漏/接觸電流量測儀","role":"equip","instId":"leakage-620L"}],"diagram":"touchcurrent","qa":"","pel":[{"equip":"Networks in according IEC 60990:2016 figures 4 and 5; ampere meter","code":"RB","test":"Prospective touch voltage touch current and protective conductor current","zh":"IEC 60990人體模擬網路+電流表","instId":"leakage-620L"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"用模擬人體的電路量測流過手的微小電流，確認小到無害、不會讓人電麻抽手。"},{"id":"6.2.2","clauses":["6.2.2"],"group":"6","title_en":"Power source circuit classifications — Classification of a power source (PS1, PS2, PS3) by measurement of available power","title_zh":"電力(電源)能量源電路之分級 — 依可用功率量測將電源分為 PS1、PS2、PS3","purpose_zh":"火災的三要素之一是『有足夠能量點燃東西』。IEC 62368-1 把電路依『最多能輸出多少功率(瓦特)』分成 PS1/PS2/PS3 三級:功率越大,萬一發生過載、短路或元件故障時,越有可能把附近材料燒起來。這項量測就是用一個可調電阻負載去『榨出』電路在最不利故障情況下能釋放的最大功率,藉此決定它屬於哪一級,進而決定後面要不要加防火外殼、要用什麼防火等級的材料。對含大容量鋰電池與大功率馬達驅動的無人機,這是判斷起火風險的根本分類。","analogy_zh":"就像評估一個爐子的火力大小:小蠟燭(PS1)頂多燙手不太會引發火災;卡式爐(PS2)某些情況能點燃紙張;噴槍(PS3)火力足以引燃並蔓延。先量出火力等級,才知道廚房(產品)要不要加裝防火牆。","procedure_zh":"在被測電路的輸出端接上可變電阻負載,從開路慢慢調到讓電路輸出『最大功率』的負載點(功率匹配點),並量測該最大功率(瓦)。需在兩種情境量:(a) 負載電路:電源在正常運轉下灌入最不利的『負載端故障』;(b) 電源電路:最不利的『電源端故障』灌入規定的正常負載。讀取穩定後的功率(對應起火評估,常以 3 秒後電壓與 30 秒後功率等時間點判定),據以歸類 PS1/PS2/PS3。","params":"分級依『可用最大功率(瓦)』：PS1 ≤15 W（且不視為潛在起火源 PIS）、PS2 >15 至 ≤100 W、PS3 >100 W。潛在起火源(PIS)判定：電弧型 — 相鄰兩點電壓 >50 V 峰值或直流（量測於 3 s 後）且電壓×正常 RMS 電流 >15；電阻型 — PS2／PS3 電路在正常或單一故障下 30 s 後功率消耗 >15 W（前 30 s 無功率上限）。量測：以可變電阻負載掃出最大功率（CNS 圖 34），涵蓋負載端與電源端故障。可燃物隔距：電弧性 PIS 13 mm、電阻性 PIS 5 mm。","standard_equipment":["Watt meter, variable resistor load, stop watch"],"iec_bsmi":"CNS 15598-1 調和於 IEC 62368-1,本分級無已知國家差異(harmonised, no known difference)。提醒:第 4 版(2023/CNS 對應更新時)對『mains 不再一律視為 PS3』等定義有調整(功率不再單獨定義 mains);實驗室應確認所依 CNS/IEC 版次。BSMI 接受依此分類之 CB 結果。","location":"安規測試區","utils":[],"equipment":[{"en":"Variable resistive load","zh":"可變電阻負載","role":"fixture","instId":"var-resistor-load"}],"diagram":"","qa":"","pel":[{"equip":"Watt meter, variable resistor load, stop watch","code":"RB","test":"Power source circuit classification","zh":"功率計+可變電阻負載+碼錶","instId":"power-analyzer"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"量電路的「火力」（最大可輸出功率）分級，決定要不要加防火外殼與耐燃材料。"},{"id":"6.3.1","clauses":["6.3.1"],"group":"6","title_en":"Reduction of the likelihood of ignition under normal operating conditions and abnormal operating conditions — Verification by the glow-wire test per IEC 60695-2-11 (and material indices GWFI per IEC 60695-2-12 / GWIT per IEC 60695-2-13)","title_zh":"降低於正常及異常操作條件下起火之可能性 — 以 IEC 60695-2-11 熾熱線(灼熱絲)試驗驗證(材料指數 GWFI、GWIT)","purpose_zh":"電子產品裡若有零件過熱、接點氧化發熱,可能把旁邊的塑膠零件點燃,進而釀成火災。熾熱線試驗就是模擬這種『內部過熱金屬點』的情境:用一根加熱到指定高溫(紅熱)的鎳鉻金屬絲去頂住塑膠零件一段時間,看它會不會被點燃、火會不會持續、會不會滴落燃燒物把下方的紙/棉布引燃。藉此確認產品所用塑膠(尤其是承載帶電零件、靠近發熱源的塑膠)具有足夠的耐燃/自熄能力。對無人機的電池盒、電源板支架等塑膠件特別重要。","analogy_zh":"就像拿一根燒紅的鐵絲去戳不同的塑膠杯:好的耐燃材料被戳一下會自己熄掉、不蔓延;差的材料一碰就燒起來還滴火。這個試驗就是用『燒紅的鐵絲』幫產品塑膠件做這種考驗。","procedure_zh":"把一根規定材質與直徑(約 ∅4 mm,Ni80/Cr20)的金屬絲尖端,用電流加熱到選定的測試溫度(例如 550 / 650 / 750 / 850 / 960°C 其中之一),以約 1.0 N 的力垂直頂住待測塑膠件表面,持續接觸 30 秒後移開。觀察接觸期間與移開後的燃燒/熾熱情形,並在試樣下方鋪上指定的棉布/包裝紙作為引燃指示。判定:無火焰且無熾熱、或於移開後 30 秒內自行熄滅,且下方棉布/紙不被點燃,即為通過。","params":"基本要求（CNS 15598-1:2020 §6.3.1）：正常／異常操作下不得引燃，且部件不得超過 ISO 871 自燃溫度限值之 90%（材料未知時取 300°C），並以 IEC 60695-2-11 在 <b>550°C<\/b> 之熾熱線試驗驗證；防火機殼外部可燃材料耐燃等級至少 HB75（最薄 <3 mm）／HB40。熱絲：∅約 4 mm、Ni80／Cr20；接觸力 1.0 N、接觸 30 s。較高溫度級（650／750／850／960°C）係材料指數 GWFI（IEC 60695-2-12，常 850°C）／GWIT（60695-2-13，常 775°C）之選用值；成品端試驗（GWEPT／GWT）常以 750°C、火焰 ≤2 s。","standard_equipment":["Glow-Wire according to IEC 60695-2-11."],"iec_bsmi":"CNS 15598-1 調和於 IEC 62368-1（引用 IEC 60695-2-11／-2-12／-2-13），屬調和標準。已對照 CNS §6.3.1：以 550°C 熾熱線為基本可燃性驗證，溫度級之選用與 PS 分級／是否無人看管相關（部分概念承襲 IEC 60335-1 家電傳統）。第4版(2023)放寬為可用熾熱線試驗驗證一般可燃性要求。","location":"材料測試區","utils":["需排煙"],"equipment":[{"en":"Glow-wire test apparatus","zh":"熾熱線試驗裝置","role":"equip","instId":"glow-wire"}],"diagram":"glowwire","qa":"","pel":[{"equip":"Glow-Wire according to IEC 60695-2-11.","code":"S","test":"Flammability test","zh":"熾熱線試驗(IEC 60695-2-11)","instId":"glow-wire"}],"pel_note":"IEC 62368-1:2023 將熾熱線（Glow-Wire, IEC 60695-2-11）列於 6.3.1／6.4.6，代碼 S（可外包）。清單自備熾熱線試驗機，可自行執行材料可燃性預選。","match":{"level":"ok","note":"與標準相符"},"gist_zh":"用燒到紅熱的金屬絲頂住塑膠，確認會自熄不蔓延；電池盒、電源板支架尤其重要。"},{"id":"6.4.8.3.3","clauses":["6.4.8.3.3"],"group":"6","title_en":"Fire enclosure and fire barrier openings — Top openings (properties of openings in the top of a fire enclosure); integrity verified by needle-flame test per Annex S.2","title_zh":"防火外殼與防火屏障之開孔 — 頂部開孔(防火外殼頂面開孔之性質);完整性以附錄 S.2 針焰試驗驗證","purpose_zh":"如果產品內部真的起火,防火外殼的工作是『把火關在裡面』。但外殼為了散熱常需開孔,問題是:萬一火焰或燃燒的塑膠碎屑從『頂部開孔』竄出,可能引燃放在產品上方的東西(例如桌上的紙、窗簾、另一台設備),把火災擴大。這條規定就是限制頂部開孔的大小、數量、間距,並在必要時做試驗,確認火焰與燃燒物不會從頂部逸出引燃上方物品。對堆疊使用或上方有遮罩的無人機地面站/充電櫃尤其重要。","analogy_zh":"就像鍋子的鍋蓋:可以留小蒸氣孔散熱,但孔不能大到讓油火直接噴出去燒到抽油煙機。這個試驗就是在確認『鍋蓋上的孔』夠小夠密,火苗冒不出去。上方鋪的棉紗布就是『會不會燒到上方東西』的偵測哨兵。","procedure_zh":"先依 6.4.8.3.1(圖 40)判定哪些算『頂部』開孔,並檢查開孔尺寸、數量與間距是否符合免試的構造規則(例如以網/柵覆蓋或符合尺寸/間距限制)。若構造未自動滿足,則對該頂部開孔施作防火外殼完整性試驗:依附錄 S.2(針焰試驗,IEC 60695-11-5 系)在內部對開孔下方施加規定火焰,並在開孔上方一定距離處水平張一層漂白棉紗布(cheesecloth)作為指示。判定:棉紗布不得被引燃或燒焦(NC=完整=通過),代表火焰/燃燒物未由頂部逸出。","params":"判定基準：頂部開孔上方所張之漂白棉紗布（cheesecloth）須保持完整、不被引燃或燒焦（NC＝棉紗布完整＝合格；YC＝燒焦／起火＝不合格）。開孔尺寸、數量、最小間距與火源施加（附錄 S.2 針焰，依 IEC 60695-11-5）依 CNS 15598-1:2020 §6.4.8.3.3 與附錄 S.2 之圖 40／圖 41 判定；第4版(2023)新增『2 mm 火錐邊界』（圖 41）與圖 S.1 之施加方式。","standard_equipment":["Cheesecloth bleached cotton cloth 40g/m2; timer"],"iec_bsmi":"CNS 15598-1 調和於 IEC 62368-1，本項無已知國家差異。版次注意：第4版(2023)對 6.4.8.3.3／6.4.8.3.4 頂、底、側開孔要求大幅修訂（重新納入側開孔、明確 2 mm 火錐邊界 圖41），且頂部開孔效能試驗對 Annex S.2 針焰施加方式有修改（新增圖 S.1）。實驗室須確認所依為 CNS 15598-1:2020（＝IEC 62368-1:2018 第3版）或 IEC 62368-1:2023（第4版），開孔規則與細節在版次間不同。","location":"安規測試區","utils":[],"equipment":[{"en":"Cheesecloth (bleached cotton)","zh":"棉紗布（漂白棉布）","role":"consumable","instId":"cheesecloth"}],"diagram":"","qa":"","pel":[{"equip":"Cheesecloth bleached cotton cloth 40g/m2; timer","code":"RB","test":"Top openings and top openings properties","zh":"棉紗布(漂白棉布40g/m²)","instId":"cheesecloth"}],"match":{"level":"warn","note":"可能缺漏 / 建議補充"},"gist_zh":"限制防火外殼頂面開孔，確認萬一起火，火焰與燃燒碎屑不會冒出引燃上方物品。"},{"id":"8.2","clauses":["8.2"],"group":"8","title_en":"Classification of mechanical energy sources (MS1, MS2, MS3)","title_zh":"機械能量源之分級 (MS1、MS2、MS3)","purpose_zh":"這一條不是一個「會動手做」的單項試驗，而是整個機械傷害章節(第8章)的分類規則:先判斷產品的會動、會割、會掉、會爆的部位「危險到什麼程度」,再決定要不要保護、要保護到幾層。觀念很簡單:MS1=碰到也不痛不傷(例如慢速小風扇);MS2=會痛但不致受傷(例如夾手、利邊);MS3=會造成需要看醫生的傷害(例如高速旋轉刀片、會把人壓傷的重物、或裝在2公尺以上掉下來會砸人的設備)。等級越高,規定要的「安全防護」越多(MS2要1層、MS3要2層)。對無人機/旋翼類產品特別關鍵,因為高速旋轉的螺旋槳幾乎一定落在MS3。","analogy_zh":"像遊樂園入口先幫每個遊樂設施貼上「綠/黃/紅」標籤:綠色隨便玩、黃色要小心、紅色一定要繫安全帶又要工作人員看著。先分級,才知道每個危險要圍幾道欄杆。","procedure_zh":"不是用儀器量,而是工程判定:檢視產品在「正常使用、異常使用、單一故障」三種狀態下,各個可被人觸及的會動/會割/會掉/會爆部位的能量大小,對照標準的MS1/MS2/MS3界限把它歸類。歸到哪一級,就套用後續8.4~8.11對應的防護與試驗。實驗室此處列的「50kg磅秤」是用來秤設備質量,因為質量(配合掉落高度)是判定動能/位能屬於哪一級的輸入值。","params":"MS分三級;MS2需1層安全防護、MS3需2層;安裝高度>2m之牆/天花板設備一律視為MS3(與質量無關),且須通過8.7固定試驗;能量於正常/異常/單一故障三狀態下評估。具體動能(J)門檻值在標準正文/表中,為付費內容,本處不臆造。","standard_equipment":["Scale up to 25kg"],"iec_bsmi":"已協和。CNS 15598-1:2020(109年版)直接採用 IEC 62368-1:2018(第3版),分級架構一致,無已知國別差異。","location":"安規測試區","utils":[],"equipment":[{"en":"Platform scale (<=50 kg)","zh":"磅秤（≤50 kg）","role":"equip","instId":"scale"}],"diagram":"","qa":"PEL 對照：官方規定磅秤量程「up to 25 kg」（RB）；清單為 50 kg，量程涵蓋無虞。","pel":[{"equip":"Scale up to 25kg","code":"RB","test":"Mechanical energy source classifications","zh":"磅秤(≤25kg)","instId":"scale"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"判斷會動、會割、會掉的部位危險到什麼程度（MS1/2/3），再決定要幾層防護。"},{"id":"8.5.4.3","clauses":["8.5.4.3"],"group":"8","title_en":"Special categories of equipment containing moving parts - accessibility (household/home-office shredder-type assessment using the wedge probe, Figure V.4)","title_zh":"含移動零件之特殊類別設備-可觸及性評估(以楔形試具 Figure V.4 評估,源自碎紙機類旋轉/破壞性零件試驗)","purpose_zh":"目的是確認:當設備內部有會旋轉、會撕裂、會夾傷人的零件(典型代表是碎紙機刀片,延伸到任何有進料口或開孔且內含旋轉/破壞性零件的設備)時,使用者的手指或塞進去的薄物(像一張紙的邊緣)不會碰到那些危險刀刃。換句話說,就是測「人會不會不小心被捲進去或割到」。對含旋轉機構的產品很重要,沒有適當防護就會傷手。","analogy_zh":"像測試果汁機的安全鎖:用一根模擬「手指/薄紙片」的探棒,從各個縫隙用力戳戳看,看能不能碰到正在轉的刀。碰得到就不合格。","procedure_zh":"先移除不需工具即可拆下的外殼或護罩,然後把楔形試具(Figure V.4,模擬薄片插入)伸入機械外殼的每一個開孔。對直條型(strip-cut)家用/家用辦公碎紙機類施加不超過45N、對交叉型(cross-cut)施加不超過90N的力,朝各方向推。判定危險的旋轉/破壞性零件是否可被觸及;若可觸及則不符合,須加強防護(警告標示不可取代結構防護)。","params":"直條型(strip-cut)家用/家用辦公碎紙機類:施力<=45N;交叉型(cross-cut):<=90N;施力方向為相對開孔之任意方向;試前先拆除免工具可拆之外殼/護罩。可觸及性探棒一般以30N施力判定一般開孔(Annex V)。","standard_equipment":["Test probe (jointed) of Annex V (figure V.1 and V.2) and; wedge probe V.4; Force 45N and 90 N with wedge probe"],"iec_bsmi":"已協和（採 IEC 62368-1:2018 第3版）。實驗室所列 ULP-1／ULP-2 為探棒供應商型號，標準以 Annex V 之 Figure V.1～V.4 命名。45 N／90 N 之楔形試具源自含旋轉／破壞性零件（碎紙機類）條款；受測無人機若非該型，實際適用之子條款與施力依產品型態而定。","location":"安規測試區","utils":[],"equipment":[{"en":"Accessibility test probes / fingers","zh":"可觸及性試驗探棒／試指","role":"fixture","instId":"access-probes"},{"en":"Wedge probe (45 N / 90 N)","zh":"楔形探棒（45／90 N）","role":"fixture","instId":"wedge-probe"}],"diagram":"","qa":"","pel":[{"equip":"Test probe (jointed) of Annex V (figure V.1 and V.2) and; wedge probe V.4; Force 45N and 90 N with wedge probe","code":"RB/RSH","test":"Equipment having an electromechanical device for destruction of media","zh":"關節試探棒(圖V.1/V.2)+楔形探棒","instId":"access-probes"}],"match":{"level":"warn","note":"部分符合"},"gist_zh":"用楔形試具戳進料口縫隙，確認碎紙機類旋轉破壞性零件不會割到、捲到手指。"},{"id":"8.5.5","clauses":["8.5.5.2"],"group":"8","title_en":"High pressure lamps (explosion / rupture test)","title_zh":"高壓燈泡(爆裂試驗)","purpose_zh":"高壓放電燈泡(投影機、舞台燈等常見)內部壓力很高,萬一爆裂會像小爆炸一樣把玻璃碎片高速噴出,可能傷到旁邊的人。這項試驗就是要確認:就算燈泡真的炸了,設備的外殼/防護罩也能把玻璃碎片擋住、不會飛出來傷人,且漏出的碎片尺寸在限值內。對含此類燈泡的產品是安全關鍵。","analogy_zh":"像把一顆可能會爆的玻璃彈珠放在一個密封盒裡搖晃測試:就算它在裡面碎掉,也不能有碎片從盒縫噴出來打到人。","procedure_zh":"在設備正常工作狀態下,使燈泡達到(或以方法促使)爆裂破壞條件,觀察外殼/防護是否能包容玻璃碎片,並檢查是否有玻璃碎片逸出外殼以及逸出碎片之尺寸是否超過標準限值。判定外殼(基本/補充/強化防護)是否足以保護一般人。","params":"於設備正常使用條件下進行燈泡爆裂評估;判定準則為外殼須包容碎片,且逸出玻璃碎片之尺寸不得超過標準規定限值(精確尺寸門檻在標準正文/表中,屬付費內容)。高壓燈泡歸類 MS3,須具備外殼安全防護。","standard_equipment":["Dark sticky mat, magnified glass with a resolution of 0,1 mm"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。實驗室所列「dark sticky mat + magnifier」與標準此試驗之收集/量測碎片需求一致。具體碎片尺寸限值為付費標準內容,本處未臆造。","location":"安規測試區","utils":[],"equipment":[{"en":"Dark sticky mat","zh":"深色黏性墊","role":"consumable","instId":"sticky-mat"},{"en":"Magnifying glass","zh":"放大鏡","role":"equip","instId":"magnifier"}],"diagram":"","qa":"","pel":[{"equip":"Dark sticky mat, magnified glass with a resolution of 0,1 mm","code":"","test":"High pressure lamps","zh":"深色黏性墊+放大鏡(0.1mm)","instId":"sticky-mat"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"確認高壓燈泡萬一爆裂，外殼/防護罩能擋住高速玻璃碎片不飛出傷人。"},{"id":"8.6.2","clauses":["8.6.2"],"group":"8","title_en":"Static stability","title_zh":"靜態穩定性","purpose_zh":"確認落地式或放在桌面的設備不會輕易翻倒砸到人。地面可能不是完全水平、或設備本身重心偏,這項試驗就是把設備放在一個微傾的斜面上(或傾斜設備本身),看它會不會倒。設備一倒,輕則砸壞、重則壓傷小孩或砸到腳,所以穩不穩很重要。","analogy_zh":"像把直立式電風扇或落地燈放在一個微微傾斜的地板上,輕輕轉一圈看會不會自己倒下去——站得住才安全。","procedure_zh":"把設備依正常使用各姿勢置於相對水平面傾斜10度的斜面上(線材以最不利方式擺放),旋轉至各方向觀察是否傾倒。另含8.6.2.3向下力試驗:對落地設備在最不利的水平面上施加800N向下力(以12.5cm×20cm平面試具),確認不致翻覆。","params":"靜態穩定:斜面角度10度,旋轉360度評估;向下力(8.6.2.3):800N,施力平面12.5cm×20cm;判定:不得翻覆。","standard_equipment":["Inclined plane 10°; Several weights up to 100N; scale","Several weights up to 250N; scale; Test tool 800Nwith a flat surface 12,5cm by 20cm; Ruler"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。實驗室列「inclined plane 10deg/15deg + angle level + weight」涵蓋本條(10度)所需;15度屬8.6.5。","location":"安規測試區","utils":[],"equipment":[{"en":"Inclined plane (10/15)","zh":"傾斜試驗平台","role":"fixture","instId":"inclined-plane"},{"en":"Angle gauge / digital level","zh":"角度規／傾角儀","role":"equip","instId":"angle-level"},{"en":"Calibrated weights / masses","zh":"砝碼／配重","role":"fixture","instId":"weights"}],"diagram":"stability","qa":"","pel":[{"equip":"Inclined plane 10°; Several weights up to 100N; scale","code":"RB","test":"Static stability for floor standing equipment","zh":"傾斜平台10°+砝碼/磅秤","instId":"inclined-plane"},{"equip":"Several weights up to 250N; scale; Test tool 800Nwith a flat surface 12,5cm by 20cm; Ruler","code":"RB","test":"Static stability for floor standing equipment","zh":"砝碼≤250N+800N試具(12.5×20cm)","instId":"weights"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"放在微傾斜面或施推力，確認不會翻倒——倒下來輕則摔壞、重則壓傷人。"},{"id":"8.6.4","clauses":["8.6.4"],"group":"8","title_en":"Glass slide test","title_zh":"玻璃滑動(玻璃滑落)試驗","purpose_zh":"有些設備底部裝有腳墊或腳座,放在像玻璃這種光滑桌面上時,如果有人靠著它、推它、或它自己受力,可能會整台滑走或滑到桌邊掉下來。這項試驗模擬「設備被放在很滑的玻璃面上」的最不利情況,確認它在受到操作力時不會滑移失穩、滑落傷人。屬於穩定性的一種延伸情境。","analogy_zh":"像把手機架放在光滑的玻璃茶几上,從旁邊推一下看它會不會一路滑到桌邊掉下去——會滑落就代表底部抓地力不足。","procedure_zh":"將設備置於模擬光滑桌面的玻璃板(滑動面)上,依規定姿勢/角度條件對其施加操作力或傾斜條件,觀察設備是否在玻璃面上發生滑移或失去平衡而傾倒/滑落。常見對「非落地、置於水平面且有操作介面」的設備施作;落地設備此項常判 N/A。","params":"以玻璃板為支撐面模擬最不利低摩擦條件,評估設備受操作力/傾斜時之滑移與穩定性;判定不得失穩或滑落。(精確施力與角度值在標準正文/表中,屬付費內容。)","standard_equipment":["Glass plate, Inclined plane 10°"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。CB報告中此項常見記為「8.6.4 Glass slide test」並對落地設備標 N/A。實驗室列專屬 glass slide test fixture,與標準需求相符。","location":"安規測試區","utils":[],"equipment":[{"en":"Glass slide test fixture","zh":"玻璃滑落試驗治具","role":"fixture","instId":"glass-slide"}],"diagram":"","qa":"","pel":[{"equip":"Glass plate, Inclined plane 10°","code":"RB","test":"Glass slide test","zh":"玻璃板+傾斜平台10°","instId":"glass-slide"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"模擬放在很滑的玻璃桌面，確認受力時不會滑移、滑到桌邊掉落傷人。"},{"id":"8.6.5","clauses":["8.6.5"],"group":"8","title_en":"Horizontal force test","title_zh":"水平力試驗","purpose_zh":"模擬有人從側面推設備、靠在設備上、或施加一個水平方向的力(例如不小心撞到),看設備會不會被推倒。這是穩定性試驗裡專門針對「橫向被推」的情境,目的是確保日常使用中人對設備的正常推靠不會造成翻覆傷人。","analogy_zh":"像有人用手橫向推一下落地式螢幕架或大型音響:正常力道推它,它應該站得穩、不會倒過來砸到人。","procedure_zh":"對設備施加規定的水平推力(對較高/落地設備一般以斜面15度配合配重模擬,水平力數組通常>=250N),施力於最不利點/高度,觀察設備是否傾倒。亦量測腳座或可動部件之位置。判定不得翻覆。","params":"水平力一般>=250N(實驗室列 weights>=250N);常以15度斜面配合配重施作;施力於最不利點;判定:設備不得傾倒。","standard_equipment":["Inclined plane 15°; several weights at least 250 N; scale"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。實驗室列 weights>=250N,符合本條水平力之量級需求。","location":"安規測試區","utils":[],"equipment":[{"en":"Calibrated weights / masses","zh":"砝碼／配重","role":"fixture","instId":"weights"}],"diagram":"","qa":"","pel":[{"equip":"Inclined plane 15°; several weights at least 250 N; scale","code":"RB","test":"Horizontal force test","zh":"傾斜平台15°+砝碼≥250N","instId":"inclined-plane"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"從側面施加水平推力，確認日常被人推、靠時設備不會翻覆。"},{"id":"8.7","clauses":["8.7"],"group":"8","title_en":"Equipment mounted to a wall, ceiling or other structure","title_zh":"安裝於牆壁、天花板或其他結構之設備","purpose_zh":"確認鎖在牆上或吊在天花板的設備(像壁掛攝影機、吸頂裝置)不會因為固定不牢而掉下來砸到人。掛得越高,掉下來越危險——標準甚至規定只要裝在2公尺以上,不管多重都當成最高危險級(MS3)。這項試驗就是用力往下拉/壓,模擬它長期承重與意外受力,確認固定點夠牢。","analogy_zh":"像裝好冷氣或壁掛電視後,自己用力往下拉拉看、掛個重物試試,確定它不會哪天突然掉下來砸到沙發上的人。","procedure_zh":"依製造商說明安裝設備,固定點置於最嚴苛受力位置;施加向下試驗力,其值取「設備重量的4倍」或「設備重量的2倍加880N」兩者中較小者,再除以固定點數目分配。若固定設計依賴螺紋件,另對每個螺紋件逐一施加規定扭矩。維持規定時間後,確認固定未鬆脫、未掉落。","params":"向下試驗力 = min(4×設備重量, 2×設備重量+880N),再÷固定點數;螺紋件另施規定扭矩;施力維持規定時間;>2m安裝一律 MS3。實驗室列 weights>=880N 與 push-pull gauge,與880N項相符。","standard_equipment":["Several weights, timer, scale; Torque gauges; push-pull gauge"],"iec_bsmi":"已協和(採 IEC 62368-1:2018 第3版)。880N為公式中之常數項,實驗室配置適當。注意UL版於 Annex 對牆掛另有國別差異,但CNS/IEC本文一致。","location":"安規測試區","utils":[],"equipment":[{"en":"Calibrated weights / masses","zh":"砝碼／配重","role":"fixture","instId":"weights"},{"en":"Push-pull force gauge","zh":"推拉力計","role":"equip","instId":"push-pull"}],"diagram":"","qa":"","pel":[{"equip":"Several weights, timer, scale; Torque gauges; push-pull gauge","code":"RB","test":"Equipment mounted to a wall or ceiling","zh":"砝碼+計時+磅秤+扭力/推拉力計","instId":"push-pull"}],"match":{"level":"ok","note":"與標準相符"},"gist_zh":"對壁掛/吸頂設備施力下拉，確認固定夠牢不會掉落；裝 2 公尺以上一律當最高危險級。"},{"id":"8.8","clauses":["8.8"],"group":"8","title_en":"Handle strength","title_zh":"握把/提把強度","purpose_zh":"確認設備上用來「提著走」的把手夠牢固,提起來時不會斷裂、脫落,害設備整台掉下去砸到腳或地面。把手一斷,重的設備掉下來可能壓傷人,所以要先用比實際更重的負荷把它「考驗」一遍。","analogy_zh":"像買行李箱前先把提把拉起來、再壓上比實際更重的東西甩一甩,確定提把不會斷、不會脫落。","procedure_zh":"以不夾持的方式(用扁帶/織帶,寬約75mm)把試驗負荷均勻施加在提把中央75mm寬範圍上,負荷大小依MS等級而定(見下),維持規定時間,確認提把及其固定不斷裂、不鬆脫。","params":"施力帶寬75mm;MS1(>=2提把)或MS2:施加=3×設備重量;MS3且質量<=50kg:2×設備重量或75kg取大者;MS3且質量>50kg:1×設備重量或100kg取大者;MS1僅單一提把者免測;維持規定時間不得斷裂/鬆脫。","
