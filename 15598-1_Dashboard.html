<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>無人機安規測試 儀器 × 章節對照 ｜ CNS 15598-1（IEC 62368-1）</title>
<meta name="description" content="無人機（UAV）安規測試 CNS 15598-1 / IEC 62368-1：章節與測試儀器對照，每項測試用一句話講清楚「在防什麼」，附中英對照與測項示意圖。支援手機/平板。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f8; --surface:#ffffff; --surface-2:#f5f7fc; --surface-3:#eef2f9;
  --ink:#1b2435; --ink-2:#54627c; --ink-3:#8a96ad; --ink-soft:#54627c;
  --line:#e2e7f1; --line-2:#eef1f7;
  --brand:#4f46e5; --brand-d:#3a32c4; --brand-dd:#2a2496; --brand-wash:#ecebfd; --brand-wash2:#f4f3fe;
  --teal:#0e9b8c; --teal-wash:#dff5f2;
  /* HBSE semantic groups */
  --g4:#64748b; --g4w:#eef1f6;
  --g5:#2f6bdb; --g5w:#e7f0ff;
  --g6:#e9692b; --g6w:#fdeee3;
  --g8:#16a06b; --g8w:#e2f6ee;
  --g9:#cf8a1a; --g9w:#fbf2da;
  --gx:#8b5cf6; --gxw:#f1ebfe;
  --ok:#0e9b8c; --warn:#d98324; --danger:#e0506b;
  --drone:#dc2626; --drone-d:#b91c1c; --drone-2:#f3a3a3; --drone-wash:#fef3f2; --drone-line:#f6cfcf;
  --pel-req:#0d7a6f; --pel-sub-bg:#fff6e8; --pel-sub-fg:#9a6a08; --pel-sub-bd:#ecca8f;
  --shadow:0 1px 2px rgba(20,30,60,.05), 0 10px 26px -8px rgba(20,30,60,.13);
  --shadow-sm:0 1px 2px rgba(20,30,60,.06);
  --shadow-pop:0 14px 40px -10px rgba(28,30,90,.30);
  --r:16px; --r-sm:11px; --r-pill:999px;
  --sans:"Hanken Grotesk","Noto Sans TC",-apple-system,"Segoe UI",system-ui,sans-serif;
  --mono:"Spline Sans Mono","Hanken Grotesk",ui-monospace,Consolas,monospace;
  --maxw:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
h1,h2,h3,h4{margin:0;font-weight:700;line-height:1.25;letter-spacing:-.012em;text-wrap:balance}
p{text-wrap:pretty}
.ch-title,.inst .en,.icard h3,.es-card .ec-zh,.dia-card h3{text-wrap:balance}
a{color:var(--brand-d);text-decoration:none}
a:hover{text-decoration:underline}
.mono{font-family:var(--mono)}
::selection{background:var(--brand-wash);color:var(--brand-dd)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd5e4;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#b6c0d4}

/* ---- atmospheric background ---- */
.bg-atmos{position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(1100px 620px at 82% -10%, #e4e7fd 0%, transparent 58%),
    radial-gradient(820px 460px at -6% -4%, #dff3ef 0%, transparent 52%),
    var(--bg);}
.bg-atmos::after{content:"";position:absolute;inset:0;opacity:.55;
  background-image:radial-gradient(circle at 1px 1px, rgba(40,55,95,.045) 1px, transparent 0);
  background-size:23px 23px}

/* ---- app bar ---- */
.appbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.80);
  backdrop-filter:saturate(170%) blur(16px);-webkit-backdrop-filter:saturate(170%) blur(16px);
  border-bottom:1px solid var(--line)}
.appbar-in{max-width:var(--maxw);margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .logo{width:39px;height:39px;flex:0 0 auto;border-radius:12px;display:block;
  box-shadow:0 4px 12px -2px rgba(79,70,229,.5)}
.brand .bt{font-weight:800;font-size:15.5px;letter-spacing:-.02em;white-space:nowrap;display:block;overflow:hidden;text-overflow:ellipsis}
.brand>div{min-width:0;overflow:hidden}
.brand .bs{display:block;font-weight:500;font-size:10.5px;color:var(--ink-3);letter-spacing:.01em;margin-top:1px}
.search{margin-left:auto;position:relative;flex:1 1 230px;max-width:380px}
.search input{width:100%;padding:9px 14px 9px 38px;border:1px solid var(--line);border-radius:var(--r-pill);
  background:var(--surface-2);font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;transition:.16s}
.search input::placeholder{color:var(--ink-3)}
.search input:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px var(--brand-wash)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-3)}

/* ---- desktop tabs ---- */
.tabs{max-width:var(--maxw);margin:0 auto;padding:7px 16px 9px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{appearance:none;border:0;background:none;cursor:pointer;font-family:inherit;
  font-size:14px;font-weight:600;color:var(--ink-2);padding:8px 15px;border-radius:var(--r-pill);
  white-space:nowrap;display:flex;align-items:center;gap:7px;transition:.15s}
.tabs button:hover{background:var(--surface-3);color:var(--ink)}
.tabs button.active{background:var(--brand);color:#fff;box-shadow:0 4px 12px -3px rgba(79,70,229,.5)}
.cbadge{font-size:11px;font-weight:700;background:rgba(255,255,255,.22);color:inherit;border-radius:var(--r-pill);
  padding:1px 7px;min-width:18px;text-align:center}
.tabs button:not(.active) .cbadge{background:var(--surface-3);color:var(--ink-3)}

/* ---- layout / views ---- */
main{max-width:var(--maxw);margin:0 auto;padding:24px 22px 90px}
.view{display:none}
.view.active{display:block;animation:viewin .32s cubic-bezier(.22,.61,.36,1)}
@keyframes viewin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section-head{margin:4px 0 18px}
.section-head h2{font-size:19px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.section-head p{margin:.35em 0 0;color:var(--ink-2);font-size:14px;text-wrap:pretty}

/* ---- hero ---- */
.hero{position:relative;overflow:hidden;border-radius:22px;padding:30px 32px;color:#fff;
  background:linear-gradient(135deg,#4f46e5 0%,#3f37c9 52%,#312e81 100%);
  box-shadow:0 20px 50px -18px rgba(49,46,129,.6)}
.hero::after{content:"";position:absolute;right:-70px;top:-90px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,200,255,.28),transparent 68%)}
.hero-drone{position:absolute;right:-48px;bottom:-74px;width:440px;height:440px;color:#e3e8ff;opacity:.15;pointer-events:none;z-index:0}
.hero h2,.hero p,.hero .kpis,.hero .intro-card{position:relative;z-index:1}
.hero h2{position:relative;font-size:clamp(24px,3.1vw,36px);color:#fff;letter-spacing:-.02em;word-break:keep-all;text-wrap:wrap}
.hero p{word-break:keep-all}
.hero p{position:relative;margin:.7em 0 0;color:#dfe3fb;font-size:15px;max-width:62ch;line-height:1.65}
.kpis{position:relative;display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.kpi{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;
  padding:13px 17px;min-width:108px;backdrop-filter:blur(2px)}
.kpi b{display:block;font-size:27px;line-height:1;letter-spacing:-.02em;font-weight:800}
.kpi span{font-size:12px;color:#cdd3f7;margin-top:4px;display:block}
.kpi{position:relative}
.kpi.clk{cursor:pointer;transition:transform .15s,background .15s,box-shadow .15s}
.kpi.clk:hover{background:rgba(255,255,255,.22);transform:translateY(-2px);box-shadow:0 10px 22px -10px rgba(0,0,0,.4)}
.kpi.clk:focus-visible{outline:2px solid #fff;outline-offset:2px}
.kpi.clk::after{content:"↗";position:absolute;top:7px;right:11px;font-size:11px;color:#b9c0f0;opacity:.6}

/* ---- generic cards ---- */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.intro-card{margin-top:18px;padding:18px 22px;border-left:4px solid var(--brand);display:flex;gap:14px;align-items:flex-start}
.intro-card .qm{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--brand-wash);color:var(--brand-d);
  display:flex;align-items:center;justify-content:center}
.intro-card p{margin:0;font-size:14.5px;color:var(--ink);line-height:1.65}

/* ---- energy classes ---- */
.es-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:13px;margin-top:8px}
.es-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px 14px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:.18s}
.es-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.es-card .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.es-card .ec-h{display:flex;align-items:center;gap:9px}
.es-code{font-family:var(--mono);font-weight:600;font-size:12px;color:#fff;border-radius:7px;padding:3px 8px;letter-spacing:.02em}
.es-card .ec-zh{font-weight:700;font-size:14.5px}
.es-card .ec-desc{margin:9px 0 0;font-size:13.5px;color:var(--ink);line-height:1.55}
.es-card .ec-tech{margin:8px 0 0;font-size:11.5px;color:var(--ink-3);line-height:1.5;border-top:1px dashed var(--line);padding-top:7px}

/* ---- info cards grid ---- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-top:6px}
.icard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm)}
.icard h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.icard h3 .dot{width:8px;height:8px;border-radius:3px;background:var(--brand)}

/* structured one-per-row lists (from data html) */
.s-intro{display:block;font-size:13.5px;color:var(--ink-2);margin-bottom:6px}
.s-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.s-row,.coderow{display:flex;gap:10px;align-items:baseline;font-size:13px;line-height:1.5}
.s-k{flex:0 0 auto;font-family:var(--mono);font-size:11px;font-weight:600;border-radius:6px;padding:2px 7px;
  background:var(--brand-wash);color:var(--brand-d);min-width:56px;text-align:center;align-self:flex-start;margin-top:1px}
.s-k.kw{font-family:var(--sans);background:var(--surface-3);color:var(--ink-2);min-width:60px;font-weight:600}
.s-note,.codenote{display:block;margin-top:10px;font-size:11.5px;color:var(--ink-3);font-style:italic;
  border-top:1px dashed var(--line);padding-top:8px}
.codelist{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.pel-code{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;font-weight:600;border-radius:5px;padding:2px 6px;min-width:42px;text-align:center}
.pel-code.req{background:var(--pel-req);color:#fff}
.pel-code.sub{background:var(--pel-sub-bg);color:var(--pel-sub-fg);box-shadow:inset 0 0 0 1px var(--pel-sub-bd)}
.pel-code.none{background:var(--surface-3);color:var(--ink-3)}
/* ---- PEL equipment-code badges (official IECEE PEL) ---- */
.pelb{font-family:var(--mono);font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 7px;line-height:1.45;white-space:nowrap;letter-spacing:.01em;display:inline-flex;align-items:center;gap:4px;cursor:help}
.pelb::before{display:none}
.pelb.req{background:var(--pel-req);color:#fff}

.pelb.sub{background:var(--pel-sub-bg);color:var(--pel-sub-fg);box-shadow:inset 0 0 0 1px var(--pel-sub-bd)}
.pelb.none{background:var(--surface-3);color:var(--ink-3);font-weight:600}
.pelb.listed{background:var(--surface-3);color:var(--ink-2);box-shadow:inset 0 0 0 1px var(--line);font-weight:700}
.pelb.listed::before{display:none}
.pelb.none::before{display:none}
.pelb.corner{position:absolute;top:13px;right:14px}
.equip-item .pelb{margin-left:0;flex:0 0 auto;min-width:58px;justify-content:center}
.pel-legend{display:flex;gap:7px 14px;flex-wrap:wrap;align-items:center;margin:0 0 14px;font-size:12px;color:var(--ink-2)}
.pel-legend .lg{display:inline-flex;align-items:center;gap:6px}
.pel-legend .sw{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.pel-legend .sw.req{background:var(--pel-req)}
.pel-legend .sw.sub{background:var(--pel-sub-bg);box-shadow:inset 0 0 0 1px var(--pel-sub-bd)}
.pel-legend .sw.none{background:var(--surface-3)}
/* ---- technical-term tooltip anchor ---- */
.term{border-bottom:1px dotted var(--brand);cursor:help;text-underline-offset:2px;transition:background .12s}
.term:hover{background:var(--brand-wash2)}
.nb{white-space:nowrap}
.gloss-cls{display:flex;flex-wrap:wrap;gap:4px}
table.gloss td .pelb{white-space:nowrap}

/* expandable "more" disclosure */
.more{margin-top:22px}
.more-tg{width:100%;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;font-family:inherit;font-size:14.5px;
  font-weight:600;color:var(--ink);box-shadow:var(--shadow-sm);transition:.16s}
.more-tg:hover{border-color:#cdd5e6}
.more-tg .chev{margin-left:auto;transition:transform .25s;color:var(--ink-3)}
.more.open .more-tg .chev{transform:rotate(180deg)}
.more-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.more.open .more-body{grid-template-rows:1fr}
.more-body>div{overflow:hidden}
.more-inner{padding-top:14px}
.std-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;
  box-shadow:var(--shadow-sm);margin-bottom:14px}
.std-panel h3{font-size:14px;color:var(--brand-d);margin-bottom:8px}

/* ---- filter bar + mobile trigger ---- */
.filterbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 16px}
.chip{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
  border-radius:var(--r-pill);padding:7px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.13s}
.chip:hover{border-color:var(--brand);color:var(--ink)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .n{opacity:.55;margin-left:3px;font-weight:600}
.count-note{margin-left:auto;font-size:12.5px;color:var(--ink-3)}
.filter-trigger{display:none}
.ch-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.skim-toggle{flex:0 0 auto;appearance:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;margin-top:2px;
  border:1px solid var(--line);background:var(--surface);color:var(--brand-d);border-radius:var(--r-pill);padding:8px 15px;box-shadow:var(--shadow-sm);transition:.14s}
.skim-toggle:hover{border-color:var(--brand)}
.skim-toggle[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}
#chList.compact .ch{margin-bottom:8px}
#chList.compact .ch-head{padding:11px 15px;gap:11px}
#chList.compact .ch-en,#chList.compact .ch-tags{display:none}
#chList.compact .ch-title{font-size:14.5px}
#chList.compact .ch-lede{margin-top:5px;font-size:13.7px}

/* ---- chapter cards ---- */
.ch{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);
  margin-bottom:13px;overflow:hidden;transition:box-shadow .2s,border-color .2s,transform .2s;scroll-margin-top:132px}
.ch:hover{box-shadow:var(--shadow);border-color:#d3dbea}
.ch.hl{box-shadow:0 0 0 3px var(--brand),var(--shadow);border-color:var(--brand)}
.ch-head{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:15px 17px;cursor:pointer}
.ch-badge{font-family:var(--mono);font-weight:600;font-size:12px;color:#fff;border-radius:9px;padding:7px 8px;
  min-width:58px;text-align:center;letter-spacing:.01em;line-height:1.2}
.ch-main{min-width:0}
.ch-title{font-weight:700;font-size:15.5px;line-height:1.34}
.ch-en{font-size:12px;color:var(--ink-3);margin-top:1px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.ch.open .ch-en{-webkit-line-clamp:unset;overflow:visible}
.ch-lede{font-size:14px;color:var(--ink-2);line-height:1.58;margin-top:9px}
.ch-lede b,.ch-lede strong{color:var(--ink)}
.ch-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:11px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px;white-space:nowrap;line-height:1.7}
.tag.grp{color:#fff}
.tag.cnt{background:var(--brand-wash);color:var(--brand-d)}
.tag.loc{background:var(--surface-3);color:var(--ink-2)}
.tag.sub{background:var(--surface-3);color:var(--ink-3);font-family:var(--mono);font-weight:600}
.ch-chev{align-self:center;color:var(--ink-3);transition:transform .26s}
.ch.open .ch-chev{transform:rotate(180deg)}
.ch-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.ch.open .ch-body{grid-template-rows:1fr}
.ch-body>div{overflow:hidden}
.ch-inner{padding:4px 17px 18px;border-top:1px solid var(--line-2)}

/* ---- drone (UAV) relevance markers ---- */
.ch.is-drone{box-shadow:inset 4px 0 0 var(--drone),var(--shadow-sm)}
.ch.is-drone:hover{box-shadow:inset 4px 0 0 var(--drone),var(--shadow);border-color:#e6b9b9}
.ch.is-drone-cond{box-shadow:inset 4px 0 0 var(--drone-2),var(--shadow-sm)}
.ch.is-drone-cond:hover{box-shadow:inset 4px 0 0 var(--drone-2),var(--shadow)}
.drone-flag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;color:#fff;
  background:var(--drone);padding:3px 10px 3px 8px;border-radius:var(--r-pill);letter-spacing:.01em;
  white-space:nowrap;margin:0 0 7px;line-height:1.5;box-shadow:0 1px 2px rgba(190,30,30,.25)}
.drone-flag svg{width:14px;height:14px;flex:0 0 auto}
.drone-flag .ap{opacity:.9;font-weight:700}
.drone-flag.high{background:var(--drone-d)}
.drone-flag.cond{background:#fff;color:var(--drone-d);border:1.5px solid var(--drone-2);box-shadow:none;font-weight:700}
.drone-note{display:flex;gap:9px;align-items:flex-start;background:var(--drone-wash);border:1px solid var(--drone-line);
  border-radius:11px;padding:10px 13px;margin:14px 0 2px;font-size:13.4px;color:#8a1c1c;line-height:1.58}
.drone-note svg{width:17px;height:17px;flex:0 0 auto;color:var(--drone);margin-top:1px}
.drone-note b{color:var(--drone-d)}
/* drone filter bar (always visible) */
.drone-bar{display:flex;align-items:center;gap:10px 13px;flex-wrap:wrap;margin:2px 0 16px;padding:11px 15px;
  background:var(--drone-wash);border:1px solid var(--drone-line);border-radius:13px}
.drone-bar .dlabel{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--drone-d);font-weight:800}
.drone-bar .dlabel svg{width:19px;height:19px;color:var(--drone);flex:0 0 auto}
.drone-bar .dhint{font-size:12.5px;color:#b56b6b;font-weight:500}
.drone-toggle{margin-left:auto;appearance:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  border:1.5px solid var(--drone);background:#fff;color:var(--drone-d);border-radius:var(--r-pill);
  padding:7px 15px;transition:.14s;display:inline-flex;align-items:center;gap:7px}
.drone-toggle svg{width:15px;height:15px;flex:0 0 auto}
.drone-toggle:hover{background:var(--drone-wash)}
.drone-toggle[aria-pressed="true"]{background:var(--drone);color:#fff;box-shadow:0 4px 12px -3px rgba(190,30,30,.5)}
.drone-toggle .n{font-weight:800;opacity:.85;margin-left:1px}
/* overview drone-focus panel */
.drone-focus{margin-top:24px;padding:18px 20px;border-radius:var(--r);box-shadow:var(--shadow-sm);
  border:1px solid var(--drone-line);border-left:4px solid var(--drone);background:linear-gradient(180deg,#fff,var(--drone-wash))}
.drone-focus .df-head{display:flex;gap:13px;align-items:flex-start}
.drone-focus .df-head>svg{width:30px;height:30px;color:var(--drone);flex:0 0 auto;margin-top:2px}
.drone-focus .df-head h3{font-size:16px;color:var(--drone-d)}
.drone-focus .df-head p{margin:5px 0 0;font-size:13.8px;color:var(--ink-2);line-height:1.6}
.df-stats{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0 4px}
.df-stat{flex:1 1 120px;background:#fff;border:1px solid var(--drone-line);border-radius:12px;padding:11px 14px}
.df-stat b{display:block;font-size:23px;font-weight:800;color:var(--drone-d);line-height:1.1}
.df-stat span{font-size:12px;color:var(--ink-2)}
.df-cta{margin-top:14px;appearance:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;
  border:0;background:var(--drone);color:#fff;border-radius:var(--r-pill);padding:10px 18px;
  display:inline-flex;align-items:center;gap:8px;transition:.14s;box-shadow:0 6px 16px -5px rgba(190,30,30,.55)}
.df-cta svg{width:16px;height:16px}
.df-cta:hover{background:var(--drone-d)}
.mx-drone{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--drone);margin:0 4px 1px 0;vertical-align:middle}

.callout{display:flex;gap:11px;align-items:flex-start;background:linear-gradient(180deg,#fdf6e6,#fbf2da);
  border:1px solid #f0e2b8;border-radius:13px;padding:12px 15px;margin:15px 0;font-size:14px;color:#5c4a17;line-height:1.6}
.callout .ic{flex:0 0 auto;color:var(--g9);margin-top:1px}
.callout b{color:#7a5d12}

.cb-grid{display:grid;grid-template-columns:1.18fr .82fr;gap:24px;margin-top:6px}
.tech-h4{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--brand-d);font-weight:700;
  margin:18px 0 7px;display:flex;align-items:center;gap:8px}
.tech-h4:first-child{margin-top:6px}
.tech-h4::before{content:"";width:3px;height:13px;background:var(--brand);border-radius:2px;flex:0 0 auto}
p.tx{margin:.2em 0 0;font-size:13.8px;color:var(--ink);line-height:1.62}
.params{font-family:var(--mono);font-size:11.8px;line-height:1.62;background:#141b2e;color:#d6deef;
  border-radius:11px;padding:12px 14px;margin-top:6px;white-space:pre-wrap;overflow-x:auto}
.equip-list{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.equip-item{display:flex;gap:9px;align-items:center;padding:8px 11px;border:1px solid var(--line);border-radius:10px;
  background:var(--surface-2);cursor:pointer;transition:.13s}
.equip-item:hover{border-color:var(--brand);background:#fff;box-shadow:var(--shadow-sm)}
.equip-item .tx2{min-width:0}
.equip-item .en{font-weight:600;font-size:13px}
.equip-item .zh{font-size:12px;color:var(--ink-2)}
.role{margin-left:auto;flex:0 0 auto;font-size:10px;font-weight:700;border-radius:6px;padding:2px 7px}
.role.equip{background:var(--g5w);color:#0b4fc0}
.role.fixture{background:var(--g8w);color:#0a7a55}
.role.consumable{background:#fbe4e8;color:#b23}
.figure{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:13px;margin-top:6px}
.figure svg{width:100%;height:auto;display:block}
.figcap{font-size:11.5px;color:var(--ink-3);text-align:center;margin-top:8px;line-height:1.45}
.pel-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.pel-item{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:8px 10px;border:1px solid var(--line);
  border-radius:9px;background:#fbfcfe}
.pel-item.link{cursor:pointer;transition:.13s}
.pel-item.link:hover{border-color:var(--brand);background:#fff;box-shadow:var(--shadow-sm)}
.pel-txt{flex:1 1 0;min-width:0;line-height:1.45}
.pel-txt .en{font-size:12.5px}
.pel-txt .zh{font-size:11.5px;color:var(--ink-2);display:block;margin-top:1px}
.goarrow{color:var(--brand-d);font-weight:700;font-size:11px;white-space:nowrap}
.note{font-size:12.5px;color:var(--ink-2);line-height:1.6;border-radius:10px;padding:10px 13px;margin-top:9px;background:var(--surface-2);border:1px solid var(--line)}
.note.bsmi{background:var(--teal-wash);border-color:#bce8e1;color:#0a5b54}
.note.qa{background:#f6f1fe;border-color:#e4d8fb;color:#5b3aa8}
.note b{color:inherit;font-weight:700}

/* ---- instruments ---- */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(284px,1fr));gap:14px}
.inst{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;position:relative;
  box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:.18s;scroll-margin-top:132px}
.inst:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:#d3dbea}
.inst.hl{box-shadow:0 0 0 3px var(--brand),var(--shadow);border-color:var(--brand)}
.inst .ih{display:flex;gap:11px;align-items:flex-start;padding-right:62px}
.inst .ic{width:40px;height:40px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;justify-content:center}
.inst .en{font-weight:700;font-size:14.5px;line-height:1.3}
.inst .zh{font-size:12.5px;color:var(--ink-2);margin-top:1px}
.inst .cat{display:inline-block;margin-top:8px;font-size:10.5px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px}
.inst .desc{font-size:13px;color:var(--ink);margin:11px 0 0;line-height:1.55}
.inst .brands{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:9px;line-height:1.5}
.inst .cchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:12px}
.cchip{font-family:var(--mono);font-size:10.5px;font-weight:600;border-radius:6px;padding:2px 7px;cursor:pointer;color:#fff;transition:.12s}
.cchip:hover{filter:brightness(1.08)}

/* ---- glossary ---- */
.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:clip;box-shadow:var(--shadow-sm)}
table.gloss{width:100%;border-collapse:collapse;font-size:13.5px}
table.gloss th,table.gloss td{text-align:left;padding:11px 15px;border-bottom:1px solid var(--line-2);vertical-align:top}
table.gloss th{background:var(--surface-2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);
  position:sticky;top:var(--appbar-h,64px);font-weight:700;white-space:nowrap}
table.gloss tr:last-child td{border-bottom:0}
table.gloss tr:hover td{background:var(--surface-2)}
table.gloss .en{font-weight:600}
table.gloss .zh{color:var(--ink-2)}
table.gloss td.cat span{font-size:10.5px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px;white-space:nowrap}

/* ---- matrix ---- */
.matrix-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);max-height:76vh;box-shadow:var(--shadow-sm)}
table.matrix{border-collapse:collapse;font-size:11.5px}
table.matrix th,table.matrix td{border:1px solid var(--line-2);padding:5px 7px;text-align:center}
table.matrix thead th{position:sticky;top:0;background:var(--surface-2);z-index:2;font-family:var(--mono);font-weight:600;white-space:nowrap}
table.matrix tbody th{position:sticky;left:0;background:var(--surface);z-index:1;text-align:left;font-weight:600;
  white-space:nowrap;max-width:230px;overflow:hidden;text-overflow:ellipsis}
table.matrix td.on{background:var(--brand)}
table.matrix td.on::after{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:#fff;vertical-align:middle}
/* sticky first column (instrument names) + corner */
table.matrix tbody th{position:sticky;left:0;z-index:1;background:var(--surface-2);text-align:left;white-space:nowrap;box-shadow:1px 0 0 var(--line)}
table.matrix thead th:first-child{left:0;z-index:3}
/* matrix scroll affordance */
.matrix-wrap{position:relative}
.matrix-wrap .edge{position:absolute;top:0;bottom:0;width:48px;pointer-events:none;z-index:4;display:flex;align-items:center;justify-content:center;transition:opacity .25s}
.matrix-wrap .edge.r{right:0;background:linear-gradient(270deg,var(--surface) 12%,transparent)}
.matrix-wrap .edge.l{left:0;background:linear-gradient(90deg,var(--surface) 12%,transparent);opacity:0}
.matrix-wrap .edge .chev{font-size:23px;color:var(--brand);font-weight:800;animation:mxpulse 1.25s ease-in-out infinite}
.matrix-wrap .edge.l .chev{animation-name:mxpulseL}
@keyframes mxpulse{0%,100%{opacity:.28;transform:translateX(-3px)}50%{opacity:1;transform:translateX(3px)}}
@keyframes mxpulseL{0%,100%{opacity:.28;transform:translateX(3px)}50%{opacity:1;transform:translateX(-3px)}}
.matrix-wrap.at-end .edge.r{opacity:0}
.matrix-wrap.scrolled .edge.l{opacity:1}
.mx-hint{font-size:12.5px;color:var(--brand-d);background:var(--brand-wash2);border:1px solid var(--brand-wash);border-radius:var(--r-pill);padding:7px 14px;display:inline-flex;align-items:center;gap:8px;margin:0 0 12px;font-weight:600}
.mx-fullbtn{flex:0 0 auto;appearance:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--surface);color:var(--brand-d);border-radius:var(--r-pill);padding:8px 15px;box-shadow:var(--shadow-sm);display:inline-flex;align-items:center;gap:7px;transition:.14s}
.mx-fullbtn:hover{border-color:var(--brand)}
.mx-close{position:fixed;top:12px;right:14px;z-index:151;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:22px;line-height:1;cursor:pointer;box-shadow:var(--shadow);display:none;align-items:center;justify-content:center}
.matrix-wrap.mx-full{position:fixed;inset:0;z-index:150;background:var(--bg);padding:54px 12px 12px;margin:0}
.matrix-wrap.mx-full .matrix-scroll{max-height:calc(100vh - 70px);height:calc(100vh - 70px)}
.matrix-wrap.mx-full .mx-close{display:flex}

/* ---- diagrams gallery ---- */
.dia-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:15px}
.dia-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow-sm);transition:.18s}
.dia-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.dia-card h3{font-size:14.5px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.dia-card h3 .en{font-weight:500;color:var(--ink-3);font-size:12px}
.dia-card .svgbox{background:var(--surface-2);border-radius:12px;padding:11px;margin-top:9px}
.dia-card p{font-size:12.5px;color:var(--ink-2);margin:10px 0 0;line-height:1.55}

/* ---- footer ---- */
footer{max-width:var(--maxw);margin:0 auto;padding:24px 22px 40px;color:var(--ink-3);font-size:12px;line-height:1.7}
.disc{background:#fff8e8;border:1px solid #f2e3b0;border-radius:13px;padding:13px 16px;margin-bottom:13px;color:#7a5c12;font-size:12.5px;line-height:1.65}
.empty{padding:46px;text-align:center;color:var(--ink-3)}
mark{background:#fff1a8;color:var(--ink);padding:0 2px;border-radius:3px}

/* ---- tooltip ---- */
[data-tip]{cursor:help}
.tipbubble{position:fixed;display:none;z-index:9999;pointer-events:none;
  background:rgba(12,14,20,.9);-webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);
  color:#fff;font-size:12.5px;font-weight:600;line-height:1.62;padding:10px 14px;border-radius:13px;max-width:290px;
  border:1px solid rgba(255,255,255,.22);box-shadow:0 16px 40px -10px rgba(8,12,28,.62),0 1px 0 rgba(255,255,255,.12) inset;
  letter-spacing:.004em;text-wrap:pretty;opacity:0;transform:translateY(5px) scale(.985);
  transition:opacity .15s ease,transform .15s ease}
.tipbubble.show{opacity:1;transform:none}
.tipbubble b{color:#c7cdff;font-weight:800}
.tipbubble::after{content:"";position:absolute;top:100%;left:var(--ax,50%);transform:translateX(-50%);
  border:7px solid transparent;border-top-color:rgba(12,14,20,.92)}
.tipbubble.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:rgba(12,14,20,.92)}

/* ---- diagram lightbox (click to enlarge) ---- */
#lightbox{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:5vh 5vw;
  background:rgba(16,20,38,.5);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px)}
#lightbox.show{display:flex;animation:lbfade .2s ease}
@keyframes lbfade{from{opacity:0}to{opacity:1}}
.lb-card{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-pop);max-width:90vw;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;position:relative;animation:lbpop .22s cubic-bezier(.2,.7,.3,1)}
@keyframes lbpop{from{transform:translateY(12px) scale(.97);opacity:.5}to{transform:none;opacity:1}}
.lb-head{padding:16px 54px 13px 20px;font-size:15.5px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.lb-head .en{color:var(--ink-3);font-size:12.5px;font-weight:500}
.lb-body{padding:18px 22px;overflow:auto;display:flex;align-items:center;justify-content:center;background:var(--surface-2);flex:1;min-height:0}
.lb-body img,.lb-body svg{max-width:100%!important;max-height:64vh!important;width:auto!important;height:auto!important;aspect-ratio:auto!important;object-fit:contain;display:block;border-radius:10px;box-shadow:var(--shadow-sm)}
.lb-cap{padding:13px 20px 17px;font-size:13.5px;color:var(--ink-2);line-height:1.62;border-top:1px solid var(--line)}
.lb-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:21px;line-height:1;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;transition:.13s}
.lb-x:hover{background:var(--surface-3);color:var(--ink)}
.dia-card{cursor:zoom-in}
.dia-card .svgbox{position:relative}
.dia-card .svgbox::after{content:"點擊放大";position:absolute;top:8px;right:8px;background:rgba(27,36,53,.62);color:#fff;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:8px;opacity:0;transition:opacity .15s;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);pointer-events:none}
.dia-card:hover .svgbox::after{opacity:1}

/* ---- mobile bottom nav ---- */
.botnav{display:none}
.filter-sheet,.sheet-backdrop{display:none}

/* ===========================================================
   RESPONSIVE — tablet
   =========================================================== */
@media (max-width:1024px){
  .cb-grid{grid-template-columns:1fr 1fr}
  .hero{padding:26px 26px}
}
@media (max-width:820px){
  .cb-grid{grid-template-columns:1fr;gap:14px}
  /* matrix: let the instrument-name column wrap so clause columns get more visible room */
  table.matrix tbody th{white-space:normal;max-width:150px;min-width:92px;line-height:1.32;overflow-wrap:break-word}
  table.matrix th,table.matrix td{padding:5px 7px}
  table.matrix thead th{font-size:10.5px}
}

/* ===========================================================
   RESPONSIVE — phone : dedicated layout
   =========================================================== */
@media (max-width:640px){
  body{font-size:15.5px}
  .appbar-in{padding:9px 15px;gap:12px}
  .brand .bs{display:none}
  .brand .logo{width:35px;height:35px}
  .brand .bt{font-size:14.5px}
  .brand .bt-tail{display:none}
  .search{flex-basis:140px}
  .search input{font-size:13px}
  /* desktop tabs -> hidden, replaced by bottom nav */
  .tabs{display:none}
  main{padding:16px 15px 96px}
  table.matrix tbody th{max-width:130px;font-size:11px}
  .matrix-wrap.mx-full{padding:50px 8px 8px}
  .hero{border-radius:18px;padding:22px 20px}
  .hero-drone{width:290px;right:-40px;bottom:-54px}
  .kpis{gap:9px}
  .kpi{flex:1 1 calc(50% - 9px);min-width:0;padding:11px 13px}
  .kpi b{font-size:23px}
  .es-grid{grid-template-columns:1fr 1fr;gap:10px}
  .es-card{padding:13px 13px}
  .cards{grid-template-columns:1fr}
  .inst-grid{grid-template-columns:1fr}
  .section-head h2{font-size:18px}
  /* filter: inline bar hidden, drawer trigger shown */
  .filterbar{display:none}
  .filter-trigger{display:flex;align-items:center;gap:9px;width:100%;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r-pill);
    padding:11px 17px;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);
    box-shadow:var(--shadow-sm);margin-bottom:15px;position:sticky;top:var(--appbar-h,60px);z-index:30}
  .filter-trigger .lab{color:var(--ink-2);font-weight:500}
  .filter-trigger .cur{color:var(--brand-d)}
  .filter-trigger svg{margin-left:auto;color:var(--ink-3)}
  .ch-head{grid-template-columns:auto 1fr;gap:11px;padding:14px 14px}
  .ch-chev{grid-column:1/-1;justify-self:center;margin-top:2px}
  .ch-badge{min-width:52px;font-size:11.5px}
  .ch-lede{font-size:14.5px}
  .ch-inner{padding:6px 14px 16px}

  /* bottom navigation */
  .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:70;
    background:rgba(255,255,255,.92);backdrop-filter:saturate(170%) blur(16px);-webkit-backdrop-filter:saturate(170%) blur(16px);
    border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
  .botnav button{appearance:none;border:0;background:none;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:11px;
    color:var(--ink-3);flex:1 1 0;min-width:0;transition:.14s}
  .botnav button .lab{font-size:10px;font-weight:600;letter-spacing:-.01em}
  .botnav button.active{color:var(--brand)}
  .botnav button.active .ico{transform:translateY(-1px)}
  .botnav button .ico{transition:transform .16s}

  /* filter drawer (bottom sheet) */
  .sheet-backdrop{display:block;position:fixed;inset:0;z-index:80;background:rgba(20,24,40,.42);
    opacity:0;visibility:hidden;transition:.22s}
  .sheet-backdrop.show{opacity:1;visibility:visible}
  .filter-sheet{display:block;position:fixed;left:0;right:0;bottom:0;z-index:81;background:var(--surface);
    border-radius:22px 22px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -16px 40px -12px rgba(20,24,60,.35);transform:translateY(102%);transition:transform .28s cubic-bezier(.22,.61,.36,1);
    max-height:74vh;overflow-y:auto}
  .filter-sheet.show{transform:none}
  .filter-sheet .grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 14px}
  .filter-sheet h4{font-size:14px;margin-bottom:13px}
  .sheet-chips{display:flex;flex-direction:column;gap:8px}
  .sheet-chips .chip{width:100%;text-align:left;display:flex;align-items:center;padding:12px 16px;font-size:14.5px}
  .sheet-chips .chip .n{margin-left:auto}
}
@media (max-width:380px){
  .es-grid{grid-template-columns:1fr}
  .kpi{flex-basis:calc(50% - 9px)}
  .botnav button .lab{font-size:9px}
}

/* ---- diagram svg helpers + shared animation block ---- */
.svgbox svg,.figure svg{font-family:var(--sans)}
.s-label{font-size:9.5px;fill:var(--ink-soft)}
.s-label-b{font-size:10px;fill:var(--ink);font-weight:700}
.s-dim{stroke:var(--ink-soft);stroke-width:.8;fill:none}
.s-part{fill:#cdd8e4;stroke:#7d8db9}

/* ---- diagram animation primitives ---- */
.anim-press{animation:press 2.2s ease-in-out infinite}
@keyframes press{0%,100%{transform:translateY(0)}45%{transform:translateY(7px)}}
.anim-heat{transform-origin:center;animation:heat 1.6s ease-in-out infinite}
@keyframes heat{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:.9;transform:translateY(-7px)}}
.anim-glow{animation:glow 1.4s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.55;filter:none}50%{opacity:1}}
.anim-flame{transform-origin:bottom center;animation:flame .5s ease-in-out infinite alternate}
@keyframes flame{0%{transform:scaleY(1) scaleX(1) skewX(0deg)}100%{transform:scaleY(1.12) scaleX(.92) skewX(4deg)}}
.anim-spark{animation:spark 1.1s steps(2,end) infinite}
@keyframes spark{0%,70%{opacity:0}72%,84%{opacity:1}}
.anim-trace{stroke-dasharray:4 5;animation:trace 3s linear infinite}
@keyframes trace{to{stroke-dashoffset:-90}}
.anim-tilt{transform-origin:50% 92%;animation:tilt 4s ease-in-out infinite}
@keyframes tilt{0%,12%{transform:rotate(0deg)}45%,62%{transform:rotate(-10deg)}100%{transform:rotate(0deg)}}
.anim-rise{animation:rise 2.6s ease-in infinite}
@keyframes rise{0%{opacity:0;transform:translateY(6px)}30%{opacity:.85}100%{opacity:0;transform:translateY(-20px)}}
.anim-drop{animation:drop 2.4s cubic-bezier(.5,0,.9,.4) infinite}

<script>const DATA = {"meta": {"title": "無人機安規測試 儀器×章節對照 (CNS 15598-1 / IEC 62368-1)", "source": "台中標準檢驗局之無人機大樓設備清單_all-0609_V1.xlsx（工作表：無人機安規試驗儀器）＋ IECEE CTL P.E.L. IEC 62368-1:2023（第4版）", "generated": "2026-06-09；2026-06-13 T 輪教材化（學習層＋事實複核）", "disclaimer": "本頁為內部研究／教育用途之整理。章節碼、測試參數與設備對應已對照 <b>CNS 15598-1:2020</b>（＝IEC 62368-1:2018 第3版）標準正文與官方 <b>IECEE CTL P.E.L.</b> 逐項核實，前瞻內容並參照 <b>IEC 62368-1:2023</b>（第4版）。符合性仍以最新版 <b>CNS 15598-1 / IEC 62368-1</b> 標準正文、<b>IECEE CTL EQL（OD-5003）</b> 與 <b>BSMI／NCC</b> 公告為最終依據。各儀器之<b>「廠牌／型號」係參照台中 BSMI 無人機驗證實驗室之設備建置清單</b>（實務參考），<b>非 IECEE 官方指定機型</b>；官方僅以 PEL 設備代碼規範應備設備類型，不指定品牌。"}, "overview": {"hero_title": "無人機安規測試 · CNS 15598-1 (IEC 62368-1) 儀器與章節完整對照", "hero_lead": "把無人機要通過的 48 項安全測試一次講清楚：每一項用一句話講「在防什麼」，再附做法、需要的儀器與測項示意圖。可從「章節」看每項測試，或從「儀器」看每台設備用在哪。", "standard_note": "<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">對應</span><span><b>CNS 15598-1:2020（109年版）＝ IEC 62368-1:2018（第3版），等同採用 IDT</b>。標題「影音資訊及通信技術設備—第1部：安全要求」</span></span><span class=\"s-row\"><span class=\"s-k kw\">強制</span><span>自 2024-01-01 起；取代 CNS 14336-1（＝60950-1）與 CNS 14408（＝60065）</span></span><span class=\"s-row\"><span class=\"s-k kw\">版本</span><span>Ed.2 2014 ／ <b>Ed.3 2018＝現行 CNS</b> ／ Ed.4 2023</span></span><span class=\"s-row\"><span class=\"s-k kw\">TRF</span><span>Ed.3＝IEC62368_1E；Ed.4＝IEC62368_1F（OD-2020 管理）</span></span><span class=\"s-row\"><span class=\"s-k kw\">設備依據</span><span>IECEE CTL P.E.L./EQL（OD-5003）＋規範性附錄（D 產生器、C UV、S 耐燃、T 機械、Y 戶外）；精度見 CTL 251B／OD-5014</span></span><span class=\"s-row\"><span class=\"s-k kw\">CB 採認</span><span>Ed.3 CB 報告可直接採用；Ed.2 需 2→3 版差異評估；IEC 60950-1（CNS 14336-1）報告不可轉用</span></span></span><span class=\"s-note\">本頁「官方 PEL 要求器具」採 <b>Ed.4（2023，TRF IEC62368_1F）</b>原文逐條對照（前瞻基準）；法規符合性以 <b>Ed.3（2018）</b>為據。</span>", "energy_classes": [{"code": "ES", "zh": "電 · 觸電", "color": "#2f6bdb", "desc": "碰到會被電到的危險。電壓越高越危險；最危險的那一級，必須用外殼或絕緣把它包好、不讓人摸到。", "tech": "對應第 5 章。依電壓/電流分 ES1／ES2／ES3：ES1 ≤30 Vrms／60 Vdc 一般人可直接接觸，ES2 需指示，ES3 危險須隔離。"}, {"code": "PS", "zh": "電 · 起火", "color": "#e9692b", "desc": "電路功率越大，零件過熱時越可能把旁邊的塑膠點燃。功率大的就得用防火外殼擋住火。", "tech": "對應第 6 章。依電路可輸出之最大功率分 PS1 ≤15 W、PS2 ≤100 W、PS3 >100 W，決定防火外殼需求。"}, {"code": "MS", "zh": "機械傷害", "color": "#16a06b", "desc": "會打到、夾到、割到或壓到人的危險，例如旋轉的螺旋槳、銳利邊角、會倒下來的機身。", "tech": "對應第 8 章。銳邊、運動/旋轉件、傾倒、高壓件等機械傷害，分 MS1／MS2／MS3。"}, {"code": "TS", "zh": "高溫 · 燙傷", "color": "#cf8a1a", "desc": "摸到會燙傷的高溫表面。依溫度高低、材質與接觸時間判斷危不危險。", "tech": "對應第 9 章。依接觸溫度、材質與接觸時間分 TS1／TS2／TS3。"}, {"code": "RS", "zh": "光 · 聲 · 射線", "color": "#8b5cf6", "desc": "光、聲音、射線造成的危險，例如雷射或強光 LED、過大的音量。", "tech": "對應第 10 章。雷射/LED 光輻射、聲壓、X 射線等，分 RS1／RS2／RS3（雷射對應 IEC 60825-1）。"}], "cards": [{"t": "HBSE 三方塊模型", "d": "<span class=\"s-intro\">IEC 62368-1 以「以危害為基礎的安全工程（HBSE）」為核心：</span><span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">三方塊</span><span>能量源 → 傳遞路徑 → 人體／可燃物（用<b>安全防護</b>切斷路徑）</span></span><span class=\"s-row\"><span class=\"s-k kw\">設計流程</span><span>找能量源 → 分級 → 設防護 → 驗證</span></span><span class=\"s-row\"><span class=\"s-k kw\">合格門檻</span><span>正常、異常、單一故障下，人接觸之能量都降到 <b>Class 1</b>（安全）</span></span></span>"}, {"t": "為何從 60950/60065 改為 62368-1", "d": "<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">舊標準</span><span>IEC 60950-1（IT 資訊設備）＋ IEC 60065（AV 影音設備）：依產品型態條列規定</span></span><span class=\"s-row\"><span class=\"s-k kw\">新標準</span><span>IEC 62368-1：以能量與危害為核心（HBSE）</span></span><span class=\"s-row\"><span class=\"s-k kw\">好處</span><span>涵蓋整合型新產品（無人機控制器/充電器/通訊模組），不必為每種新形態重寫規定</span></span></span>"}, {"t": "如何閱讀本頁", "d": "<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">依章節</span><span>每條文的目的、做法、參數、所需儀器與示意圖</span></span><span class=\"s-row\"><span class=\"s-k kw\">依儀器</span><span>每件儀器的中英名稱、用途說明、用在哪些章節</span></span><span class=\"s-row\"><span class=\"s-k kw\">對照矩陣</span><span>章節 × 儀器一覽</span></span><span class=\"s-row\"><span class=\"s-k kw\">測項示意圖</span><span>圖解每項測試的原理與配置</span></span></span><span class=\"s-note\">上方搜尋框可跨章節／儀器即時搜尋。</span>"}, {"t": "IECEE CB 與 BSMI 驗證路徑", "d": "<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">CB 流程</span><span>CBTL 依 IECEE 02 測試 → CB 報告（官方 TRF）＋ CB 證書 → 成員國相互承認</span></span><span class=\"s-row\"><span class=\"s-k kw\">BSMI 路徑</span><span>商品檢驗：型式認可＋逐批/監視查驗，或符合性聲明（DoC）/商品驗證登錄（RPC）</span></span><span class=\"s-row\"><span class=\"s-k kw\">無人機分工</span><span>無線電模組 → NCC 型式認可；主機/充電/資訊設備安全 → BSMI 依 CNS 15598-1（安全）＋ CNS 15936（CISPR 32，EMC）</span></span></span>"}, {"t": "無人機（戶外設備）適用重點", "d": "<span class=\"s-intro\">無人機多為戶外使用，除一般章節外特別涉及：</span><span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k\">附錄 Y</span><span>戶外外殼構造：耐 UV、鹽霧/SO₂ 腐蝕、墊片拉伸/壓縮/耐油</span></span><span class=\"s-row\"><span class=\"s-k\">4.1.4</span><span>戶外環境溫度（預設 −33°C～+40°C）</span></span><span class=\"s-row\"><span class=\"s-k\">5.4.5.2</span><span>天線端子突波</span></span><span class=\"s-row\"><span class=\"s-k\">9.6.3</span><span>無線充電異物加熱</span></span><span class=\"s-row\"><span class=\"s-k\">附錄 M</span><span>電池相關</span></span></span>"}, {"t": "官方所需設備清單來源（已對照）", "d": "<span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k kw\">使用儀器</span><span>＝ 實驗室實際清單（無人機安規試驗儀器）</span></span><span class=\"s-row\"><span class=\"s-k kw\">官方 PEL</span><span>＝ IECEE CTL P.E.L. 官方應備設備（含 R/S 代碼）</span></span><span class=\"s-row\"><span class=\"s-k kw\">權威依據</span><span>IECEE CTL EQL（OD-5003）＋標準規範性附錄（尤其附錄 D 試驗產生器）</span></span></span><span class=\"s-note\">兩欄並陳，一眼看出覆蓋與差異。</span>"}, {"t": "PEL 設備代碼說明（R / S）", "d": "<span class=\"codelist\"><span class=\"coderow\"><span class=\"pel-code req\">R</span><span><b>須由實驗室自備</b> Required</span></span><span class=\"coderow\"><span class=\"pel-code req\">RB</span><span>基本必備 Required Basic（所有設備皆需）</span></span><span class=\"coderow\"><span class=\"pel-code req\">RA</span><span>含音訊放大器須備（audio power &gt; 0.5 W）</span></span><span class=\"coderow\"><span class=\"pel-code req\">RC</span><span>有線分配系統須備</span></span><span class=\"coderow\"><span class=\"pel-code req\">ROUT</span><span>戶外設備須備</span></span><span class=\"coderow\"><span class=\"pel-code req\">RSH</span><span>碎紙機須備</span></span><span class=\"coderow\"><span class=\"pel-code req\">RT</span><span>電信連接須備</span></span><span class=\"coderow\"><span class=\"pel-code req\">RV</span><span>影像 / CRT 設備須備</span></span><span class=\"coderow\"><span class=\"pel-code req\">RWPT</span><span>無線充電發射器須備</span></span><span class=\"coderow\"><span class=\"pel-code sub\">S</span><span>可外包 Subcontract（見 OD-2012）</span></span><span class=\"coderow\"><span class=\"pel-code sub\">SP</span><span>特殊測試設施 Specialized</span></span><span class=\"coderow\"><span class=\"pel-code sub\">W</span><span>可於他實驗室見證 Witness</span></span><span class=\"coderow\"><span class=\"pel-code sub\">3PPS</span><span>需三相電源 Three-phase supply</span></span></span><span class=\"codenote\">代碼僅表「是否須自建」，不代表設備已合格——仍須評估校正、不確定度與文件。</span>"}, {"t": "與官方 PEL 對照：清單未明列（建議確認）", "d": "<span class=\"s-intro\">PEL 列為必備(R*)或常見、而清單未明列者（部分屬 S 可外包）：</span><span class=\"s-list\"><span class=\"s-row\"><span class=\"s-k\">5.4.1.4</span><span>繞組電阻計（2/4 線）、高壓電壓探棒</span></span><span class=\"s-row\"><span class=\"s-k\">5.4.2</span><span>顯微鏡</span></span><span class=\"s-row\"><span class=\"s-k\">5.4.10</span><span>鈍頭探棒 Figure V.3</span></span><span class=\"s-row\"><span class=\"s-k\">5.8</span><span>電池備援回送 back-feed 高阻抗量測（無人機電池相關）</span></span><span class=\"s-row\"><span class=\"s-k\">8.9</span><span>輪/腳輪 20 N ＋碼錶</span></span><span class=\"s-row\"><span class=\"s-k\">8.12</span><span>伸縮/桿狀天線 0.6 N·m 扭力試具（無人機天線相關）</span></span><span class=\"s-row\"><span class=\"s-k\">附錄 H</span><span>5000 Ω 電信振鈴電阻</span></span><span class=\"s-row\"><span class=\"s-k\">V.1.6</span><span>端子探棒 ＋ 1 N</span></span></span>"}], "drone_focus": {"summary": "一套無人機在 CNS 15598-1（≡IEC 62368-1）下不是「一台」而是「四件」分開判級：機體、機載 LiPo、充電器、遙控器。關鍵分流是機體屬 Class III/SELV、不碰市電也無保護接地，所以起火（PS3 大電池＋大馬達）與機械（MS3 高速螺旋槳）落在機體，而空間/沿面距離、耐電壓、接觸/洩漏電流等市電隔離類全部落在接市電的充電器一次側。", "core": 8, "high": 13, "conditional": 22, "na": 5}, "intro_plain": "無人機要在台灣上市販售，得先通過 CNS 15598-1（等同國際標準 IEC 62368-1）這套電氣安全測試。本頁把實驗室的測試項目、需要哪些儀器，整理成一眼就能查的對照表。"}, "clauses": [{"id": "4.1.4", "clauses": ["4.1.4"], "group": "4", "title_en": "Specified conditions for transportable, direct plug-in, hand-held and outdoor equipment (the TRF line item is 'Specified ambient temperature for outdoor use (deg C)')", "title_zh": "設備安裝（戶外設備之溫度條件 −33～+40°C 與附錄 Y 要求載於本條）", "purpose_zh": "這一條在問一件事：這台設備是不是會被拿到戶外（風吹日曬雨淋、酷暑寒冬）使用？無人機/遙控器、戶外充電器很容易遇到。如果是戶外用，外殼與內部就必須在製造商宣告的最低到最高溫度範圍內仍維持安全（不會龜裂、不會進水、絕緣不會失效）。對無人機特別重要，因為飛行環境溫差大、又會淋到露水或細雨。換句話說，先把『會在什麼環境用』講清楚，後面所有安全試驗才知道要在多冷多熱、多潮濕的條件下做。", "analogy_zh": "就像買冬天外套要先看吊牌寫『耐寒到攝氏幾度』——廠商先承諾這件衣服能撐到多冷多熱，店員（試驗室）再把它放進那個溫度去驗證真的撐得住，而不是只在室溫試穿一下就說沒問題。", "procedure_zh": "本身主要以『檢查＋審查製造商資料』判定：確認製造商有無宣告戶外用途及操作溫度範圍。若宣告戶外用，除依其宣告之最低/最高溫度設定後續各項試驗的環境條件外，戶外外殼還須符合 Annex Y（抗紫外線、抗腐蝕、防塵防水等）。實務上試驗室會把樣品放進步入式恆溫恆濕室（walk-in chamber），由腔體自身製冷系統達到宣告之低溫/高溫（循環式冷卻機為腔體製冷系統之排熱/冷凝循環配套，工作水溫約 +13～+25°C，非低溫源），再供電讓設備運轉，作為各能量源試驗前的環境設定／預處理。", "params": "Default outdoor operating ambient (unless manufacturer specifies otherwise): minimum -33 deg C up to maximum +40 deg C. If declared, the manufacturer's own min/max temperatures govern. Outdoor socket-outlet circuits require an RCD with rated residual operating current <= 30 mA - per CNS 5.5.9 (PDF p.104), not 4.1.4 itself. Note: 4.1.4 itself sets the conditions/temperatures; the actual heating/electric-strength/etc. tests are then run at these limits per their own clauses.", "standard_equipment": ["Test chamber: minimum range of –33°C to +40°C."], "iec_bsmi": "Largely harmonised. CNS 15598-1:2020 corresponds to IEC 62368-1:2018 (Ed.3.0); the formal outdoor-enclosure Annex Y and the -33 deg C default were strengthened in IEC 62368-1:2023 (Ed.4.0), so the exact wording/scope of 4.1.4 differs by edition - confirm which edition BSMI currently enforces. Caution: the lab's '預處理/環境調節' label overlaps conceptually with humidity conditioning at 5.4.8 (e.g. 40 deg C / 93% RH for ~120 h before the electric-strength test); 4.1.4 is specifically about declared outdoor temperature limits, not the insulation-conditioning soak. Verify the exact CNS clause title against the official CNS 15598-1 text (cnsonline.com.tw).", "location": "1F", "utils": ["需排水", "需用水"], "equipment": [{"en": "Walk-in environmental chamber", "zh": "步入式環境試驗室", "role": "equip", "instId": "walkin-chamber"}, {"en": "Regenerative AC/DC power source", "zh": "可程式交直流電源供應器", "role": "equip", "instId": "ac-dc-source"}, {"en": "Circulation chiller", "zh": "循環式冷卻機", "role": "equip", "instId": "chiller"}], "diagram": "", "qa": "", "pel": [{"equip": "Test chamber: minimum range of –33°C to +40°C.", "code": "ROUT", "test": "Equipment Installation (Outdoor), Conditioning", "zh": "環境試驗箱 −33~+40°C", "instId": "walkin-chamber"}], "match": {"level": "warn", "note": "部分符合"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "僅製造商宣告戶外使用時觸發，設定 −33~+40°C 為各試驗前提；多數空拍機/戶外站適用，室內專用機 N/A"}, "gist_zh": "先界定這台會在多冷多熱、多潮濕的戶外用，作為後續所有測試的條件基準。", "learn": {"obj": ["能說出未宣告時戶外預設環境溫度為 -33～+40°C，製造商宣告值優先。", "能判斷本條僅於製造商宣告戶外使用時觸發，先以審查資料判定。", "能說出宣告戶外用之外殼須符合附錄 Y（抗 UV、防塵防水等）。", "能解釋 4.1.4 只設定條件基準，各項試驗依其本身條文於此條件執行。"], "pit": [{"t": "誤解：4.1.4 的條文標題是『供戶外使用設備之規定條件』。正解：標題實為『設備安裝』，戶外溫度與附錄 Y 要求屬其內文（Ed.3/Ed.4 皆然）。", "src": "查證記錄 D-01、G-1"}, {"t": "誤解：戶外插座 30 mA RCD 要求規定於 4.1.4。正解：該要求位於 5.5.9（CNS p.104），4.1.4 僅界定戶外環境條件。", "src": "查證記錄 D-03、G-3"}], "quiz": [{"q": "若製造商未另行宣告，戶外設備之預設操作環境溫度範圍為何？", "a": "-33°C 至 +40°C；若有宣告，以製造商宣告之最低/最高溫度為準。", "src": "params"}, {"q": "戶外插座迴路的 30 mA RCD 要求是規定在 4.1.4 嗎？", "a": "不是；該要求屬 5.5.9（CNS p.104），4.1.4 本身只設定環境溫度條件。", "src": "CNS p.104"}, {"q": "僅限室內飛行的無人機，需依 4.1.4 設定戶外溫度條件嗎？", "a": "不需要；本條以製造商宣告戶外用途為前提，室內專用機不適用。", "src": "params"}]}}, {"id": "4.7", "clauses": ["4.7"], "group": "4", "title_en": "Equipment for direct insertion into mains socket-outlets (4.7.1 General; 4.7.2 Requirements / mains plug part; 4.7.3 Compliance criteria / torque test)", "title_zh": "供直接插入主電源插座之設備（4.7.1 一般；4.7.2 要求／主電源插頭部分；4.7.3 符合性判定／轉矩試驗）", "purpose_zh": "有些設備（像免線材的充電器、轉接頭，無人機常配的『直插式』變壓器）插頭直接長在機身上，整台靠插頭掛在牆上插座。這條要確認兩件事：一是插頭刀片（金屬腳）尺寸合乎當地插座規格、插得穩；二是這台設備的重量與外型不會對插座產生過大的『扭力』而把插座弄鬆、弄裂或讓刀片接觸不良。插座一旦被撐鬆，可能造成接觸不良發熱起火、或刀片外露觸電。簡單說：別讓一個又大又重的插頭把牆上插座給拗壞了。", "analogy_zh": "像掛在牆上掛鉤的相框——掛鉤（插座）能承受的重量與翹起角度有限，如果相框又大又重、還往外翹，掛鉤就會被拗鬆甚至崩掉。這個試驗就是在量『相框會不會把掛鉤拗壞』。", "procedure_zh": "4.7.2：以量規/比對檢查整體成型插頭刀片（pin/blade）的尺寸與構造是否符合當地插頭標準（如 CNS、IEC 60884-1、NEMA WD6 等）。4.7.3：把樣品插入符合規格的試驗插座（固定於專用插頭轉矩試驗機 Plug Torque Tester 的標準插座座上），以天平臂（balance arm）加掛砝碼方式對設備施加並量測其作用於插座的轉矩，讀取砝碼讀數×力臂得到轉矩值，與標準限值比較；插座配置須能承受該轉矩而插頭仍維持正常嚙合。", "params": "Output is the torque (Nm) the EUT exerts on the socket-outlet, measured via weight x lever arm and compared against the standard's stated limit; the device must remain in normal engagement. Reference plug-standard torque procedure: IEC 60884-1:2022 cl.14.23.2. (Real CB-report measured results are typically very low, e.g. ~0.03-0.05 Nm.) CNS 4.7.3 (PDF p.52): additional torque on the socket-outlet must not exceed 0.25 Nm; support axis 8 mm behind the engagement face; torque keeping the socket face vertical excluded.；臺灣本地插頭標準＝CNS 690 系列（CNS 15598-1 引用標準清單 p.20；正文 p.28「使用非工業用型式的插頭與插座(CNS 690)」）。", "standard_equipment": ["Test equipment (see Fig. 11 of IEC 60065)"], "iec_bsmi": "Harmonised in method (CNS 15598-1 = IEC 62368-1). The substantive national difference is WHICH plug standard the blade/pin must meet: for Taiwan/BSMI the integral plug must comply with the Taiwan/CNS plug-pin configuration (CNS 690 family) rather than EU/UK/US - so 4.7.2 dimensional compliance is country-specific even though the 4.7.3 torque method is identical.", "location": "安規測試區", "utils": [], "equipment": [{"en": "Mains-plug pin torque tester", "zh": "插頭刃片轉矩試驗機", "role": "equip", "instId": "plug-torque"}], "diagram": "plugtorque", "qa": "", "pel": [{"equip": "Test equipment (see Fig. 11 of IEC 60065)", "code": "RB", "test": "Equipment for direct insertion in to mains socket-outlets", "zh": "插頭量測試具 (IEC 60065 圖11)", "instId": "plug-torque"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "charger", "why_zh": "僅充電器為直插式變壓器(插頭長在機身)才測轉矩;分離線材式或機體本身 N/A"}, "gist_zh": "整台靠插頭掛在插座上的設備，重量與扭力不能把牆上插座撐鬆、發熱或讓刀片外露觸電。", "learn": {"obj": ["能說出 4.7.3 附加轉矩限值 0.25 Nm，支撐軸在嚙合面後 8 mm。", "能解釋轉矩以砝碼×力臂量測，插頭並須維持正常嚙合。", "能判斷僅插頭直接成型於機身之直插式設備適用，分離線材式不適用。", "能說出 4.7.2 刀片尺寸須符合當地插頭標準，臺灣為 CNS 690 系列。"], "pit": [{"t": "誤解：62368-1 未明定直插式設備之轉矩限值，須另查其他來源。正解：CNS 4.7.3（p.52）明定附加轉矩不得超過 0.25 Nm，Ed.4 同值。", "src": "查證記錄 D-02、G-2"}], "quiz": [{"q": "直插式設備施加於插座之附加轉矩限值為何？", "a": "不得超過 0.25 Nm（4.7.3）；支撐軸位於嚙合面後方 8 mm 處。", "src": "CNS p.52"}, {"q": "使插座面保持垂直所需之轉矩，要計入 0.25 Nm 限值嗎？", "a": "不計入；此轉矩明文排除，僅評估設備產生之附加轉矩。", "src": "CNS p.52"}, {"q": "無人機隨附充電器何時須做 4.7 轉矩試驗？", "a": "僅當充電器為插頭直接長在機身之直插式設計；分離線材式或機體本身不適用。", "src": "params"}]}}, {"id": "4.8.4.3", "clauses": ["4.8.4.3"], "group": "4", "title_en": "Battery replacement test (within 4.8.4 Battery compartment mechanical tests; parent 4.8 Equipment containing coin / button cell batteries)", "title_zh": "電池更換試驗（屬 4.8.4 電池室機械試驗；上層 4.8 含鈕扣型／硬幣型電池之設備）", "purpose_zh": "鈕扣電池（像無人機遙控器、小搖控裡那種銀色圓鈕電池）若被幼兒吞下，會在食道灼傷甚至致命。這條模擬『使用者反覆更換電池』後，電池室的蓋子或門是否還能牢牢關緊、不會因為開關久了就鬆脫。重點是：電池蓋被開開關關很多次以後，仍要能扣得緊，讓小孩沒辦法輕易打開把電池摳出來。", "analogy_zh": "像藥罐的兒童安全蓋——你天天開關它好幾次，用了一陣子之後那個『卡榫』還是要一樣緊，不能用久了就鬆掉變成小孩一撥就開。這個試驗就是模擬『開關很多次』之後扣具還牢不牢。", "procedure_zh": "對電池室門/蓋執行『打開→取出電池→放回電池→關上』的完整循環共 10 次，模擬使用者實際更換電池的操作磨耗。此為 4.8.4 機械試驗序列的一環（與應力釋放 4.8.4.2、掉落 4.8.4.4、衝擊 4.8.4.5、碾壓 4.8.4.6 接續進行）。完成後依 4.8.5 以約 30 N 試驗探棒及約 20 N 試驗鉤檢查電池是否仍無法被取出／觸及。轉矩計（torque gauge）用於量測需以工具開啟之蓋具所需的開啟轉矩（依 4.8.3 須至少 0.5 Nm 並旋轉至少 90 度才打得開）；若蓋以螺釘緊固，試驗中轉鬆後須依表 37 之轉矩重新鎖緊。『用手以至少 2 個獨立且同時動作開啟』的鎖固設計則以實際操作檢查。", "params": "Replacement cycling: open/remove/replace/close x 10 cycles. Post-test compliance (4.8.5): apply 30 N +/- 1 N for 10 s with the straight unjointed Figure V.1 probe at the most unfavourable place/direction; door/cover must remain functional and EITHER the battery must not become accessible OR it must not be possible to extract the cell with the Figure 20 test hook using approx. 20 N.", "standard_equipment": ["30 N ± 1N applied by rigid test finger (Figure V.1); test hook (Figure 20) using a force of approximately 20 N; calliper; timer", "Crush Test (330 N ± 5N); flat surface measuring 100 mm by 250 mm; timer", "Torque gauges (0,5Nm), angle meter"], "iec_bsmi": "Harmonised method (CNS 15598-1 follows IEC 62368-1). Coin/button-cell safety was significantly strengthened in IEC 62368-1:2023 (Ed.4.0), aligning with UL 4200A; if CNS 15598-1 is still pinned to the 2018/Ed.3.0 base, the exact set/structure of 4.8.4 sub-tests may differ slightly from Ed.4.0 - verify the edition BSMI enforces. No Taiwan-specific deviation known beyond edition timing.", "location": "安規測試區", "utils": [], "equipment": [{"en": "Torque gauge / driver", "zh": "扭力計／扭力起子", "role": "equip", "instId": "torque-gauge"}], "diagram": "", "qa": "", "pel": [{"equip": "Rigid test finger 30 N ± 1 N (Figure V.1)", "code": "RB", "test": "Coin/button cell batteries", "zh": "剛性試指 30 N±1 N（圖 V.1）", "instId": "steady-force-finger"}, {"equip": "Test hook (Figure 20), force ≈ 20 N", "code": "RB", "test": "Coin/button cell batteries", "zh": "試驗鉤（圖 20，約 20 N）", "instId": "test-hook"}, {"equip": "Calliper", "code": "RB", "test": "Coin/button cell batteries", "zh": "游標卡尺", "instId": "calliper"}, {"equip": "Timer", "code": "RB", "test": "Coin/button cell batteries", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Crush test force 330 N ± 5 N", "code": "RB", "test": "Coin/button cell batteries", "zh": "碾壓力 330 N±5 N", "instId": "weights"}, {"equip": "Flat plate 100 mm × 250 mm", "code": "RB", "test": "Coin/button cell batteries", "zh": "碾壓平板 100 mm×250 mm", "instId": ""}, {"equip": "Timer", "code": "RB", "test": "Coin/button cell batteries", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Torque gauge (0.5 N·m)", "code": "RB", "test": "Coin/button cell batteries", "zh": "扭力計（0.5 N·m）", "instId": "torque-gauge"}, {"equip": "Angle meter", "code": "RB", "test": "Coin/button cell batteries", "zh": "角度計", "instId": "angle-level"}], "match": {"level": "warn", "note": "部分符合"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "remote", "why_zh": "僅遙控器含鈕扣/硬幣電池時適用,開關10次驗電池蓋不鬆脫防幼兒吞食;機體無鈕扣電池 N/A"}, "gist_zh": "鈕扣電池蓋被反覆開關後仍要扣得緊，避免幼兒打開取出電池吞食灼傷。", "learn": {"obj": ["能說出更換循環為打開、取出、放回、關上，共 10 次。", "能說出試後以 V.1 探棒 30 N、試鉤約 20 N 依 4.8.5 驗證。", "能判斷 4.8.5 兩判準擇一滿足且門蓋仍具功能即合格。", "能說出工具開啟之蓋依 4.8.3 須至少 0.5 Nm 且旋轉至少 90 度。"], "pit": [], "quiz": [{"q": "電池更換試驗的循環內容與次數為何？", "a": "打開、取出電池、放回、關上為一完整循環，共 10 次，模擬使用者更換磨耗。", "src": "params"}, {"q": "須以工具開啟之電池蓋，開啟門檻為何？", "a": "依 4.8.3 須至少 0.5 Nm 轉矩並旋轉至少 90 度；試中轉鬆之螺釘依表 37 重新鎖緊。", "src": "CNS p.52-53"}, {"q": "試後 4.8.5 的『不可觸及』與『無法取出』須同時滿足嗎？", "a": "不必；門/蓋仍具功能下，兩判準以『或』連接，擇一滿足即合格。", "src": "CNS p.53"}]}}, {"id": "4.8.4.6", "clauses": ["4.8.4.6"], "group": "4", "title_en": "Crush test (within 4.8.4 Battery compartment mechanical tests; parent 4.8 Equipment containing coin / button cell batteries) - applied to hand-held remote control devices", "title_zh": "碾壓（壓潰）試驗（屬 4.8.4 電池室機械試驗；上層 4.8 含鈕扣型／硬幣型電池之設備）——適用於手持式遙控裝置", "purpose_zh": "手持遙控器（無人機遙控器、玩具遙控器）常被踩到、被壓在沙發或被體重壓住。這條模擬被人坐上去、踩到那種『壓』的力量，看看遙控器的電池蓋會不會因此爆開、把鈕扣電池彈出來。因為一旦電池在被壓壞後掉出來，幼兒就可能撿到吞下。重點是：就算被大人坐到、壓到，電池也要乖乖留在裡面。", "analogy_zh": "像把手機放後口袋不小心一屁股坐下去——這個試驗就是模擬『被人坐壓』的力量，確認遙控器被壓之後電池蓋不會崩開、電池不會像彈珠一樣蹦出來被小孩撿走。", "procedure_zh": "把手持遙控裝置以最易產生不利結果的姿勢置於剛性平面上（須能自我支撐）。以約 100 mm × 250 mm 的剛性平板，對其暴露的上、下表面施加 330 N ± 5 N 的壓潰力，持續 10 秒。隨後依 4.8.5 以約 30 N 試驗探棒（Figure V.1）及約 20 N 試驗鉤（Figure 20）確認電池仍無法被觸及或取出。砝碼（weight）用於施加碾壓力，剛性試指（rigid finger）/試驗鉤與碼錶（stop watch）用於後續觸及性與夾持時間之驗證。", "params": "Crush force 330 N +/- 5 N applied via a flat rigid surface ~100 mm x 250 mm to the top and bottom exposed surfaces, dwell 10 s. Post-crush compliance (4.8.5): 30 N +/- 1 N for 10 s with straight Figure V.1 probe; cell must stay inaccessible OR not be removable with the Figure 20 hook at approx. 20 N.", "standard_equipment": ["30 N ± 1N applied by rigid test finger (Figure V.1); test hook (Figure 20) using a force of approximately 20 N; calliper; timer", "Crush Test (330 N ± 5N); flat surface measuring 100 mm by 250 mm; timer", "Torque gauges (0,5Nm), angle meter"], "iec_bsmi": "Harmonised (CNS 15598-1 follows IEC 62368-1). Same edition caveat as 4.8.4.3: coin-cell mechanical-abuse provisions tightened in Ed.4.0 (2023) per UL 4200A; verify the CNS-referenced edition. No known Taiwan-specific value deviation; the 330 N / 100x250 mm / 10 s figures are from the IEC base text.", "location": "安規測試區", "utils": [], "equipment": [{"en": "Calibrated weights / masses", "zh": "砝碼／配重", "role": "fixture", "instId": "weights"}, {"en": "Accessibility test probes / fingers", "zh": "可觸及性試驗探棒／試指", "role": "fixture", "instId": "access-probes"}, {"en": "Test hook", "zh": "試驗鉤", "role": "fixture", "instId": "test-hook"}, {"en": "Stopwatch", "zh": "碼錶", "role": "equip", "instId": "stopwatch"}], "diagram": "crush", "qa": "", "pel": [{"equip": "Rigid test finger 30 N ± 1 N (Figure V.1)", "code": "RB", "test": "Coin/button cell batteries", "zh": "剛性試指 30 N±1 N（圖 V.1）", "instId": "steady-force-finger"}, {"equip": "Test hook (Figure 20), force ≈ 20 N", "code": "RB", "test": "Coin/button cell batteries", "zh": "試驗鉤（圖 20，約 20 N）", "instId": "test-hook"}, {"equip": "Calliper", "code": "RB", "test": "Coin/button cell batteries", "zh": "游標卡尺", "instId": "calliper"}, {"equip": "Timer", "code": "RB", "test": "Coin/button cell batteries", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Crush test force 330 N ± 5 N", "code": "RB", "test": "Coin/button cell batteries", "zh": "碾壓力 330 N±5 N", "instId": "weights"}, {"equip": "Flat plate 100 mm × 250 mm", "code": "RB", "test": "Coin/button cell batteries", "zh": "碾壓平板 100 mm×250 mm", "instId": ""}, {"equip": "Timer", "code": "RB", "test": "Coin/button cell batteries", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Torque gauge (0.5 N·m)", "code": "RB", "test": "Coin/button cell batteries", "zh": "扭力計（0.5 N·m）", "instId": "torque-gauge"}, {"equip": "Angle meter", "code": "RB", "test": "Coin/button cell batteries", "zh": "角度計", "instId": "angle-level"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "remote", "why_zh": "明文針對手持遙控器,330N模擬被坐壓驗電池不彈出;僅遙控器含鈕扣電池時適用,機體 N/A"}, "gist_zh": "手持遙控器被人坐壓、踩到時，電池蓋不能崩開讓鈕扣電池蹦出被幼兒撿食。", "learn": {"obj": ["能說出碾壓力 330 N±5 N、平板約 100×250 mm、持續 10 秒。", "能判斷施作對象為手持遙控裝置，以最不利姿勢置於剛性平面受壓。", "能說出試後依 4.8.5 檢查：不可觸及或無法取出，擇一滿足即合格。", "能解釋本試驗模擬被坐壓踩踏，防止鈕扣電池彈出遭幼兒撿食。"], "pit": [], "quiz": [{"q": "碾壓試驗之施力、平板尺寸與持續時間各為何？", "a": "330 N±5 N，以約 100 mm×250 mm 平坦剛性面壓上、下暴露表面，持續 10 秒。", "src": "params"}, {"q": "無人機系統中，碾壓試驗施作於哪個部件？模擬什麼情境？", "a": "含鈕扣電池之手持遙控器；模擬被人坐壓、踩到，確認電池不會彈出遭幼兒撿食。", "src": "params"}, {"q": "碾壓後如何確認鈕扣電池仍安全？", "a": "依 4.8.5：V.1 直探棒 30 N±1 N 施力 10 秒、試鉤約 20 N；不可觸及或無法取出擇一滿足。", "src": "CNS p.53"}]}}, {"id": "5.2", "clauses": ["5.2"], "group": "5", "title_en": "Electrical energy source classifications (5.2.1 Electrical energy source classifications; 5.2.2 Electrical energy source limits - incl. 5.2.2.2 Steady-state voltage and current limits)", "title_zh": "電氣能量源分級（5.2.1 電氣能量源分級；5.2.2 電氣能量源限值——含 5.2.2.2 穩態電壓及電流限值）", "purpose_zh": "這是整個『觸電安全』的分級總開關。它把設備裡每一條電路依『電壓有多高、能推多少電流』分成三級：ES1＝摸到也安全（連小孩都行）；ES2＝摸到會痛、會嚇一跳（只允許受過告知的人接觸）；ES3＝會造成電擊傷害甚至致命（只有受過訓練的人在有防護下才可接觸）。分完級，後面才知道哪條電路需要外殼、絕緣、警告標示等防護。對無人機而言，電池組、馬達驅動、充電輸入往往是高能量電路，正確分級是判定要不要包覆防護的第一步。", "analogy_zh": "像泳池的水深標示：齊腰（ES1）人人可下；及胸有救生員看著才行（ES2）；深水區（ES3）只有受訓泳者＋圍欄才准進。先把『水多深』量清楚並標好，才能決定要不要立圍欄、放警示牌。", "procedure_zh": "在正常、異常與單一故障三種狀態下，量測各電路相對於地或相對於可觸及部位的電壓與電流，比對 5.2.2 各限值表（穩態值、電容放電、單一脈衝、重複脈衝、振鈴、音訊）。判級時電壓與電流兩者皆超標才算超過該級。在正常、異常及非安全防護零件單一故障下不超過 ES1（安全防護單一故障時允許到 ES2 限值）者列為 ES1；超過 ES1 但各狀態皆不超過 ES2 者列為 ES2；連 ES2 限值都超過者列為 ES3；交流電源各載流導體（含中性線）逕列 ES3。用示波器擷取波形（脈衝/振鈴），用具高內阻的電壓表與量測儀（如 Ikonix/SCI 620L 之類觸電電流／洩漏量測儀）量測穩態電壓與接觸電流。", "params": "ES1 steady-state limits (f <= 1 kHz): 30 V r.m.s. / 42.4 V peak / 60 V d.c. ES2 steady-state limits (f <= 1 kHz): 50 V r.m.s. / 70.7 V peak / 120 V d.c. Above ES2 = ES3. All a.c. mains current-carrying conductors incl. neutral are classified ES3 by default. Touch-current thresholds derive from IEC 60479-1 (measured through the IEC 60990 network). For ES1/ES2, meeting EITHER the voltage OR the current limit suffices; both must not be exceeded.", "standard_equipment": ["Ampere- and voltmeter suitable for the current and waveform, frequency meter; Measuring instruments in according to IEC 60990:2016 Figure 4 and 5, timer, 2 k resistor", "Oscilloscope"], "iec_bsmi": "Harmonised, no known Taiwan-specific deviation. CNS 15598-1:2020 = IEC 62368-1:2018; the ES1/ES2 numeric limits (30/42.4/60 and 50/70.7/120) are unchanged into Ed.4.0. Note ES1 is NOT identical to legacy SELV - SELV is not used in 62368-1. Lab note: instrument 'Ikonix 620L' is a touch/leakage-current source-and-meter; ensure its measuring network conforms to IEC 60990 for the touch-current part of the classification.", "location": "安規測試區", "utils": [], "equipment": [{"en": "Oscilloscope", "zh": "示波器", "role": "equip", "instId": "oscilloscope"}, {"en": "Digital multimeter", "zh": "數位萬用電錶", "role": "equip", "instId": "multimeter"}, {"en": "Leakage / touch-current tester (IEC 60990 networks)", "zh": "洩漏/接觸電流量測儀", "role": "equip", "instId": "leakage-620L"}], "diagram": "", "qa": "", "pel": [{"equip": "Ampere- & voltmeter (suitable for current/waveform), frequency meter", "code": "RB", "test": "Steady- state voltage and current limits", "zh": "電流／電壓表（適合波形）、頻率計", "instId": "multimeter"}, {"equip": "Measuring network per IEC 60990:2016 (Figures 4 & 5)", "code": "RB", "test": "Steady- state voltage and current limits", "zh": "IEC 60990 量測網路（圖 4/5）", "instId": "leakage-620L"}, {"equip": "Timer", "code": "RB", "test": "Steady- state voltage and current limits", "zh": "計時器", "instId": "stopwatch"}, {"equip": "2 kΩ resistor", "code": "RB", "test": "Steady- state voltage and current limits", "zh": "2 kΩ 無感電阻", "instId": "noninductive-r"}, {"equip": "Oscilloscope", "code": "RB", "test": "Single pulse limits", "zh": "示波器", "instId": "oscilloscope"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "system", "why_zh": "分級總開關；機體電池/馬達驅動/充電輸入逐電路先分級，決定後續防護"}, "gist_zh": "把每條電路依危險度分三級（摸到安全／會痛／會傷人），這是觸電安全的總開關。", "learn": {"obj": ["能說出 ES1 穩態限值：30/42.4/60（V rms/peak/dc）。", "能說出 ES2 穩態限值：50/70.7/120（V rms/peak/dc）。", "能判斷超過 ES2 即列 ES3；交流電源載流導體含中性線逕列 ES3。", "能解釋分級涵蓋正常、異常與單一故障狀態之電壓及電流量測。"], "pit": [{"t": "誤解：官方 P.E.L. 所列『5.2.A.4』為標準實際條號。正解：經查為 5.2.2.4（單一脈衝限制值）之誤植，CNS 與 Ed.4 皆無 5.2.A 編號。", "src": "查證記錄 G-12、G-15"}], "quiz": [{"q": "f≤1 kHz 時，ES1 與 ES2 的穩態限值各為多少？", "a": "ES1：30 V rms/42.4 V peak/60 V dc；ES2：50 V rms/70.7 V peak/120 V dc。", "src": "params"}, {"q": "無人機電池迴路電壓超過 ES1 限值但電流未超，應列哪級？", "a": "仍列 ES1；電壓與電流皆超標才算超過該級，符合其一限值即可。", "src": "params"}, {"q": "基本安全防護單一故障下電路不超過 ES2 限值，可維持 ES1 嗎？", "a": "可以；分級結構允許安全防護單一故障時達 ES2 限值而仍列 ES1。", "src": "CNS p.55"}]}}, {"id": "5.3.2", "clauses": ["5.3.2"], "group": "5", "title_en": "Accessibility to electrical energy sources and safeguards (test probes / accessibility evaluation under 5.3 Protection against electrical energy sources)", "title_zh": "電氣能量源及安全防護之可觸及性（屬 5.3 對電氣能量源之防護；以試驗探棒評估可觸及性）", "purpose_zh": "分完級（5.2）之後，這條問：危險的電路（ES2/ES3）使用者的『手指』摸得到嗎？標準用模擬人手指的金屬試指去戳、去探設備的開口、縫隙、接頭。如果試指能碰到危險帶電部位，就代表防護不足、必須加蓋或加絕緣。針對可能被兒童接觸的產品，還會用更細、能伸更進去的兒童探棒。簡單說：把『標準化的假手指』伸進每個縫，確認摸不到會電人的地方。對無人機，電池接點、充電孔、散熱孔都是要戳的重點。", "analogy_zh": "像家裡插座的『防觸電安全蓋』檢查——拿一根模擬小孩手指的棒子去戳插座孔，看戳不戳得到裡面的銅片。戳得到就不安全，得加擋板；這個試驗就是用標準假手指去戳設備每個開口。", "procedure_zh": "依人員類別選用對應探棒：成人用 Figure V.2（即 IEC 61032 圖 2 Test Probe B 鉸接式試指）；可能被兒童接觸者另用 Figure V.1 鉸接式探棒（含一支不鉸接直探棒版本）。將試指以直伸與彎曲（關節可彎 90°）兩種姿勢，在所有可觸及開口/縫隙嘗試探入，並接低壓指示電路：試指前端一旦碰到帶電/危險部位即導通報警，判定為可觸及。需要時對直探棒施加約 30 N 之穩定推力 5 秒，並可配合擋板（baffle）限制過度插入；以推拉力計與量規/游標卡尺驗證施力與開口尺寸。", "params": "Steady accessibility force: 30 N +/- 3 N applied for approx. 5 s using the straight (unjointed) version of the applicable Figure V.1/V.2 probe. Test Probe B geometry: 12 mm dia x 80 mm jointed finger, 50 mm baffle, ~300 mm overall, joints articulate 0-90 deg (+/-10 deg). Probe applied in both straight and bent attitudes at all accessible points; contact = fail (safeguard required). Higher steady-force tools (100 N / 250 N, 30 mm circular face per Annex T.2-T.5) are used where enclosure robustness is also assessed.", "standard_equipment": ["Test probes (Figures V.1, V.2, V.3, V.5);force gauge having at least 30 N; calliper"], "iec_bsmi": "Harmonised, no known Taiwan-specific deviation (CNS 15598-1 = IEC 62368-1; probes per IEC 61032). Key conceptual point vs legacy: 62368-1 adds the child-accessibility probe (Figure V.1) distinct from the traditional adult IEC 61032 Probe B (Figure V.2) - selection depends on whether the product is likely accessible to children. Same probes/forces across editions.", "location": "安規測試區", "utils": [], "equipment": [{"en": "Accessibility test probes / fingers", "zh": "可觸及性試驗探棒／試指", "role": "fixture", "instId": "access-probes"}, {"en": "Force gauge", "zh": "推拉力計（測力計）", "role": "equip", "instId": "force-gauge"}, {"en": "Vernier calliper", "zh": "游標卡尺", "role": "equip", "instId": "calliper"}], "diagram": "accessprobe", "qa": "", "pel": [{"equip": "Test probes (Figures V.1, V.2, V.3, V.5)", "code": "RB", "test": "Accessibility to electrical energy sources and safeguards", "zh": "試驗探棒（圖 V.1/V.2/V.3/V.5）", "instId": "access-probes"}, {"equip": "Force gauge (≥ 30 N)", "code": "RB", "test": "Accessibility to electrical energy sources and safeguards", "zh": "測力計（≥30 N）", "instId": "force-gauge"}, {"equip": "Calliper", "code": "RB", "test": "Accessibility to electrical energy sources and safeguards", "zh": "游標卡尺", "instId": "calliper"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "system", "why_zh": "試指戳電池接點/充電孔/散熱孔；機體SELV風險低，ES3落在充電器"}, "gist_zh": "用模擬手指的試棒戳遍開口縫隙，確認危險帶電部位手指（含兒童）碰不到。", "learn": {"obj": ["能說出直探棒穩定施力為 30 N±3 N，持續約 5 秒。", "能說出 Probe B 幾何：直徑12 mm、指長80 mm、可彎90度。", "能判斷兒童可能接觸之產品另用 V.1 探棒，成人情境用 V.2。", "能解釋試指以直伸與彎曲姿勢探所有開口，碰到帶電部位即不合格。"], "pit": [], "quiz": [{"q": "可觸及性評估中，直探棒之穩定施力與持續時間為何？", "a": "30 N±3 N，施加約 5 秒；使用適用探棒（V.1/V.2）之不鉸接直版本。", "src": "params"}, {"q": "戳測無人機充電孔與電池接點時，何時須改用 V.1 探棒？", "a": "產品可能被兒童接觸時用 V.1；一般成人情境用 V.2（IEC 61032 Probe B）。", "src": "params"}, {"q": "試指探入開口碰到危險帶電部位時，如何判定？", "a": "判定為可觸及，即防護不足不合格，須加蓋或加絕緣等安全防護。", "src": "params"}]}}, {"id": "5.4.1.4", "clauses": ["5.4.1.4", "9.3", "E"], "group": "5", "title_en": "Maximum operating temperatures for materials, components and systems (incl. 9.3 Touch temperature, Annex E test conditions for equipment containing audio amplifiers)", "title_zh": "材料、組件及系統之最大操作溫度（含 9.3 接觸溫度、附錄 E 含音訊放大器設備之試驗條件）", "purpose_zh": "這項測試是要確認產品在正常使用、長時間開機運轉時，內部的塑膠、絕緣材料、變壓器、線材以及外殼摸得到的地方，溫度不會高到危險。溫度太高會讓絕緣材料劣化變脆、提早老化甚至起火，外殼太燙則會燙傷使用者。它量到的溫度數字，後續還會拿來決定別的測試要用幾度（例如球壓試驗、絕緣材料耐溫等級）。對無人機而言，馬達驅動板、電池管理板、充電電路與通訊模組都會發熱，這項測試確保它們在最操的狀態下也不會過熱。", "analogy_zh": "就像智慧型手機長時間玩遊戲或快充時會發燙，廠商必須確認再怎麼操，機身也只是溫溫的、不會燙到拿不住，內部零件也不會被自己烤壞。", "procedure_zh": "在被測物的關鍵發熱點（變壓器繞組、半導體、絕緣材料、外殼可觸及面等）貼上細線熱電偶，連到溫度記錄器。讓產品在額定電壓（或最不利電壓）下以正常操作條件運轉直到溫度達穩定；若內含音訊放大器，則依附錄 E 以 1/8 非削波輸出功率或粉紅雜訊訊號驅動。記錄各點最高穩態溫升，與標準各表之溫度限值比對，同時依 9.3 檢核可觸及表面之接觸溫度。", "params": "供電：額定電壓或最不利電壓(通常 90%~110% 額定範圍取最嚴苛)；運轉至熱穩態(溫升變化通常 < 1 K/連續數分鐘)。音訊放大器(Annex E)：1000 Hz 正弦或帶限粉紅雜訊，設定為 1/8 非削波額定輸出功率。判定：各點溫度不得超過該材料/組件/能源類別之限值(繞組/絕緣依表 9（CNS p.64-65）：等級 105(A)→100°C、120(E)→115°C、130(B)→120°C、155(F)→140°C（註(a) 條件適用）；接觸溫度依表 38（CNS p.156）：例 TS1 級短暫碰觸(>1 s,<10 s)＝金屬 60／玻璃陶瓷 71／塑膠橡膠 77／木材 107°C；TS2 級同列＝70/81/87/117°C，依握持時間與材質查表)。", "standard_equipment": ["Single phase voltage supply systems/variability/adequacy", "Three phase voltage supply systems", "Temperature recorder (multi-channel)", "Thermocouples", "Winding resistance (normally > 1,0 Ω 2-wire, 4-wire <1,0 Ω ).", "Voltmeters (ac/dc)", "High voltage meter (probe)", "Currents (ac/dc)", "Loads (resistive)"], "iec_bsmi": "CNS 15598-1 為 IEC 62368-1 之國家轉訂，溫度量測法(Annex B)與限值表(Clause 9 / 5.4.1.4)原則上和諧一致、無已知重大差異。注意：本案附註之『Annex E』在 IEC 62368-1 中是『含音訊放大器設備之試驗條件(粉紅雜訊 / 1/8 非削波輸出)』，並非溫升量測本身；溫升量測程序實際依 Annex B(B.1.5 量測法、B.2.6 正常操作條件)。實驗室引用 Annex E 應理解為當受測影音設備含放大器時用以建立溫度測試之正常操作訊號條件。", "location": "安規測試區", "utils": ["需排煙"], "equipment": [{"en": "Power analyzer / power meter", "zh": "功率分析儀", "role": "equip", "instId": "power-analyzer"}, {"en": "Regenerative AC/DC power source", "zh": "可程式交直流電源供應器", "role": "equip", "instId": "ac-dc-source"}, {"en": "DC power supply", "zh": "直流電源供應器", "role": "equip", "instId": "dc-supply"}, {"en": "Temperature data logger (thermocouples)", "zh": "溫度記錄器（熱電偶）", "role": "equip", "instId": "datalogger"}, {"en": "DC electronic load", "zh": "直流電子負載", "role": "equip", "instId": "dc-load"}], "diagram": "temprise", "qa": "", "pel": [{"equip": "Single phase voltage supply systems/variability/adequacy", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Voltage supply", "zh": "單相交流電源供應器", "instId": "ac-dc-source"}, {"equip": "Three phase voltage supply systems", "code": "S", "test": "Maximum operating temperatures for materials, components and systems — Voltage supply", "zh": "三相電源供應器", "instId": ""}, {"equip": "Temperature recorder (multi-channel)", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Temperature (rise)", "zh": "多通道溫度記錄器", "instId": "datalogger"}, {"equip": "Thermocouples", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Temperature (rise)", "zh": "熱電偶", "instId": "datalogger"}, {"equip": "Winding resistance (normally > 1,0 Ω 2-wire, 4-wire <1,0 Ω ).", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Temperature (rise)", "zh": "繞組電阻計(2/4線)", "instId": ""}, {"equip": "Voltmeters (ac/dc)", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Voltage", "zh": "交直流電壓表", "instId": "multimeter"}, {"equip": "High voltage meter (probe)", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Voltage", "zh": "高壓電壓量測(探棒)", "instId": ""}, {"equip": "Currents (ac/dc)", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Current", "zh": "交直流電流量測", "instId": "multimeter"}, {"equip": "Loads (resistive)", "code": "RB", "test": "Maximum operating temperatures for materials, components and systems — Loading", "zh": "電阻性負載", "instId": "var-resistor-load"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "airframe", "why_zh": "量機體馬達驅動板/BMS/通訊模組發熱，溫度數據供後續球壓/耐溫判定"}, "gist_zh": "確認長時間運轉時，內部零件與摸得到的外殼不會熱到劣化、起火或燙傷。", "learn": {"obj": ["能說出溫升試驗的供電條件與熱穩態判斷基準（<1 K/連續數分鐘）。", "能依表 9 說出絕緣等級 105/120/130/155 的溫度限值。", "能依表 38 按材質與碰觸時間查出可觸及面接觸溫度限值。", "能解釋附錄 E 含音訊放大器設備之 1/8 非削波功率驅動條件。"], "pit": [{"t": "誤解：接觸溫度限值約為 60/75/80°C 概略值。正解：依表 38 實值：TS1 短暫碰觸＝金屬 60/玻璃陶瓷 71/塑膠橡膠 77/木材 107°C。", "src": "查證記錄 D-20"}], "quiz": [{"q": "等級 130(B) 繞組絕緣的溫度限值是幾度？", "a": "120°C。表 9：105(A)→100、120(E)→115、130(B)→120、155(F)→140°C（註(a) 條件適用）。", "src": "CNS p.64-65"}, {"q": "無人機塑膠外殼可觸及面，TS1 級短暫碰觸的接觸溫度限值？", "a": "77°C（塑膠橡膠）。表 38 同列金屬 60、玻璃陶瓷 71、木材 107°C；TS2 級為 70/81/87/117°C。", "src": "CNS p.156"}, {"q": "含音訊放大器的設備，附錄 E 規定用什麼訊號條件做溫升試驗？", "a": "以 1000 Hz 正弦或帶限粉紅雜訊驅動，設定為 1/8 非削波額定輸出功率，運轉至熱穩態。", "src": "params"}]}}, {"id": "5.4.1.10.3", "clauses": ["5.4.1.10.3"], "group": "5", "title_en": "Ball pressure test (for thermoplastic parts), conducted in accordance with IEC 60695-10-2", "title_zh": "球壓試驗（依 IEC 60695-10-2，適用於直接鑲嵌可導電金屬部件之熱塑性部件）", "purpose_zh": "很多固定電線、夾住帶電金屬片或當作端子座的塑膠零件，受熱後會變軟。這項測試就是把塑膠加熱到它工作時可能達到的高溫，再用一顆鋼球用力壓它，看會不會被壓出一個明顯的凹陷。如果壓痕太大，代表這種塑膠在高溫下會軟掉、撐不住帶電零件，可能讓帶電件鬆脫位移，造成觸電或短路起火。對無人機的端子台、電池座、連接器外殼特別重要。", "analogy_zh": "就像夏天把巧克力放在大太陽下，本來硬的會變軟，手指一壓就一個坑；這測試在確認塑膠零件遇熱不會軟到一壓就凹、撐不住裡面的金屬。", "procedure_zh": "取試片(厚度至少 2.5 mm，表面平整)，水平放入已升溫的烘箱。用直徑 5 mm 鋼球以 20 N 的力垂直壓在試片表面，於規定溫度下持續 1 小時。取出後 10 秒內浸入 20°C±5°C 的水中 6 分鐘急冷，再於 3 分鐘內以顯微鏡量測壓痕直徑。", "params": "鋼球：直徑 5 mm(R=2.5 mm)；施力：20 N；加熱時間：60 分鐘(1 小時)；試驗溫度（CNS p.68）：(T−Tamb+Tma+15°C)±2°C 之溫控箱內；主電源系統供電電路中之熱塑性支撐部件最低 125°C。（鋼球 Ø5 mm／20 N／1 h／水淬等裝置細節屬 IEC 60695-10-2 之規定）；急冷：取出後 10 s 內浸入 20°C±5°C 水中 6 分鐘(±2 min)；判定：壓痕直徑 d <= 2.0 mm 為合格；量測須於取出後 3 分鐘內完成。試片厚度 >= 2.5 mm。", "standard_equipment": ["Vicat test B 50 of ISO 306", "Ball pressure test apparatus according to IEC 60695-10-2, Oven at least 125°C ± 2°C"], "iec_bsmi": "CNS 15598-1 引用 IEC 60695-10-2 之球壓法，參數(5 mm 球、20 N、125°C/75°C、壓痕 2 mm)為國際一致，和諧無已知差異。實驗室列 oven 即恆溫箱，符合；建議補列 20°C 水浴與讀數顯微鏡。", "location": "材料測試區", "utils": [], "equipment": [{"en": "Ball-pressure test apparatus", "zh": "球壓試驗裝置", "role": "equip", "instId": "ball-pressure"}, {"en": "Heating oven", "zh": "熱風循環烘箱", "role": "equip", "instId": "oven"}], "diagram": "ballpressure", "qa": "PEL 對照：官方列「Ball-pressure apparatus（IEC 60695-10-2）＋ Oven」為 RB（必備），另有「Vicat B50（ISO 306）」為替代法（S 可外包）。核實參數：5 mm 鋼球、20 N、加熱 1 h、試驗溫度 (T−Tamb+Tma+15°C)±2°C（主電源供電電路之熱塑性支撐件最低 125°C）、壓痕 ≤ 2.0 mm 合格。", "pel": [{"equip": "Vicat test B 50 of ISO 306", "code": "S", "test": "Thermoplastic parts on which conductive metallic parts are directly mounted", "zh": "維卡軟化點試驗(ISO 306)", "instId": ""}, {"equip": "Ball-pressure apparatus (IEC 60695-10-2)", "code": "RB", "test": "Thermoplastic parts on which conductive metallic parts are directly mounted", "zh": "球壓試驗裝置（IEC 60695-10-2）", "instId": "ball-pressure"}, {"equip": "Oven (≥ 125 °C ± 2 °C)", "code": "RB", "test": "Thermoplastic parts on which conductive metallic parts are directly mounted", "zh": "烘箱（≥125°C±2°C）", "instId": "oven"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "multiple", "why_zh": "機體端子座/電池座/連接器外殼及充電器塑膠件受熱不可軟塌；支援性材料試驗"}, "gist_zh": "加熱後用鋼球壓塑膠件，確認高溫下不軟化凹陷，否則撐不住帶電件會鬆脫短路。", "learn": {"obj": ["能說出本試驗適用於直接鑲嵌可導電金屬部件之熱塑性部件。", "能說出試驗溫度公式與主電源電路支撐件 125°C 下限。", "能判斷壓痕直徑量測結果是否合格（d ≤ 2.0 mm）。", "能舉出無人機上適用的零件，如端子座、電池座、連接器外殼。"], "pit": [{"t": "誤解：125°C（支撐帶電件）/75°C（其他）二級溫度。正解：CNS 為公式 (T−Tamb+Tma+15°C)±2°C，主電源電路支撐件最低 125°C；無 75°C。", "src": "查證記錄 D-16"}], "quiz": [{"q": "主電源系統供電電路中的熱塑性支撐部件，最低試驗溫度是幾度？", "a": "125°C。一般情況試驗溫度依公式 (T−Tamb+Tma+15°C)±2°C 決定。", "src": "CNS p.68"}, {"q": "球壓試驗後量測壓痕直徑，合格判準為何？", "a": "壓痕直徑 d ≤ 2.0 mm 為合格。", "src": "params"}, {"q": "無人機的哪些塑膠零件最需要通過球壓試驗？為什麼？", "a": "端子座、電池座、連接器外殼等鑲嵌導電金屬之熱塑性件；高溫軟化會讓帶電件鬆脫位移，造成短路起火。", "src": "params"}]}}, {"id": "5.4.2", "clauses": ["5.4.2", "5.4.3", "5.4.4", "X"], "group": "5", "title_en": "5.4.2 Clearances; 5.4.3 Creepage distances; 5.4.4 Solid insulation (including distance through insulation, DTI); Annex X Insulating tapes / wound components", "title_zh": "5.4.2 空間（電氣）間隙；5.4.3 沿面距離（爬電距離）；5.4.4 固體絕緣（含絕緣穿透距離 DTI）；附錄 X 空間距離決定之替代方法（≤420 V 峰值交流主電源電路）", "purpose_zh": "電要跳過去傷人，有三條路：直接穿過空氣（空間間隙）、沿著塑膠表面爬過去（沿面距離）、或穿透固體絕緣材料本身（固體絕緣）。這三項就是分別量這三條路夠不夠長、夠不夠厚，確保高壓電不會跨過去電到人或打火。電壓越高、環境越髒（灰塵濕氣會在表面形成導電通路），要求的距離就越長；材料抗漏電起痕能力（CTI）越差，爬電距離要求也越大。無人機的電源板、充電器、高壓馬達驅動級都靠這個把危險電壓和人隔開。", "analogy_zh": "就像兩棟高壓鐵塔之間要留夠遠才不會放電打火（空間間隙）；欄杆上的污垢若連成一線，螞蟻就能沿著爬過去（沿面距離）；而牆壁要夠厚實，東西才不會直接穿牆過來（固體絕緣）。", "procedure_zh": "先依工作電壓、瞬時(衝擊)電壓、污染等級與材料群組查標準表，得出所需最小間隙與爬電距離。再用卡尺、量棒、測微計或 2.5D 投影儀實際量測產品上帶電件之間（及對可觸及件）的最短空氣距離、最短表面爬行距離與絕緣厚度，比對是否達標。材料群組由 IEC 60112 之 CTI 試驗(50 滴 A 液)判定；間隙亦可改用 Annex D 脈衝電壓產生器以衝擊耐壓驗證；固體絕緣厚度不足者可用替代之熱循環+濕度+耐壓組合試驗。", "params": "輸入變數：工作電壓(AC rms/DC)、額定瞬時(衝擊)電壓(查表，如 OVC II、230 V 對應 2.5 kV)、污染等級(一般設備多為 PD2)、材料群組(由 CTI 判定：I>=600、II 400~599、IIIa 175~399、IIIb 100~174；未知時假設 IIIb)。範例：2.5 kV 衝擊電壓查表 14——基本/補充絕緣最小間隙 1.5 mm、強化絕緣 3.0 mm（CNS p.76）。固體絕緣替代試驗常以耐壓 x1.6 倍施加。CTI 試驗：IEC 60112，A 液(0.1% NH4Cl)，50 滴。間隙衝擊驗證波形：1.2/50 µs(Annex D Circuit 2)。", "standard_equipment": ["Oscilloscope", "Dial gauge or calliper", "Micrometer", "Pins etc. with different diameters", "Microscope", "Impulse test generator circuit 1 of Table D.1.; Impulse test generator circuit 2 of Table D.1.; impulse test generator circuit 3 of Table D.1", "Test equipment for tracking index per IEC 60112", "Mandrel (
