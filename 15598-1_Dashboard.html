2 mm（僅外披覆延展、導體未位移者不計）、抗拉力機制不得損及電線、且拉力不得傳遞至端子。彎曲保護(G.7.5)：對出線口之線材施加規定負載觀察其彎曲，在加重狀態下量測曲率半徑(radius of curvature)，以半徑規(radius gauge)確認不小於規定值（避免過度彎折）。", "params": "拉力依表 G.8 以「設備質量」分級（CNS p.219）：≤1 kg→30 N；>1～4 kg→60 N；>4 kg→100 N；於最不利方向施加 1 s、重複 25 次；隨後立即施加 0.25 N·m 扭力 1 min（單一值，並於相反方向重複；IEC Ed.4 同值同制）。判定：抗拉力機制不損及電線、縱向位移 ≤2 mm。披覆應自抗拉力機制延伸入設備 ≥1/2 線徑（G.7.3.2.3）；彎曲保護試驗（G.7.5.2，p.220-221）：電線於彎曲防護軸向以 45° 向外突出，自由端附加 (10×D²) g 重量（D＝電源線整體直徑 mm，扁平線取較小尺度；溫度敏感護套材料於 23°C±2°C 試驗），加重後曲率半徑不得小於 1.5D。", "standard_equipment": ["Test equipment according IEC 60227", "Appropriate weights", "Torque meter or equivalent"], "iec_bsmi": "已諧調，無已知差異。拉力/扭力值依 IEC 62368-1 Table G.8（GB/T 4943.1-2022 亦對應 G.7.3.2.1 與 Table G.8）；CNS 15598-1:2020 一致。註：IEC 62368-1:2023 (Ed.4) 將 G.7.3 應力消除擴及 ES2/ES3/PS3 之互連線，惟對現行 CNS 15598-1:2020(Ed.3) 適用範圍以電源線為主。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Calibrated weights / masses", "zh": "砝碼／配重", "role": "fixture", "instId": "weights"}, {"en": "Radius gauge", "zh": "半徑規（R 規）", "role": "equip", "instId": "radius-gauge"}], "diagram": "cordpull", "qa": "", "pel": [{"equip": "Test equipment according IEC 60227", "code": "S", "test": "Mains supply cords", "zh": "電源線試驗設備(IEC 60227)", "instId": ""}, {"equip": "Appropriate weights", "code": "RB", "test": "Mains supply cords", "zh": "適當砝碼", "instId": "weights"}, {"equip": "Torque meter or equivalent", "code": "RB", "test": "Mains supply cords", "zh": "扭力計或同等品", "instId": "torque-gauge"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "市電電源線之固定座拉/扭與彎曲保護;落在接市電的充電器/變壓器,機體無市電線N/A。"}, "gist_zh": "拉扯與扭轉電源線，確認固定座夠牢、火線不脫落碰殼，出線口不折斷露銅。", "learn": {"obj": ["能選出對應設備質量之表 G.8 拉力值（30／60／100 N）", "能說出拉力 1 秒×25 次與扭力 0.25 N·m×1 分鐘之施加方式", "能判斷合格判準：電線縱向位移不超過 2 mm、拉力不得傳至端子", "能換算彎曲保護附加重量 (10×D²) g 並判斷加重後曲率半徑不小於 1.5D"], "pit": [{"t": "誤解：表 G.8 拉力依額定電流／導線截面分級，扭力分 0.1／0.25／0.35 N·m。正解：CNS 依設備質量分級（30／60／100 N），扭力為單一 0.25 N·m。", "src": "查證記錄 D-06"}], "quiz": [{"q": "質量 3 kg 之無人機充電器，電源線拉力試驗應施加多少力？如何施加？", "a": "60 N（屬 >1～4 kg 級距），於最不利方向施加 1 秒、重複 25 次，隨後施加 0.25 N·m 扭力 1 分鐘。", "src": "CNS p.219"}, {"q": "應力消除試驗後，電線縱向位移之合格限值為何？", "a": "不得超過 2 mm（僅外披覆延展、導體未位移者不計），且抗拉力機制不得損及電線、拉力不得傳遞至端子。", "src": "CNS p.219"}, {"q": "電源線整體直徑 D＝4 mm，彎曲保護試驗自由端應加掛多重？判準為何？", "a": "附加 10×D²＝160 g 重量；加重狀態下曲率半徑不得小於 1.5D（此例為 6 mm）。", "src": "CNS p.220-221"}]}}, {"id": "P.2", "clauses": ["P.2"], "group": "annex", "title_en": "Safeguards against entry or consequences of entry of a foreign object — P.2.2 Safeguards against entry of a foreign object", "title_zh": "防止外物進入或其後果之安全防護 — P.2.2 防止外物進入之安全防護", "purpose_zh": "桌上型或開孔設備常被掉進迴紋針、項鍊、髮夾等細長金屬物。如果這些金屬從外殼縫隙掉進去、剛好搭在兩個帶電點之間，就會造成短路、起火或讓外殼帶電電人。這個試驗一方面檢查開孔的幾何設計擋不擋得住外物進入，一方面用一根模擬『細長金屬物』的試具，在外物掉得到的內部範圍模擬短路，確認就算金屬異物進入也不會讓安全防護失效、引發危險。對有散熱開孔、又會在環境中作業的設備很關鍵。", "analogy_zh": "就像檢查烤麵包機或主機殼頂部的散熱縫——故意拿一根細鐵絲/迴紋針從縫隙戳進去，看會不會碰到裡面的帶電零件造成觸電或短路。", "procedure_zh": "使用模擬『直的剛性金屬物』之試具（直徑 1 mm、長度可達 13 mm 之金屬棒/針），於圖 P.3 所示外物可達之投影體積內，在無施力下將 ES3/PS3 裸露導電部件與半徑 13 mm 內之其他裸露導電部件短路，模擬外物掉入後造成的跨接（P.2.3.2 進入後果試驗）。構造面（P.2.2）符合下列任一即可：任何尺度皆不超過 5 mm 之開孔；寬度不超過 1 mm（長度不限）之開孔；符合 IP3X 之開孔；已預防垂直掉入之頂部開孔（圖 P.1）；具向外偏移遮板之側邊開孔（圖 P.2）；或開孔側機殼厚度不小於開孔垂直尺寸之側邊開孔。判定：試驗期間及試驗後，補充與強化安全防護仍應有效，且無部件成為潛在引燃源（PIS）。", "params": "試具：直徑 1 mm、長度最長 13 mm 之直的剛性金屬物。開孔判定：開孔任一方向尺寸 ≤ 5 mm 視為可接受之一種情形；IEC 62368-1:2023(Ed.4) 另增『側面開孔不超過外殼厚度 11 倍』(Figure P.3) 之判據。判定（P.2.3.2）：以金屬物於圖 P.3 體積 V 內無施力短路 ES3/PS3 裸露導電部件與半徑 13 mm 內之其他裸露導電部件；試驗期間及試驗後，補充/強化安全防護仍應有效且無部件成為 PIS。", "standard_equipment": ["Suitable tool (or tools) to simulate a straight metal object, 1mm in diameter, length up to 13 mm"], "iec_bsmi": "已諧調，無已知差異（就現行 CNS 15598-1:2020 = IEC 62368-1:2018 而言）。版本差異提醒：IEC 62368-1:2023(Ed.4) 更新 P.2.1 側面開孔判據為『不超過外殼厚度 11 倍』(Figure P.3)；此為未來 CNS 改版時需留意之變更，現行 CNS 15598-1:2020 尚未納入。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Straight metal-object probe", "zh": "直形金屬棒探棒", "role": "fixture", "instId": "straight-probe"}], "diagram": "", "qa": "", "pel": [{"equip": "Suitable tool (or tools) to simulate a straight metal object, 1mm in diameter, length up to 13 mm", "code": "RB", "test": "Safeguards against entry of solid foreign objects", "zh": "模擬直形金屬物之試具", "instId": "straight-probe"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "multiple", "why_zh": "以細金屬棒從頂/側開孔探入防跨接帶電件;僅具開孔之機體/充電器/地面站適用。"}, "gist_zh": "用細長試具模擬掉進機內的迴紋針等金屬，確認不會因跨接帶電件而起火或讓外殼帶電。", "learn": {"obj": ["能說出試具規格：直徑 1 mm、最長 13 mm 之直的剛性金屬物", "能說出 P.2.2 與 P.2.3.2 分工：前者查開孔構造，後者查進入後果", "能選出 P.2.2 可接受開孔構造（任一尺度不超過 5 mm、IP3X 等）", "能說出 P.2.3.2 判準：安全防護仍有效且無部件成為 PIS"], "pit": [], "quiz": [{"q": "模擬細長金屬異物之試具直徑與最大長度為何？", "a": "直徑 1 mm、長度最長 13 mm 之直的剛性金屬物，模擬迴紋針等掉入機內的細長金屬。", "src": "params"}, {"q": "P.2.3.2 進入後果試驗如何執行？判準為何？", "a": "於圖 P.3 體積內無施力將 ES3/PS3 裸露導電部件與半徑 13 mm 內其他裸露導電部件短路；防護仍須有效且無部件成 PIS。", "src": "CNS p.276"}, {"q": "無人機地面站頂部散熱孔任一尺度皆不超過 5 mm，是否符合 P.2.2？", "a": "符合。任何尺度皆不超過 5 mm 之開孔為可接受構造之一，符合所列任一構造即可。", "src": "CNS p.273"}]}}, {"id": "S", "clauses": ["S"], "group": "annex", "title_en": "Annex S — Tests for resistance to heat and fire (Flammability tests for fire enclosures, fire barriers and materials)", "title_zh": "附錄 S — 耐熱及耐燃試驗(防火外殼、防火障壁及材料之可燃性試驗)", "purpose_zh": "這組試驗在問一個問題:萬一機器內部某個零件因故障起火,這把火會不會燒穿外殼、蔓延到外面、或引燃旁邊的東西?針焰試驗用一支像打火機的小火苗,模擬內部小零件著火的情況;500W大火焰則模擬比較猛的火源。外殼或障壁必須能擋住或讓火自己熄掉,不能把火放出來。對無人機而言,機身內有鋰電池與馬達驅動板,一旦短路冒火,外殼若不耐燃就可能在空中或落地後引發更大火災。", "analogy_zh": "就像考驗一個垃圾桶:你丟一根點燃的火柴進去,看桶子會不會自己燒穿、會不會把放在桶子下面的衛生紙也點著。會的話這個桶子(外殼)就不及格。", "procedure_zh": "針焰法(IEC 60695-11-5):用直徑約0.9mm的噴嘴產生約12mm高的藍色火焰,以45度角接觸試樣（施焰時間依 S.1：先 10 秒；若燃燒不超過 30 秒，同點再施 1 分鐘；若仍不超過 30 秒，再施 2 分鐘），每次移開火焰後觀察試樣與周圍是否在 30 秒內自行熄滅,且其下方200mm處鋪設的薄紙(wrapping tissue)與襯墊不可被引燃。500W火焰法(IEC 60695-11-20):用較大的125mm火焰對試樣施加,評估垂直燃燒等級(對應UL94 5VA/5VB)。防火外殼完整性試驗(S.2)於頂部開孔覆蓋單層棉紗布(cheesecloth)作為火焰是否竄出之指示物，棉紗布不可被點燃；底部開孔另以 S.3 燃油灌注法驗證（紗布置於樣品下方約 50 mm，不得被點燃）。", "params": "S.1 防火機殼/阻隔物材料針焰試驗（IEC 60695-11-5；CNS p.284）：施焰 10 s；若燃燒 ≤30 s 同點立即再施 1 min；若再 ≤30 s 再施 2 min。預處理：空氣循環烤箱 168 h（7 日），溫度＝5.4.1.4 實測最高溫＋10 K 或 70°C 取高；印刷電路板另為 125°C±2°C／24 h＋無水氯化鈣乾燥冷卻 4 h。判定：不得完全燒盡、持續火焰 30 s 內熄滅、指定層/包裝棉紙不得燃燒。S.2 完整性（p.285）：施焰 60 s；頂部開孔覆單層紗布，紗布不得引燃（針焰距離量測參圖 S.1，頂面基準 12 mm）。S.3 底部耐燃（p.286）：紗布置於樣品下方約 50 mm 之淺盤上；小金屬勺（Ø≤65 mm）盛 10 mL 蒸餾燃料油，點燃後以約 1 mL/s 自開孔上方約 100 mm 穩定灌注，燃燒 1 min；5 min 間隔重複 2 次（換新紗布），紗布不得點燃。S.4 材料耐燃分級＝表 S.1～S.3（HF／5V／V／HB／VTM 系）。S.5（穩態 >4,000 W）500 W 火焰（IEC 60695-11-20；p.287）：施焰 5 s／移除 5 s，共 5 次。紗布＝約 40 g/m² 漂白棉布（3.1.16）。版次補充：IEC Ed.4 新增 S.6 網罩布/泡棉之燃料錠試驗（六亞甲基四胺錠、燃燒 130 s±10%、延燒不得超過錠中心 50 mm）——CNS Ed.3 無此節。", "standard_equipment": ["Needle flame test apparatus acc. to IEC 60695-11-5:2016, gauge for flame hight", "Distillate fuel oil as described in annex S.3.2", "500W flame test apparatus in acc. to IEC 60695-11-20:2015", "Cheesecloth (bleached cotton cloth 40g/m2), wrapping tissue (12g/ m2 – 30g/m2)", "fuel tablet in according to S.6"], "iec_bsmi": "CNS 15598-1 對應採用 IEC 62368-1,Annex S 之耐燃方法引用 IEC 60695 系列(CNS 亦有對應之 CNS 14545/CNS 14535 系列火災危險試驗標準)。基本諧和,無已知技術差異;UL 62368-1 對 500W/UL94 分類有並行對照,屬等同。需注意 CNS 版次(對應 IEC 62368-1 第2版/2018)與最新 IEC 第3版(2023)在 Annex S 編排上可能有細部章節號差異。", "location": "材料測試區", "utils": ["需排煙"], "equipment": [{"en": "Needle-flame test apparatus", "zh": "針焰試驗裝置", "role": "equip", "instId": "needle-flame"}, {"en": "500 W flame test apparatus", "zh": "500 W 火焰試驗裝置", "role": "equip", "instId": "flame-500w"}, {"en": "Cheesecloth (bleached cotton)", "zh": "棉紗布（漂白棉布）", "role": "consumable", "instId": "cheesecloth"}, {"en": "Wrapping tissue", "zh": "薄棉紙（包裝紙）", "role": "consumable", "instId": "tissue"}], "diagram": "needleflame", "qa": "PEL 已確認：附錄 S 同時列有「針焰試驗裝置（IEC 60695-11-5）」與「500 W 火焰試驗裝置（IEC 60695-11-20）」兩者（皆 SP 特殊設施），另需餾分燃油（S.3.2）。故清單之 500 W 火焰裝置為官方要求項目，正確（先前「非規範」之提醒予以更正）。", "pel": [{"equip": "Needle flame test apparatus acc. to IEC 60695-11-5:2016, gauge for flame hight", "code": "SP", "test": "Tests for resistance to heat and fire", "zh": "針焰試驗裝置(IEC 60695-11-5)", "instId": "needle-flame"}, {"equip": "Distillate fuel oil as described in annex S.3.2", "code": "S", "test": "Tests for resistance to heat and fire", "zh": "餾分燃油(S.3.2)", "instId": ""}, {"equip": "500W flame test apparatus in acc. to IEC 60695-11-20:2015", "code": "SP", "test": "Tests for resistance to heat and fire", "zh": "500W火焰試驗裝置(IEC 60695-11-20)", "instId": "flame-500w"}, {"equip": "Cheesecloth (bleached cotton, 40 g/m²)", "code": "RB", "test": "Tests for resistance to heat and fire", "zh": "漂白棉紗布（40 g/m²）", "instId": "cheesecloth"}, {"equip": "Wrapping tissue (12–30 g/m²)", "code": "RB", "test": "Tests for resistance to heat and fire", "zh": "包裝棉紙（12–30 g/m²）", "instId": "tissue"}, {"equip": "fuel tablet in according to S.6", "code": "SP", "test": "Tests for resistance to heat and fire", "zh": "燃料錠(S.6)", "instId": ""}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "multiple", "why_zh": "機體內含LiPo+馬達驅動板(PS3)，防火外殼與塑膠件耐燃為核心；充電器亦適用。"}, "gist_zh": "用針焰/大火焰燒外殼與屏障，確認能擋火或自熄，避免機內鋰電/驅動板起火延燒。", "learn": {"obj": ["能說出 S.1 施焰 10 秒→1 分→2 分與三判準（不燒盡、30 秒熄、棉紙不燃）", "能解釋 S.2／S.3 以紗布不得引燃作為火焰竄出之合格指示", "能判斷穩態功率 >4,000 W 之防火機殼改依 S.5（500 W 火焰，5 秒×5 次）", "能判斷 S.6 燃料錠試驗為 IEC Ed.4 新增，CNS Ed.3 無此節"], "pit": [{"t": "誤解：S.1 施焰 30 秒、預處理 24 小時、紗布 26–28 m²/kg。正解：施焰 10 s→1 min→2 min，預處理 168 h，紗布約 40 g/m²。", "src": "查證記錄 D-07"}, {"t": "誤解：燃料錠（S.6）為現行 CNS 必測項目。正解：S.6 係 IEC Ed.4 新增，CNS Ed.3（2020）無此節，採用 Ed.4 後始適用。", "src": "查證記錄 G-5"}], "quiz": [{"q": "S.1 針焰試驗三段施焰時間如何安排？自熄判準為何？", "a": "先施焰 10 s；若燃燒不超過 30 s 同點再施 1 min；仍不超過 30 s 再施 2 min；持續火焰須於 30 s 內熄滅。", "src": "CNS p.284"}, {"q": "S.3 底部耐燃試驗用多少燃油？以何速率自多高灌注？重複幾次？", "a": "10 mL 蒸餾燃料油，以約 1 mL/s 自開孔上方約 100 mm 灌注，燃燒 1 min，間隔 5 min 重複 2 次（換新紗布）。", "src": "CNS p.286"}, {"q": "無人機機殼做 S.2 完整性試驗時，如何判斷火焰是否竄出？", "a": "頂部開孔覆單層棉紗布（約 40 g/m² 漂白棉布）作指示物，施焰 60 s，紗布不得被引燃。", "src": "CNS p.285-286"}]}}, {"id": "T.2", "clauses": ["T.2–T.4"], "group": "annex", "title_en": "Annex T.2 Steady force test, 10 N / T.3 Steady force test, 30 N / T.4 Steady force test, 100 N", "title_zh": "附錄 T.2 穩定力試驗 10 N / T.3 穩定力試驗 30 N / T.4 穩定力試驗 100 N", "purpose_zh": "這是用「手指或手掌可能施加的力量」去推、壓機器各部位,確認在正常使用中被人手碰、靠、按時,內部的帶電零件或危險運動件不會因外殼變形而暴露出來。10N約等於用一根手指輕按的力;30N是用力按的力;100N則接近用一隻手掌用力推。施力後仍須維持安全距離與隔離,不能讓人摸到電或被夾傷。", "analogy_zh": "就像你買智慧型手機時用拇指用力按一按螢幕邊框、推一推背蓋,看看會不會按到內部、或把後蓋推開露出電池——機器也要能承受手指與手掌這種日常力道。", "procedure_zh": "T.2(10N±1N)對考量中之組件或部件施加穩定力約 5 秒(條文未指定施力工具);T.3(30N±3N)以未關節化試指(unjointed test finger,圖 V.1/V.2)施力約 5 秒;T.4(100N±10N)與 T.5(250N±10N)則以直徑 30 mm 圓形平面端之施力工具，依序施加於外部機殼之頂部、底部及側面各約 5 秒。施力後檢查是否仍符合電氣間隙、防護或防觸電要求。", "params": "T.2:10 N ± 1 N;T.3:30 N ± 3 N;T.4:100 N ± 10 N;施力工具圓形平面直徑30mm(100N及以上);施力時間典型 5 s。(對照:T.5 外殼為 250 N ± 10 N,5s;質量>18kg者底部不施加。)", "standard_equipment": ["10N ± 1N; Test finger (figure V1 or V2 unjointed, 30N± 3N); Test tool 100N± 10N with a circular plan surface Ø 30mm; Stop watch"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和,力值與工具無已知差異(源自舊 IEC 60950-1 4.2.x / IEC 60065 9.1.x)。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Steady-force test finger (10/30 N)", "zh": "穩定施力試指（10／30 N）", "role": "fixture", "instId": "steady-force-finger"}], "diagram": "", "qa": "", "pel": [{"equip": "Steady force 10 N ± 1 N, unjointed test finger 30 N ± 3 N (Figure V.1/V.2)", "code": "RB", "test": "Steady force test", "zh": "穩定施力試指（10 N／30 N，圖 V.1/V.2）", "instId": "steady-force-finger"}, {"equip": "Test tool 100 N ± 10 N, circular Ø 30 mm", "code": "RB", "test": "Steady force test", "zh": "施力試具 100 N（Ø30 mm 圓面）", "instId": "force-gauge"}, {"equip": "Stop watch", "code": "RB", "test": "Steady force test", "zh": "碼錶", "instId": "stopwatch"}], "match": {"level": "warn", "note": "部分符合"}, "drone": {"relevant": true, "level": "high", "applies_to": "airframe", "why_zh": "以試指10/30/100N推壓外殼，確認受力不致暴露機體內LiPo/帶電件，屬基礎外殼完整性。"}, "gist_zh": "用相當於手指到手掌的力推壓各部位，確認外殼不變形到露出帶電件或夾傷手。", "learn": {"obj": ["能說出 T.2～T.4 力值：10±1、30±3、100±10 N，約 5 秒", "能判斷 T.2 條文未指定施力工具，試指（圖 V.1/V.2）僅規定於 T.3", "能說出 T.4／T.5 以 Ø30 mm 平面工具施於外部機殼頂、底、側面", "能解釋施力後仍須符合電氣間隙、防護或防觸電要求"], "pit": [{"t": "誤解：T.4／T.5 之 100／250 N 施力對象與 T.2／T.3 相同。正解：T.4／T.5 係以 Ø30 mm 圓形平面工具依序施加於外部機殼之頂部、底部及側面。", "src": "查證記錄 敘事修正（T.2）"}], "quiz": [{"q": "T.3 穩定力試驗之力值、容差與施力工具為何？", "a": "30 N±3 N，以未關節化試指（圖 V.1／V.2）施力約 5 秒。", "src": "CNS p.289"}, {"q": "T.2 之 10 N 穩定力施加於何對象、持續多久？", "a": "施加於考量中之組件或部件約 5 秒；條文未指定施力工具。", "src": "CNS p.289"}, {"q": "以手掌用力推無人機外殼約對應哪級試驗？如何施加？", "a": "約對應 T.4 之 100 N±10 N，以 Ø30 mm 圓形平面工具依序施於外部機殼頂、底、側面各約 5 秒。", "src": "params"}]}}, {"id": "T.6", "clauses": ["T.6"], "group": "annex", "title_en": "Annex T.6 Impact test (Steel-ball impact test)", "title_zh": "附錄 T.6 撞擊試驗(鋼球撞擊試驗)", "purpose_zh": "這是測試外殼「被東西砸到或撞到」時夠不夠堅固。用一顆約半公斤的鋼球去撞擊外殼,模擬日常可能發生的碰撞(掉落的工具、被物品砸到等)。撞完後外殼不能破裂到讓人摸得到內部帶電或會夾傷的部位,也不能讓防護功能失效。對無人機,機身殼若被撞裂露出電池或螺旋槳驅動部位,就有觸電或割傷風險。", "analogy_zh": "就像測試安全帽:拿一顆鐵球從固定高度砸下去,看帽殼會不會裂開。會裂開保護不了頭(內部),就不合格。", "procedure_zh": "使用直徑約50mm、質量500g±25g的硬鋼球,依受測面方位施加:水平面以垂直落球——讓鋼球從規定高度自由落下撞擊水平朝上的外殼;垂直面以水平擺錘——將鋼球以擺錘方式擺下撞擊垂直的外殼面(垂直/傾斜面亦可改將樣品轉 90° 後以垂直落球取代擺錘)。落下/擺盪高度為 1,300 mm±10 mm（能量約 6.4 J）；僅作防火機殼部件評估時為 410 mm±10 mm。撞擊後檢查外殼是否破裂、是否使危險部位變為可觸及。", "params": "鋼球：Ø約 50 mm、500 g±25 g（CNS p.289）。水平面：自 1,300 mm±10 mm 自由落下；垂直/傾斜面：以線懸吊自同高度鐘擺擺盪施加水平撞擊（或將樣品轉 90° 改施垂直撞擊）。僅作防火機殼部件評估時高度 410 mm±10 mm。教學提醒：0.5–3.5 J 能量階梯屬 T.9 玻璃撞擊試驗（表 T.1：0.5 J/102 mm、1 J/204、2 J/408、3.5 J/714）；4.8.4.5 電池匣蓋撞擊用 0.5 J／2 J；8.5.5.2 燈泡爆裂以 5 J 步進——勿與 T.6 混用。", "standard_equipment": ["50mm/500g ± 25g steel ball, ruler"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和。同等構造亦見於 IEC 60598-1(燈具)Clause 4.13.4,UL 62368-1 等同採用,無已知差異。", "location": "安規測試區", "utils": [], "equipment": [{"en": "500 g impact steel ball", "zh": "鋼球撞擊試驗球（500 g）", "role": "fixture", "instId": "steel-ball"}], "diagram": "impactball", "qa": "", "pel": [{"equip": "Steel ball Ø50 mm, 500 g ± 25 g", "code": "RB", "test": "Enclosure impact test", "zh": "鋼球 Ø50 mm／500 g±25 g", "instId": "steel-ball"}, {"equip": "Ruler", "code": "RB", "test": "Enclosure impact test", "zh": "量尺", "instId": "ruler"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "airframe", "why_zh": "500g鋼球約5J撞擊機體外殼，確認撞後不使LiPo/螺旋槳驅動等危險源可觸及。"}, "gist_zh": "用約半公斤鋼球撞擊外殼，確認不破裂到摸得到帶電或會夾傷的部位。", "learn": {"obj": ["能說出鋼球 500 g±25 g 與一般落高 1,300 mm", "能判斷受測面方位之施加法：水平面垂直落球、垂直面水平擺錘", "能說出僅作防火機殼部件評估時之落高 410 mm±10 mm", "能判斷 0.5–3.5 J 能量階梯屬 T.9 等條文而非 T.6"], "pit": [{"t": "誤解：T.6 為「典型 5 J、0.5–3.5 J 多級」。正解：T.6＝500 g 鋼球自 1,300 mm（防火件 410 mm）；能量階梯屬 T.9 等條文。", "src": "查證記錄 D-08"}], "quiz": [{"q": "T.6 鋼球質量與一般落下高度為何？", "a": "鋼球 500 g±25 g（直徑約 50 mm），自 1,300 mm±10 mm 自由落下，能量約 6.4 J。", "src": "CNS p.289"}, {"q": "無人機機身垂直側面應如何施加鋼球撞擊？", "a": "以線懸吊鋼球自同高度鐘擺擺盪作水平撞擊；或將樣品轉 90° 後以垂直落球取代擺錘。", "src": "CNS p.289"}, {"q": "僅作防火機殼部件評估時，落下高度改為多少？", "a": "410 mm±10 mm；一般評估則為 1,300 mm±10 mm。", "src": "CNS p.289"}]}}, {"id": "T.7", "clauses": ["T.7"], "group": "annex", "title_en": "Annex T.7 Drop test", "title_zh": "附錄 T.7 落下試驗", "purpose_zh": "這是測試「整台機器不小心摔到地上」會怎樣。手持或可攜帶的設備(像遙控器、無人機本體、隨身電源)難免會從手中或桌上掉下來;此試驗讓設備從規定高度自由落下到硬地面,摔完後檢查外殼是否破裂、電池是否露出、有沒有變得會觸電或起火。重點不是設備還能不能用,而是摔了之後安不安全。", "analogy_zh": "就像手機防摔測試:把手機從一定高度往硬地板摔幾次,看會不會摔到電池外露、螢幕碎到割手。摔壞外觀沒關係,但不能變得危險。", "procedure_zh": "把設備從規定高度自由落下到標準硬質地面,通常落3次,選擇最可能造成最大衝擊(尤其對電池室)的姿態。落下高度依設備類別而定：手持式/直插式/可攜式 1,000 mm±10 mm；桌上型/移動式 750 mm±10 mm；僅作為防火外殼之部位則為 350 mm（桌上/移動）或 500 mm（手持/直插/可攜）。另 4.8.4.4 規定 7 kg 以下可攜式設備之電池匣落下試驗為 1 m×3 次（遙控器 10 次）。落地後檢查外殼破損、帶電件可觸及性、電池安全等。", "params": "落下 3 次，置於可能產生最不利結果之位置（CNS p.290）：桌上型/移動式 750 mm±10 mm；手持式/直插式/可攜式 1,000 mm±10 mm；僅作防火機殼部件：桌上/移動 350 mm±10、手持/直插/可攜 500 mm±10。落下面＝約 13 mm 硬木固定於 2 層各 18 mm±2 mm 合板，置於混凝土或等效非彈性地板。相關條文：4.8.4.4 電池匣落下試驗（7 kg 以下可攜式設備自 1 m 落下 3 次；遙控器 10 次）即引用本法。", "standard_equipment": ["Hard wood 13mm on 18mm ± 2mm plywood, two layers. ruler up to 1000 mm ± 10mm"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和。落下高度依設備分類,各認證機構對「可移動設備750mm」偶有豁免討論,但標準值一致,無國家差異。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Hardwood / plywood drop surface", "zh": "硬木／合板落下試驗台", "role": "fixture", "instId": "plywood"}, {"en": "Steel ruler / tape (<=5000 mm)", "zh": "鋼直尺／量尺", "role": "equip", "instId": "ruler"}], "diagram": "droptest", "qa": "", "pel": [{"equip": "Hardwood 13 mm on two layers of 18 mm ± 2 mm plywood", "code": "RB", "test": "Drop test", "zh": "硬木 13 mm＋2 層 18 mm 合板", "instId": "plywood"}, {"equip": "Ruler (up to 1000 mm ± 10 mm)", "code": "RB", "test": "Drop test", "zh": "量尺（至 1000 mm）", "instId": "ruler"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "multiple", "why_zh": "可攜機體/遙控落下；含鋰電池整機落下由附錄M.4.4強制，摔後不得電池外露或起火。"}, "gist_zh": "手持/可攜設備從規定高度摔到硬地，確認摔後外殼不裂、電池不外露、不致觸電起火。", "learn": {"obj": ["能選出設備類別對應落高：手持／可攜 1,000 mm、桌上／移動 750 mm", "能說出落下面構造：13 mm 硬木＋兩層各 18 mm±2 mm 合板", "能解釋判定重點為摔後安全性，而非設備功能是否正常", "能判斷 1 m×3 次（遙控器 10 次）屬 4.8.4.4 而非 T.7 本文"], "pit": [{"t": "誤解：合板厚 19～20 mm，且「7 kg 以下自 1 m 落下」屬 T.7。正解：合板為兩層各 18 mm±2 mm；1 m×3 次（遙控器 10 次）屬 4.8.4.4。", "src": "查證記錄 D-09"}], "quiz": [{"q": "手持式遙控器做 T.7 落下試驗，高度與次數為何？", "a": "1,000 mm±10 mm（手持式／直插式／可攜式類），落下 3 次，置於可能產生最不利結果之位置。", "src": "CNS p.290"}, {"q": "T.7 落下試驗之標準落下面如何構成？", "a": "約 13 mm 硬木固定於兩層各 18 mm±2 mm 合板上，置於混凝土或等效非彈性地板。", "src": "CNS p.290"}, {"q": "依 4.8.4.4，無人機遙控器之電池匣應自多高落下幾次？", "a": "自 1 m 落下，遙控器為 10 次（一般 7 kg 以下可攜式設備 3 次）；該條引用 T.7 方法。", "src": "params"}]}}, {"id": "T.10", "clauses": ["T.10"], "group": "annex", "title_en": "Annex T.10 Glass fragmentation test (for thermally toughened glass)", "title_zh": "附錄 T.10 玻璃破碎(碎片化)試驗(適用於熱強化/鋼化玻璃)", "purpose_zh": "這是測試「機器上那塊玻璃萬一破掉,碎成什麼樣」。如果設備有可被人摸到的玻璃面板(顯示器蓋板、觀景玻璃等),萬一破裂,碎片必須是細小、邊緣鈍化的鋼化玻璃顆粒(像汽車車窗那樣),而不是長而尖、會劃傷人的大片刀狀玻璃。此試驗用衝子把玻璃打破,再數碎片夠不夠細,藉此確認用的是安全的鋼化玻璃。", "analogy_zh": "就像汽車側窗玻璃破掉時,會碎成一堆小方塊不傷人;但一般窗戶玻璃破掉是大片尖刀會割傷人。這試驗就是在確認設備用的是前者那種安全玻璃。", "procedure_zh": "把玻璃試樣整面平放支撐妥當,並做防碎片飛濺防護。用一支頭部質量75g±5g、尖端為60度±2度碳化鎢圓錐的中心衝子,定位在距樣品長邊中點約 15 mm 處,以鎚子敲擊衝子使玻璃破裂。破裂後最多等5分鐘,在大概位於樣品中心處取一個50mm見方範圍(排除任何距邊緣15mm以內的區域),目視計數碎片數,須≥45片才合格。", "params": "擊碎點：距樣品長邊中點約 15 mm 處（CNS p.291）。破碎後 5 min 內、不使用輔助工具計數：中心區邊長 50 mm 矩形內粗粒碎片 ≥45 個；排除任何邊緣 15 mm 內之區域。擊碎工具：CNS Ed.3 未指定；IEC Ed.4 與官方 P.E.L. 明定 centre punch（頭部 75 g±5 g、尖端 60°±2° 圓錐碳化鎢，引 IEC 60335-2-24）。", "standard_equipment": ["Centre punch (having a head with a mass of 75 g ± 5 g and a conical tungsten carbide tip with an angle of 60° ± 2°; IEC 60335-2-24:2010/AMD2:2017 Subclause 22)* and a square of 50 mm side"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和。同方法廣見於 IEC 60598-2-3、IEC 60335-2-x 之鋼化玻璃驗證,UL 62368-1 等同,無已知國家差異。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Spring-loaded centre punch", "zh": "中心衝子（彈簧式）", "role": "fixture", "instId": "centre-punch"}], "diagram": "glassfrag", "qa": "", "pel": [{"equip": "Centre punch (head 75 g ± 5 g, 60° ± 2° tungsten-carbide tip, IEC 60335-2-24 §22)", "code": "RB", "test": "Fragmentation test", "zh": "中心衝子（頭 75 g；60° 碳化鎢尖）", "instId": "centre-punch"}, {"equip": "50 mm square counting frame", "code": "RB", "test": "Fragmentation test", "zh": "50 mm 見方計數框", "instId": ""}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "remote", "why_zh": "僅遙控/地面站含可觸及鋼化玻璃面板時觸發，碎片須≥45片；多數無玻璃故常N/A。"}, "gist_zh": "打破面板玻璃並數碎片，確認用的是破成細小鈍粒的安全鋼化玻璃，而非大片尖刀。", "learn": {"obj": ["能說出合格判準：中心區50mm方格內粗粒碎片≥45個、排除邊緣15mm內區域", "能說出擊碎點位置：距樣品長邊中點約15mm處", "能解釋為何要求碎成細小鈍粒而非大片尖刀狀碎片", "能判斷遙控器/地面站有可觸及鋼化玻璃面板時才觸發本試驗"], "pit": [{"t": "誤解：擊碎點距樣品長邊中點13mm。正解：CNS規定約15mm，IEC Ed.4同值。", "src": "查證記錄 D-10"}, {"t": "誤解：CNS Ed.3已規定用75g中心衝擊碎。正解：Ed.3未指定工具；centre punch（頭75g±5g、尖60°±2°碳化鎢）為IEC Ed.4正文與P.E.L.明定。", "src": "查證記錄 G-7"}], "quiz": [{"q": "玻璃破碎後，50mm方格內粗粒碎片至少幾個才合格？要在多久內數完？", "a": "≥45個；破碎後5分鐘內、不使用輔助工具，在大概位於中心的50mm方格內計數，排除邊緣15mm內區域。", "src": "CNS p.291"}, {"q": "擊碎點應定在樣品的哪個位置？", "a": "距樣品長邊中點約15mm處；定位擊碎後再進行碎片計數。", "src": "CNS p.291"}, {"q": "無人機遙控器的鋼化玻璃螢幕蓋板可被觸及，本試驗要確認什麼？", "a": "確認破裂時碎成細小、邊緣鈍化的顆粒（如汽車車窗），而非長而尖的大片刀狀玻璃，避免割傷使用者。", "src": "params"}]}}, {"id": "X", "clauses": ["X"], "group": "annex", "title_en": "Annex X — Determination of clearance and creepage distance dimensions (measuring method)", "title_zh": "附錄 O／X — 空間距離與沿面距離之決定（一般量測法見附錄 O；不超過峰值 420 V 交流主電源電路之空間距離替代決定法見附錄 X）", "purpose_zh": "這不是一個「會破壞樣品」的試驗,而是一套「如何正確量距離」的規則。電器內部帶電金屬之間、帶電件與人可觸及部位之間,必須隔開足夠的距離才不會跳電或漏電——『空間距離』是兩點間穿過空氣的最短距離;『沿面距離』是沿著絕緣材料表面爬行的最短距離。Annex O 規定遇到溝槽、肋條、轉角、接縫時要怎麼量(例如小於某寬度的溝槽要不要跨過去算),確保不同實驗室量出來的數字一致、可比對。", "analogy_zh": "就像量兩棟房子之間的距離:『空間距離』是拉一條直線飛過去最短的距離;『沿面距離』是沿著地面繞過中間的牆和溝走過去的距離。Annex O 就是那本規定「遇到溝、遇到牆要怎麼繞、怎麼算」的量測規則手冊。", "procedure_zh": "依附錄 O 之圖 O.1–O.16 規則，先依污染等級自表 O.1 取最小溝槽寬度 X（0.25／1.00／1.50 mm）。量沿面距離時,寬度小於 X 的溝槽以跨越直線計算,寬度≥X 的溝槽則須沿溝槽輪廓量。空間距離則取穿過空氣的最短路徑。配合塞規/量規或顯微量測,將實測值與 5.4 表列之需求值比較判定。 本附錄為量測「方法」，所用器具與 5.4.2／5.4.3／5.4.4 共用（游標卡尺、測微器、2.5D 投影量測儀、沿面距離量測棒等）。", "params": "X 值（CNS 表 O.1，p.266）：污染等級 1＝0.25 mm、2＝1.00 mm、3＝1.50 mm；若規定之最小空間距離 <3 mm，X 取「表 O.1 值」與「該最小空間距離之 1/3」二者較小者;量測結果須對照 5.4 依工作電壓、汙染度、絕緣等級(基本/補充/強化)所定之 clearance 與 creepage 最小值。本附錄本身無施力/溫度等破壞參數。（IEC Ed.4 表 O.1 同值：0.25／1.00／1.50 mm）", "standard_equipment": ["Oscilloscope", "Dial gauge or calliper", "Micrometer", "Pins etc. with different diameters", "Microscope", "Impulse test generator circuit 1 of Table D.1.; Impulse test generator circuit 2 of Table D.1.; impulse test generator circuit 3 of Table D.1", "Test equipment for tracking index per IEC 60112", "Mandrel (figure 25 to 28), metal foil, equipment suitable for electrical strength test loads; Stop watch, weight"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和；量測規則源自 IEC 60664-1。條號釐清：一般之沿面距離與空間距離量測為 <b>附錄 O</b>「沿面距離及空間距離之量測」；<b>附錄 X</b> 則為「連接至不超過峰值 420 V(300 V RMS) 之交流主電源電路之空間距離替代決定法」。溝槽、轉角等量測規則與最小溝槽寬度 X 依 CNS 15598-1:2020 §5.4 與附錄 O／X 表列。", "location": "", "utils": [], "equipment": [{"en": "Insulation resistance meter", "zh": "絕緣電阻計", "role": "equip", "instId": "ir-meter"}, {"en": "Impulse voltage test generator", "zh": "脈衝（突波）電壓產生器", "role": "equip", "instId": "impulse-gen"}, {"en": "Tracking index (CTI/PTI) tester", "zh": "相對漏電起痕指數試驗機", "role": "equip", "instId": "cti-tester"}, {"en": "Vernier calliper", "zh": "游標卡尺", "role": "equip", "instId": "calliper"}, {"en": "Micrometer", "zh": "測微器（分厘卡）", "role": "equip", "instId": "micrometer"}, {"en": "2.5D profile projector / video measuring", "zh": "2.5 次元投影量測儀", "role": "equip", "instId": "projector"}, {"en": "Creepage distance test rod/probe", "zh": "沿面距離量測棒", "role": "fixture", "instId": "creepage-rod"}, {"en": "Mandrel (bending) tester", "zh": "心軸彎曲試驗機", "role": "equip", "instId": "mandrel"}], "diagram": "creepage", "qa": "", "pel": [{"equip": "Oscilloscope", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "示波器", "instId": "oscilloscope"}, {"equip": "Dial gauge or calliper", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "量錶或游標卡尺", "instId": "calliper"}, {"equip": "Micrometer", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "測微器", "instId": "micrometer"}, {"equip": "Pins etc. with different diameters", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "不同直徑量測銷", "instId": ""}, {"equip": "Microscope", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "顯微鏡", "instId": ""}, {"equip": "Impulse test generator, circuits 1 & 2 of Table D.1", "code": "RT/S/RC", "test": "Clearances, creepage distance, solid insulation", "zh": "脈衝電壓產生器（電路 1、2）", "instId": "impulse-gen"}, {"equip": "Impulse test generator, circuit 3 of Table D.1 (10 kV)", "code": "RT/S/RC", "test": "Clearances, creepage distance, solid insulation", "zh": "天線突波產生器（電路 3，10 kV）", "instId": "antenna-surge"}, {"equip": "Test equipment for tracking index per IEC 60112", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "相對漏電起痕(CTI)試驗機", "instId": "cti-tester"}, {"equip": "Mandrel (Figures 25–28)", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "心軸（圖 25–28）", "instId": "mandrel"}, {"equip": "Metal foil", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "金屬箔", "instId": ""}, {"equip": "Equipment for electric-strength test loads", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "耐壓試驗負載設備", "instId": "hipot"}, {"equip": "Stop watch", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "碼錶", "instId": "stopwatch"}, {"equip": "Weight", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "砝碼", "instId": "weights"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "clearance/creepage量測法,僅市電高壓需隔離處有意義;落在充電器一次側,SELV機體易滿足。"}, "gist_zh": "不是破壞試驗，而是遇溝槽、轉角時如何量間隙/沿面距離的統一規則，確保各實驗室結果可比對。", "learn": {"obj": ["能說出空間距離與沿面距離之定義差異", "能依污染等級選出表O.1之X值（0.25/1.00/1.50mm）", "能判斷溝槽寬度小於或達到X時各自的量測方式", "能解釋附錄O（量測規則）與附錄X（查表替代法）之分工"], "pit": [{"t": "誤解：X值是概略的0.25/1.0/1.5mm。正解：表O.1精確值為0.25/1.00/1.50mm；且最小空間距離<3mm時，X取表值與其1/3之較小者。", "src": "查證記錄 D-19"}, {"t": "誤解：溝槽、肋條、轉角的量測規則在附錄X。正解：規則在附錄O（圖O.1–O.16）；附錄X為峰值420V以下交流主電源電路空間距離之查表替代法。", "src": "CNS p.266、p.306"}], "quiz": [{"q": "污染等級1、2、3時，表O.1的最小溝槽寬度X各是多少？", "a": "0.25mm、1.00mm、1.50mm（表O.1精確值，非概略值）。", "src": "CNS p.266"}, {"q": "量沿面距離時遇到寬度小於X的溝槽，要怎麼算？", "a": "以跨越溝槽的直線計算；寬度達X以上的溝槽才須沿溝槽輪廓量。", "src": "CNS p.266"}, {"q": "量無人機充電器一次側隔離時，空間距離與沿面距離各指什麼？", "a": "空間距離＝兩導電部件間在空氣中的最短距離；沿面距離＝沿絕緣材料表面爬行的最短距離。", "src": "CNS p.35"}]}}, {"id": "Y.3", "clauses": ["Y.3", "Y.3.3"], "group": "annex", "title_en": "Annex Y.3 Resistance to corrosion (Y.3 salt mist test; SO2 / sulphur-dioxide corrosion test)", "title_zh": "附錄 Y.3 抗腐蝕性(Y.3 鹽霧試驗;二氧化硫腐蝕試驗)", "purpose_zh": "戶外設備長年風吹日曬雨淋,沿海還有鹽分、都市與工業區有含硫廢氣,金屬零件會生鏽腐蝕。一旦負責安全的金屬件(接地端子、螺絲、外殼、屏蔽)鏽蝕,可能導致接地失效、外殼鬆脫漏電。此試驗用人工加速的方式(噴鹽霧、通二氧化硫)在短時間內模擬多年腐蝕,確認設備用的金屬與鍍層夠耐腐蝕,長期使用仍安全。對戶外作業的無人機基地台/充電座尤其重要。", "analogy_zh": "就像把腳踏車放進一個整天噴鹽水又冒酸氣的房間,加速看它幾天內會不會鏽到煞車失靈——藉此預測它在海邊騎好幾年會不會壞。", "procedure_zh": "鹽霧試驗（裝置依 IEC 60068-2-11）：試樣置於 35°C±2°C 箱內，噴灑 5%±1%（重量比）生理食鹽水霧，每組連續暴露 168 小時。二氧化硫試驗（Y.3.3；ISO 3231 式惰性密封箱 300 L±30 L）：注入體積濃度 0.067% 之 SO₂ 0.2 L；每循環＝8 小時暴露（箱溫 40°C±3°C）＋開門靜置 16 小時，共 5 循環。整體程序（Y.3.4）＝2 組各 12 天（每組＝鹽霧試驗(a) 接 SO₂ 試驗(b)），每組結束以除礦質水清洗；試後檢查腐蝕程度與安全防護功能（必要時執行 5.6 接地連續性檢核）。", "params": "鹽霧（裝置依 IEC 60068-2-11；CNS p.309）：生理食鹽水 5%±1%（重量比）、箱溫 35°C±2°C、每組暴露 168 h。SO₂（Y.3.3，p.308-309）：ISO 3231 式惰性密封箱 300 L±30 L，注入體積濃度 0.067% 之 SO₂ 0.2 L（可由 Na₂S₂O₅＋胺基磺酸生成）；每循環＝8 h 暴露（箱溫 40°C±3°C）＋開門靜置 16 h，共 5 循環。整體程序（Y.3.4）：2 組各 12 天（每組＝鹽霧試驗(a) 接 SO₂ 試驗(b)），每組後以除礦質水清洗。替代：ISO 21207 方法 B／ISO 14993／等同標準。判定（Y.3.5）：目測無危害安全之銹蝕、龜裂或其他劣化（允許塗層表面侵蝕）；必要時試後執行 5.6 接地連續性檢核。", "standard_equipment": ["Salt spray test apparatus according to IEC 60068-2-11; Test chamber according to ISO 22479", "Water - sulphur dioxide test chamber"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和：鹽霧設備依 IEC 60068-2-11、水飽和 SO2 惰性箱依 ISO 3231。已對照 CNS 附錄 Y.3 試驗程序：<b>2 組、每組連續 12 天</b>——(a) 鹽霧 <b>168 h</b>（食鹽水 5%±1%、35°C±2°C），接 (b) <b>5 循環</b>（每循環 8 h 暴露水飽和 SO2、40°C±3°C，再開門 16 h）；SO2 於 300 L±30 L 箱注入體積濃度 0.067% 之 0.2 L（按容積比例）。判定：目視無危害安全之保護塗層銹蝕／氧化／龜裂（容許表面侵蝕）。亦可用 ISO 21207 方法B／ISO 14993 等同程序。", "location": "", "utils": [], "equipment": [{"en": "Salt-spray (fog) chamber", "zh": "鹽霧試驗機", "role": "equip", "instId": "salt-spray"}, {"en": "SO2 corrosion test chamber", "zh": "二氧化硫腐蝕試驗箱", "role": "equip", "instId": "so2-chamber"}], "diagram": "saltspray", "qa": "", "pel": [{"equip": "Salt-spray apparatus (IEC 60068-2-11)", "code": "S", "test": "Resistance to corrosion, water borne contaminants", "zh": "鹽霧試驗機（IEC 60068-2-11）", "instId": "salt-spray"}, {"equip": "SO₂ corrosion test chamber (ISO 22479)", "code": "S", "test": "Resistance to corrosion, water borne contaminants", "zh": "二氧化硫腐蝕試驗箱（ISO 22479）", "instId": "so2-chamber"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅宣告戶外時觸發；確認機體/戶外殼接地端子螺絲等金屬抗鹽霧SO2不鏽蝕，PEL為S。"}, "gist_zh": "用鹽霧/二氧化硫加速數年腐蝕，確認接地端子、螺絲、外殼等金屬件耐蝕、不致接地失效漏電。", "learn": {"obj": ["能說出鹽霧條件：5%±1%食鹽水、35±2°C、每組168h", "能說出SO₂循環：8h暴露（40±3°C）＋16h靜置，共5循環", "能說出整體程序：2組各12天，每組結束以除礦質水清洗", "能解釋判定重點：無危害安全之銹蝕，必要時做5.6接地連續性檢核"], "pit": [{"t": "誤解：鹽霧箱溫±1°C、飽和桶47°C、沉降率等為CNS規定。正解：CNS為35±2°C、5%±1%食鹽水168h；SO₂ 8h@40±3°C×5循環、2組各12天。", "src": "查證記錄 D-11"}], "quiz": [{"q": "鹽霧試驗的食鹽水濃度、箱溫與每組暴露時間各是多少？", "a": "5%±1%（重量比）食鹽水、箱溫35±2°C、每組連續暴露168小時。", "src": "CNS p.309"}, {"q": "SO₂試驗一個循環如何組成？共做幾循環？", "a": "每循環＝8小時暴露（箱溫40±3°C）＋開門靜置16小時，共5循環。", "src": "CNS p.308-309"}, {"q": "戶外無人機充電座做完整套Y.3後，如何判定合格？", "a": "目測無危害安全之銹蝕、龜裂或其他劣化（允許塗層表面侵蝕）；必要時執行5.6接地連續性檢核。", "src": "params"}]}}, {"id": "Y.4.3", "clauses": ["Y.4.3"], "group": "annex", "title_en": "Annex Y.4.3 Tensile strength and elongation tests (for non-metallic outdoor enclosures / gaskets after UV conditioning)", "title_zh": "附錄 Y.4.3 ＆ C — 拉伸強度及伸長率（戶外件老化後之保留）", "purpose_zh": "塑膠在太陽紫外線長期照射下會變脆、變弱(就像塑膠水管曬久了一折就斷)。戶外設備若用塑膠外殼,曬了幾年後可能一碰就裂,露出內部帶電件而危險。此試驗先用人工紫外線燈把塑膠樣品加速「曬老」,再拉它測量還能承受多大拉力(拉伸強度)、能拉多長才斷(伸長率),並和沒曬過的比較。必須保留足夠比例(通常要≥70%)才算這塑膠夠耐曬、能安全用在戶外。", "analogy_zh": "就像比較一條新橡皮筋和一條曬了一整年的舊橡皮筋:新的能拉很長很有力,舊的稍微一拉就脆斷。設備的塑膠殼曬過後若像那條脆掉的舊橡皮筋,就不能用在戶外。", "procedure_zh": "墊片本體試驗（Y.4.3）：樣品於 69～70°C 循環空氣老化 168 小時，與未老化樣品比較，抗拉強度保留 ≥75%、伸長率 ≥60%（可依 ISO 37／ISO 1798／ASTM D412／D3574 執行）。UV 老化路徑（附錄 C，搭配 Y.2）：先依 Annex C 用氙弧/碳弧耐候試驗機(ISO 4892 系列)對塑膠試樣做紫外線老化(典型氙弧約1000小時或碳弧約720小時,黑板溫度約63°C)。老化後與未老化試樣分別依 ISO 527 用拉力試驗機量測拉伸強度與斷裂伸長率,計算保留率=(老化後值/初始值)×100%。一般要求關鍵機械性質保留 ≥70%(對應 UL 746C F1 戶外等級)方為合格。", "params": "Y.4.3 墊片拉伸試驗（適用可拉伸墊片如 O 形環；CNS p.310。注意：CNS 中文版此節標題誤印為「壓縮試驗」（與 Y.4.4 重複），IEC 原文為 Tensile strength and elongation tests）：樣品於 69～70°C 循環空氣老化 168 h；與未老化樣品相比，抗拉強度 ≥75%、伸長率 ≥60%；不得有可視劣化、變形、熔解或龜裂；可以 ISO 37、ISO 1798、ASTM D412 或 ASTM D3574 之抗拉強度及伸長試驗替代。配套之附錄 C（UV 老化後機械性質保留，搭配 Y.2 抗 UV）：碳弧 720 h 或氙弧 1,000 h、黑盤溫度 63°C±3°C、相對濕度 (50±5)%；判定依表 C.1：ISO 527 拉伸（或彎曲/衝擊）試驗後最小殘留 ≥70%（CNS p.181-182）。", "standard_equipment": ["Tensile strength test apparatus"], "iec_bsmi": "已對照 CNS 標準正本。<b>附錄 Y.4.3</b>（可拉伸密封墊片，如 O 型環）：經 <b>69–70°C 循環空氣 168 h</b> 熱老化後，抗拉強度須 ≥未老化之 <b>75%</b>、伸長率 ≥<b>60%</b>，且無明顯劣化／龜裂（可用 ISO 37／ISO 1798／ASTM D412／D3574 替代）。<b>附錄 C 表 C.1</b>（非金屬結構件 UV 老化後）：抗拉／抗彎／衝擊保留 ≥<b>70%</b>。兩者皆用拉伸試驗機，惟老化方式（熱 vs UV）與限值不同。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Tensile strength tester", "zh": "拉伸強度試驗機", "role": "equip", "instId": "tensile"}], "diagram": "", "qa": "", "pel": [{"equip": "Tensile strength test apparatus", "code": "S", "test": "Tensile strength and elongation tests", "zh": "拉伸強度試驗機", "instId": "tensile"}], "match": {"level": "warn", "note": "可能缺漏 / 建議補充"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅宣告戶外時觸發；機體非金屬殼經UV老化後拉伸/伸長率須保留≥70%，PEL為S。"}, "gist_zh": "紫外線加速老化後拉伸塑膠樣品，確認強度/伸長率仍保留足夠比例（常 ≥70%），才適合戶外。", "learn": {"obj": ["能說出墊片熱老化69～70°C/168h與保留判準≥75%/≥60%", "能說出附錄C UV老化：碳弧720h或氙弧1,000h、殘留≥70%", "能判斷CNS中文標題為誤印，正確為拉伸強度及伸長率試驗", "能解釋戶外塑膠與墊片為何須驗證老化後機械性質保留"], "pit": [{"t": "誤解：Y.4.3是壓縮試驗（CNS中文標題誤印，與Y.4.4重複）。正解：內文實為墊片拉伸強度及伸長率試驗；壓縮試驗為Y.4.4。", "src": "查證記錄 C-01、G-8"}, {"t": "誤解：Y.4.3只有附錄C的UV老化內容。正解：本體為墊片69～70°C/168h熱老化後抗拉≥75%、伸長≥60%；UV老化屬配套附錄C（殘留≥70%）。", "src": "查證記錄 D-12"}], "quiz": [{"q": "Y.4.3墊片熱老化的條件與拉伸/伸長保留判準各是多少？", "a": "69～70°C循環空氣老化168小時；與未老化樣品比，抗拉強度保留≥75%、伸長率≥60%。", "src": "CNS p.310"}, {"q": "附錄C的UV老化要曬多久？試後判定要保留多少？", "a": "碳弧720h或氙弧1,000h，黑盤溫度63±3°C；依表C.1，機械性質最小殘留≥70%。", "src": "CNS p.181-182"}, {"q": "無人機機體塑膠殼宣告戶外使用，為何要做老化後拉伸試驗？", "a": "紫外線久曬使塑膠變脆；老化後強度/伸長率須保留足夠（≥70%），否則曬幾年後一碰就裂、露出帶電件。", "src": "CNS p.181-182"}]}}, {"id": "Y.4.4", "clauses": ["Y.4.4"], "group": "annex", "title_en": "Annex Y.4.4 Compression and impact test (for non-metallic outdoor enclosures, including low-temperature impact)", "title_zh": "附錄 Y.4.4 壓縮及衝擊試驗(封閉型結構之密封墊片,含低溫衝擊)", "purpose_zh": "戶外機殼要防水防塵,靠的是門蓋接縫處的密封墊片。封閉型(閉孔)結構的墊片一方面長期被門蓋鎖緊壓著,另一方面在寒冷冬天會變脆,這時若被撞一下就容易裂。此試驗先對墊片樣品施加相當於約69 kPa的壓力(看會不會被壓扁回不來),再把樣品放到很冷(約-33°C或廠商標示最低溫)冰凍24小時後拿出來,馬上用1.35公斤的鎚從固定高度敲它,看冷脆狀態下會不會裂開。連續做幾天,確認墊片材料在又冷又受撞的最壞情況下仍能維持密封、不讓水氣灰塵跑進去造成漏電。", "analogy_zh": "就像把塑膠水桶放進冷凍庫凍一晚,拿出來馬上用鐵鎚敲——冬天變脆的塑膠最容易這樣裂開。能撐住不裂的才適合放戶外過冬。", "procedure_zh": "壓縮:把可提供約69 kPa壓力的圓柱形荷重置於墊片樣品中央2小時,移除靜置約30分鐘後量厚度,壓縮不得超過原厚度的50%。低溫衝擊:將同一試樣冷凍24小時至廠商標示最低溫(未標示則為-33°C),取出後立即以質量1.35kg、鎚頭直徑28.6mm(打擊面25.4mm)之鎚從150mm高處落下衝擊,試樣置於50×100mm無瑕雲杉(clear spruce)木塊之短邊上。每24小時再衝擊一次,連做兩天;最後於25°C±3靜置約24小時再驗證是否仍符合要求(無裂痕、無危險暴露)。", "params": "壓縮荷重:約69 kPa;冷凍:24h 至 -33°C(或廠商標示最低溫);衝擊鎚:1.35 kg,落高150mm,鎚頭Ø28.6mm/打擊面Ø25.4mm;墊塊:clear spruce 50×100mm木板,衝擊時試樣置於其短邊上(CNS p.310);衝擊頻率:每24h一次共3天;後置:25°C±3、約24h 後複驗。", "standard_equipment": ["Cylindrical weight for 69 kPa; Air oven; Environmental test chamber capable of testing to –33 °C; 1,35 kg impact hammer apparatus; Clear spruce wood pieces"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 諧和;此程序承襲北美戶外外殼要求(UL 60950-22 / UL 746C 系)。基本無國家差異;-33°C 與 69 kPa、1.35kg/150mm 為標準引用值。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Cylindrical weight (69 kPa)", "zh": "69 kPa 壓縮配重", "role": "fixture", "instId": "cyl-weight-69"}, {"en": "1.35 kg impact hammer", "zh": "1.35 kg 衝擊鎚", "role": "fixture", "instId": "impact-hammer"}, {"en": "Clear spruce wood blocks", "zh": "雲杉木塊（衝擊墊木）", "role": "consumable", "instId": "spruce"}], "diagram": "", "qa": "", "pel": [{"equip": "Cylindrical weight (69 kPa)", "code": "S", "test": "Compression test", "zh": "69 kPa 壓縮配重", "instId": "cyl-weight-69"}, {"equip": "Air oven", "code": "S", "test": "Compression test", "zh": "熱風烘箱", "instId": "oven"}, {"equip": "Environmental chamber (to –33 °C)", "code": "S", "test": "Compression test", "zh": "環境試驗箱（至 −33°C）", "instId": "walkin-chamber"}, {"equip": "1.35 kg impact hammer", "code": "S", "test": "Compression test", "zh": "1.35 kg 衝擊鎚", "instId": "impact-hammer"}, {"equip": "Clear spruce wood blocks", "code": "S", "test": "Compression test", "zh": "雲杉木塊", "instId": "spruce"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅宣告戶外時觸發；機體塑膠殼69kPa壓縮+−33°C冷凍後1.35kg鎚擊不得脆裂，PEL為S。"}, "gist_zh": "對密封墊片樣品加壓，再冷凍到約 -33°C 後敲擊，確認墊片冬天又冷又受撞時仍不破裂、守住密封。", "learn": {"obj": ["能說出試驗對象為封閉型結構之密封墊片", "能說出壓縮條件：69kPa置中2h，靜置30min後壓縮≤50%厚度", "能說出冷凍-33°C/24h後以1.35kg鎚自150mm落下衝擊", "能解釋墊片低溫變脆受撞破裂導致密封失效之風險"], "pit": [{"t": "誤解：目錄出現兩個「壓縮試驗」，以為 Y.4.3 也是壓縮。正解：CNS 中文版 Y.4.3 標題誤印，實為墊片拉伸/伸長試驗；壓縮試驗僅 Y.4.4。", "src": "查證記錄 C-01、G-8"}], "quiz": [{"q": "Y.4.4壓縮及衝擊試驗的試驗對象是什麼？", "a": "封閉型結構之密封墊片的材料樣品，不是外殼本體；確認墊片受壓與低溫衝擊後仍守住密封。", "src": "CNS p.310"}, {"q": "壓縮段怎麼做？合格判準是什麼？", "a": "約69kPa圓柱形荷重置於樣品中央2小時；移除靜置約30分鐘後量厚度，壓縮不得超過原厚度50%。", "src": "CNS p.310"}, {"q": "低溫衝擊的冷凍條件、鎚規格與試樣擺放方式？", "a": "冷凍24h至-33°C（或廠商標示最低溫）；1.35kg鎚自150mm落下，試樣置於50×100mm雲杉木板短邊上。", "src": "params"}]}}, {"id": "Y.4.5", "clauses": ["Y.4.5"], "group": "annex", "title_en": "Annex Y.4.5 Oil resistance (resistance of gaskets/elastomers to oil)", "title_zh": "附錄 Y.4.5 抗油性(墊片/彈性體之耐油性)", "purpose_zh": "戶外設備靠橡膠墊片(gasket)來防水防塵,維持外殼密封。但設備若安裝在會接觸到油的環境(機械設備旁、含油霧的工業區、或本身有潤滑油),橡膠碰到油會膨脹、變軟或變硬龜裂,密封就失效、水氣灰塵就跑進去造成漏電或短路。此試驗把橡膠墊片樣品泡進標準試驗油裡一段時間,量它膨脹或收縮了多少,確認墊片夠耐油、長期仍能維持密封與安全。", "analogy_zh": "就像把一條橡皮筋泡進沙拉油裡一晚,看它會不會泡到膨脹發脹、變黏變軟而失去彈性。墊片若泡油後變這樣,就守不住外殼的防水門戶了。", "procedure_zh": "依 ISO 1817(或等效 ASTM D471)將墊片/彈性體標準試片浸入規定的標準試驗油(如 IRM 902 / ASTM Oil No.3 對應油)中,於室溫 25°C±3°C 浸泡 70 小時。取出後與浸泡前比較,判定:膨脹不得超過25%、萎縮(收縮)不得超過1%(避免過度膨脹擠出溝槽,或收縮出現縫隙而漏水)。", "params": "浸油試驗（CNS p.311）：室溫 25°C±3°C 浸入油中 70 h；油規格參考 ISO 1817:2005 或 ASTM D471-98（IRM 902 等試驗油屬此系統）；判定：膨脹 ≤25%、萎縮（收縮）≤1%。注意：CNS 為室溫試驗；高溫（如 100°C）浸油屬其他標準之作法，勿混用。", "standard_equipment": ["Oil immersion test equipment per ISO 1817:2022 or ASTM D471- 98"], "iec_bsmi": "已對照 CNS 附錄 Y.4.5 抗油性：密封墊片於 <b>25°C±3°C 浸油 70 h</b> 後，膨脹須 <b>≤25%</b>、萎縮 <b>≤1%</b>；油規格依 <b>ISO 1817:2005／ASTM D471-98</b>。（ISO 1817 為 IEC 慣用、ASTM D471 為北美慣用之等效並行方法。）", "location": "環境測試區", "utils": [], "equipment": [{"en": "Oil-immersion test equipment", "zh": "耐油浸泡試驗設備", "role": "consumable", "instId": "oil-immersion"}], "diagram": "", "qa": "", "pel": [{"equip": "Oil immersion test equipment per ISO 1817:2022 or ASTM D471- 98", "code": "S", "test": "Oil resistance", "zh": "耐油浸泡試驗設備", "instId": "oil-immersion"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅宣告戶外且含防水墊片時觸發；浸標準油測膨脹/硬度確保密封不失效，PEL為S，較罕用。"}, "gist_zh": "把橡膠墊片泡標準油測膨脹/收縮變化，確認耐油、長期仍維持外殼防水防塵密封。", "learn": {"obj": ["能說出浸油條件：室溫 裂、裂縫或細微痕跡，輔助燈泡爆裂、玻璃破碎等評估。", "clauses": ["8.5.5"]}, {"id": "sticky-mat", "en": "Dark sticky mat", "zh": "深色黏性墊", "cat": "機械/結構試驗", "desc": "深色黏性墊用於捕集燈泡爆裂飛散的碎片，便於計數與評估危害。", "clauses": ["8.5.5"]}, {"id": "card-cover", "en": "Card (vent-cover simulation)", "zh": "卡紙（覆蓋通風孔）", "cat": "機械/結構試驗", "desc": "以卡紙覆蓋散熱/通風開孔，模擬阻塞情況做異常操作（過熱）試驗。", "clauses": ["B.3.2"]}, {"id": "cheesecloth", "en": "Cheesecloth (bleached cotton)", "zh": "棉紗布（漂白棉布）", "cat": "耗材", "desc": "鋪在試件下方的可燃指示布，若試驗中被引燃即代表起火危害，用於耐燃/堵轉試驗。", "clauses": ["6.4.8.3.3", "G.5.4.5.3", "S"]}, {"id": "tissue", "en": "Wrapping tissue", "zh": "薄棉紙（包裝紙）", "cat": "耗材", "desc": "包覆或鋪底的可燃指示紙，用於判定過熱/燃燒試驗是否引燃周遭可燃物。", "clauses": ["G.5.4.5.3", "S"]}, {"id": "petroleum", "en": "Petroleum spirit", "zh": "石油醚（去漬油）", "cat": "耗材", "desc": "標示耐久性試驗的擦拭溶劑，以沾溶劑布料摩擦後檢查標示是否仍清晰。", "clauses": ["F.3.10"]}, {"id": "water-cloth", "en": "Water + cloth (marking rub)", "zh": "水＋擦布（標示耐久）", "cat": "耗材", "desc": "以沾水布料摩擦標示，檢查標示是否在一般擦拭下脫落模糊。", "clauses": ["F.3.10"]}, {"id": "spruce", "en": "Clear spruce wood blocks", "zh": "雲杉木塊（衝擊墊木）", "cat": "耗材", "desc": "指定的清材雲杉木塊，作為衝擊/壓縮試驗的標準墊材。", "clauses": ["Y.4.4"]}], "learn_path": {"intro": "本教材以 CNS 15598-1（等同 IEC 62368-1）為本，從「五種會傷人的能量」出發，把 48 個實驗室測項組成 8 個由淺入深的模組：先建立能量分級思維，再依電擊、火、機械、耐候等危害聚類拆解，最後以無人機高關聯測項收束複講。", "usage": "建議先照 m1 到 m8 的順序走完學習路徑，建立全局再深入；每到一個模組，點開儀表板上對應的測項卡片細讀目的、做法、參數與儀器；讀完一個模組就用測驗自評，確認觀念站得住再前進；遇到看不懂的步驟，若該測項附有示意圖，回到示意圖對照配置與原理後重讀。", "modules": [{"mid": "m1", "title": "先懂能量觀", "subtitle": "三大能量分級（ES/PS/MS）與總則條件", "objective": "學完能以 ES、PS、MS 能量分級的眼光，替無人機四件組（機體、電池、充電器、遙控器）標出能量源等級並設定環境與使用條件基準。", "clause_ids": ["5.2", "6.2.2", "8.2", "4.1.4", "4.7"]}, {"mid": "m2", "title": "電擊防護（上）：摸不到、量得準", "subtitle": "可觸及性、異物防護與絕緣距離", "objective": "學完能用試驗探棒與間隙、沿面距離量測規則，判斷危險帶電件是否摸得到、絕緣距離與耐熱材料是否撐得住，並確認掉入機內的導電異物不致跨接帶電件。", "clause_ids": ["5.3.2", "P.2", "5.4.2", "X", "5.4.1.10.3"]}, {"mid": "m3", "title": "電擊防護（下）：打不穿、漏不出", "subtitle": "耐濕耐壓、洩漏電流、接地與殘電", "objective": "學完能安排受潮預處理、耐電壓、突波、殘電放電、接觸電流到接地阻抗的整套電擊驗證順序並判讀結果，以及電源線受拉扯／扭轉後火線不致脫落。", "clause_ids": ["5.4.8", "5.4.9", "5.4.5.2", "5.5.2.2", "5.7", "5.6.4.1", "G.7"]}, {"mid": "m4", "title": "火與燃燒", "subtitle": "從輸入基準、過載點火源到防火外殼", "objective": "學完能從輸入功率基準、異常過熱到馬達堵轉點火與材料耐燃，評估產品起火風險與防火外殼是否到位。", "clause_ids": ["B.2.5", "B.3.2", "G.5.4.5.3", "6.3.1", "S", "6.4.8.3.3"]}, {"mid": "m5", "title": "機械傷害", "subtitle": "推不倒、摔不裂、提不斷", "objective": "學完能依使用情境挑選受力、撞擊、落下與穩定性試驗，並判斷外殼破裂或翻倒後的傷害後果，並能驗證電池匣蓋經反覆開閉與碾壓後仍鎖得住（防兒童取得電池）。", "clause_ids": ["T.2", "T.6", "T.7", "4.8.4.3", "4.8.4.6", "T.10", "8.8", "8.6.2", "8.6.4", "8.6.5", "8.7"]}, {"mid": "m6", "title": "熱與化學耐候", "subtitle": "高溫、日曬、鹽霧與密封標示", "objective": "學完能評估高溫燙傷與異物加熱風險，以及日曬、低溫、鹽霧、油對戶外外殼、密封件和安全標示的劣化影響。", "clause_ids": ["5.4.1.4", "9.6.3", "C", "Y.4.3", "Y.4.4", "Y.4.5", "Y.3", "F.3.7", "F.3.10"]}, {"mid": "m7", "title": "功能與特殊試驗", "subtitle": "特定產品形態與不適用判定", "objective": "學完能辨認電信埠、音訊、碎紙機、高壓燈、推車等特定產品形態的測項範圍，替無人機案寫出站得住腳的不適用判定。", "clause_ids": ["5.4.11", "E", "8.5.4.3", "8.5.5", "8.10"]}, {"mid": "m8", "title": "無人機重點串講", "subtitle": "機體核心＋高關聯 21 測項複講與送測查核", "objective": "學完能把 8 個機體核心測項（能量分級、溫升、熾熱線、馬達堵轉、耐燃、整機落下）與 13 個充電器／配件高關聯測項（一次側絕緣鏈、基準、結構強度與標示）串成送測前查核清單。", "clause_ids": ["5.2", "6.2.2", "8.2", "5.4.1.4", "6.3.1", "G.5.4.5.3", "S", "T.7", "5.3.2", "5.4.2", "X", "5.4.1.10.3", "5.4.8", "5.4.9", "5.5.2.2", "5.7", "G.7", "B.2.5", "T.2", "T.6", "F.3.10"]}]}};</script>

const PELMEAN={R:'須由實驗室自備（Required）',RB:'基本必備，須自備',RA:'含音訊放大器設備須備',RC:'有線分配系統須備',ROUT:'戶外設備須備',RSH:'碎紙機類設備須備',RT:'電信網路連接須備',RV:'影像/CRT 設備須備',RWPT:'無線充電發射器須備',S:'可外包（分包試驗）',SP:'特殊試驗設施',W:'可於他實驗室見證'};

const PEL_EXTRA={oven:['RB'],'test-hook':['RB'],stopwatch:['RB'],'angle-level':['RB'],ruler:['RB'],tissue:['RB'],'dc-supply':['RB'],'dc-load':['RB'],projector:['RB'],'creepage-rod':['RB'],'force-gauge':['RB'],'antenna-surge':['RC'],'wedge-probe':['RSH'],'pink-noise':['RA'],'wood-box':['RA'],'uv-xenon':['S'],flexural:['S'],charpy:['S'],izod:['S'],'tensile-impact':['S'],'impact-hammer':['S'],spruce:['S'],magnifier:[''],'sticky-mat':['']};
function buildPelMap(){PELBYINST={};(DATA.clauses||[]).forEach(c=>(c.pel||[]).forEach(p=>{if(p&&p.instId){(PELBYINST[p.instId]=PELBYINST[p.instId]||[]).push(p.code||'');}}));Object.keys(PEL_EXTRA).forEach(k=>{(PELBYINST[k]=PELBYINST[k]||[]).push.apply(PELBYINST[k],PEL_EXTRA[k]);});}
function pelStatus(id){
  const atoms=[];(PELBYINST[id]||[]).forEach(code=>String(code).split('/').forEach(a=>{a=a.trim();if(a)atoms.push(a);}));
  const uniq=[];atoms.forEach(a=>{if(uniq.indexOf(a)<0)uniq.push(a);});
  if(!uniq.length){if((PELBYINST[id]||[]).length)return {kind:'listed',codes:[],label:'已列'};return {kind:'none',codes:[],label:'未列'};}
  const kind=uniq.some(a=>/^R/.test(a))?'req':(uniq.some(a=>a==='S'||a==='SP'||a==='W')?'sub':'none');
  return {kind:kind,codes:uniq,label:uniq.join('/')};
}
function pelTipText(st){
  if(st.kind==='listed')return 'PEL 設備代碼 · 已列官方 P.E.L.\n（該列未標分類代碼）';

  const head=st.kind==='req'?'須自備（必要）':'可外包（分包/見證）';

}

const TERMS_SORTED=TERMS.slice().sort((a,b)=>b.t.length-a.t.length);
function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function findTermFrom(txt,T,from){
  if(/^[A-Za-z]/.test(T.t)){const re=new RegExp('(?<![A-Za-z0-9])'+reEsc(T.t)+'(?![A-Za-z0-9])','g');re.lastIndex=from;const m=re.exec(txt);return m?m.index:-1;}
  return txt.indexOf(T.t,from);
}
function tipify(root){
  if(!root||typeof document.createTreeWalker!=='function')return;
  const SKIP={A:1,BUTTON:1,SCRIPT:1,STYLE:1,svg:1,SVG:1,CODE:1,INPUT:1,TEXTAREA:1,SELECT:1};
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
    if(!n.nodeValue||n.nodeValue.length<2)return NodeFilter.FILTER_REJECT;
    let p=n.parentNode;
    while(p&&p!==root){if(p.nodeType===1&&(SKIP[p.tagName]||(p.classList&&(p.classList.contains('term')||p.classList.contains('params')||p.classList.contains('mono')||p.classList.contains('tex')))||p.hasAttribute('data-tip')))return NodeFilter.FILTER_REJECT;p=p.parentNode;}
    return NodeFilter.FILTER_ACCEPT;}});
  const nodes=[];let nn;while(nn=walker.nextNode())nodes.push(nn);
  nodes.forEach(function(tn){
    const txt=tn.nodeValue;const ms=[];
    for(const T of TERMS_SORTED){let from=0,i;while((i=findTermFrom(txt,T,from))>=0){ms.push({i:i,len:T.t.length,d:T.d});from=i+T.t.length;}}
    if(!ms.length)return;
    ms.sort((a,b)=>a.i-b.i||b.len-a.len);
    const chosen=[];let end=-1;for(const m of ms){if(m.i>=end){chosen.push(m);end=m.i+m.len;}}
    const frag=document.createDocumentFragment();let pos=0;
    for(const m of chosen){if(m.i>pos)frag.appendChild(document.createTextNode(txt.slice(pos,m.i)));
      const sp=document.createElement('span');sp.className='term';sp.setAttribute('data-tip',m.d);sp.textContent=txt.slice(m.i,m.i+m.len);frag.appendChild(sp);pos=m.i+m.len;}
    if(pos<txt.length)frag.appendChild(document.createTextNode(txt.slice(pos)));
    tn.parentNode.replaceChild(frag,tn);});
}

/* ---------------- LEARN PATH (T輪) ---------------- */
function renderLearn(){
  const wrap=$('#view-learn');if(!wrap)return;
  const LP=DATA.learn_path;
  if(!LP||!(LP.modules||[]).length){wrap.innerHTML='<div class="empty">尚無學習路徑資料。</div>';return;}
  const byId={};(DATA.clauses||[]).forEach(c=>byId[c.id]=c);
  const qTotal=(DATA.clauses||[]).reduce((s,c)=>s+((c.learn&&c.learn.quiz)?c.learn.quiz.length:0),0);
  const oTotal=(DATA.clauses||[]).reduce((s,c)=>s+((c.learn&&c.learn.obj)?c.learn.obj.length:0),0);
  /* 依模組主題對映危害色系，延續全站章節分組色語彙 */
  function modTheme(m){
    const s=(m.title||'')+' '+(m.subtitle||'');
    if(/無人機|UAV/.test(s))return{c:'var(--drone)',w:'var(--drone-wash)',t:'無人機'};
    if(/機械/.test(s))return{c:'var(--g8)',w:'var(--g8w)',t:'機械傷害'};
    if(/火|燃燒|起火/.test(s))return{c:'var(--g6)',w:'var(--g6w)',t:'電氣起火'};
    if(/電擊|電氣|觸電/.test(s))return{c:'var(--g5)',w:'var(--g5w)',t:'電擊防護'};
    if(/熱|耐候|燙傷|高溫|化學/.test(s))return{c:'var(--g9)',w:'var(--g9w)',t:'熱與耐候'};
    if(/功能|特殊|不適用/.test(s))return{c:'var(--gx)',w:'var(--gxw)',t:'特殊試驗'};
    return{c:'var(--g4)',w:'var(--g4w)',t:'能量觀念'};
  }
  const mods=LP.modules.map((m,i)=>{
    const ids=m.clause_ids||[];const TH=modTheme(m);
    const nq=ids.reduce((s,id)=>s+((byId[id]&&byId[id].learn&&byId[id].learn.quiz)?byId[id].learn.quiz.length:0),0);
    const chips=ids.map(id=>{const c=byId[id];if(!c)return '';const g=c.group||groupKey(c.id);
      const dr=c.drone&&c.drone.relevant&&(c.drone.level==='core'||c.drone.level==='high');
      const t=(c.title_zh||'').split('（')[0];
      return `<button class="lm-chip${dr?' dr':''}" data-go-ch="${esc(id)}" title="${esc(c.title_zh||'')}"><span class="dot" style="background:${gColor(g)}"></span><span class="cid">${esc(clean(id))}</span><span class="t">${esc(t)}</span></button>`;}).join('');

      <div class="lm-no"><span>${String(i+1).padStart(2,'0')}</span></div>
      <div class="lm-card"><span class="lm-bar"></span>

        ${m.objective?`<p class="lm-obj">${esc(m.objective)}</p>`:''}

      </div></div>`;}).join('');
  wrap.innerHTML=`<div class="section-head"><h2>學習路徑</h2><p>${esc(LP.intro||'')}</p></div>
    ${LP.usage?`<div class="std-panel lp-usage"><h3>如何使用本教材</h3><div>${esc(LP.usage)}</div></div>`:''}
    <div class="lp-stats"><span class="lp-stat"><b>${LP.modules.length}</b>個模組</span><span class="lp-stat"><b>${(DATA.clauses||[]).length}</b>個測項</span><span class="lp-stat"><b>${oTotal}</b>條學習目標</span><span class="lp-stat"><b>${qTotal}</b>題自我測驗</span></div>
    <div class="lp-track">${mods}</div>`;

  tipify(wrap);
}

/* ---------------- custom tooltips ---------------- */
(function(){
  function setup(){
    const tip=document.createElement('div');tip.className='tipbubble';document.body.appendChild(tip);
    let cur=null;
    function hide(){tip.classList.remove('show');tip.style.display='none';cur=null;}
    function place(el){const t=el.getAttribute('data-tip');if(!t){hide();return;}
      cur=el;const parts=String(t).split('\n');
      tip.innerHTML='<b>'+esc(parts[0])+'</b>'+(parts.length>1?'<br>'+parts.slice(1).map(esc).join('<br>'):'');
      tip.style.display='block';tip.classList.remove('below','show');
      const r=el.getBoundingClientRect(),b=tip.getBoundingClientRect();
      let left=r.left+r.width/2-b.width/2;left=Math.max(8,Math.min(left,window.innerWidth-b.width-8));
      let top=r.top-b.height-10;if(top<6){top=r.bottom+10;tip.classList.add('below');}
      tip.style.left=left+'px';tip.style.top=top+'px';tip.style.setProperty('--ax',(r.left+r.width/2-left)+'px');
      requestAnimationFrame(()=>{if(cur===el)tip.classList.add('show');});}
    document.addEventListener('mouseover',e=>{const el=e.target.closest?e.target.closest('[data-tip]'):null;if(el)place(el);});
    document.addEventListener('mouseout',e=>{const el=e.target.closest?e.target.closest('[data-tip]'):null;if(el&&el===cur)hide();});
    document.addEventListener('scroll',()=>{if(cur)hide();},true);
    window.addEventListener('resize',hide);
  }
  if(document.body)setup();else document.addEventListener('DOMContentLoaded',setup);
})();
</script>

    var codes=(co&&co.length)?co:['—'];

      return '<span class="code">'+esc(c)+'</span>';}).join(' ')+

  function match(g,i){

    if(st.q){var h=(g.nz+' '+g.iec+' '+g.cns+' '+g.cl+' '+i.en+' '+i.zh+' '+i.br+' '+i.co.join(' ')).toLowerCase();if(h.indexOf(st.q)<0)return false;}
    return true;
  }
  function render(){
    var rows='',lastChap=null,shown=0;
    CT_DATA.forEach(function(g){
      var vis=g.items.filter(function(i){return match(g,i);});
      if(!vis.length)return;
      var ck=chapKey(g.cl);
      if(ck!==lastChap){lastChap=ck;var ch=CHAP[ck]||['','','#888'];
        rows+='<tr class="ct-chap"><td colspan="7"><span class="cdot" style="background:'+ch[2]+'"></span><span class="cz">'+esc(ch[0])+'</span><span class="ce">'+esc(ch[1])+'</span></td></tr>';}

        '<span class="ct-gsum">'+sumtxt+'</span></div>'+
        '<span class="ct-std"><span class="sk">CNS 15598-1 §'+esc(g.cl)+'</span>'+esc(g.cns||'—')+'<br>'+
        '<span class="sk">IEC 62368-1 §'+esc(g.cl)+'</span><span class="en">'+esc(g.iec||'—')+'</span></span></td></tr>';
      vis.forEach(function(i){shown++;

    var head='<thead><tr><th>項次</th><th>設備 · 材料（EN／中）</th><th>廠牌／型號</th><th>P.E.L. 代碼<br>EN／中</th><th>成本歸屬</th><th>設施需求</th><th>採購<br>年度</th></tr></thead>';

      '<span class="ct-sep"></span><div class="ct-chips" id="ct-yr">'+chip('全部年度','全部','yr')+chip('116','116','yr')+chip('117','117','yr')+chip('118','118','yr')+'</div>'+

  function kpis(){

    render();

  function sync(){ // refresh chip/kpi active states without losing search box focus
    root.querySelectorAll('.ct-chip').forEach(function(b){var on=st[b.dataset.k]===b.dataset.v;b.classList.toggle('on',on);});

    root.querySelectorAll('.ct-kpi').forEach(function(b){b.onclick=function(){var v=b.dataset.kpi;st.cls=(v&&st.cls!==v)?v:'全部';sync();};});
