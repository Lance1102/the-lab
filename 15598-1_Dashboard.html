figure 25 to 28), metal foil, equipment suitable for electrical strength test loads; Stop watch, weight"], "iec_bsmi": "CNS 15598-1 之間隙/爬電/固體絕緣表與 IEC 62368-1 和諧一致；引用 IEC 60112(CTI)、IEC 60664 系列原則相同，無已知重大差異。註：實驗室標示『Annex X』，IEC 62368-1 之 Annex X 為『絕緣繞組線/絕緣帶之替代要求』，與 5.4.4 固體絕緣量測相關，引用合理。", "location": "安規測試區", "utils": ["需排煙"], "equipment": [{"en": "Vernier calliper", "zh": "游標卡尺", "role": "equip", "instId": "calliper"}, {"en": "Creepage distance test rod/probe", "zh": "沿面距離量測棒", "role": "fixture", "instId": "creepage-rod"}, {"en": "Micrometer", "zh": "測微器（分厘卡）", "role": "equip", "instId": "micrometer"}, {"en": "2.5D profile projector / video measuring", "zh": "2.5 次元投影量測儀", "role": "equip", "instId": "projector"}, {"en": "Impulse voltage test generator", "zh": "脈衝（突波）電壓產生器", "role": "equip", "instId": "impulse-gen"}, {"en": "Tracking index (CTI/PTI) tester", "zh": "相對漏電起痕指數試驗機", "role": "equip", "instId": "cti-tester"}, {"en": "Mandrel (bending) tester", "zh": "心軸彎曲試驗機", "role": "equip", "instId": "mandrel"}, {"en": "Insulation resistance meter", "zh": "絕緣電阻計", "role": "equip", "instId": "ir-meter"}], "diagram": "creepage", "qa": "", "pel": [{"equip": "Oscilloscope", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "示波器", "instId": "oscilloscope"}, {"equip": "Dial gauge or calliper", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "量錶或游標卡尺", "instId": "calliper"}, {"equip": "Micrometer", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "測微器", "instId": "micrometer"}, {"equip": "Pins etc. with different diameters", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "不同直徑量測銷", "instId": ""}, {"equip": "Microscope", "code": "RB", "test": "Clearances, creepage distance, solid insulation", "zh": "顯微鏡", "instId": ""}, {"equip": "Impulse test generator, circuits 1 & 2 of Table D.1", "code": "RT/S/RC", "test": "Clearances, creepage distance, solid insulation", "zh": "脈衝電壓產生器（電路 1、2）", "instId": "impulse-gen"}, {"equip": "Impulse test generator, circuit 3 of Table D.1 (10 kV)", "code": "RT/S/RC", "test": "Clearances, creepage distance, solid insulation", "zh": "天線突波產生器（電路 3，10 kV）", "instId": "antenna-surge"}, {"equip": "Test equipment for tracking index per IEC 60112", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "相對漏電起痕(CTI)試驗機", "instId": "cti-tester"}, {"equip": "Mandrel (Figures 25–28)", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "心軸（圖 25–28）", "instId": "mandrel"}, {"equip": "Metal foil", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "金屬箔", "instId": ""}, {"equip": "Equipment for electric-strength test loads", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "耐壓試驗負載設備", "instId": "hipot"}, {"equip": "Stop watch", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "碼錶", "instId": "stopwatch"}, {"equip": "Weight", "code": "S", "test": "Clearances, creepage distance, solid insulation", "zh": "砝碼", "instId": "weights"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "市電隔離類kV絕緣距離，落在充電器一次側；機體SELV需求極小"}, "gist_zh": "量帶電件之間穿空氣、沿表面、穿材料三條路徑夠不夠，確保高壓不會跨過去電人或打火。", "learn": {"obj": ["能說出電擊防護三路徑：空間間隙、沿面距離、固體絕緣。", "能依工作電壓、衝擊電壓、污染等級與材料群組查最小距離。", "能依 CTI 值判定材料群組，並知未知時假設 IIIb。", "能說出附錄 X 為空間距離之替代決定法及其適用範圍。"], "pit": [{"t": "誤解：附錄 X 是絕緣帶/繞組件之要求。正解：附錄 X 為決定絕緣空間距離之替代方法，適用 ≤420 V 峰值交流主電源電路（繞組線屬附錄 J）。", "src": "CNS p.306"}], "quiz": [{"q": "無人機充電器接 230 V 交流市電（OVC II），額定衝擊電壓是多少？", "a": "2.5 kV。查表 14：此衝擊電壓下基本絕緣最小間隙 1.5 mm、強化絕緣 3.0 mm。", "src": "CNS p.76"}, {"q": "材料 CTI 值 450 屬於哪個材料群組？CTI 未知時怎麼辦？", "a": "群組 II（400~599）；未知時假設為最差的 IIIb（100~174）。", "src": "params"}, {"q": "電要跳過去傷人的三條路徑，分別對應哪一項量測？", "a": "直接穿過空氣＝空間間隙、沿著表面爬＝沿面距離、穿透材料本身＝固體絕緣，三者皆須達標。", "src": "params"}]}}, {"id": "5.4.5.2", "clauses": ["5.4.5.2"], "group": "5", "title_en": "Antenna terminal insulation — impulse (surge) withstand test (verification of insulation of external antenna coaxial terminal)", "title_zh": "天線端子絕緣 — 衝擊（雷擊/突波）耐受試驗（外接天線同軸端子之絕緣驗證）", "purpose_zh": "如果產品接了戶外天線（無人機的圖傳、遙控、GPS、5G/LTE 天線都算），雷擊或附近放電產生的高壓突波會沿著天線線灌進機器。這項測試就是對天線端子打一連串高壓脈衝，模擬鄰近雷擊誘發的突波，確認天線端子的絕緣不會被一次突波就擊穿，否則雷擊能量會傳到使用者摸得到的地方或內部低壓電路，造成觸電、燒毀甚至起火。", "analogy_zh": "就像家裡的避雷針和接地，要確保打雷時電流乖乖走安全路徑、不會竄進屋內電器電到人；這測試在確認天線端子這道防線扛得住一記雷擊脈衝。", "procedure_zh": "依 D.2 之天線介面試驗產生器（表 D.1 電路 3）對「連接在一起的天線端子」與「連接在一起的主電源端子」之間施加 50 次放電：Uc＝10 kV、每分鐘不超過 12 次；設備置於絕緣平面上、試驗中不通電（試驗期間人員勿接觸設備）。試後依 5.4.5.3 以 500 V 直流量測絕緣電阻 1 分鐘：基本/補充絕緣 ≥2 MΩ、雙重/強化絕緣 ≥4 MΩ（表 23）；或改以 5.4.9.1 耐電壓試驗替代（不得發生絕緣崩潰）。", "params": "產生器：D.2 天線介面試驗產生器(表 D.1 電路 3)；放電：50 次、每分鐘不超過 12 次、Uc＝10 kV（CNS p.91）；配置：設備置於絕緣平面，產生器輸出接於「連接在一起的天線端子」與「連接在一起的主電源端子」之間；具供電至其他設備之外部電路者，於外部電路端子連接在一起下重複試驗；試驗中設備不通電。判定（5.4.5.3 表 23，CNS p.92）：試後以 500 V 直流量測 1 min，絕緣電阻 ≥ 2 MΩ(基本/補充絕緣)、≥ 4 MΩ(雙重/強化絕緣)；或以 5.4.9.1 耐電壓試驗替代(取方法 1/2/3 之最高試驗電壓)，不得有絕緣崩潰。", "standard_equipment": ["Insulation resistance meter (500V > 4 MΩ), antenna interface test generator circuit 3 of Table D.1; timer, See electric strength test of Clause 5.4.9."], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 在天線端子／外部電路突波試驗上和諧一致。外接同軸／天線之突波試驗規範於 5.4.5.2，使用 Annex D 之天線介面試驗產生器（表 D.1 電路 3）：50 次放電、每分鐘不超過 12 次、Uc＝10 kV。實驗室之 10 kV 天線突波測試器即對應此電路 3 產生器。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Antenna terminal surge tester (10 kV)", "zh": "天線端子突波試驗機", "role": "equip", "instId": "antenna-surge"}], "diagram": "surge", "qa": "", "pel": [{"equip": "Insulation resistance meter (500 V, > 4 MΩ)", "code": "RC", "test": "Antenna terminal insulation", "zh": "絕緣電阻計（500 V，>4 MΩ）", "instId": "ir-meter"}, {"equip": "Antenna interface test generator, circuit 3 of Table D.1", "code": "RC", "test": "Antenna terminal insulation", "zh": "天線介面試驗產生器（電路 3）", "instId": "antenna-surge"}, {"equip": "Timer", "code": "RC", "test": "Antenna terminal insulation", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Electric-strength test equipment (per Clause 5.4.9)", "code": "RC", "test": "Antenna terminal insulation", "zh": "耐電壓試驗設備（參見 5.4.9）", "instId": "hipot"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅『外接』天線同軸端子(圖傳/遙控/GPS)觸發；內建PCB天線N/A。落在機體RF端。"}, "gist_zh": "對外接天線端子打高壓脈衝模擬雷擊，確認絕緣不被擊穿、雷電不會竄進機內電到人。", "learn": {"obj": ["能說出試驗用表 D.1 電路 3 及 50 次/≤12 次/分/10 kV。", "能說出端子併接配置、絕緣平面放置與試驗中不通電要求。", "能依表 23 判斷試後絕緣電阻 2/4 MΩ 二級合格門檻。", "能判斷無人機外接與內建天線何者適用本試驗。"], "pit": [{"t": "誤解：用電路 1 之 10/700 µs 波形、正負極性各打數次、電壓查表決定。正解：CNS 用表 D.1 電路 3，固定 50 次、每分鐘不超過 12 次、Uc＝10 kV。", "src": "CNS p.91"}, {"t": "誤解：這是模擬天線直接被雷打到。正解：電路 3 模擬鄰近雷擊擊至地時，誘發進入天線系統配線的電壓突波。", "src": "CNS p.183"}], "quiz": [{"q": "天線端子衝擊試驗的放電次數、頻率與充電電壓 Uc 各是多少？", "a": "50 次放電、每分鐘不超過 12 次、Uc＝10 kV，用表 D.1 電路 3 之天線介面試驗產生器。", "src": "CNS p.91"}, {"q": "試後依表 23 量絕緣電阻，雙重/強化絕緣的合格門檻為何？", "a": "以 500 V 直流量測 1 分鐘，須 ≥4 MΩ；基本/補充絕緣為 ≥2 MΩ；亦可改以 5.4.9.1 耐電壓替代。", "src": "CNS p.92"}, {"q": "無人機的內建 PCB 天線需要做這項天線端子試驗嗎？", "a": "不需要。本試驗僅由外接天線同軸端子（圖傳/遙控/GPS）觸發；內建 PCB 天線不適用。", "src": "params"}]}}, {"id": "5.4.8", "clauses": ["5.4.8"], "group": "5", "title_en": "Humidity conditioning (preconditioning prior to electric strength / insulation tests)", "title_zh": "耐濕（濕度）處理（耐電壓/絕緣試驗前之預處理）", "purpose_zh": "潮濕會讓絕緣材料吸水、表面結露，電就更容易漏過去或打穿。這項『耐濕處理』是在做耐電壓測試之前，先把產品丟進濕氣很重的箱子裡放幾天，讓它充分受潮，模擬南台灣梅雨季、海邊或機體淋雨後的最糟狀況。受潮後馬上做耐壓測試，才能真正考驗絕緣在最不利潮濕條件下還撐不撐得住。對戶外飛行、可能遇雨的無人機特別關鍵。", "analogy_zh": "就像買雨衣前，先把它泡在濕氣很重的浴室裡放幾天，再潑水測試，看它受潮之後還防不防水——而不是只在乾爽的新品狀態下測。", "procedure_zh": "把樣品（整機或其組件、次組件）放入恆溫恆濕箱：預設條件為 20～30°C 間任一溫度（維持 ±2°C）、相對濕度 (93±3)%、連續 48 小時；熱帶條件則為 (40±2)°C、(93±3)%、120 小時。期間不通電、不得凝結。處理結束後立即（在箱內或同等濕度環境）接續進行 5.4.9 耐電壓試驗，以評估受潮後之絕緣性能。", "params": "預設處理（CNS 5.4.8，p.93）：48 h、相對濕度 (93±3)%、溫度 T 取 20～30°C 間任一值並維持 ±2°C、不得凝結、處理中不通電；處理前樣品先置於 T 至 (T+4)°C。熱帶條件：120 h、(40±2)°C、(93±3)%。處理後緊接執行 5.4.9 耐電壓試驗。註：500 V 絕緣電阻量測屬 5.4.5.3（表 23）之天線端子絕緣判準，與本條之濕度預處理為不同程序。", "standard_equipment": ["Chamber RH (93 ± 3)%, (20…30)°C", "Chamber RH (93 ± 3)%, (40 ± 2)°C", "Extra large environmental testing chamber"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 之濕度處理條件(40°C / 93% RH)和諧一致；實際時數依設備宣告之操作/環境條件而定。多份 CB 報告實測採 93% RH、40°C、120 h，與 IEC 一致，無已知 BSMI 差異。", "location": "環境測試區", "utils": ["需排水"], "equipment": [{"en": "Temperature & humidity chamber", "zh": "恆溫恆濕試驗箱", "role": "equip", "instId": "humidity-chamber"}], "diagram": "", "qa": "", "pel": [{"equip": "Chamber RH (93 ± 3)%, (20…30)°C", "code": "RB", "test": "Humidity conditioning", "zh": "恆溫恆濕箱 (93%RH)", "instId": "humidity-chamber"}, {"equip": "Chamber RH (93 ± 3)%, (40 ± 2)°C", "code": "RB", "test": "Humidity conditioning", "zh": "恆溫恆濕箱 (93%RH)", "instId": "humidity-chamber"}, {"equip": "Extra large environmental testing chamber", "code": "S", "test": "Humidity conditioning", "zh": "大型環境試驗室", "instId": ""}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "耐電壓前置受潮處理，針對充電器市電絕緣；機體無市電隔離"}, "gist_zh": "耐壓測試前先把產品放進高濕度試驗箱受潮，模擬梅雨／淋雨後最不利的狀況。", "learn": {"obj": ["能說出預設處理條件：48 h、(93±3)%、20～30°C。", "能區分預設條件與熱帶條件（120 h、(40±2)°C）。", "能說出期間不通電、不得凝結，處理後緊接耐壓試驗。"], "pit": [{"t": "誤解：預設處理是 40°C/120 h 的又熱又濕條件。正解：預設為 20～30°C 間任一值、(93±3)%、48 h；(40±2)°C/120 h 是熱帶條件。", "src": "查證記錄 D-04"}, {"t": "誤解：耐濕處理本身含 500 V 絕緣電阻 ≥2 MΩ 判準。正解：該判準屬 5.4.5.3（表 23）之天線端子絕緣，與本條濕度預處理為不同程序。", "src": "查證記錄 D-04"}], "quiz": [{"q": "預設耐濕處理的時間、相對濕度與溫度範圍各是多少？", "a": "48 小時、(93±3)%，溫度取 20～30°C 間任一值並維持 ±2°C；不得凝結、不通電。", "src": "CNS p.93"}, {"q": "熱帶條件的耐濕處理時間與溫度是多少？", "a": "120 小時、(40±2)°C，相對濕度同為 (93±3)%。", "src": "CNS p.93"}, {"q": "無人機充電器完成濕度處理後，下一步應做什麼試驗？", "a": "立即（於箱內或同等濕度環境）接續 5.4.9 耐電壓試驗，考驗受潮後最不利狀態下的絕緣。", "src": "params"}]}}, {"id": "5.4.9", "clauses": ["5.4.9"], "group": "5", "title_en": "Electric strength (dielectric withstand) test, including the test for thin sheet / solid insulation (Figure 29 set-up)", "title_zh": "電氣強度（耐電壓/介電耐壓）試驗，含薄片/固體絕緣之試驗（圖 29 配置）", "purpose_zh": "這是觸電防護的『期末考』。把比正常工作電壓高很多的測試電壓，加在絕緣的兩側（例如帶電電路對外殼、一次側對二次側），維持一段時間，看絕緣會不會被電打穿。打穿就代表這層絕緣不可靠，正常使用或突波來時可能讓人觸電。對薄片絕緣（如膠帶、絕緣墊片）還會用上下兩支金屬電極夾住、靠 100 g 金屬刀片的重量壓著來測最脆弱處。前面的耐濕處理就是為了讓這關在『受潮後最糟狀態』下進行。", "analogy_zh": "就像水管出廠前要灌進比平常高好幾倍的水壓撐幾分鐘，確認不會爆管漏水；耐電壓就是給絕緣灌『超高電壓』撐一下，確認不會被擊穿漏電。", "procedure_zh": "依絕緣等級（基本/補充/強化）與工作電壓，從標準 Table 25（瞬時電壓）、Table 26（工作電壓峰值/重複峰值）、Table 27（暫時過電壓）三表中取最高值決定試驗電壓。將試驗電壓施加於絕緣兩端，自低緩升至規定值並維持約 60 秒（型式試驗）。薄片絕緣依圖 29 治具試驗：樣品水平夾於上下兩支 Ø5 mm±0.1 mm、針頭邊緣圓角 0.5 mm 的金屬電極之間，上電極連同 100 g±5 g 金屬刀片以自重壓住樣品，再於兩電極間施加試驗電壓。觀察是否發生絕緣崩潰（漏電流失控暴增）；單次瞬間閃絡或電暈不算崩潰。", "params": "試驗電壓 = Table 25/26/27 三者取最高(例：120 V AC → 2 kV 級；230 V AC → 約 2.5 kV)；常見直流值如基本絕緣 2500 Vdc；升壓後維持約 60 s(型式試驗)；薄片/固體絕緣 Figure 29：上下 Ø5 mm±0.1 mm 金屬電極(測試針頭邊緣圓角半徑 0.5 mm)＋質量 100 g±5 g 之金屬刀片（CNS p.96 圖 29）(UL 1310 另為 6.4 mm/50 g)；判定：無絕緣崩潰(漏電流不得失控暴增；單次閃絡/電暈可接受)。通常於 5.4.8 耐濕處理後立即進行。", "standard_equipment": ["Test instrument / equipment with the relevant voltage, frequency and tripping current; Stop watch", "Test instrument / equipment according to Figure 29 for electric strength (of solid / thin sheet insulation)"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 之耐電壓試驗(Table 25/26/27、Figure 29 薄片試驗、約 60 s 維持)和諧一致；探球 5 mm/100 g 為 IEC 規格(UL 1310 為 6.4 mm/50 g，屬北美差異，非 CNS/IEC)。無已知 BSMI 重大差異。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Hipot (dielectric strength) tester", "zh": "耐壓測試機（介電強度）", "role": "equip", "instId": "hipot"}, {"en": "Electric-strength tester for thin/solid insulation", "zh": "薄片/固體絕緣電氣強度試驗裝置", "role": "equip", "instId": "thin-sheet-es"}], "diagram": "hipot", "qa": "PEL 列 5.4.9 耐電壓：「具相關電壓／頻率之試驗儀」(RB) 與「依圖 29 之薄片／固體絕緣電氣強度試驗」(S)。已對照 CNS 15598-1:2020 <b>圖 29</b>：薄片絕緣試驗之金屬刀片電極質量 <b>100 g±5 g</b>、Ø5 mm±0.1 mm、圓角 R0.5 mm（UL 1310 之 6.4 mm／50 g 屬北美差異，非 CNS／IEC）。例行試驗（§5.4.9.2）維持 1–4 s、試驗電壓可降 10%。", "pel": [{"equip": "Test instrument with relevant voltage, frequency, tripping current", "code": "RB", "test": "Electric strength test", "zh": "耐電壓試驗機（相關電壓／頻率／跳脫電流）", "instId": "hipot"}, {"equip": "Stop watch", "code": "RB", "test": "Electric strength test", "zh": "碼錶", "instId": "stopwatch"}, {"equip": "Test instrument / equipment according to Figure 29 for electric strength (of solid / thin sheet insulation)", "code": "S", "test": "Electric strength test", "zh": "薄片/固體絕緣耐壓試具(圖29)", "instId": "thin-sheet-es"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "觸電防護期末考，kV耐壓打在充電器一次側對二次側；機體SELV多N/A"}, "gist_zh": "給絕緣灌比正常高很多的電壓，確認不被打穿漏電——觸電防護最關鍵的一關。", "learn": {"obj": ["能說出試驗電壓取表 25/26/27 三者最高值的原則。", "能說出型式試驗自低緩升並維持約 60 秒。", "能描述圖 29 治具：上下 Ø5 mm 電極＋100 g 金屬刀片。", "能區分絕緣崩潰與可接受之單次閃絡/電暈。"], "pit": [{"t": "誤解：薄片絕緣試驗用金屬箔貼兩面、加探球模擬手指壓力。正解：圖 29 為樣品夾於上下 Ø5 mm 針狀電極間，由 100 g±5 g 金屬刀片自重壓住。", "src": "CNS p.96 圖29"}, {"t": "誤解：電極治具可用 6.4 mm/50 g 規格。正解：那是 UL 1310 北美規格；CNS/IEC 圖 29 為 Ø5 mm±0.1 mm、100 g±5 g 金屬刀片。", "src": "params"}], "quiz": [{"q": "圖 29 薄片絕緣試驗的電極直徑與刀片質量是多少？", "a": "上下電極 Ø5 mm±0.1 mm（針頭圓角 0.5 mm），金屬刀片 100 g±5 g，以自重壓住樣品後加壓。", "src": "CNS p.96"}, {"q": "無人機充電器一次對二次側的耐壓電壓如何決定？要維持多久？", "a": "取表 25/26/27（瞬時/工作峰值/暫時過電壓）三者最高值；自低緩升後維持約 60 秒（型式試驗）。", "src": "params"}, {"q": "試驗中出現一次瞬間閃絡，算不算絕緣崩潰不合格？", "a": "不算。絕緣崩潰的判定是漏電流失控暴增；單次瞬間閃絡或電暈可接受。", "src": "params"}, {"q": "例行試驗（routine test）與型式試驗的耐壓條件差在哪？", "a": "例行試驗可於室溫執行、維持 1–4 秒、試驗電壓可降 10%；型式試驗自低緩升並維持約 60 秒（5.4.9.2）。", "src": "CNS p.96"}]}}, {"id": "5.4.11", "clauses": ["5.4.11"], "group": "5", "title_en": "Separation between external circuits and earth (e.g. telecommunication network to protective earth) — discharge / leakage measurement", "title_zh": "外部電路與地之間之隔離（例如電信網路對保護接地）— 洩漏電流量測", "purpose_zh": "產品若接到電信網路或其他外部線路，這條外線和產品的接地之間必須保持安全隔離，且漏過去的電不能太多。這項測試先用耐電壓試驗考驗這道隔離；若耐壓時拆下了跨接的零組件，就把零件全部裝回，依標準試驗電路用一顆精準的 5000 歐姆無感電阻器串上電流表，施加等於額定電壓的試驗電壓，量有多少電流漏過這道隔離（不得超過 10 mA）。如果隔離不良、漏電流過大，維修人員或使用者碰到外線接頭就可能被電到。它確保外線這道隔離把危險電流擋在外面。", "analogy_zh": "就像兩個不同水位的水池之間的閘門，必須確認閘門夠密、就算有滲水也只是幾滴、不會一下子灌過去淹到人；這測試在量外線和接地之間『扛不扛得住電壓、漏多少電』。", "procedure_zh": "先以檢驗及表 25 之試驗電壓，對這道隔離（基本或補充絕緣）進行 5.4.9.1 耐電壓試驗；耐壓時可移除跨接在絕緣上、電容器以外的組件，留在原位的組件試驗後不得損壞。若有組件被移除，則所有組件裝回，依 CNS 圖 31 配置（5,000 Ω 無感電阻＋電流表）做額外試驗：在外部電路與接地（或將接地）的電路或部件之間施加試驗電壓——交流供電設備取額定電壓或額定電壓範圍之最大值，直流供電設備取使用地區最高交流主電源標稱電壓——量測流經圖 31 試驗電路的電流，不得超出 10 mA。", "params": "量測電路：CNS 圖 31「電信網路與地間之隔離試驗」＝5,000 Ω 無感電阻器＋mA 電流表（CNS p.100；附錄 H 振鈴準則亦以 5,000 Ω 電阻量測 ITS1/ITS2 振鈴電流，CNS p.237）。試驗法（5.4.11.3，CNS p.99）：以檢驗及表 25 試驗電壓進行 5.4.9.1 耐電壓試驗（跨接絕緣上除電容器外之組件可移除）；若組件被移除，則所有組件在位依圖 31 電路進行額外試驗——交流主電源供電設備之試驗電壓＝額定電壓或額定電壓範圍之最大值，直流主電源供電設備＝使用地區最高交流主電源標稱電壓。判定：流經圖 31 試驗電路之電流不得超出 10 mA。註：5.2.2.2 另使用 2000 Ω 無感電阻器，勿混用。", "standard_equipment": ["Non-inductive resistor 5000Ω, Ampere meter"], "iec_bsmi": "CNS 15598-1 與 IEC 62368-1 在此條（Annex H、引用 IEC 60990 量測電路）和諧一致。5000 Ω 無感電阻器對應 5.4.11／Annex H。實驗室所列 non-inductive resistor 須確認為 5000 Ω 規格（而非 5.2.2.2 之 2000 Ω）。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Non-inductive resistor", "zh": "無感電阻", "role": "fixture", "instId": "noninductive-r"}], "diagram": "", "qa": "", "pel": [{"equip": "Non-inductive resistor 5000 Ω", "code": "RB", "test": "Separation between external circuits and earth", "zh": "無感電阻 5000 Ω", "instId": "noninductive-r"}, {"equip": "Ampere meter", "code": "RB", "test": "Separation between external circuits and earth", "zh": "電流表", "instId": "multimeter"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": false, "level": "na", "applies_to": "system", "why_zh": "針對電信網路/TNV有線外線對地隔離；無人機為無線、無有線電信埠且機體無PE，N/A。"}, "gist_zh": "考驗外接線路與接地之間的隔離（耐電壓＋洩漏電流不得超過 10 mA），確保碰到外線接頭不會被電到。", "learn": {"obj": ["能說出 5.4.11 包含耐電壓試驗與圖 31 洩漏電流量測兩段程序", "能說出圖 31 電路為 5,000 Ω 無感電阻加電流表，限值 10 mA", "能判斷無人機無有線電信埠且機體無 PE，本項為 N/A", "能說出交流設備取額定電壓上限、直流設備取最高交流標稱電壓施測"], "pit": [{"t": "誤解：5.4.11 是在切斷電源瞬間量外部電路的殘留電荷。正解：CNS 無殘留電荷量測；實為耐電壓試驗加圖 31 洩漏電流量測（不得超過 10 mA）。", "src": "CNS p.99"}, {"t": "誤解：外部電路隔離與接觸電流量測共用同一顆無感電阻。正解：5.4.11 圖 31 用 5,000 Ω，5.2.2.2 用 2,000 Ω，勿混用。", "src": "params"}], "quiz": [{"q": "依圖 31 做外部電路與地之隔離試驗時，流經試驗電路的電流上限是多少？", "a": "10 mA。CNS 5.4.11.3 規定流經圖 31 試驗電路之電流不得超出 10 mA。", "src": "CNS p.99"}, {"q": "圖 31 量測電路用幾歐姆的無感電阻器？與 5.2.2.2 有何不同？", "a": "5,000 Ω 無感電阻器串接電流表；5.2.2.2 用的是 2,000 Ω，兩者勿混用。", "src": "CNS p.100"}, {"q": "耐電壓試驗時若移除了跨接絕緣上的組件，後續必須做什麼？", "a": "將所有組件裝回，依圖 31 試驗電路施加試驗電壓做額外試驗，電流不得超過 10 mA。", "src": "CNS p.99"}]}}, {"id": "5.5.2.2", "clauses": ["5.5.2.2"], "group": "5", "title_en": "Safeguards against capacitor discharge after disconnection of a connector", "title_zh": "斷開連接器後防止電容器放電之防護措施", "purpose_zh": "很多帶有電源插頭的產品(電源供應器、充電器、機上盒等)裡面裝有所謂的『X 電容』來濾除電源雜訊。問題是當你把插頭拔下來時,這顆電容裡可能還殘留電荷,讓插頭的金屬腳在拔出後的瞬間仍帶著危險電壓。如果這時手指剛好碰到插頭金屬腳,就可能被電到。這項試驗就是確認:拔掉插頭後,殘留電壓會在很短的時間內自動洩掉(透過內部的洩放電阻或放電 IC),不會電到人。對無人機這類含內建電源/充電模組的產品同樣重要。", "analogy_zh": "就像關掉水龍頭後,水管裡還會殘留一些水滴流出來。這個試驗是在確認:拔插頭後『殘留的電』要在一兩秒內漏光,而不是憋在插頭金屬腳上等著電你的手。", "procedure_zh": "讓設備在額定電壓下運轉,然後在交流電壓波形的最不利相位(峰值附近)瞬間拔掉插頭/斷開連接器,並立刻用高輸入阻抗電壓表測量外露金屬腳上的殘留電壓隨時間衰減的曲線。同時在正常狀態與單一故障狀態(例如其中一顆洩放電阻開路)下各做一次。判定殘留電壓是否在規定時間內降到安全值(等同於 ES1/不具危害),或殘餘電荷對應的能量低於限值。判定限值依表 5「已充電電容器之電氣能量源限制值」：以等效電容量查表對應允許之 Upeak（普通人員正常條件 ES1、單一故障條件 ES2）。", "params": "量測儀器:輸入阻抗 >=100 MΩ、並聯電容 <=25 pF(此即實驗室所列規格,完全符合標準)。判定限值依表 5〈已充電電容器之電氣能量源限制值〉：以電容量 C（nF）分級對應 ES1/ES2/ES3 之 Upeak（CNS p.59）。量測時點＝連接器切離後 2 s（5.5.2.2，p.101）：普通人員正常條件須符合 ES1、受指導人員正常條件 ES2、單一故障條件 ES2。斷電相位:於交流峰值最不利相位斷開。測試條件:正常 + 單一故障各一次;若用兩顆串聯且各自符合 5.5.6/補強絕緣距離的洩放電阻,則不需模擬其開路。判定:殘留電壓需於規定時間內衰減至 ES1 限值以下(常被類比為類似 IEC 61010-1 的『5 秒內不具危害』概念,但 62368-1 以能量/電壓限值判定)。", "standard_equipment": ["Measuring instrument with input impedance 100M Ω ± 5 MΩ in parallel with an input capacitance of 25pF or less; timer"], "iec_bsmi": "CNS 15598-1 為 IEC 62368-1 之國家轉訂，屬調和標準，無已知國家差異。CNS 官方標題為「連接器切離後之電容器放電」；已核實切離後 <b>2 s</b> 量得之可觸及電壓須符合限值。若使用具放電功能 IC(ICX)，其評估另依 Annex G.16，但 5.5.2.2 仍需於最終成品層級再驗證。", "location": "安規測試區", "utils": [], "equipment": [{"en": "High-impedance voltage probe (>=100 M, <=25 pF)", "zh": "高輸入阻抗電壓探棒", "role": "equip", "instId": "cap-discharge-probe"}], "diagram": "capdischarge", "qa": "QA 更正：電容殘電之量測時點（切離後 2 s）規定於條文 5.5.2.2，判定限值依表 5（普通人員正常條件 ES1、受指導人員正常條件 ES2、單一故障條件 ES2）。PEL：量測儀 ≥100 MΩ // ≤25 pF（RB），放電電阻見 G.10、放電功能 IC（ICX）見 G.16。", "pel": [{"equip": "High-impedance voltage probe (100 MΩ ± 5 MΩ, ≤ 25 pF)", "code": "RB", "test": "Capacitor discharge", "zh": "高輸入阻抗電壓探棒（100 MΩ，≤25 pF）", "instId": "cap-discharge-probe"}, {"equip": "Timer", "code": "RB", "test": "Capacitor discharge", "zh": "計時器", "instId": "stopwatch"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "針對含市電X電容之插頭產品殘電；落在市電充電器/變壓器，機體SELV無此。"}, "gist_zh": "拔下插頭後，插腳殘留電壓要在規定時間（常 2 秒）內放掉，避免殘電電擊手。", "learn": {"obj": ["能說出切離後 2 s 量測可觸及電壓並依表 5 判定", "能判斷正常條件須符合 ES1、單一故障條件須符合 ES2", "能說出量測儀規格：輸入阻抗 100 MΩ ± 5 MΩ、並聯電容 ≤25 pF", "能說出須於交流峰值最不利相位斷開，正常與單一故障各測一次"], "pit": [{"t": "誤解：表 5 是『電容 >18 nF 即觸發單一故障試驗』的門檻表。正解：表 5 為依電容量 C 分級對應允許 Upeak 之限值表，量測值與其比對判定。", "src": "查證記錄 D-17"}, {"t": "誤解：殘電限值規定於條文 5.5.2.2 本身、與表 5 無關。正解：5.5.2.2 定切離後 2 s 量測時點，限值依表 5（正常 ES1、單一故障 ES2）。", "src": "查證記錄 19處敘事修正"}], "quiz": [{"q": "連接器切離後多久要量測可觸及電壓？依據哪個表判定？", "a": "切離後 2 s 量測，依表 5『已充電電容器之電氣能量源限制值』以電容量對應 Upeak 判定。", "src": "CNS p.101"}, {"q": "普通人員正常條件與單一故障條件，殘電各須符合哪一級限值？", "a": "正常條件 ES1、單一故障 ES2（受指導人員正常條件為 ES2），皆依表 5。", "src": "CNS p.101"}, {"q": "什麼情況下可免做洩放電阻開路的單一故障模擬？", "a": "當使用兩顆串聯且各自符合 5.5.6／補強絕緣距離要求的洩放電阻時，不需模擬其開路。", "src": "params"}]}}, {"id": "5.6.4.1", "clauses": ["5.6.4.1"], "group": "5", "title_en": "Protective bonding conductors — Requirements (5.6.4); resistance of the protective bonding system verified per 5.6.6 (Test method 5.6.6.2 / Resistance or voltage drop 5.6.6.3)", "title_zh": "保護連結(接地)導體之要求;保護連結系統之電阻(阻抗)量測", "purpose_zh": "金屬外殼或金屬零件如果因內部故障(例如電線脫落碰到外殼)而帶電,使用者一摸就會觸電。為了防止這種事,產品會用一條『保護接地線(綠/黃線)』把這些金屬零件連到接地端,讓故障電流經由這條低電阻的路徑快速流走、把保險絲/斷路器跳掉,而不是流經人體。這項試驗就是用大電流去『考驗』這條接地路徑:確認它接得夠牢、電阻夠低,真的有能力安全導走故障電流。對含金屬機臂/外殼且插市電充電的無人機系統很關鍵。", "analogy_zh": "就像逃生通道:平常用不到,但失火(故障)時必須又寬又暢通,讓人(故障電流)一秒就跑光。這個試驗等於灌一大群人進去測,確認通道沒有被卡住(電阻過大)、門栓夠牢(接點接觸良好)。", "procedure_zh": "在『主保護接地端子』與『任一需接地的金屬零件』之間通入規定的大電流(交流或直流均可),量測該路徑的電阻或壓降。電源開路電壓限制在 12 V 以下(避免把待測物當負載加熱或產生危險電壓)。依電路的保護電流額定決定試驗電流大小,維持規定時間後讀取電阻/壓降並與限值比較。", "params": "電源：交流或直流皆可，開路電壓 ≤12 V。試驗電流：保護電流額定 ≤25 A 時取其 200%（常見 EU 16A／UK 13A／US 20A）；>25 A 時取『額定 200%』與『500 A』兩者較小者。施加時間：保護電流額定 ≤25 A 者施加 2 min；>25 A 者依表 33（額定 ≤30 A：2 min、≤60 A：4 min、≤100 A：6 min、≤200 A：8 min、>200 A：10 min）；接受外部電路供電之設備為 2 min。判定（CNS 15598-1:2020 §5.6.6.3）：保護電流額定 ≤25 A 者，由壓降計算之保護搭接系統電阻 <b>不得超過 0.1 Ω</b>；>25 A 者，搭接系統上之壓降 <b>不得超過 2.5 V</b>。", "standard_equipment": ["High current source with a voltage not exceeding 12 V,", "Source with at least 1500A short circuit", "Calliper, micrometer"], "iec_bsmi": "CNS 15598-1 轉訂 IEC 62368-1,屬調和標準,本項無已知國家差異(harmonised, no known difference)。實務提醒:條號中『需接地零件之要求』在 5.6.4(含導體截面積),而『電阻量測之試驗方法與限值』正式落在 5.6.6(5.6.6.2 方法、5.6.6.3 電阻/壓降)。實驗室標示 5.6.4.1 著重在『要求』面,量測程序對應 5.6.6。BSMI 接受 CB/IEC 結果,惟以 CNS 條文為最終依據。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Earth/ground bond resistance tester", "zh": "接地阻抗測試機", "role": "equip", "instId": "ground-bond"}], "diagram": "earthbond", "qa": "", "pel": [{"equip": "High current source with a voltage not exceeding 12 V,", "code": "RB", "test": "Resistance of protective conductors and their terminations", "zh": "接地阻抗大電流源(≤12V)", "instId": "ground-bond"}, {"equip": "Source with at least 1500A short circuit", "code": "S", "test": "Determination of the overcurrent protective device and circuit (Annex R)", "zh": "1500A短路電流源", "instId": ""}, {"equip": "Calliper", "code": "RB", "test": "Requirements for protective earthing conductors", "zh": "游標卡尺", "instId": "calliper"}, {"equip": "Micrometer", "code": "RB", "test": "Requirements for protective earthing conductors", "zh": "測微器", "instId": "micrometer"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "charger", "why_zh": "僅Class I接地設備適用；機體為Class III/SELV無PE，僅Class I充電器或接市電地面站才測。"}, "gist_zh": "灌大電流考驗接地線，確認故障時電流能快速流走跳電，而不是流經人體。", "learn": {"obj": ["能說出試驗電源交直流皆可、開路電壓不得超過 12 V", "能依保護電流額定換算試驗電流（200%；>25 A 與 500 A 取小）", "能說出限值：≤25 A 為 0.1 Ω、>25 A 為壓降 2.5 V", "能說出要求面在 5.6.4，量測方法與限值在 5.6.6"], "pit": [], "quiz": [{"q": "保護電流額定 20 A 的電路，試驗電流取多少、施加多久？", "a": "取保護電流額定之 200%（即 40 A），施加 2 min（≤25 A 者均為 2 min）。", "src": "CNS p.110"}, {"q": "接地連結系統的判定限值，≤25 A 與 >25 A 各是多少？", "a": "≤25 A：由壓降計算之電阻不得超過 0.1 Ω；>25 A：壓降不得超過 2.5 V。", "src": "params"}, {"q": "為什麼試驗電源的開路電壓要限制在 12 V 以下？", "a": "避免把待測物當負載加熱或產生危險電壓；電源交流或直流皆可。", "src": "params"}]}}, {"id": "5.7", "clauses": ["5.7"], "group": "5", "title_en": "Prospective touch voltage, touch current and protective conductor current (5.7.2 Measuring devices and networks; 5.7.2.1 Measurement of touch current; 5.7.2.2 Measurement of prospective touch voltage)", "title_zh": "預期接觸電壓、接觸電流及保護導體電流(量測裝置與網路、接觸電流量測、預期接觸電壓量測)", "purpose_zh": "就算外殼沒有明顯帶高壓,某些零件(例如電源濾波電容、絕緣的微小漏電)還是會讓很小的電流流經摸到它的人。雖然不致命,但達到一定大小會讓人『有感、嚇一跳、甚至肌肉收縮放不開手』。這項量測就是模擬『人手碰到產品時,有多少電流會流過人體』,並確認這個電流小到對人沒有危害(屬 ES1)。它不是用普通電表測,而是用一個模擬『人體電阻與頻率反應』的特製電路網路(IEC 60990 的量測網路)來測,結果才會和人體實際感受相符。", "analogy_zh": "就像用『假手』去摸帶微弱電的欄杆,這隻假手的導電與反應特性跟真人一模一樣(IEC 60990 網路),於是測到的數字能直接代表『真人摸下去會不會麻、會不會抽手放不開』。", "procedure_zh": "把設備依規定接好電源（取容許差內最不利之供電電壓；實務常以 110% 額定執行）,在外露可觸及零件與大地(或另一可觸及零件)之間接上 IEC 60990 規定的量測網路:圖 4 用於『感知/驚嚇反應』加權,圖 5 用於『無法放手(let-go)』加權。讀取網路輸出端電壓並換算成等效接觸電流(例如反應網路:接觸電流 mA = 輸出電壓 / 500Ω 的關係),於正常與單一故障(如中斷中性線)條件下量測。若為含保護接地之設備,另量保護導體電流並與限值/輸入電流比例比較。", "params": "量測網路元件(IEC 60990 圖 4 感知/反應):輸出取 500Ω 端,典型含 Rs 1500Ω、Rs 500Ω、Cs 0.22µF、R1 10000Ω、C1 0.022µF;接觸電流 = V(輸出)/500Ω (mA)。圖 5(let-go)為較複雜網路且使用受特定條件限制。供電:取容許差內最不利電壓（實務常用 110% 額定;CNS 15598-1 未明定此值）。判定限值(交流):ES1 穩態接觸電流上限約 0.5 mA(0.707 mA 峰值);注意：CNS 15598-1 並無 3.5 mA 之一般接觸電流限值（該值源自舊 IEC 60950-1）;接觸電流超過 ES2 限制時依 5.7.6（CNS p.112-113）:保護導體電流不得超過正常輸入電流之 5%、保護接地導體依 5.6.3 強化/雙重化、超過 10 mA 須於安裝手冊載明保護導體電流值、並依 F.5 提供指示型安全防護。量測同時涵蓋正常與單一故障條件。", "standard_equipment": ["Networks in according IEC 60990:2016 figures 4 and 5; ampere meter"], "iec_bsmi": "CNS 15598-1 調和於 IEC 62368-1,並引用 IEC 60990 量測方法,屬調和標準(harmonised, no known difference)。注意 vs. 美規:UL 62368-1 在量測電路的『e』開關處理與 UL 101 傳統做法不同,故若同時取得 UL 報告需留意量測接法差異;但對 CNS/BSMI(IEC 路線)無影響。台灣市電 110V/60Hz 之供電條件需據此設定 110% 過電壓點。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Leakage / touch-current tester (IEC 60990 networks)", "zh": "洩漏/接觸電流量測儀", "role": "equip", "instId": "leakage-620L"}], "diagram": "touchcurrent", "qa": "", "pel": [{"equip": "IEC 60990:2016 measuring networks (Figures 4 & 5)", "code": "RB", "test": "Prospective touch voltage touch current and protective conductor current", "zh": "IEC 60990 量測網路（圖 4/5）", "instId": "leakage-620L"}, {"equip": "Ampere meter", "code": "RB", "test": "Prospective touch voltage touch current and protective conductor current", "zh": "電流表", "instId": "multimeter"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "charger", "why_zh": "IEC 60990網路於110%額定市電下量接觸/洩漏電流，屬市電連接量測，落在充電器。"}, "gist_zh": "用模擬人體的電路量測流過手的微小電流，確認小到無害、不會讓人電麻抽手。", "learn": {"obj": ["能解釋 IEC 60990 網路模擬人體；圖 4 量感知反應、圖 5 量無法放手", "能說出 ES1 交流穩態接觸電流上限約 0.5 mA（峰值 0.707 mA）", "能說出超過 ES2 時依 5.7.6：5% 規則、>10 mA 載明手冊", "能判斷供電取容許差內最不利電壓；110% 為實務慣用而非 CNS 明定"], "pit": [{"t": "誤解：接觸電流沿用 3.5 mA 一般限值。正解：CNS 無此值（源自舊 IEC 60950-1）；超過 ES2 限制時依 5.7.6 之輸入電流 5% 規則等處置。", "src": "查證記錄 D-05"}, {"t": "誤解：110% 額定電壓為 CNS 明定之供電條件。正解：CNS 要求取容許差內最不利之供電電壓；110% 僅為實務慣用值。", "src": "查證記錄 19處敘事修正"}], "quiz": [{"q": "交流下 ES1 的穩態接觸電流上限約是多少？", "a": "約 0.5 mA（峰值 0.707 mA）；CNS 並無 3.5 mA 之一般限值。", "src": "params"}, {"q": "接觸電流超過 ES2 限制時，保護導體電流不得超過正常輸入電流的多少？", "a": "5%；且超過 10 mA 時須於安裝手冊載明保護導體電流值（5.7.6）。", "src": "CNS p.112-113"}, {"q": "量接觸電流為何要用 IEC 60990 量測網路而非普通電流表？", "a": "網路模擬人體電阻與頻率反應，讀值才對應真人感受；感知／反應用圖 4，無法放手（let-go）用圖 5。", "src": "params"}]}}, {"id": "6.2.2", "clauses": ["6.2.2"], "group": "6", "title_en": "Power source circuit classifications — Classification of a power source (PS1, PS2, PS3) by measurement of available power", "title_zh": "電力(電源)能量源電路之分級 — 依可用功率量測將電源分為 PS1、PS2、PS3", "purpose_zh": "火災的三要素之一是『有足夠能量點燃東西』。IEC 62368-1 把電路依『最多能輸出多少功率(瓦特)』分成 PS1/PS2/PS3 三級:功率越大,萬一發生過載、短路或元件故障時,越有可能把附近材料燒起來。這項量測就是用一個可調電阻負載去『榨出』電路在最不利故障情況下能釋放的最大功率,藉此決定它屬於哪一級,進而決定後面要不要加防火外殼、要用什麼防火等級的材料。對含大容量鋰電池與大功率馬達驅動的無人機,這是判斷起火風險的根本分類。", "analogy_zh": "就像評估一個爐子的火力大小:小蠟燭(PS1)頂多燙手不太會引發火災;卡式爐(PS2)某些情況能點燃紙張;噴槍(PS3)火力足以引燃並蔓延。先量出火力等級,才知道廚房(產品)要不要加裝防火牆。", "procedure_zh": "在被測電路的輸出端接上可變電阻負載,從開路慢慢調到讓電路輸出『最大功率』的負載點(功率匹配點),並量測該最大功率(瓦)。需在兩種情境量:(a) 負載電路:電源在正常運轉下灌入最不利的『負載端故障』;(b) 電源電路:最不利的『電源端故障』灌入規定的正常負載。依規定時點讀取功率:PS1 為 3 秒後不超過 15 W、PS2 為 5 秒後量測不超過 100 W、超過 PS2 限制即為 PS3(起火評估另看:電弧 PIS 之開路電壓量於 3 秒後、電阻性 PIS 之功率量於 30 秒後),據以歸類 PS1/PS2/PS3。", "params": "分級依『可用最大功率(瓦)』：PS1 ≤15 W（且不視為潛在起火源 PIS）、PS2 >15 至 ≤100 W、PS3 >100 W。潛在起火源(PIS)判定：電弧型 — 相鄰兩點電壓 >50 V 峰值或直流（量測於 3 s 後）且電壓×正常 RMS 電流 >15；電阻型 — PS2／PS3 電路在正常或單一故障下 30 s 後功率消耗 >15 W（前 30 s 無功率上限）。量測：以可變電阻負載掃出最大功率（CNS 圖 34），涵蓋負載端與電源端故障。可燃物隔距：電弧性 PIS 13 mm、電阻性 PIS 5 mm。", "standard_equipment": ["Watt meter, variable resistor load, stop watch"], "iec_bsmi": "CNS 15598-1 調和於 IEC 62368-1,本分級無已知國家差異(harmonised, no known difference)。提醒:第 4 版(2023/CNS 對應更新時)對『mains 不再一律視為 PS3』等定義有調整(功率不再單獨定義 mains);實驗室應確認所依 CNS/IEC 版次。BSMI 接受依此分類之 CB 結果。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Variable resistive load", "zh": "可變電阻負載", "role": "fixture", "instId": "var-resistor-load"}], "diagram": "", "qa": "", "pel": [{"equip": "Watt meter", "code": "RB", "test": "Power source circuit classification", "zh": "功率計", "instId": "power-analyzer"}, {"equip": "Variable resistor load", "code": "RB", "test": "Power source circuit classification", "zh": "可變電阻負載", "instId": "var-resistor-load"}, {"equip": "Stop watch", "code": "RB", "test": "Power source circuit classification", "zh": "碼錶", "instId": "stopwatch"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "airframe", "why_zh": "所有帶電電路起火分級總開關；機體大容量LiPo+大功率馬達驅動定為PS3，是起火防護判定起點。"}, "gist_zh": "量電路的「火力」（最大可輸出功率）分級，決定要不要加防火外殼與耐燃材料。", "learn": {"obj": ["能說出 PS 分級：3 秒後 15 W 與 5 秒後 100 W 兩道門檻", "能區分電弧型與電阻型 PIS 的判定條件與量測時點", "能說出可燃物隔距：電弧性 PIS 13 mm、電阻性 PIS 5 mm", "能解釋 PS 分級決定後續防火外殼與耐燃材料要求"], "pit": [], "quiz": [{"q": "PS1 與 PS2 的功率限值與量測時點各為何？", "a": "PS1：3 秒後不超過 15 W；PS2：5 秒後量測不超過 100 W；超過 PS2 限制即為 PS3。", "src": "CNS p.119"}, {"q": "可燃材料與潛在起火源 PIS 的最小隔距是多少？", "a": "電弧性 PIS 13 mm、電阻性 PIS 5 mm。", "src": "params"}, {"q": "無人機機體動力電路為何通常直接列為 PS3？", "a": "大容量鋰電池加大功率馬達驅動，可用功率超過 PS2 的 100 W 上限，屬 PS3，是起火防護判定的起點。", "src": "params"}]}}, {"id": "6.3.1", "clauses": ["6.3.1"], "group": "6", "title_en": "Reduction of the likelihood of ignition under normal operating conditions and abnormal operating conditions — Verification by the glow-wire test per IEC 60695-2-11 (and material indices GWFI per IEC 60695-2-12 / GWIT per IEC 60695-2-13)", "title_zh": "降低於正常及異常操作條件下起火之可能性 — 以 IEC 60695-2-11 熾熱線(灼熱絲)試驗驗證(材料指數 GWFI、GWIT)", "purpose_zh": "電子產品裡若有零件過熱、接點氧化發熱,可能把旁邊的塑膠零件點燃,進而釀成火災。熾熱線試驗就是模擬這種『內部過熱金屬點』的情境:用一根加熱到指定高溫(紅熱)的鎳鉻金屬絲去頂住塑膠零件一段時間,看它會不會被點燃、火會不會持續、會不會滴落燃燒物把下方的紙/棉布引燃。藉此確認產品所用塑膠(尤其是承載帶電零件、靠近發熱源的塑膠)具有足夠的耐燃/自熄能力。對無人機的電池盒、電源板支架等塑膠件特別重要。", "analogy_zh": "就像拿一根燒紅的鐵絲去戳不同的塑膠杯:好的耐燃材料被戳一下會自己熄掉、不蔓延;差的材料一碰就燒起來還滴火。這個試驗就是用『燒紅的鐵絲』幫產品塑膠件做這種考驗。", "procedure_zh": "把一根規定材質與直徑(約 ∅4 mm,Ni80/Cr20)的金屬絲尖端,用電流加熱到規定溫度（本條（6.3.1）之熾熱線選項為 550°C；650～960°C 等級屬材料指數 GWFI／GWIT 之選用值）,以約 1.0 N 的力垂直頂住待測塑膠件表面,持續接觸 30 秒後移開。觀察接觸期間與移開後的燃燒/熾熱情形,並在試樣下方鋪上指定的棉布/包裝紙作為引燃指示。判定:無火焰且無熾熱、或於移開後 30 秒內自行熄滅,且下方棉布/紙不被點燃,即為通過。", "params": "基本要求（CNS 15598-1:2020 §6.3.1）：正常／異常操作下不得引燃，且部件不得超過 ISO 871 自燃溫度限值之 90%（材料未知時取 300°C），並以 IEC 60695-2-11 在 <b>550°C</b> 之熾熱線試驗驗證；防火機殼外部可燃材料耐燃等級至少 HB75（最薄 <3 mm）／HB40。熱絲：∅約 4 mm、Ni80／Cr20；接觸力 1.0 N、接觸 30 s。較高溫度級（650／750／850／960°C）係材料指數 GWFI（IEC 60695-2-12，常 850°C）／GWIT（60695-2-13，常 775°C）之選用值；成品端試驗（GWEPT／GWT）常以 750°C、火焰 ≤2 s。", "standard_equipment": ["Glow-Wire according to IEC 60695-2-11."], "iec_bsmi": "CNS 15598-1 調和於 IEC 62368-1（引用 IEC 60695-2-11／-2-12／-2-13），屬調和標準。已對照 CNS §6.3.1：以 550°C 熾熱線為基本可燃性驗證，溫度級之選用與 PS 分級／是否無人看管相關（部分概念承襲 IEC 60335-1 家電傳統）。第4版(2023)放寬為可用熾熱線試驗驗證一般可燃性要求。", "location": "材料測試區", "utils": ["需排煙"], "equipment": [{"en": "Glow-wire test apparatus", "zh": "熾熱線試驗裝置", "role": "equip", "instId": "glow-wire"}], "diagram": "glowwire", "qa": "", "pel": [{"equip": "Glow-Wire according to IEC 60695-2-11.", "code": "S", "test": "Flammability test", "zh": "熾熱線試驗(IEC 60695-2-11)", "instId": "glow-wire"}], "pel_note": "IEC 62368-1:2023 將熾熱線（Glow-Wire, IEC 60695-2-11）列於 6.3.1／6.4.6，代碼 S（可外包）。清單自備熾熱線試驗機，可自行執行材料可燃性預選。", "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "multiple", "why_zh": "承載PS3帶電件之塑膠件(機體電池盒/電源板支架，充電器外殼)須550℃熾熱線耐燃；屬基礎防火要求。"}, "gist_zh": "用燒到紅熱的金屬絲頂住塑膠，確認會自熄不蔓延；電池盒、電源板支架尤其重要。", "learn": {"obj": ["能說出 6.3.1 熾熱線驗證溫度為 550°C（IEC 60695-2-11）", "能區分 550°C 基本驗證與 GWFI／GWIT 高溫級之用途", "能說出部件限溫為自燃溫度之 90%，材料未知時取 300°C", "能選出無人機須驗證之塑膠件：電池盒、電源板支架等"], "pit": [{"t": "誤解：6.3.1 之驗證須用 650～960°C 高溫級熾熱線。正解：本條選項為 550°C；650／750／850／960°C 屬材料指數 GWFI／GWIT 之選用值。", "src": "查證記錄 19處敘事修正"}], "quiz": [{"q": "CNS 6.3.1 的熾熱線試驗溫度是幾度？", "a": "550°C（依 IEC 60695-2-11）；650～960°C 為 GWFI／GWIT 材料指數之選用值。", "src": "params"}, {"q": "材料自燃溫度未知時，部件溫度限值取多少？", "a": "取 300°C；已知材料則不得超過 ISO 871 自燃溫度限值之 90%。", "src": "params"}, {"q": "熾熱線試驗模擬產品內部的哪種起火情境？無人機哪些零件首當其衝？", "a": "模擬零件過熱、接點氧化發熱的內部過熱金屬點點燃鄰近塑膠；電池盒、電源板支架等塑膠件特別重要。", "src": "params"}]}}, {"id": "6.4.8.3.3", "clauses": ["6.4.8.3.3"], "group": "6", "title_en": "Fire enclosure and fire barrier openings — Top openings (properties of openings in the top of a fire enclosure); integrity verified by needle-flame test per Annex S.2", "title_zh": "防火外殼與防火屏障之開孔 — 頂部開孔(防火外殼頂面開孔之性質);完整性以附錄 S.2 針焰試驗驗證", "purpose_zh": "如果產品內部真的起火,防火外殼的工作是『把火關在裡面』。但外殼為了散熱常需開孔,問題是:萬一火焰或燃燒的塑膠碎屑從『頂部開孔』竄出,可能引燃放在產品上方的東西(例如桌上的紙、窗簾、另一台設備),把火災擴大。這條規定就是限制頂部開孔的大小,並在必要時做試驗,確認火焰與燃燒物不會從頂部逸出引燃上方物品。對堆疊使用或上方有遮罩的無人機地面站/充電櫃尤其重要。", "analogy_zh": "就像鍋子的鍋蓋:可以留小蒸氣孔散熱,但孔不能大到讓油火直接噴出去燒到抽油煙機。這個試驗就是在確認『鍋蓋上的孔』夠小,火苗冒不出去。上方鋪的棉紗布就是『會不會燒到上方東西』的偵測哨兵。", "procedure_zh": "先依 6.4.8.3.1(圖 40)判定哪些算『頂部』開孔,並檢查開孔尺寸是否在免試限度內(任何尺度不超過5 mm,或寬不超過1 mm且不限長度)。若構造未自動滿足,則對該頂部開孔施作防火外殼完整性試驗:依附錄 S.2(針焰試驗,IEC 60695-11-5 系)在內部對開孔下方施加規定火焰,並以單層漂白棉紗布(cheesecloth)直接覆蓋試樣頂部開孔作為指示。判定:棉紗布不得被引燃(未引燃=通過),代表火焰/燃燒物未由頂部逸出。", "params": "判定基準：覆蓋於試樣頂部開孔之單層漂白棉紗布（cheesecloth）不得引燃（未引燃＝合格；引燃＝不合格）。開孔尺寸與火源施加（附錄 S.2 針焰，依 IEC 60695-11-5）依 CNS 15598-1:2020 §6.4.8.3.1 圖 40、§6.4.8.3.3 圖 41 與附錄 S.2 判定；『繞著圓錐 2 mm』之火錐邊界（圖 41）與附錄 S.2 之圖 S.1 施加方式於本版即已明載。", "standard_equipment": ["Cheesecloth bleached cotton cloth 40g/m2; timer"], "iec_bsmi": "CNS 15598-1 調和於 IEC 62368-1，本項無已知國家差異。版次注意：2 mm 火錐邊界（圖 41）與 S.2 之圖 S.1 於 CNS Ed.3 即有（p.129、p.285），非第 4 版新增；經 Ed.4 正文 OCR 逐字比對（IEC 62368-1:2023 印刷 p.163-165）：6.4.8.3.3 頂部開孔與 6.4.8.3.4 底部開孔（含火錐＋2 mm、圖 41／42、S.2／S.3、免試尺度、圖 43 擋板結構）Ed.3 與 Ed.4 實質相同，非版次差異項。實驗室仍應確認所依版本為 CNS 15598-1:2020（＝IEC 62368-1:2018 第3版）或 IEC 62368-1:2023（第4版）送驗；惟就 6.4.8.3 開孔要求而言，二版實質一致。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Cheesecloth (bleached cotton)", "zh": "棉紗布（漂白棉布）", "role": "consumable", "instId": "cheesecloth"}], "diagram": "", "qa": "", "pel": [{"equip": "Cheesecloth (bleached cotton, 40 g/m²)", "code": "RB", "test": "Top openings and top openings properties", "zh": "漂白棉紗布（40 g/m²）", "instId": "cheesecloth"}, {"equip": "Timer", "code": "RB", "test": "Top openings and top openings properties", "zh": "計時器", "instId": "stopwatch"}], "match": {"level": "warn", "note": "可能缺漏 / 建議補充"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "僅堆疊或上方有遮罩之地面站/充電櫃情境觸發；手持飛行器頂部逸火非核心，視機構選配。"}, "gist_zh": "限制防火外殼頂面開孔，確認萬一起火，火焰與燃燒碎屑不會冒出引燃上方物品。", "learn": {"obj": ["能說出頂部開孔免試限度：任何尺度≤5 mm，或寬≤1 mm且不限長度", "能說出附錄S.2指示物配置：單層漂白棉紗布直接覆蓋試樣頂部開孔", "能判斷試驗結果：紗布未引燃為合格、引燃為不合格", "能解釋堆疊或上方有遮罩之地面站／充電櫃為何須防頂部逸火"], "pit": [{"t": "誤解：『繞著圓錐2 mm』火錐邊界與圖S.1施加方式為第4版(2023)新增。正解：CNS 15598-1:2020圖41與附錄S.2即已明載。", "src": "params"}, {"t": "誤解：附錄S施焰30 s、紗布26–28 m²/kg為CNS規定。正解：皆非CNS附錄S條文（曾遭誤植），應依附錄S正文；本試驗紗布為40 g/m²漂白棉布。", "src": "查證記錄 D-07/D-15"}], "quiz": [{"q": "防火外殼頂部開孔在多大尺寸內可免做試驗？", "a": "任何尺度不超過5 mm，或寬不超過1 mm且不限長度；超出限度則須依附錄S.2試驗。", "src": "CNS p.129"}, {"q": "附錄S.2試驗中棉紗布如何配置？判定準則為何？", "a": "單層漂白棉紗布直接覆蓋試樣頂部開孔；紗布不得引燃，未引燃即通過。", "src": "CNS p.285-286"}, {"q": "無人機產品中，哪種情境最需要關注本試驗？", "a": "堆疊使用或上方有遮罩之地面站／充電櫃——防止內部起火時火焰與燃燒碎屑由頂部開孔竄出引燃上方物品。", "src": "params"}]}}, {"id": "8.2", "clauses": ["8.2"], "group": "8", "title_en": "Classification of mechanical energy sources (MS1, MS2, MS3)", "title_zh": "機械能量源之分級 (MS1、MS2、MS3)", "purpose_zh": "這一條不是一個「會動手做」的單項試驗，而是整個機械傷害章節(第8章)的分類規則:先判斷產品的會動、會割、會掉、會爆的部位「危險到什麼程度」,再決定要不要保護、要保護到幾層。觀念很簡單:MS1=碰到也不痛不傷(例如慢速小風扇);MS2=會痛但不致受傷(例如夾手、利邊);MS3=會造成需要看醫生的傷害(例如高速旋轉刀片、會把人壓傷的重物、或裝在2公尺以上掉下來會砸人的設備)。等級越高,規定要的「安全防護」越多(MS2要1層、MS3要2層)。對無人機/旋翼類產品特別關鍵,因為高速旋轉的螺旋槳幾乎一定落在MS3。", "analogy_zh": "像遊樂園入口先幫每個遊樂設施貼上「綠/黃/紅」標籤:綠色隨便玩、黃色要小心、紅色一定要繫安全帶又要工作人員看著。先分級,才知道每個危險要圍幾道欄杆。", "procedure_zh": "不是用儀器量,而是工程判定:檢視產品在「正常使用、異常使用、單一故障」三種狀態下,各個可被人觸及的會動/會割/會掉/會爆部位的能量大小,對照標準的MS1/MS2/MS3界限把它歸類。歸到哪一級,就套用後續8.4~8.11對應的防護與試驗。實驗室此處列的「50kg磅秤」是用來秤設備質量,因為質量(配合掉落高度)是判定動能/位能屬於哪一級的輸入值。", "params": "MS分三級;MS2需1層安全防護、MS3需2層;安裝高度>2m之牆/天花板設備一律視為MS3(與質量無關),且須通過8.7固定試驗;能量於正常/異常/單一故障三狀態下評估。分級門檻見表35:設備質量以≤7 kg/≤25 kg/>25 kg分級,扇葉依K參數公式對照圖45/圖46分級,無單一動能(J)門檻值。", "standard_equipment": ["Scale up to 25kg"], "iec_bsmi": "已協和。CNS 15598-1:2020(109年版)直接採用 IEC 62368-1:2018(第3版),分級架構一致,無已知國別差異。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Platform scale (<=50 kg)", "zh": "磅秤（≤50 kg）", "role": "equip", "instId": "scale"}], "diagram": "", "qa": "PEL 對照：官方規定磅秤量程「up to 25 kg」（RB）；清單為 50 kg，量程涵蓋無虞。", "pel": [{"equip": "Scale up to 25kg", "code": "RB", "test": "Mechanical energy source classifications", "zh": "磅秤(≤25kg)", "instId": "scale"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "core", "applies_to": "airframe", "why_zh": "全第8章分級總開關；機體高速螺旋槳=MS3，是機體機械危害判定起點。"}, "gist_zh": "判斷會動、會割、會掉的部位危險到什麼程度（MS1/2/3），再決定要幾層防護。", "learn": {"obj": ["能說出MS1/MS2/MS3傷害意涵，及MS2需1層、MS3需2層防護", "能說出表35質量級距：≤7/≤25/>25 kg，扇葉依K參數公式分級", "能判斷安裝高度>2 m之牆/天花板設備一律視為MS3並須通過8.7固定試驗", "能解釋能量須於正常使用、異常使用、單一故障三狀態下評估"], "pit": [], "quiz": [{"q": "MS2與MS3各需要幾層安全防護？", "a": "MS2需1層、MS3需2層安全防護。", "src": "params"}, {"q": "表35之設備質量分級級距為何？有單一動能(J)門檻值嗎？", "a": "≤7 kg、≤25 kg、>25 kg三級；無單一動能(J)門檻值，扇葉依K參數公式對照圖45/圖46分級。", "src": "CNS p.135"}, {"q": "無人機高速旋轉的螺旋槳通常歸哪一級？為什麼？", "a": "MS3——高速旋轉刀片類會造成需就醫之傷害，須2層安全防護，是第8章機體機械危害判定起點。", "src": "params"}]}}, {"id": "8.5.4.3", "clauses": ["8.5.4.3"], "group": "8", "title_en": "Special categories of equipment containing moving parts - accessibility (household/home-office shredder-type assessment using the wedge probe, Figure V.4)", "title_zh": "設備具有破壞介質之電機裝置（碎紙機類）— 可觸及性評估（楔形試具圖 V.4；條狀型 45 N／破碎型 90 N）", "purpose_zh": "目的是確認:當設備內部有會旋轉、會撕裂、會夾傷人的零件(典型代表是碎紙機刀片,延伸到任何有進料口或開孔且內含旋轉/破壞性零件的設備)時,使用者的手指或塞進去的薄物(像一張紙的邊緣)不會碰到那些危險刀刃。換句話說,就是測「人會不會不小心被捲進去或割到」。對含旋轉機構的產品很重要,沒有適當防護就會傷手。", "analogy_zh": "像測試果汁機的安全鎖:用一根模擬「手指/薄紙片」的探棒,從各個縫隙用力戳戳看,看能不能碰到正在轉的刀。碰得到就不合格。", "procedure_zh": "先移除不需工具即可拆下的外殼或護罩,然後把楔形試具(Figure V.4,模擬薄片插入)伸入機械外殼的每一個開孔。對直條型(strip-cut)家用/家用辦公碎紙機類施加不超過45N、對交叉型(cross-cut)施加不超過90N的力,朝各方向推。判定危險的旋轉/破壞性零件是否可被觸及;若可觸及則不符合,須加強防護(警告標示不可取代結構防護)。", "params": "直條型(strip-cut)家用/家用辦公碎紙機類:施力<=45N;交叉型(cross-cut):<=90N;施力方向為相對開孔之任意方向;試前先拆除免工具可拆之外殼/護罩。可觸及性探棒一般以30N施力判定一般開孔(Annex V)。", "standard_equipment": ["Test probe (jointed) of Annex V (figure V.1 and V.2) and; wedge probe V.4; Force 45N and 90 N with wedge probe"], "iec_bsmi": "已協和（採 IEC 62368-1:2018 第3版）。實驗室所列 ULP-1／ULP-2 為探棒供應商型號，標準以 Annex V 之 Figure V.1～V.4 命名。45 N／90 N 之楔形試具源自含旋轉／破壞性零件（碎紙機類）條款；受測無人機若非該型，實際適用之子條款與施力依產品型態而定。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Accessibility test probes / fingers", "zh": "可觸及性試驗探棒／試指", "role": "fixture", "instId": "access-probes"}, {"en": "Wedge probe (45 N / 90 N)", "zh": "楔形探棒（45／90 N）", "role": "fixture", "instId": "wedge-probe"}], "diagram": "", "qa": "", "pel": [{"equip": "Jointed test probe, Annex V (Figures V.1, V.2)", "code": "RB", "test": "Equipment having an electromechanical device for destruction of media", "zh": "關節試探棒（圖 V.1/V.2）", "instId": "access-probes"}, {"equip": "Wedge probe (Figure V.4), 45 N / 90 N", "code": "RSH", "test": "Equipment having an electromechanical device for destruction of media", "zh": "楔形探棒（圖 V.4，45／90 N）", "instId": "wedge-probe"}], "match": {"level": "warn", "note": "部分符合"}, "drone": {"relevant": false, "level": "na", "applies_to": "airframe", "why_zh": "碎紙機類進料口旋轉/破壞零件專用；無人機無此機構，機體不適用。"}, "gist_zh": "用楔形試具戳進料口縫隙，確認碎紙機類旋轉破壞性零件不會割到、捲到手指。", "learn": {"obj": ["能說出楔形試具（圖V.4）施力上限：直條型45 N、交叉型90 N", "能說出試前處置：先拆除免工具可拆之外殼或護罩", "能判斷合格準則：危險零件不得被觸及，警告標示不可取代結構防護", "能判斷無人機無進料口破壞機構，本條不適用"], "pit": [{"t": "誤解：本條標題即『碎紙機可觸及性評估』。正解：CNS標題為『設備具有破壞介質之電機裝置』，碎紙機為其典型代表。", "src": "查證記錄 D-18"}], "quiz": [{"q": "楔形試具對直條型與交叉型碎紙機之施力上限各為何？", "a": "直條型(strip-cut)不超過45 N、交叉型(cross-cut)不超過90 N，朝相對開孔之任意方向施力。", "src": "params"}, {"q": "若危險零件可被楔形試具觸及，能以警告標示補救嗎？", "a": "不能；可觸及即不符合，須加強防護，警告標示不可取代結構防護。", "src": "params"}, {"q": "四旋翼無人機機體需要做本項楔形試具試驗嗎？", "a": "不需要；本條針對有進料口且內含旋轉/破壞性零件之碎紙機類設備，無人機無此機構。", "src": "params"}]}}, {"id": "8.5.5", "clauses": ["8.5.5.2"], "group": "8", "title_en": "High pressure lamps (explosion / rupture test)", "title_zh": "高壓燈泡(爆裂試驗)", "purpose_zh": "高壓放電燈泡(投影機、舞台燈等常見)內部壓力很高,萬一爆裂會像小爆炸一樣把玻璃碎片高速噴出,可能傷到旁邊的人。這項試驗就是要確認:就算燈泡真的炸了,設備的外殼/防護罩也能把玻璃碎片擋住、不會飛出來傷人,且漏出的碎片尺寸在限值內。對含此類燈泡的產品是安全關鍵。", "analogy_zh": "像把一顆可能會爆的玻璃彈珠放在一個密封盒裡搖晃測試:就算它在裡面碎掉,也不能有碎片從盒縫噴出來打到人。", "procedure_zh": "在設備正常工作狀態下,使燈泡達到(或以方法促使)爆裂破壞條件,觀察外殼/防護是否能包容玻璃碎片,能量逐步以 5 J 增加直到燈泡破裂；以深色黏性墊捕捉、0.1 mm 放大鏡量測碎片，依 8.5.5.3 判定（長軸 ≥0.8 mm 之碎片不得濺出）。判定外殼(基本/補充/強化防護)是否足以保護一般人。", "params": "燈泡操作至少 5 分鐘達工作溫度與壓力後，以機械衝擊、電子脈衝產生器或類似方式激發爆裂；能量逐步以 5 J 增加，直到使燈泡破裂（8.5.5.2，CNS p.144）。以合適尺寸之深色黏性墊置於設備通氣孔處捕捉微粒，爆裂後用 0.1 mm 解析度放大鏡量測玻璃顆粒。判定（8.5.5.3）：長軸 ≥0.8 mm 之玻璃碎片不得濺出；且機殼開孔外 1 m 內區域不得發現長軸 <0.8 mm 之碎片（中文版此句語向疑與 IEC 原文相反，正式引用前建議對照英文正本；專業設備 0.8 mm 可放寬為 5 mm）。高壓燈泡歸類 MS3，須具備外殼安全防護。", "standard_equipment": ["Dark sticky mat, magnified glass with a resolution of 0,1 mm"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版)。實驗室所列「dark sticky mat + magnifier」與標準此試驗之收集/量測碎片需求一致。具體碎片尺寸限值為付費標準內容,本處未臆造。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Dark sticky mat", "zh": "深色黏性墊", "role": "consumable", "instId": "sticky-mat"}, {"en": "Magnifying glass", "zh": "放大鏡", "role": "equip", "instId": "magnifier"}], "diagram": "bulb", "qa": "", "pel": [{"equip": "Dark sticky mat", "code": "", "test": "High pressure lamps", "zh": "深色黏性墊", "instId": "sticky-mat"}, {"equip": "Magnifying glass (0.1 mm resolution)", "code": "", "test": "High pressure lamps", "zh": "放大鏡（解析 0.1 mm）", "instId": "magnifier"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": false, "level": "na", "applies_to": "airframe", "why_zh": "投影機/舞台高壓放電燈專用；無人機用LED，無高壓燈泡，不適用。"}, "gist_zh": "確認高壓燈泡萬一爆裂，外殼/防護罩能擋住高速玻璃碎片不飛出傷人。", "learn": {"obj": ["能說出試驗目的：燈泡爆裂時外殼須包容高速玻璃碎片不傷人", "能判斷高壓燈泡歸類MS3，須具備外殼安全防護", "能說出 8.5.5.2/8.5.5.3：能量以 5 J 步進至爆裂；≥0.8 mm 碎片不得濺出", "能判斷無人機採LED光源，無高壓燈泡，本項不適用"], "pit": [{"t": "誤解：燈泡爆裂試驗沿 0.5–3.5 J 能量階梯施加。正解：能量階梯屬 T.9 玻璃撞擊試驗；8.5.5.2 為逐步以 5 J 增加直到燈泡破裂。", "src": "查證記錄 D-08；CNS p.144"}], "quiz": [{"q": "高壓燈泡爆裂試驗如何施加能量？關鍵判準為何？", "a": "能量逐步以 5 J 增加直到燈泡破裂；長軸 ≥0.8 mm 之玻璃碎片不得濺出（深色黏性墊＋0.1 mm 放大鏡檢視）。", "src": "CNS p.144"}, {"q": "高壓燈泡屬機械能量源哪一級？須具備何種防護？", "a": "MS3，須具備外殼安全防護。", "src": "params"}, {"q": "多旋翼無人機為何不需做高壓燈泡爆裂試驗？", "a": "無人機使用LED光源，無投影機/舞台燈類之高壓放電燈泡，本項不適用。", "src": "params"}]}}, {"id": "8.6.2", "clauses": ["8.6.2"], "group": "8", "title_en": "Static stability", "title_zh": "靜態穩定性", "purpose_zh": "確認落地式或放在桌面的設備不會輕易翻倒砸到人。地面可能不是完全水平、或設備本身重心偏,這項試驗就是把設備放在一個微傾的斜面上(或傾斜設備本身),看它會不會倒。設備一倒,輕則砸壞、重則壓傷小孩或砸到腳,所以穩不穩很重要。", "analogy_zh": "像把直立式電風扇或落地燈放在一個微微傾斜的地板上,輕輕轉一圈看會不會自己倒下去——站得住才安全。", "procedure_zh": "靜態穩定試驗三擇一（8.6.2.2）：①設備在所有方向傾斜至基座傾角 10 度；②置於傾斜 10 度之表面繞正常垂直軸緩慢轉 360 度；③置於水平防滑面施力——垂直向下 50% 重量（上限 100 N；若支撐面擋住翻覆則不靠支撐面重測）且所有水平方向 13% 重量（上限 250 N），經約 125×200 mm 平面治具、施力高度 ≤1.5 m。門、抽屜、腳輪、可調整式支架等以最不利方式擺放，試驗中不得傾倒。另含8.6.2.3向下力試驗:對MS3落地設備(質量>25 kg)在最不利的水平面上施加800N向下力(以12.5cm×20cm平面試具),確認不致翻覆。", "params": "靜態穩定（8.6.2.2 三擇一）：傾斜 10°；或 10° 斜面繞垂直軸轉 360°；或施力＝垂直向下 50% 重量（≤100 N）且水平 13% 重量（≤250 N，約 125×200 mm 治具、高度 ≤1.5 m）；向下力(8.6.2.3):800N,施力平面12.5cm×20cm;判定:不得翻覆。", "standard_equipment": ["Inclined plane 10°; Several weights up to 100N; scale", "Several weights up to 250N; scale; Test tool 800Nwith a flat surface 12,5cm by 20cm; Ruler"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版)。實驗室列「inclined plane 10deg/15deg + angle level + weight」涵蓋本條(10度)所需;15度屬8.6.5。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Inclined plane (10/15)", "zh": "傾斜試驗平台", "role": "fixture", "instId": "inclined-plane"}, {"en": "Angle gauge / digital level", "zh": "角度規／傾角儀", "role": "equip", "instId": "angle-level"}, {"en": "Calibrated weights / masses", "zh": "砝碼／配重", "role": "fixture", "instId": "weights"}], "diagram": "stability", "qa": "", "pel": [{"equip": "Inclined plane 10°", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "傾斜平台 10°", "instId": "inclined-plane"}, {"equip": "Weights up to 100 N", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "砝碼（≤100 N）", "instId": "weights"}, {"equip": "Scale", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "磅秤", "instId": "scale"}, {"equip": "Weights up to 250 N", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "砝碼（≤250 N）", "instId": "weights"}, {"equip": "Scale", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "磅秤", "instId": "scale"}, {"equip": "800 N test tool, flat surface 12.5 cm × 20 cm", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "800 N 試具（平面 12.5×20 cm）", "instId": ""}, {"equip": "Ruler", "code": "RB", "test": "Static stability for floor standing equipment", "zh": "量尺", "instId": "ruler"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "傾倒試驗屬桌上/落地設備；手持機體N/A，僅落地式地面站/支架觸發。"}, "gist_zh": "放在微傾斜面或施推力，確認不會翻倒——倒下來輕則摔壞、重則壓傷人。", "learn": {"obj": ["能說出 8.6.2.2 三擇一：傾斜 10°／10° 斜面轉 360°／力試驗（50%≤100N＋13%≤250N）", "能說出8.6.2.3向下力試驗：800 N、施力面12.5 cm×20 cm", "能判斷800 N向下力僅適用質量>25 kg之MS3落地設備", "能說出設置要求：門、抽屜、腳輪、可調整式支架擺至最不利位置"], "pit": [], "quiz": [{"q": "靜態穩定試驗（8.6.2.2）有哪三種擇一作法？", "a": "①各方向傾斜至基座傾角 10°；②10° 斜面繞垂直軸轉 360°；③施力：垂直向下 50% 重量（≤100N）且水平 13% 重量（≤250N）；皆不得翻覆。", "src": "CNS p.144-145"}, {"q": "8.6.2.3向下力試驗之力值、試具面與適用對象為何？", "a": "800 N向下力、12.5 cm×20 cm平面試具；僅適用質量>25 kg之MS3落地設備。", "src": "CNS p.144-145"}, {"q": "手持無人機機體需要做靜態穩定試驗嗎？", "a": "不需要(N/A)；本試驗屬桌上/落地設備，無人機僅落地式地面站/支架觸發。", "src": "params"}]}}, {"id": "8.6.4", "clauses": ["8.6.4"], "group": "8", "title_en": "Glass slide test", "title_zh": "玻璃滑動(玻璃滑落)試驗", "purpose_zh": "有些設備底部裝有腳墊或腳座,放在像玻璃這種光滑桌面上時,如果有人靠著它、推它、或它自己受力,可能會整台滑走或滑到桌邊掉下來。這項試驗模擬「設備被放在很滑的玻璃面上」的最不利情況,確認玻璃面傾斜10度時它不會滑移失穩、滑落傷人。屬於穩定性的一種延伸情境。", "analogy_zh": "像把手機架放在光滑的玻璃茶几上,把茶几一側稍微墊高,看它會不會一路滑到桌邊掉下去——會滑落就代表底部抓地力不足。", "procedure_zh": "將設備置於模擬光滑桌面的玻璃板(滑動面)上,使設備僅有支撐支架(腳座)接觸玻璃,再將玻璃面朝最不利方向傾斜10度,觀察設備是否在玻璃面上發生滑移或失去平衡而傾倒/滑落。常見對「非落地、置於水平面且具控制器或顯示器」的設備施作;落地設備此項常判 N/A。", "params": "以玻璃板為支撐面模擬最不利低摩擦條件,設備置於乾淨、乾燥之玻璃覆蓋水平面且僅支撐支架接觸玻璃,將玻璃面朝最不利方向傾斜10度;判定:試驗期間不得滑落或傾倒。", "standard_equipment": ["Glass plate, Inclined plane 10°"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版)。CB報告中此項常見記為「8.6.4 Glass slide test」並對落地設備標 N/A。實驗室列專屬 glass slide test fixture,與標準需求相符。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Glass slide test fixture", "zh": "玻璃滑落試驗治具", "role": "fixture", "instId": "glass-slide"}], "diagram": "", "qa": "", "pel": [{"equip": "Glass plate", "code": "RB", "test": "Glass slide test", "zh": "玻璃板", "instId": "glass-slide"}, {"equip": "Inclined plane 10°", "code": "RB", "test": "Glass slide test", "zh": "傾斜平台 10°", "instId": "inclined-plane"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "腳墊置滑面之穩定情境；僅置桌之地面站/Hub適用，飛行機體N/A。"}, "gist_zh": "模擬放在很滑的玻璃桌面，確認傾斜時不會滑移、滑到桌邊掉落傷人。", "learn": {"obj": ["能說出試驗機制：玻璃面朝最不利方向傾斜10度", "能說出設置條件：乾淨乾燥玻璃面，僅支撐支架（腳座）接觸玻璃", "能判斷合格準則：試驗期間不得滑落或傾倒", "能選出適用對象：置水平面且具控制器或顯示器之設備；落地設備常判N/A"], "pit": [], "quiz": [{"q": "玻璃滑動試驗中，玻璃面要朝哪個方向傾斜幾度？", "a": "朝最不利方向傾斜10度；試驗期間設備不得滑落或傾倒。", "src": "CNS p.147-148"}, {"q": "試驗時設備與玻璃面之接觸與表面條件為何？", "a": "玻璃面須乾淨、乾燥，且設備僅有支撐支架（腳座）接觸玻璃。", "src": "CNS p.147-148"}, {"q": "置於桌面的無人機地面站Hub適用本試驗嗎？落地式呢？", "a": "置桌且具控制器或顯示器者適用；落地設備此項常判N/A。", "src": "CNS p.145"}]}}, {"id": "8.6.5", "clauses": ["8.6.5"], "group": "8", "title_en": "Horizontal force test", "title_zh": "水平力試驗", "purpose_zh": "模擬有人從側面推設備、靠在設備上、或施加一個水平方向的力(例如不小心撞到),看設備會不會被推倒。這是穩定性試驗裡專門針對「橫向被推」的情境,目的是確保日常使用中人對設備的正常推靠不會造成翻覆傷人。", "analogy_zh": "像有人用手橫向推一下落地式螢幕架或大型音響:正常力道推它,它應該站得穩、不會倒過來砸到人。", "procedure_zh": "對設備施加水平推力＝設備重量之 20% 或 250 N 取較低者，施力於最不利點（高度不超過支撐面上方 1.5 m），觀察設備是否傾倒；或改以自垂直傾斜最大 15°（含置於 15° 斜面旋轉 360°）方式試驗。試驗時所有門、抽屜、腳輪、可調整式支架等可動部件均擺在最不穩定的位置。判定不得翻覆。", "params": "水平力=設備重量20%或250N二者較低者,上限250N(實驗室列 weights>=250N);常以15度斜面配合配重施作;施力於最不利點;判定:設備不得傾倒。", "standard_equipment": ["Inclined plane 15°; several weights at least 250 N; scale"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版)。實驗室列 weights>=250N,符合本條水平力之量級需求。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Calibrated weights / masses", "zh": "砝碼／配重", "role": "fixture", "instId": "weights"}], "diagram": "", "qa": "", "pel": [{"equip": "Inclined plane 15°", "code": "RB", "test": "Horizontal force test", "zh": "傾斜平台 15°", "instId": "inclined-plane"}, {"equip": "Weights ≥ 250 N", "code": "RB", "test": "Horizontal force test", "zh": "砝碼（≥250 N）", "instId": "weights"}, {"equip": "Scale", "code": "RB", "test": "Horizontal force test", "zh": "磅秤", "instId": "scale"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "側推傾倒，針對較高落地設備；僅地面站/支架觸發，手持機體N/A。"}, "gist_zh": "從側面施加水平推力，確認日常被人推、靠時設備不會翻覆。", "learn": {"obj": ["能說出水平力為設備重量20%與250N取較低者，上限250N。", "能說出施力於最不利點，高度不超過支撐面上方1.5m。", "能解釋試驗前可動部件須擺在最不穩定位置。", "能判斷手持機體N/A，僅落地地面站/支架觸發本試驗。"], "pit": [{"t": "誤解：水平力一般≥250N。正解：取設備重量20%與250N二者較低者，250N為上限；≥250N係實驗室砝碼備量需求。", "src": "CNS p.148"}, {"t": "誤解：試驗須量測腳座或可動部件之位置。正解：應把門、抽屜、腳輪、可調整式支架等擺在最不穩定位置後施測。", "src": "CNS p.148"}], "quiz": [{"q": "無人機地面站機櫃重量2,000N，8.6.5水平推力應施加多少？", "a": "250N。設備重量20%為400N，與250N取較低者，故施加上限值250N。", "src": "CNS p.148"}, {"q": "施加水平力前，設備的門、抽屜、腳輪應如何配置？", "a": "全部擺在導致最不穩定條件的位置（含可調整式支架等可動部件），再施力試驗。", "src": "CNS p.148"}, {"q": "除水平推力外，8.6.5可改用什麼替代方式試驗？", "a": "自垂直傾斜最大15°，含置於15°斜面旋轉360°；判定同樣不得翻覆。", "src": "params"}]}}, {"id": "8.7", "clauses": ["8.7"], "group": "8", "title_en": "Equipment mounted to a wall, ceiling or other structure", "title_zh": "安裝於牆壁、天花板或其他結構之設備", "purpose_zh": "確認鎖在牆上或吊在天花板的設備(像壁掛攝影機、吸頂裝置)不會因為固定不牢而掉下來砸到人。掛得越高,掉下來越危險——標準甚至規定只要裝在2公尺以上,不管多重都當成最高危險級(MS3)。這項試驗就是用力往下拉/壓,模擬它長期承重與意外受力,確認固定點夠牢。", "analogy_zh": "像裝好冷氣或壁掛電視後,自己用力往下拉拉看、掛個重物試試,確定它不會哪天突然掉下來砸到沙發上的人。", "procedure_zh": "依製造商說明安裝設備，安裝裝置定位於支撐上最嚴苛受力處（含熱塑材料影響強度者，先做 T.8 應力釋放再試驗）。試驗1（製造商有定義安裝裝置）：設備自重外，於設備重心施加額外向下力——取「設備重量 3 倍」與「設備重量＋880 N」較小者——維持 1 分鐘；之後橫向施加 50 N 水平力 1 分鐘。試驗2（設備僅提供掛鉤、螺孔等附著部件）：將「4 倍設備重量」與「2 倍設備重量＋880 N」較小者除以附著點總數，對每個代表附著點逐點施 6 次力（剪力 4 方向＋向內推＋向外拉，各 1 分鐘）。試驗3（安裝仰賴螺紋部件）：每個螺紋件依表 37 扭矩擰緊再鬆開共 5 次。判定：設備及安裝裝置不得脫出、保持機械性完整及穩固，螺紋維持機械性完整。", "params": "三試驗結構（CNS p.148-149）——試驗1（製造商定義安裝裝置）：設備自重外，於重心施加向下力 min(3×設備重量, 設備重量+880 N) 維持 1 分鐘，之後橫向施加 50 N 水平力 1 分鐘。試驗2（僅提供掛鉤/螺孔等附著部件）：以 min(4×設備重量, 2×設備重量+880 N) 除以附著點總數，對每一代表附著點一次一點施 6 次力（垂直中心軸之剪力 4 方向、平行軸向內推、向外拉，各 1 分鐘）。試驗3（螺紋部件）：依表 37 扭矩擰緊再鬆開共 5 次，扭矩逐步施加。判定（8.7.3）：設備與安裝裝置不得脫出、試驗中保持機械性完整及穩固、螺紋維持機械性完整。安裝高度 >2 m 一律 MS3（表 35 項目6）。實驗室列 weights>=880N 與 push-pull gauge，與 880 N 項相符。", "standard_equipment": ["Several weights, timer, scale; Torque gauges; push-pull gauge"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版)。880N為公式中之常數項,實驗室配置適當。注意UL版於 Annex 對牆掛另有國別差異,但CNS/IEC本文一致。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Calibrated weights / masses", "zh": "砝碼／配重", "role": "fixture", "instId": "weights"}, {"en": "Push-pull force gauge", "zh": "推拉力計", "role": "equip", "instId": "push-pull"}], "diagram": "", "qa": "", "pel": [{"equip": "Weights", "code": "RB", "test": "Equipment mounted to a wall or ceiling", "zh": "砝碼", "instId": "weights"}, {"equip": "Timer", "code": "RB", "test": "Equipment mounted to a wall or ceiling", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Scale", "code": "RB", "test": "Equipment mounted to a wall or ceiling", "zh": "磅秤", "instId": "scale"}, {"equip": "Torque gauge", "code": "RB", "test": "Equipment mounted to a wall or ceiling", "zh": "扭力計", "instId": "torque-gauge"}, {"equip": "Push-pull gauge", "code": "RB", "test": "Equipment mounted to a wall or ceiling", "zh": "推拉力計", "instId": "push-pull"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "僅當有壁掛/吸頂配件(如充電基座)；>2m安裝逕為MS3，須固定試驗。"}, "gist_zh": "對壁掛/吸頂設備施力下拉，確認固定夠牢不會掉落；裝 2 公尺以上一律當最高危險級。", "learn": {"obj": ["能區分試驗1（製造商定義安裝裝置）與試驗2（僅提供附著部件）之適用情境。", "能換算試驗1 向下力 min(3×重量, 重量+880N) 與試驗2 之每點分攤力。", "能說出 8.7.3 判準：不得脫出、保持機械性完整及穩固、螺紋完整。", "能判斷安裝高度超過 2 公尺之設備一律列 MS3。"], "pit": [{"t": "誤解：8.7力值公式易誤記（曾列敘事修正）。正解：自重外另加min(3×重量, 重量+880N)，總力即min(4×重量, 2×重量+880N)。", "src": "查證記錄 19處敘事修正(8.7)"}], "quiz": [{"q": "壁掛充電基座重量500N、製造商有定義安裝架（試驗1），力怎麼施？", "a": "自重外於重心另加 min(3×500, 500+880)=1,380N 向下維持1分鐘，之後橫向施 50N 水平力1分鐘。", "src": "CNS p.148"}, {"q": "壁掛設備安裝高度超過2公尺，MS等級如何認定？", "a": "一律MS3，不論設備多重；掛越高掉落越危險，故直接列最高危險級。", "src": "params"}, {"q": "吸頂基座重500N、僅提供4個螺孔（試驗2），每個附著點怎麼施力？", "a": "min(4×500, 2×500+880)=1,880N÷4=470N；逐點施6次（剪力4方向＋內推＋外拉，各1分鐘）；螺紋件另依表37扭矩×5次。", "src": "CNS p.149"}]}}, {"id": "8.8", "clauses": ["8.8"], "group": "8", "title_en": "Handle strength", "title_zh": "握把/提把強度", "purpose_zh": "確認設備上用來「提著走」的把手夠牢固,提起來時不會斷裂、脫落,害設備整台掉下去砸到腳或地面。把手一斷,重的設備掉下來可能壓傷人,所以要先用比實際更重的負荷把它「考驗」一遍。", "analogy_zh": "像買行李箱前先把提把拉起來、再壓上比實際更重的東西甩一甩,確定提把不會斷、不會脫落。", "procedure_zh": "以不夾持的方式(用扁帶/織帶,寬約75mm)把試驗負荷均勻施加在提把中央75mm寬範圍上,負荷大小依MS等級而定(見下),維持規定時間,確認提把及其固定不斷裂、不鬆脫。", "params": "施力帶寬75mm;MS1(>=2提把)或MS2:施加=3×設備重量;MS3且質量<=50kg:2×設備重量或75kg取大者;MS3且質量>50kg:1×設備重量或100kg取大者;MS1僅單一提把者免測;維持規定時間不得斷裂/鬆脫。", "standard_equipment": ["Belts with 75mm width, several weights, scale, timer"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版)。實驗室列 belts/straps 正是本條規定之75mm非夾持加載方式,配置正確。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Straps / belts (handle test)", "zh": "提把試驗吊帶", "role": "fixture", "instId": "belts"}], "diagram": "handle", "qa": "", "pel": [{"equip": "Straps/belts (75 mm width)", "code": "RB", "test": "Handle strength test method", "zh": "吊帶（寬 75 mm）", "instId": "belts"}, {"equip": "Weights", "code": "RB", "test": "Handle strength test method", "zh": "砝碼", "instId": "weights"}, {"equip": "Scale", "code": "RB", "test": "Handle strength test method", "zh": "磅秤", "instId": "scale"}, {"equip": "Timer", "code": "RB", "test": "Handle strength test method", "zh": "計時器", "instId": "stopwatch"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "僅當機體/機箱/地面站附提把時測；多數手持飛行器無提把，否則N/A。"}, "gist_zh": "用超過實際的重量考驗提把，確認提起時不斷裂、不脫落害設備掉落砸腳。", "learn": {"obj": ["能選出對應MS等級與質量的提把試驗負荷公式。", "能換算MS3且質量≤50kg者取2×重量或75kg較大者。", "能判斷MS1僅單一提把之設備免測。", "能說出以非夾持扁帶均勻加載，不得斷裂或鬆脫。"], "pit": [{"t": "誤解：CNS目錄「把手強度」與正文「握柄強度」是不同條文。正解：同屬8.8，目錄與正文用詞不一，引用以正文為準。", "src": "查證記錄 C-02"}], "quiz": [{"q": "MS3、質量40kg設備的提把試驗負荷是多少？", "a": "80kg。MS3且質量≤50kg取「2×設備重量或75kg較大者」，2×40=80kg大於75kg。", "src": "params"}, {"q": "MS1設備只有一個提把，8.8如何處理？", "a": "免測。MS1僅單一提把者免測；MS1有2個以上提把或MS2者施加3×設備重量。", "src": "params"}, {"q": "無人機外箱提把試驗的合格判定是什麼？", "a": "負荷維持規定時間後，提把及其固定不斷裂、不鬆脫，設備不致掉落砸傷。", "src": "params"}]}}, {"id": "8.10", "clauses": ["8.10"], "group": "8", "title_en": "Carts, stands, and similar carriers (NOTE: this is clause 8.10 in IEC 62368-1:2018 Ed.3; clause 8.11 in Ed.3 is 'Mounting means for slide/rail-mounted equipment (SRME)')", "title_zh": "推車、支架及類似承運裝置（測試以 440 N 經 Ø30 mm 圓面施力）", "purpose_zh": "確認用來承載並推動設備的推車、落地支架(像電視推車、投影機推架)夠堅固、夠穩,人推它、靠它、撞到它時,車架不會被壓垮,上面承載的設備也不會翻落砸到人。這類承運裝置通常較高又會移動,翻倒很容易壓到小孩或腳,所以要施力測試其結構與穩定。", "analogy_zh": "像買電視推車時,用力壓一下層板、推一下整台車,確認層板不會塌、整車不會一推就倒、電視不會滑落。", "procedure_zh": "以直徑30mm的圓形施力面,對推車/支架的承載面/結構施加最高440N的力,評估其機械強度與穩定性(含衝擊、水平力施加情境)。輪子/腳輪本身是否牢固則屬8.9的20N拉力試驗,另行查核。維持規定時間,確認結構不破壞、不傾倒、承載設備不掉落。", "params": "施力上限440N,經直徑30mm圓形施力面施加;另含衝擊與水平力穩定性評估(輪/腳輪固定之20N拉力要求屬8.9);判定:結構不破壞、不傾倒、載重物不掉落。", "standard_equipment": ["Force up to 440 N with a circular plan surface Ø 30mm, stop watch,"], "iec_bsmi": "已協和（採 IEC 62368-1:2018 第3版）。條號說明：本測試（440 N 經 Ø30 mm 圓面施力）對應 CNS 15598-1／IEC 62368-1 之 <b>8.10</b>「推車、支架及類似承運裝置」，官方 IECEE CTL P.E.L. 亦列於 8.10（代碼 RB，基本必備）。原 Excel 誤標「8.1」、本表初版誤植「8.11」（8.11 實為「滑軌安裝式設備之架設裝置（SRME）」，以配重＋計時器試驗），均已更正為 <b>8.10</b>。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Force applicator 440 N (Ø30 mm)", "zh": "440 N 施力裝置（Ø30 mm 圓面）", "role": "fixture", "instId": "force-440"}], "diagram": "", "qa": "PEL 確認：推車／支架／承運裝置為 8.10 條（PEL：「Force up to 440 N, Ø30 mm 圓面 ＋ stop watch」RB）；第3版 8.11 為「滑軌安裝式設備之架設裝置(SRME)」。清單標號 8.1／8.11 宜更正為 8.10。", "pel": [{"equip": "Force applicator up to 440 N (circular Ø 30 mm)", "code": "RB", "test": "Carts, stands and similar carriers", "zh": "440 N 施力裝置（Ø30 mm 圓面）", "instId": "force-440"}, {"equip": "Stop watch", "code": "RB", "test": "Carts, stands and similar carriers", "zh": "碼錶", "instId": "stopwatch"}], "match": {"level": "ok", "note": "與標準相符（條號已更正為 8.10）"}, "drone": {"relevant": false, "level": "na", "applies_to": "system", "why_zh": "電視推車／投影推架類承運裝置；無人機產品族無此件，多為不適用。"}, "gist_zh": "對推車/落地支架施力，確認人推、靠、撞時不會壓垮或翻倒、設備不滑落。", "learn": {"obj": ["能說出施力上限440N、經Ø30mm圓形施力面。", "能說出判定三要件：不破壞、不傾倒、載重不掉落。", "能判斷輪/腳輪20N拉力試驗屬8.9，非8.10。", "能說出第3版8.11為滑軌安裝式設備之架設裝置(SRME)。"], "pit": [{"t": "誤解：8.10含檢查輪/腳輪安裝是否牢固。正解：輪/腳輪固定屬8.9之20N拉力試驗（1分鐘），8.10不含此項。", "src": "CNS p.150"}, {"t": "誤解：第3版8.11是「機架安裝設備之安裝機構」。正解：CNS 8.11為「滑軌安裝式設備之架設裝置(SRME)」。", "src": "CNS p.152"}], "quiz": [{"q": "8.10對推車/支架施力的上限與施力面規格？", "a": "最高440N，經直徑30mm圓形施力面施加，維持規定時間。", "src": "params"}, {"q": "8.10判定合格須同時滿足哪三件事？", "a": "結構不破壞、不傾倒、承載設備（載重物）不掉落。", "src": "params"}, {"q": "推車輪子是否牢固的20N拉力試驗屬哪一條？", "a": "屬8.9（20N拉力維持1分鐘），不屬8.10；本條僅評估結構強度與穩定性。", "src": "CNS p.150"}]}}, {"id": "9.6.3", "clauses": ["9.6.3"], "group": "9", "title_en": "Wireless power transmitters - Test method (heating of foreign metallic objects near a near-field wireless power transmitter)", "title_zh": "無線電力傳輸器-試驗方法(近場無線電力傳輸器對鄰近金屬異物之加熱評估)", "purpose_zh": "無線充電板在充電時,如果上面剛好放了一塊金屬小物(鑰匙、手機指環、口香糖錫箔紙、迴紋針等),這塊金屬會被感應加熱,可能燙到拿它的人或引燃旁邊物品。這項試驗就是把幾種代表性的金屬異物放在充電器上,確認它們被加熱後的溫度不會高到燙傷人。對含無線充電功能的產品是必測的熱安全項目。", "analogy_zh": "像把一根鐵湯匙放在電磁爐上:電磁爐會把鐵湯匙加熱到燙手。無線充電板也一樣,這試驗就是確認放上去的小金屬不會被燙到危險的程度。", "procedure_zh": "把標準規定的三種金屬異物(鋼圓片、鋁環、鋁箔)分別放在傳輸器表面,於規定室溫環境下啟動充電,在傳輸器上移動異物找出溫度最高的位置,並量測異物溫度。共做四種情境:無接收器直接接觸、有接收器直接接觸、有接收器間隔2mm、有接收器間隔5mm(以墊片控制間距)。每個異物依圖面裝有熱電偶量溫(任何合適型式皆可)。判定:異物溫度不得超過70°C。", "params": "溫度上限70°C;四種情境:無接收器直接接觸、有接收器直接接觸、有接收器間距2mm、有接收器間距5mm;異物於表面移動以尋找最高溫位置;以熱電偶量測(圖47-49圖註:任何合適型式)。(異物精確尺寸/材質規格依標準 Figure 47-49 或2023版 Figure 49-51。)（試件圖號：CNS Ed.3＝圖 47 鋼盤／圖 48 鋁環／圖 49 鋁箔，p.158-160；IEC Ed.4＝Figure 49/50/51，內容相同）", "standard_equipment": ["Figure 49 – Steel disc; Figure 50 – Aluminium ring; Figure 51 – Aluminium foil; Spacers with 2.0 0.5 mm thick and 5.0 0.5 mm thick"], "iec_bsmi": "已協和(採 IEC 62368-1:2018 第3版,含無線電力傳輸器條款)。實驗室列 steel disc/aluminium ring/aluminium foil/spacers 與標準三種異物及間距墊片完全對應,配置正確。注意:9.6 自第3版納入;不同版次圖號(Fig.47-49 vs 2023版 Fig.49-51)略異,但試驗方法與70°C限值一致。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Wireless-power foreign-object set", "zh": "無線充電異物試驗組", "role": "fixture", "instId": "wireless-fod"}], "diagram": "wirelessfod", "qa": "", "pel": [{"equip": "Figure 49 – Steel disc; Figure 50 – Aluminium ring; Figure 51 – Aluminium foil; Spacers with 2.0 0.5 mm thick and 5.0 0.5 mm thick", "code": "RWPT", "test": "Wireless power transmitters", "zh": "鋼片/鋁環/鋁箔異物組(圖49-51)", "instId": "wireless-fod"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "system", "why_zh": "僅配近場無線充電機種適用(RWPT，異物≤70℃)；多數無人機為有線/接點充電，常N/A。"}, "gist_zh": "放鋼片/鋁環/鋁箔等異物量溫，確認感應加熱不致燙傷人；含無線充電必測。", "learn": {"obj": ["能說出三種金屬異物：鋼圓片、鋁環、鋁箔。", "能說出四種情境，含接收器間距2mm與5mm墊片。", "能判斷異物溫度超過70°C即不合格。", "能解釋異物須在表面移動以找出最高溫位置。"], "pit": [{"t": "誤解：9.6.3規定須用K型熱電偶。正解：CNS圖47/48/49圖註為「熱電偶（任何合適型式）」，K型僅為實驗室慣用。", "src": "CNS p.158-160"}, {"t": "誤解：IEC Ed.4圖49/50/51與CNS圖47/48/49是不同試件。正解：僅版次圖號位移，鋼盤/鋁環/鋁箔內容相同。", "src": "查證記錄 P-02"}], "quiz": [{"q": "無線充電異物加熱試驗的溫度判定上限？", "a": "70°C。任一情境下量得異物溫度超過70°C即不合格。", "src": "CNS p.160-161"}, {"q": "9.6.3共做哪四種量測情境？", "a": "無接收器直接接觸、有接收器直接接觸、有接收器間距2mm、間距5mm（墊片控制間距）。", "src": "params"}, {"q": "無人機無線充電底座試驗時，為何要移動異物？", "a": "在傳輸器表面移動異物找出溫度最高位置再量測，以最壞點對70°C判定。", "src": "params"}]}}, {"id": "B.2.5", "clauses": ["B.2.5"], "group": "annex", "title_en": "Input test (Normal operating conditions)", "title_zh": "輸入試驗（正常操作條件）", "purpose_zh": "這是把產品『接上電、正常操作』後，量它實際吃進去多少電（電流/功率）的試驗。目的是確認產品銘牌上標示的額定電流/功率是真的、沒有低報；如果實際耗電遠超過標示，後續的溫升、保險絲選用、線材載流量等安全評估就會全部失準，可能埋下過熱起火的風險。它本身不是『破壞性』試驗，而是為後面所有發熱與過載試驗『定錨』出正確的操作功率點。", "analogy_zh": "就像買車前先實測油耗：廠商說『百公里 6 公升』，你要實際開一趟量出真實油耗，確認標示沒灌水，後面算續航、油箱大小才不會出錯。", "procedure_zh": "將設備接到額定電壓（若為電壓範圍，則取範圍兩端各測一次），在正常操作條件下運轉到穩定，量測實際輸入電流與輸入功率。對主功能為影像顯示的設備，需用訊號產生器輸入 IEC 60107-1 規定的「三垂直線訊號」、並把畫面控制調到最耗電的狀態（這正是實驗室列出 signal generator 的原因）；含音頻放大器的設備則依附錄 E.1 設定。判定：實測值不得超過銘牌額定值的 110%（即 +10%）。結果記錄於報告附表 B.2.5。", "params": "判定限值：實測輸入電流/功率不得超過額定值的 110%（+10%）。測試電壓：額定電壓；若為電壓範圍則取兩端各測一次。設備需先在正常操作條件下運轉至穩定。", "standard_equipment": ["Ampere meter suitable for the current and waveform, power meter, voltmeter (See Clause 4.1.9)", "Variable loads", "Signal generator in acc. IEC 60107-1:1997"], "iec_bsmi": "已諧調，無已知差異。CNS 15598-1:2020 等同採用 IEC 62368-1:2018 (Ed.3.0)，B.2.5 內容一致。IEC 60107-1（電視接收機量測方法）為被引用之子標準，CNS 亦有對應採用版。", "location": "安規測試區", "utils": [], "equipment": [{"en": "TV/AV signal generator (IEC 60107-1)", "zh": "影音訊號產生器（IEC 60107-1）", "role": "equip", "instId": "siggen-60107"}], "diagram": "", "qa": "", "pel": [{"equip": "Ampere meter suitable for the current and waveform, power meter, voltmeter (See Clause 4.1.9)", "code": "RB", "test": "Input test", "zh": "電流表+功率計+可變負載", "instId": "power-analyzer"}, {"equip": "Variable loads", "code": "RB", "test": "Input test", "zh": "可變負載", "instId": "var-resistor-load"}, {"equip": "Signal generator in acc. IEC 60107-1:1997", "code": "RV", "test": "Input test", "zh": "影音訊號產生器(IEC 60107-1)", "instId": "siggen-60107"}], "match": {"level": "warn", "note": "部分符合"}, "drone": {"relevant": true, "level": "high", "applies_to": "system", "why_zh": "量實際輸入功率以定錨後續溫升/過載試驗;機體大功率馬達與充電器皆須,屬基礎步驟。"}, "gist_zh": "實測產品吃進的電流/功率，確認額定標示沒低報，作為後續發熱與過載評估的基準。", "learn": {"obj": ["能說出判定限值：實測不得超過額定值110%。", "能說出電壓範圍取兩端各測一次，先運轉至穩定。", "能判斷影像顯示設備用三垂直線訊號、含音頻放大器依E.1。", "能解釋輸入試驗為後續溫升/過載評估定錨。"], "pit": [{"t": "誤解：含影音放大功能設備一律依IEC 60107-1以訊號產生器設定。正解：三垂直線訊號適用主功能為影像顯示者；含音頻放大器依附錄E.1。", "src": "CNS p.174-175"}], "quiz": [{"q": "無人機充電器實測輸入功率最多可超出銘牌額定多少？", "a": "不得超過額定值的110%（即+10%）；超過代表標示低報，不合格。", "src": "params"}, {"q": "設備額定電壓標示為一段範圍時，測試電壓怎麼取？", "a": "取範圍兩端各測一次，且先在正常操作條件下運轉至穩定再量測。", "src": "params"}, {"q": "主功能為影像顯示的設備，B.2.5用訊號產生器輸入什麼？", "a": "IEC 60107-1規定的三垂直線訊號，並把畫面控制調到最耗電狀態；含音頻放大器者依E.1。", "src": "CNS p.174-175"}]}}, {"id": "B.3.2", "clauses": ["B.3.2"], "group": "annex", "title_en": "Covering of ventilation openings (Simulated abnormal operating conditions)", "title_zh": "散熱開孔之覆蓋（模擬異常操作條件）", "purpose_zh": "很多電子產品靠機殼上的散熱孔『呼吸』散熱。這個試驗故意把散熱孔堵住，模擬使用者把機器塞進櫃子、貼牆、或被灰塵/紙張蓋住散熱孔的真實情況，看機器會不會因此悶燒、過熱、甚至起火。目的是確認就算散熱被部分擋住，產品也不會變成火災隱患。", "analogy_zh": "就像把正在運轉的筆電放在棉被上、把出風口悶住，看它會不會燙到危險甚至冒煙——這試驗就是刻意製造『悶住散熱孔』的最壞情況。", "procedure_zh": "先讓設備在正常操作條件下運轉，再用一張卡紙（piece of card / cardboard）依規定方式覆蓋住散熱/通風開孔（頂部、側邊、背面有開孔者依序一次覆蓋一面，卡片不小於受試表面且須蓋住該面所有開孔；頂部不同表面的開孔同時以個別卡片覆蓋，側邊與背面的卡片固定上緣自由垂掛），持續運轉直到溫度穩定或保護裝置動作。觀察是否發生過熱、絕緣熔化、起火等危險。試驗後所有安全防護(safeguard)須仍有效。僅適用於確實具有通風開孔的設備。", "params": "覆蓋方式：以一片最小密度 200 g/m² 之卡片（硬紙或薄卡片）依序覆蓋頂部、側邊、背面其中一面（一次一面），卡片不小於受試表面且應蓋住該面所有開孔；頂部不同表面之開孔同時以個別卡片覆蓋。試驗時間：運轉至溫度穩定或保護裝置動作為止。判定：不得起火、不得有危險性絕緣熔化；試驗後安全防護須仍有效。", "standard_equipment": ["piece of card with minimum 200 g/m² density"], "iec_bsmi": "已諧調，無已知差異。CNS 15598-1:2020 等同 IEC 62368-1:2018，B.3.2 條文一致。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Card (vent-cover simulation)", "zh": "卡紙（覆蓋通風孔）", "role": "consumable", "instId": "card-cover"}], "diagram": "", "qa": "", "pel": [{"equip": "piece of card with minimum 200 g/m² density", "code": "RB", "test": "Covering of ventilation openings", "zh": "卡紙(≥200g/m²)", "instId": "card-cover"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "multiple", "why_zh": "僅具散熱開孔之設備適用;機體ESC/電池艙或充電器有通風孔時堵孔測悶燒,密閉機種N/A。"}, "gist_zh": "故意堵住散熱孔模擬塞櫃/貼牆/積塵，確認散熱受阻時不會過熱悶燒起火。", "learn": {"obj": ["能說出覆蓋卡片規格：最小密度 200 g/m² 之硬紙或薄卡片", "能說出依序逐面覆蓋規則：頂部、側邊、背面一次覆蓋一面", "能說出判定：不得起火、無危險性絕緣熔化，試後安全防護仍有效", "能判斷適用性：僅具散熱開孔之設備適用，密閉機種不適用"], "pit": [{"t": "誤解：一次只蓋會造成最不利結果的開孔。正解：CNS 規定依序逐面覆蓋（頂部、側邊、背面一次一面），卡片不小於受試表面且應蓋住該面所有開孔。", "src": "T輪查證（CNS p.176）"}, {"t": "誤解：可移動式設備須置於測試角落或軟木板上。正解：CNS B.3.2 全文無「角落」「軟木」規定，屬他標準概念混入。", "src": "T輪查證（CNS p.176）"}], "quiz": [{"q": "覆蓋散熱開孔之卡片最小密度與尺寸要求為何？", "a": "最小密度 200 g/m²（硬紙或薄卡片）；卡片不小於受試表面，且應蓋住該面所有開孔。", "src": "CNS p.176"}, {"q": "設備頂部、側邊、背面皆有散熱開孔時應如何覆蓋？", "a": "依序一次覆蓋一面；頂部不同表面開孔同時以個別卡片覆蓋，側邊與背面卡片固定上緣自由垂掛。", "src": "CNS p.176"}, {"q": "全密閉、無散熱開孔的無人機是否須做本試驗？", "a": "不須；本試驗僅適用於確實具有通風（散熱）開孔之設備，密閉機種 N/A。", "src": "params"}]}}, {"id": "C", "clauses": ["C"], "group": "annex", "title_en": "UV radiation — UV light conditioning test (C.1 Requirements / test method; C.2 UV light conditioning test: C.2.3 Carbon-arc light-exposure apparatus, C.2.4 Xenon-arc light-exposure apparatus)", "title_zh": "紫外線(UV)輻射 — 紫外線光照調節試驗（C.1 要求與試驗法；C.2 紫外線光照調節：C.2.3 碳弧燈曝照裝置、C.2.4 氙弧燈曝照裝置）", "purpose_zh": "塑膠長期曬太陽會脆化、變色、龜裂。如果一台機器（例如無人機/空拍機的塑膠機身或戶外設備外殼）的塑膠殼是用來『隔離高壓、防止觸電或防止零件飛出』的安全屏障，那它曬幾年後若一掰就碎，安全防護就失效了。這個試驗用人工光源加速模擬數年日曬，再量塑膠還剩多少強度，確認它不會因為紫外線而提早失去保護能力。", "analogy_zh": "就像曬了好幾年的塑膠洗衣夾或庭院塑膠椅，輕輕一折就斷裂——這試驗就是用『人工太陽燈』快轉這個老化過程，提前驗出哪種塑膠殼撐不住。", "procedure_zh": "取塑膠試片置於碳弧燈或氙弧燈加速耐候試驗箱中，依規定光譜、輻照度、黑板溫度 63°C±3°C 與濕度條件曝照（碳弧 720 小時或氙弧 1,000 小時）。曝照前後分別以拉伸(tensile)、彎曲(flexural)、Charpy 衝擊、Izod 衝擊及拉伸衝擊(tensile-impact)試驗量測機械性質。判定：曝照後須保留曝照前機械性質（拉伸/彎曲強度、衝擊強度）至少 70%，且材料耐燃等級不得低於第 6 節之要求（允許改變）。", "params": "曝照時間：碳弧燈連續照射 720 h，或氙弧燈連續照射 1,000 h（C.2.1）。判定限值：曝照後機械性質（拉伸、彎曲、衝擊）保留率 ≥ 70%，且材料耐燃等級不得低於第 6 節之規定（表 C.1 註(d)：允許改變；耐燃分級參照 S.4）。光源依 C.2.3/C.2.4 規定之碳弧或氙弧光譜、輻照度與黑板溫度；兩法皆不需水霧。", "standard_equipment": ["Carbon-arc light-exposure test - apparatus described in ISO 4892-4, or equivalent, in accordance with the; procedures given in ISO 4892-1 and ISO 4892-4 using a type 1 filter, with water spray.; Xenon-arc light-exposure test - apparatus described in ISO 4892-2:2013, or equivalent, in accordance with the procedures given in ISO 4892-1 and ISO 4892-2 using cycle 1 of method A of Table 3, without water spray.; Tensile strength, ISO 527; Flexural strength, ISO 178; Charpy impact, ISO 179-1; Izod impact, ISO 180; Tensile impact, ISO 8256", "Ultraviolet light test apparatus – see annex C."], "iec_bsmi": "已諧調，無已知國家差異。Annex C 之 UV 光照調節法（C.2 碳弧／氙弧燈，180–400 nm）源自 IEC 60950-1 Annex Y。已對照 CNS 15598-1:2020 <b>表 C.1</b>：紫外線照射後結構部件之最小特性殘留為 <b>70%</b>（抗拉 ISO 527／抗彎 ISO 178／衝擊 ISO 179-1／180／8256），照射後置室內 16–96 h 再試。版次注意：IEC 62368-1:2023(Ed.4) 將戶外外殼 UV 要求整併入 Annex Y，但 CNS 15598-1:2020（＝Ed.3）之 UV 耐受仍在 <b>Annex C</b>，故為現行正確條號。", "location": "環境測試區", "utils": [], "equipment": [{"en": "Carbon-arc weathering tester", "zh": "碳弧燈耐候試驗機", "role": "equip", "instId": "uv-carbon"}, {"en": "Xenon-arc weathering tester", "zh": "氙弧燈耐候試驗機", "role": "equip", "instId": "uv-xenon"}, {"en": "Tensile strength tester", "zh": "拉伸強度試驗機", "role": "equip", "instId": "tensile"}, {"en": "Flexural strength tester", "zh": "彎曲強度試驗機", "role": "equip", "instId": "flexural"}, {"en": "Charpy impact tester", "zh": "夏比衝擊試驗機", "role": "equip", "instId": "charpy"}, {"en": "Izod impact tester", "zh": "艾氏（Izod）衝擊試驗機", "role": "equip", "instId": "izod"}, {"en": "Tensile-impact tester", "zh": "拉伸衝擊試驗機", "role": "equip", "instId": "tensile-impact"}], "diagram": "uv", "qa": "", "pel": [{"equip": "Carbon-arc light-exposure apparatus (ISO 4892-4, type 1 filter)", "code": "S", "test": "UV radiation", "zh": "碳弧燈曝照試驗機（ISO 4892-4）", "instId": "uv-carbon"}, {"equip": "Xenon-arc light-exposure apparatus (ISO 4892-2)", "code": "S", "test": "UV radiation", "zh": "氙弧燈曝照試驗機（ISO 4892-2）", "instId": "uv-xenon"}, {"equip": "Tensile-strength test (ISO 527)", "code": "S", "test": "UV radiation", "zh": "拉伸強度試驗（ISO 527）", "instId": "tensile"}, {"equip": "Flexural-strength test (ISO 178)", "code": "S", "test": "UV radiation", "zh": "彎曲強度試驗（ISO 178）", "instId": "flexural"}, {"equip": "Charpy impact test (ISO 179-1)", "code": "S", "test": "UV radiation", "zh": "夏比衝擊試驗（ISO 179-1）", "instId": "charpy"}, {"equip": "Izod impact test (ISO 180)", "code": "S", "test": "UV radiation", "zh": "艾氏衝擊試驗（ISO 180）", "instId": "izod"}, {"equip": "Tensile-impact test (ISO 8256)", "code": "S", "test": "UV radiation", "zh": "拉伸衝擊試驗（ISO 8256）", "instId": "tensile-impact"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅宣告戶外時觸發；為機體塑膠殼UV老化前處理，餵入Y.4.3保留率，PEL為S可外包。"}, "gist_zh": "用人工光源加速數年日曬，確認當作安全屏障的塑膠殼不會因紫外線脆化失效。", "learn": {"obj": ["能說出曝照時間：碳弧連續照射 720 h 或氙弧連續 1,000 h", "能說出判定：機械性質保留率 ≥70%，耐燃等級不低於第 6 節", "能說出 CNS 規定碳弧與氙弧兩法皆不需水霧", "能列出曝照前後量測的五種機械試驗項目"], "pit": [{"t": "誤解：曝照一律 1,000 h 且分段取樣。正解：CNS C.2.1 為連續照射，碳弧 720 h、氙弧 1,000 h；分段取樣屬他標準慣例。", "src": "查證記錄 敘事修正（CNS p.182）"}, {"t": "誤解：曝照後材料耐燃等級須維持不變。正解：表 C.1 註(d) 允許耐燃等級改變，只要不低於第 6 節之規定即可。", "src": "CNS p.181"}], "quiz": [{"q": "碳弧燈與氙弧燈各須連續曝照多久？", "a": "碳弧燈連續照射 720 h、氙弧燈連續照射 1,000 h；C.2.1 規定為連續照射。", "src": "CNS p.182"}, {"q": "曝照後機械性質保留率與耐燃等級的判定門檻為何？", "a": "拉伸、彎曲、衝擊性質保留率 ≥70%；耐燃等級允許改變，但不得低於第 6 節之規定。", "src": "CNS p.181"}, {"q": "無人機塑膠機殼在什麼情況下須做附錄 C 的 UV 調節試驗？", "a": "當塑膠殼是隔離高壓、防觸電或防零件飛出的安全屏障且會長期日曬時，須驗證不因紫外線脆化而失去保護能力。", "src": "params"}]}}, {"id": "E", "clauses": ["E"], "group": "annex", "title_en": "Test conditions for equipment containing audio amplifiers", "title_zh": "含音訊放大器設備之試驗條件", "purpose_zh": "音響/喇叭擴大機在『大聲播放音樂』時最會發熱，但若用最大音量的純測試音去測，反而不真實（音樂不會一直滿格）。這條規定了一個公認、可重現的『加載音量』方式（取不失真最大功率的 1/8），讓擴大機處在接近真實長時間使用、又足夠嚴苛的發熱狀態，再去做溫升與起火安全評估。目的是確保擴大機在實際聆聽情境下不會過熱起火。", "analogy_zh": "就像測冷氣耗電不會一直開到最強、也不會關著測，而是設定在『真實長時間使用會出現的負載』；這裡是把擴大機音量設在真實聽音樂時的等效熱負載點（1/8 功率），再來看會不會燒起來。", "procedure_zh": "先以 1 kHz 正弦波訊號（放大器若非設計於 1 kHz 操作則改用峰值響應頻率）餵入放大器，在額定負載阻抗下調到剛好不失真(non-clipped)的最大輸出功率。再把音量降到該不失真功率的 1/8（電壓約降到 35.36%）作為操作點。亦可改用經帶通濾波器(band-pass filter, 依 Figure E.1 特性)限頻之粉紅噪音(pink noise)訊號取代正弦波。所有聲道同時操作、接最不利之額定負載或實際喇叭，於此狀態下進行溫升等正常操作條件試驗；異常操作條件試驗則依 E.3 把控制器調至最不利輸出功率（輸出端子短路亦屬異常條件）。", "params": "訊號頻率：1 000 Hz 正弦波（或峰值響應頻率）。操作功率：不失真最大輸出功率之 1/8（電壓約為不失真值之 35.36%；功率比 0.3536² ≈ 0.125）。替代訊號：經 Figure E.1 帶通濾波之粉紅噪音（近似峰值因數約 4）。條件：所有聲道同時操作、接最不利額定負載或實際喇叭。", "standard_equipment": ["Signal generator (sinus) 1kHz or alternative; Band-pass filter for wide-band noise measurement, pink noise signal generator; Variable wood test box"], "iec_bsmi": "已諧調，無已知差異。Annex E 條件源自舊 IEC 60065（音響安全）4.2/4.3 之 1/8 功率與粉紅噪音法，CNS 15598-1:2020 等同 IEC 62368-1:2018 一致採用。木製障板源自 IEC 60268 系列喇叭量測之標準障板概念。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Variable wooden test enclosure (audio)", "zh": "可變木質試驗箱（音頻）", "role": "fixture", "instId": "wood-box"}, {"en": "1 kHz sine signal generator", "zh": "1 kHz 正弦訊號產生器", "role": "equip", "instId": "siggen-1khz"}, {"en": "Pink-noise generator + band-pass filter", "zh": "粉紅噪音產生器＋帶通濾波器", "role": "equip", "instId": "pink-noise"}, {"en": "Regenerative AC/DC power source", "zh": "可程式交直流電源供應器", "role": "equip", "instId": "ac-dc-source"}, {"en": "DC power supply", "zh": "直流電源供應器", "role": "equip", "instId": "dc-supply"}, {"en": "DC electronic load", "zh": "直流電子負載", "role": "equip", "instId": "dc-load"}, {"en": "Power analyzer / power meter", "zh": "功率分析儀", "role": "equip", "instId": "power-analyzer"}, {"en": "Temperature data logger (thermocouples)", "zh": "溫度記錄器（熱電偶）", "role": "equip", "instId": "datalogger"}], "diagram": "", "qa": "", "pel": [{"equip": "Signal generator (sine) 1 kHz or alternative", "code": "RA", "test": "Test conditions for equipment intended to; amplify audio signals", "zh": "1 kHz 正弦訊號產生器（或替代）", "instId": "siggen-1khz"}, {"equip": "Band-pass filter + pink-noise signal generator (wide-band noise)", "code": "RA", "test": "Test conditions for equipment intended to; amplify audio signals", "zh": "帶通濾波器＋粉紅噪音產生器", "instId": "pink-noise"}, {"equip": "Variable wood test box", "code": "RA", "test": "Test conditions for equipment intended to; amplify audio signals", "zh": "可變木質試驗箱", "instId": "wood-box"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": false, "level": "na", "applies_to": "multiple", "why_zh": "僅含>0.5W音訊放大器(RA)才觸發;一般無人機/遙控器無大功率放大器,N/A。"}, "gist_zh": "規定擴大機加載到真實聽音樂的等效音量（1/8 功率），再做發熱與起火安全評估。", "learn": {"obj": ["能換算 1/8 功率對應電壓比：\\(\\sqrt{1/8}\\approx 35.36%\\)", "能說出操作點設定：1 kHz 正弦波調至不失真最大功率再降至 1/8", "能說出替代訊號：經 Figure E.1 帶通濾波之粉紅噪音", "能區分正常試驗（1/8 功率）與異常試驗（E.3 最不利輸出）"], "pit": [{"t": "誤解：1/8 功率時電壓約為不失真值之 35.32%。正解：\\(\\sqrt{1/8}=0.3536\\)，電壓約 35.36%（\\(0.3536^2\\approx 0.125\\)）；35.32% 為錯誤換算。", "src": "T輪查證（CNS p.185＋數學換算）"}, {"t": "誤解：異常操作條件試驗也在 1/8 功率狀態進行。正解：依 E.3 將控制器調至最不利之輸出功率；輸出端子短路亦認定為異常操作條件。", "src": "T輪查證（CNS p.186）"}], "quiz": [{"q": "操作點設在不失真最大輸出功率的幾分之一？對應電壓比約多少？", "a": "1/8 功率；電壓約為不失真值之 35.36%（\\(0.3536^2\\approx 0.125\\)）。", "src": "CNS p.185"}, {"q": "測試訊號頻率規定為何？何時改用其他頻率？", "a": "1 000 Hz 正弦波；放大器若非設計於 1 kHz 操作，則改用峰值響應頻率。", "src": "params"}, {"q": "做異常操作條件試驗時，音量控制器應如何設定？", "a": "依 E.3 調至最不利之輸出功率；輸出端子短路亦認定為異常操作條件。", "src": "CNS p.186"}]}}, {"id": "F.3.7", "clauses": ["F.3.7"], "group": "annex", "title_en": "Equipment IP (ingress protection) rating marking — IP classification per IEC 60529", "title_zh": "設備 IP（侵入防護）等級標示 — 依 IEC 60529 之 IP 分類", "purpose_zh": "IP 等級（例如 IP54、IP67）是告訴使用者『這台機器能擋多少灰塵、多少水』。對無人機/空拍機尤其重要——它會在戶外飛、可能淋雨、降落在塵土中。如果標示了防護等級，就必須實測證明它真的擋得住規定的灰塵與水，否則灰塵或雨水滲入碰到帶電/高溫零件，會造成觸電、短路或起火。這條確保『標多少就真的做得到多少』。", "analogy_zh": "就像潛水手錶標示『防水 50 公尺』，廠商必須真的拿去加壓水缸測過才能標；不能嘴上說防水，結果一淋雨就進水短路。", "procedure_zh": "依 IEC 60529 進行兩部分試驗：第一位數字（防固體異物/防塵）以規定試具或在粉塵試驗箱(dust chamber)中以滑石粉測試；第二位數字（防水）依等級以滴水、噴淋、強力噴射(jet)或浸水(immersion)等對應裝置施加規定水量與時間。試驗後檢查灰塵/水是否侵入到危及安全或妨礙正常運作之程度，並確認標示之 IP 等級成立。", "params": "依 IEC 60529 各等級：防塵第一位數字 0–6（5=防塵、6=塵密，含 2 kPa 負壓 8 h 等）；防水第二位數字 0–8（IPX1 滴水、IPX4 各方向潑水、IPX5 用 6.3 mm／IPX6 用 12.5 mm 噴嘴噴射、IPX7 浸水 1 m/30 min、IPX8 廠商規定更深）。水量、噴射距離、時間、壓力依各等級表訂。", "standard_equipment": ["IP test equipment according to IEC 60529"], "iec_bsmi": "已諧調，無已知差異。IP 等級分類與試驗依 IEC 60529（CNS F.3.7 正文引用 CNS 14165 之 IP 碼）；Annex F.3.7 僅規範該等級之『標示』。對無人機而言此項常為產品安全與市場宣稱之重點。", "location": "防水防塵測試區", "utils": ["需排水", "需用水"], "equipment": [{"en": "IP ingress-protection test equipment (IEC 60529)", "zh": "防塵防水（IP）試驗設備", "role": "equip", "instId": "ip-test"}], "diagram": "ipwater", "qa": "", "pel": [{"equip": "IP test equipment according to IEC 60529", "code": "SP", "test": "Equipment IP rating marking", "zh": "IP防塵防水試驗設備(IEC 60529)", "instId": "ip-test"}], "pel_note": "F.3.7＝IP 等級之標示，IP 試驗設備依 IEC 60529（SP 特殊設施）。戶外更嚴格之防水（IPX4–X8）／防塵（IP5X/6X）另見附錄 Y.5。", "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "conditional", "applies_to": "airframe", "why_zh": "僅當標示IP/宣告戶外才實測(多數空拍機會標);機體防塵防水,室內專用機N/A。"}, "gist_zh": "確認標示的防水防塵等級（如 IP54/IP67）實測屬實；戶外無人機名不副實會進水短路起火。", "learn": {"obj": ["能說出 IP 碼結構：第一位防固體/防塵 0–6，第二位防水 0–8", "能說出噴嘴口徑：IPX5＝6.3 mm、IPX6＝12.5 mm", "能說出 IPX7 條件：浸水 1 m、30 min", "能解釋有標示 IP 等級即須依 IEC 60529 實測證明屬實"], "pit": [{"t": "誤解：IPX5 用 12.5 mm、IPX6 用 6.3 mm 噴嘴。正解：IPX5＝6.3 mm、IPX6＝12.5 mm；兩口徑曾被對調誤植。", "src": "查證記錄 D-14"}], "quiz": [{"q": "IPX5 與 IPX6 噴射試驗的噴嘴口徑各是多少？", "a": "IPX5 用 6.3 mm 噴嘴、IPX6 用 12.5 mm 噴嘴。", "src": "params"}, {"q": "IPX7 浸水試驗的水深與時間為何？IPX8 呢？", "a": "IPX7 浸水 1 m、30 min；IPX8 為廠商規定之更深條件。", "src": "params"}, {"q": "空拍機標示 IP54 後，依 F.3.7 須負什麼驗證義務？", "a": "須依 IEC 60529 實測證明防塵防水屬實；名不副實時塵水滲入碰到帶電或高溫零件，會觸電、短路或起火。", "src": "params"}]}}, {"id": "F.3.10", "clauses": ["F.3.10"], "group": "annex", "title_en": "Test for permanence of markings", "title_zh": "標示耐久性（永久性）試驗", "purpose_zh": "產品上的安全標示（額定電壓電流、警告語、接地與極性符號等）必須一輩子都看得清楚。如果這些字用手一擦、沾到清潔劑就糊掉或脫落，使用者就可能誤用、接錯電壓或忽略警告而受傷。這個試驗就是用手沾水和油性溶劑去『搓』標示，驗證它夠耐久、不會輕易消失。", "analogy_zh": "就像測試瓶身上的成分標示牢不牢——用濕布和去油的酒精/去漬油不必用力、各擦上 15 秒，看字會不會被擦掉或捲邊；擦掉的就是不合格的劣質標籤。", "procedure_zh": "用手持沾水的布塊在標示上來回搓擦 15 秒，再換沾石油溶劑(petroleum spirit，即正己烷/n-hexane)的布塊搓擦 15 秒。判定：搓擦後標示須仍清晰可辨、不易被移除、標籤邊緣不得捲翹。", "params": "以手搓擦：沾水 15 秒，接著沾石油溶劑(n-hexane) 15 秒。判定：標示仍清晰可辨、不可輕易移除、邊緣不捲翹。", "standard_equipment": ["water/piece of cloth/ timer", "Petroleum spirit (85% n-hexane), (CAS# 110-54-3)"], "iec_bsmi": "已諧調，無已知差異。F.3.10 為 IEC 62368-1 內部條款（非引用 IEC 60529）；石油溶劑沿用 IEC 60950-1 之定義（脂肪族正己烷/試劑級己烷）。CNS 15598-1:2020 一致。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Water + cloth (marking rub)", "zh": "水＋擦布（標示耐久）", "role": "consumable", "instId": "water-cloth"}, {"en": "Petroleum spirit", "zh": "石油醚（去漬油）", "role": "consumable", "instId": "petroleum"}], "diagram": "", "qa": "", "pel": [{"equip": "Water + cloth", "code": "RB", "test": "Durability", "zh": "水＋擦布", "instId": "water-cloth"}, {"equip": "Timer", "code": "RB", "test": "Durability", "zh": "計時器", "instId": "stopwatch"}, {"equip": "Petroleum spirit (85% n-hexane), (CAS# 110-54-3)", "code": "RB", "test": "Durability", "zh": "石油醚(85% n-hexane)", "instId": "petroleum"}], "match": {"level": "ok", "note": "與標準相符"}, "drone": {"relevant": true, "level": "high", "applies_to": "system", "why_zh": "安全標示須耐擦不脫;機體額定/警告、充電器、電池標示皆適用,通用基礎要求。"}, "gist_zh": "用水與油性溶劑搓擦標示，確認額定、警告等安全字樣不會輕易糊掉脫落。", "learn": {"obj": ["能說出程序：沾水布搓擦 15 s，再沾石油溶劑布搓擦 15 s", "能說出施力要求：無施加額外力量下摩擦", "能說出判定：清晰可辨、不易移除、邊緣不捲翹", "能說出石油溶劑規格：85% 正己烷（n-hexane）"], "pit": [{"t": "誤解：標示耐久試驗要用濕布用力擦幾下。正解：以沾水布在無施加額外力量下摩擦 15 s，再換沾石油溶劑布 15 s，不必用力。", "src": "T輪查證（CNS p.192）"}], "quiz": [{"q": "沾水與沾石油溶劑各須搓擦多久？施力規定為何？", "a": "各 15 秒；於無施加額外力量下以手持布塊摩擦。", "src": "CNS p.192"}, {"q": "搓擦後判定標示合格的三個要件為何？", "a": "標示仍清晰可辨、不可輕易移除、標籤邊緣不得捲翹。", "src": "params"}, {"q": "本試驗守護的安全標示包含哪些內容？", "a": "額定電壓電流、警告語、接地與極性符號等安全標示，須長期保持清晰可辨，否則使用者可能誤用受傷。", "src": "params"}]}}, {"id": "G.5.4.5.3", "clauses": ["G.5.4.5.3", "G.5.4.6.3", "G.9.3", "S.3.1", "S.3.2"], "group": "annex", "title_en": "DC-motor running-overload test — bench / alternative test method (G.5.4.5.3) and DC-motor locked-rotor overload test — bench / alternative test method (G.5.4.6.3); fire-ignition indicators per Annex S (wrapping tissue / cheesecloth, S.1 mounting, S.3 bottom-of-fire-enclosure indicators)", "title_zh": "直流電動機運轉過載試驗—台架/替代試驗法 (G.5.4.5.3) 及直流電動機堵轉(locked-rotor)過載試驗—台架/替代試驗法 (G.5.4.6.3)；起火判定指示材料依 Annex S（包裝棉紙/薄棉布，S.3.1 樣品裝設、S.3.2 試驗法及判定）", "purpose_zh": "馬達是無人機最關鍵也最容易出問題的零件。若螺旋槳被卡住(堵轉)或長期超載運轉，馬達線圈會急速升溫，可能燒毀絕緣甚至引燃周圍材料。這組試驗刻意製造『卡死』與『過載』兩種最壞情況，並在馬達周圍鋪上極易燃的薄棉布與棉紙當『火災偵測紙』，看會不會引燃，藉此確認馬達異常時不會釀成火災；試驗後還要做耐電壓測試確認絕緣沒被熱壞。馬達試驗本可在試驗台上模擬整機條件進行；『替代法(.3)』則是當馬達太小或設計特殊、繞組溫度無法精確量測時，改以棉紙/紗布是否引燃來判定。", "analogy_zh": "就像把電風扇用手按住不讓它轉、或一直超載硬轉，看馬達會不會燒起來；周圍鋪上薄如蟬翼的衛生紙當警報——只要被引燃就代表這台會釀火災，不合格。", "procedure_zh": "直流電動機之運轉過載(G.5.4.5)與堵轉(G.5.4.6)各有標準法(.2)與替代法(.3)：標準法直接量繞組溫度對照限值；當馬達體積過小或非傳統式設計、溫度無法精確量測時，才用替代法(.3)以引燃指示判定（兩法皆可在試驗台上模擬安裝條件）。替代法將馬達固定於台架，施加過載或機械堵轉並通電（運轉過載：逐步加載直到過載保護動作、繞組開路或無法再增載；堵轉：通電鎖定 7 小時或至穩態，取較長者），全程將馬達置於鋪單層包裝棉紙之木板上、馬達覆以單層薄棉布（G.5.4.5.3 規定之配置）運轉，觀察是否引燃。試驗後對馬達絕緣施加耐電壓(electric strength)試驗。判定：薄棉布與棉紙不得燒焦或起燃，馬達不得噴出火焰或熔化之金屬，耐壓不得崩潰。", "params": "紗布（cheesecloth）：約 40 g/m² 之漂白棉布（CNS 3.1.16 定義，p.31）；包裝棉紙（wrapping tissue）：12～30 g/m²（p.32）。試驗時間：運轉過載為逐步加載直到過載保護動作、繞組開路或無法再增載（G.5.4.5.3，CNS p.214）；鎖定轉子試驗：7 h 或至穩態（取時間較長者；G.5.4.6.2／G.5.4.6.3，CNS p.215）。判定：棉布/棉紙不得燒焦或起燃；電動機不得噴出火焰或熔化之金屬；試後耐電壓不得崩潰。", "standard_equipment": ["Cheesecloth (bleached cotton cloth 40g/m2), Wrapping Tissue (12g/ m2 – 30g/m2)"], "iec_bsmi": "已諧調，無已知差異。條號說明：本列條號字串「G.5.4.5.3 G.5.4.6.3 G.9.3 S.3.1 S.3.2」與設備（棉布／棉紙起火指示材料）係<b>逐字對應官方 IECEE CTL P.E.L.（IEC 62368-1:2023）之同一列</b>，為忠實轉錄、非誤植。主體條號為 G.5.4.5.3（DC 馬達運轉過載—台架法）與 G.5.4.6.3（堵轉—台架法）；S.3.1／S.3.2 為 Annex S 起火指示材料之安裝與底部開孔判定。其中「G.9.3」之引用源自官方 P.E.L. 原文（IEC 62368-1 之 G.9 本體為 IC 限流器），屬官方文件既有用語，實驗室無需更動。", "location": "安規測試區", "utils": [], "equipment": [{"en": "Cheesecloth (bleached cotton)", "zh": "棉紗布（漂白棉布）", "role": "consumable", "instId": "cheesecloth"}, {"en": "Wrapping tissue", "zh": "薄棉紙（包裝紙）", "role": "consumable", "instId": "tissue"}], "diagram": "", "qa": "", "pel": [{"equip": "Cheesecloth (bleached cotton, 40 g/m²)", "code": "RB", "test": "Alternative test method", "zh": "漂白棉紗布（40 g/m²）", "instId": "cheesecloth"}, {"equip": "Wrapping tissue (12–30 g/m²)", "code": "RB", "test": "Alternative test method", "zh": "包裝棉紙（12–30 g/m²）", "instId": "tissue"}], "match": {"level": "ok", "note": "與標準相符（條號逐字對應官方 P.E.L.）"}, "drone": {"relevant": true, "level": "core", "applies_to": "airframe", "why_zh": "直接測無刷馬達堵轉/過載是否引燃(Annex S棉布指示);螺旋槳卡死為機體核心起火源。"}, "gist_zh": "製造馬達堵轉與過載最壞情況、周圍鋪易燃棉紙偵測，確認不引燃、絕緣不被熱壞。", "learn": {"obj": ["能說出替代法要件：馬達過小或非傳統設計致溫度無法精確量測", "能說出指示材料：紗布約 40 g/m²、包裝棉紙 12–30 g/m²", "能說出運轉過載停止條件：保護動作、繞組開路或無法再增載", "能說出判定：不得燒焦或起燃、不噴焰或熔金屬、耐壓不崩潰"], "pit": [{"t": "誤解：替代法(.3)是可把馬達拆到工作台上測的便利選項。正解：其要件為馬達體積過小或非傳統設計致溫度無法精確量測，改以引燃指示判定；台架模擬兩法皆可用。", "src": "T輪查證（CNS p.213-214）"}, {"t": "誤解：紗布（cheesecloth）規格為 35.7–38.5 g/m²。正解：CNS 3.1.16 定義為約 40 g/m² 之漂白棉布；35.7–38.5 屬他標準值混入。", "src": "查證記錄 D-15"}], "quiz": [{"q": "堵轉（locked-rotor）試驗須通電鎖定多久？", "a": "鎖定轉子 7 h 或達到穩態條件，二者取其時間較長者。", "src": "CNS p.215"}, {"q": "替代法的引燃判定準則為何？", "a": "棉布/棉紙不得燒焦或起燃；電動機不得噴出火焰或熔化之金屬；試後耐電壓不得崩潰。", "src": "CNS p.215"}, {"q": "無人機馬達何時才能改用替代法(.3)而非直接量繞組溫度？", "a": "當馬達體積過小或非傳統式設計、繞組溫度無法精確量測時，改以棉紙/紗布是否引燃來判定。", "src": "CNS p.214"}]}}, {"id": "G.7", "clauses": ["G.7"], "group": "annex", "title_en": "Mains supply cords — Cord anchorage and strain relief (G.7.3.2: strain-relief pull/torque test, Table G.8) and Non-detachable cord bend protection (G.7.5: radius of curvature)", "title_zh": "電源供應線 — 線固定與應力消除（G.7.3.2：應力消除拉力/扭力試驗，表 G.8）及不可拆卸電源線之彎曲保護（G.7.5：曲率半徑）", "purpose_zh": "電源線常被使用者拉扯、絆到、纏繞收納。這個試驗檢查線材『固定座』夠不夠牢——用規定的力道去拉、去扭電源線，確認內部導線不會被扯鬆、火線不會脫離端子碰到外殼（否則整台機殼帶電會電人）。彎曲保護(曲率半徑)則檢查電源線在出線口處不會因反覆彎折而折斷、銅線外露。對會頻繁收納、攜帶的設備（如無人機充電器）特別重要。", "analogy_zh": "就像吹風機的電源線——你常用力一拔插頭，若線根固定不牢，內部銅線就會被扯鬆甚至露出；出線口若沒有保護套，反覆折同一點久了就會斷裂冒火花。這試驗就是模擬這些拉扯與彎折。", "procedure_zh": "應力消除(G.7.3.2)：將規定拉力依表 G.8 施加於電源線（依設備質量分級：≤1 kg→30 N、>1～4 kg→60 N、>4 kg→100 N），於最不利方向施加 1 秒、重複 25 次，隨後立即施加 0.25 N·m 扭力 1 分鐘（並於相反方向重複）；判定電線之縱向位移不得超過
